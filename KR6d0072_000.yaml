front:
  text: 重刻法華科注序妙法者是自心之別名蓮華者乃妙法之巧喻也心之於物即事而真猶如蓮之方華即實處染而淨經者訓徑宜達自心妙境之要路也蓋目諸佛出興唯為斯一事欲令衆生開示佛知見便得清淨故正與達磨直指人心示其捷徑全無二致矣智者手不執卷常讀是經口無言音遍誦衆典者斯之謂乎小子存䇿效重鍥於徐氏擬豫於柯山重需讐校其書倫師雖祖述天台及妙樂舊所刊行不能無差訛豈翅分毫作亥豕而已其義亦間燕説舉燭今為是正而以便弘闡所謂總持無文字文字顯總持茲知文持持一佛乘義持持一大事然則文辭義詮其舍諸元祿甲戌夏佛降誕日釋養存謹題於讚陽龜山依天台科釋注法華經序四明海慧教院住持傳教沙門平澗必升述靈山會上妙法華經昔日世尊金口宣暢阿難貝多結集羅什次翻此經洎我天台妙談玄疏章安纂集荊溪作記良由如來教化之本原祖師傳弘之命脈故歷劫而不泯遍剎土以流行名德碩師處處建立法幢長篇巨軸在在敷揚教義有倫法師嘗注此經今習善徐居士深信佛乘好樂教法慨茲印板湮沒悉取其經依科分注起倫師已墜之書開後學易入之徑雖曰柯山之述注實皆天台之疏文科標于上注顯于下一覽周知衆義悉現𨤲為七帙壽諸良梓又得諸山名德里閈仁賢相與助成必有寂光佛祖冥空天龍密宣願力原夫天台智者初依大蘇面承南嶽用普賢觀為正行誦法華經為歷事豁然大悟獲旋總持徹見靈山儼然大會親聆妙法轉示後人今演此道誠是先志使後之人聞此生信即一念信解微有開發即略解言趣復能潤物即廣為他説功倍理契即深信觀成現在四信滅後五品兩得相符不遠而復其或知心道友同門信人一言之下心地開通一句之中義天明朗衆寶大車皆本然之物長者大宅即固有之家實相體心曠神怡珍寶所色盈目眩服上妙珍御飾頂髻明珠論壽命則限量墨塵言聚會則影響等妙供養乃攪長河為酥酪受用則變大地作黃金功不浪施福不唐捐閻浮提內豈是虗行龍華會中宜應慶快必升屬在校讐辭不堪命輒陳管見贅云爾元貞改元乙未彌勒生辰書法華經科注目次卷第一序智顗述觀心誦經法與咸録釋經六意法華三分總別之圖弘傳序注序品第一方便品第二卷第二譬喻品第三信解品第四卷第三藥草喻品第五授記品第六化城喻品第七卷第四五百弟子授記品第八授學無學人記品第九法師品第十見寶塔品第十一卷第五提婆達多品第十二勸持品第十三安樂行品第十四從地涌出品第十五卷第六如來壽量品第十六分別功德品第十七隨喜功能品第十八法師功德品第十九卷第七常不輕菩薩品第二十如來神力品第二十一囑纍品第二十二藥王菩薩本事品第二十三妙音菩薩品第二十四卷第八觀世音菩薩普門品第二十五陀羅尼第二十六妙莊嚴王本事品第二十七普賢菩薩勸發品第二十八法華經科注目次終天台智者大師觀心誦經法夫欲誦經滅罪第一先須盥漱整肅威儀別座跏趺而坐第二入觀觀所坐之座高廣嚴好次觀座下皆有天龍八部四衆圍繞聽法次須運心作觀觀我能為法師傳佛正教為四衆説想所出聲非但此一席衆乃至十方皆得聽受名為假觀次觀能説之人所誦之經何者是經為經卷是為紙墨是為標軸是誦音為口出為齦齶和合而出為有我身為無我身誰是誦者為心是誦為口是誦為和合出觀此四衆為是實有為從想生四衆非有無我能誦是名空觀雖無所誦之經而有經卷紙墨文字雖無能誦之人而有我身為四衆宣説雖非內外不離內外雖非經卷不離經卷雖非身口不出身口從始至終必無差謬名不可思議能作此解能作此觀名為三觀於一心中得不前不後三觀宛然雖無施者而有法施雖無受者四衆炳然雖無法座登座宣説非一二三而一二三名為法施檀波羅蜜專心誦持無諸遮礙名為持戒忍耐惡覺名聞財利皆不能惱名之為忍一心不息從始至終無有懈怠名為精進專念此經無有愛味名之為禪分別無謬序正流通無不諦了句文分明名為般若是名六波羅蜜具足自行此經名之為實傳授外人名之為權若能一生以此成辦功德於無始心名為正因仍有觀心名為了因高座為四衆説授名為緣因三觀具足若觀未明但是性德研之不已觀心相應名托聖胎以胎業成就名為修德中間四十一位亦修亦性至於極果名為種智伊字三點不縱不橫名大涅槃能到彼岸名第一義空平等大慧是名誦經正觀三世諸佛無不從此而生信者可施無信莫説第三言流通者若自調度不名為慈見苦不救不名為悲既修正觀現前復應莊嚴法界所誦經竟出觀之後以此運觀功德已登正覺者願廣度衆生入位之人悉登上地未入位者即運慈悲二法願未來世共成正覺先敘台宗釋經六意丹丘凝翠蘭若澤山叟與咸録一約五時判大化一華嚴時佛初成道於寂滅場為大菩薩現舍那身説圓滿教即華嚴梵網等經最初頓説二乘之人如聾如啞經云我始坐道場觀樹亦經行於三七日中常思惟是事又云大富長者踞師子牀窮子驚走之時也此如日出先照高山時此經初從佛出如從牛出乳味也二鹿苑時佛之本意皆欲諸衆生普入佛慧奈何機有未堪聞必生謗反增罪業今經云若但讚佛乘衆生沒在苦尋以方便力示以三乘教於是脫舍那珍服著丈六弊衣於鹿苑説小乘法聞則易解即阿含小乘等經二乘悟解證羅漢果今經云密遣二人形色憔悴誘引窮子二十年中常令除糞如日照幽谷如轉乳成酪味也三方等時既於鹿苑權用小乘得此一流方堪受化既受化已將欲還令歸於大乘故寄淨名彈訶殃掘斥罵此一類方堪受得道果聞罵不瞋內懷慚愧恣殃掘之譏任淨名之折如彼窮子過是已後心相體信出入無難見菩薩不思議事心自恥之云何如來以小乘法而見化度是我等咎非世尊也此類小機於方等中能如此悔恨者謂之回心向大是説淨名殃掘思益楞伽諸方等經此如日照平地時如從酪轉生酥味也四般若時小乘之人心既回惑大乘機發於此時為説般若融通淘汰令彼窮子得見寶藏心生欣喜此如日禺中時如轉生酥成熟酥味也五法華涅槃時如來從彼鹿苑調停攝化此諸機緣今日淳熟堪受大法故説無量義經從一法出生諸法欲令知此三乘諸法從一法生可以會彼三乘皆歸一乘於是入無量義處三昧放光現瑞駭動群機假彌勒懷疑而發問寄文殊決答以引起乃云我見燈明佛本光瑞如此以是知今佛欲説法華經故世尊從三昧起稱歎方便三請四止略開廣開普令群機開佛知見皆成佛道方暢如來出世大意使諸漸來一類聲聞悟本見聞皆是佛法無上大寶不求自得客作賤人是長者子授記聲聞悉皆成佛此如日輪當午時如醍醐上味純一無雜然後説涅槃經捃拾殘機扶律談常廣開佛性大事已畢一化已周故於雙林示入涅槃機盡化息矣五時次第竟如上乃約如來出世已來化儀次第二四教釋群經上來但約一代大化述其次第然於此五時所説諸經不一其中説法大小不同故約四教而為判攝四教有二一者化儀四教二者化法四教一化儀四者一頓二漸三祕密四不定乃判教之大綱也華嚴即頓教鹿苑即漸始方等即漸中般若即漸終此三時皆漸教也祕密教者如鹿苑本是説小乘阿含諸經其中有大乘機密為説大或正説大乘有小乘機即密為説小故名祕密也不定教者如説小時忽得大益説大時忽得小益於頓解漸於漸解頓故為不定也此乃以化儀四判於五時説法不同有此儀式若法華者是頓非漸是顯露非祕密是定非不定何也以由昔日機緣未淳設化不一勞於如來不思議化或隱或顯或頓或漸若法華者機已淳熟純一貞實一統大化無復異端普令一切咸歸佛乘故非昔日二三之異也二化法四者即於上來五時之中或頓或漸或祕密或不定説於諸經雖則為機種種異説統而攝之不出四教如華嚴説別圓二教鹿苑唯三藏一教方等諸經備説四教般若衍門唯説三教法華一乘唯説圓教涅槃扶律則有追説追泯兩種四教如此五時羣經無量括而統之無出此四故此四教乃是釋經之網目故知法華五時中乃純圓獨妙之經也三三觀論修證教為能詮教下則有理智因果行位等法為所詮如諸大士聞教修行依教而證故約三觀為所修三惑為所破三諦為所證約此破惑證理之處則有行位淺深高下所歷也於四教中藏通兩教同詮真理則以空觀為所修見思為所破真諦為所證此之二教所修空觀亦有巧拙不同藏拙則修析法空觀通巧則修體法空觀觀雖巧拙破惑證理皆歸一真別圓兩教以三觀為所修三惑為所破三諦為所證此之二教所修三觀亦有巧拙不同別拙則修次第三觀圓巧則修一心三觀圓破三惑圓證三諦圓成三德也故五時唯第五時所説法華純圓獨妙無復次第於如來一代時教之中乃究竟之極唱也既知此已然後可以消釋經文苟不如上判釋何以知其法華乃超群經之表智者云若釋餘經可無約教若釋法華不可不約時約教以判也四五章釋首題天台凡釋經目必用五章此經乃以法譬為名實相為體一乘因果為宗斷疑生信為用無上醍醐為教相然釋經題目須此五者法理合爾一代藏中經經有名名下必有所詮之法為體約何修行為宗得何功力為用然後區判何時所説何教所收偏圓大小若何攝屬乃為教相故此五法諸經題目缺一不可故體宗用即是三德體即法身宗即般若用即解脫又體即真性軌宗即觀照軌用即資成軌又體即境妙宗即智妙用即行妙釋名是總總三法故教相區判判三法故此五章乃一經之至要天台一家妙得佛意故用以釋經目得茲旨趣於大藏中信手抽經可以判釋也一法譬為名者妙法法也蓮華譬也妙者法上褒美之稱也則有迹門十妙本門十妙云云法者有三所謂衆生法佛法心法衆生法即十界十如權實之法也云云佛法者非別有法亦十界十如權實之法悉能究竟照了無違也心法者即於自心具十界百界千如之法皆一念本有也此三種法佛法太高衆生法大廣初學為難觀於心法則易可了學者現前一念心起或善或惡必屬一界一必具十十具百即有百界千如權實之法一一皆不思議故心法妙也心法既爾佛法衆生法亦然華嚴云心佛與衆生是三無差別故約三法皆不思議為妙法也此法難解假喻易知故用蓮華以喻此法蓮以喻實華以喻權蓮華多奇故有三喻為蓮故華喻為實施權華開蓮現喻開權顯實華落蓮成喻廢權立實此權實因果皆不思議故以蓮華為妙法之喻也經者訓法訓常即教行理可軌之法皆悉常故梵語修多羅此翻契經以何法為經此方衆生用三塵為經一用聲塵為經如佛在世金口演説聲音詮辨聽者得道大品云從善知識處聞也二用色塵為經今佛去世紙墨傳持大品云從經卷中聞也三用法塵為經內自思惟心與法合不由他教亦非紙墨但心曉悟故云修我法者證乃自知也故智者云手不執卷常讀是經口無言音遍誦衆典佛不説法恆聞法音心不思惟普照法界如此學問豈不大哉誦經者當以此時時照心方契妙法蓮華法譬之經也二實相為體者體是一部之旨歸衆義之都會乃真性軌一實相印為經正體故經云唯佛與佛乃能究盡諸法實相經體之旨大有所涉非此可具三一乘因果為宗宗者修行之喉襟顯體之要蹊也經體乃是非因非果無修無證真常妙理也迷失此理為凡夫悟得此理為上聖欲修欲悟須約宗論修有進趣始終之漸行始為因行終為果故以因果為宗迹門破廢方便開顯真實亦明弟子實因實果亦明師門權因權果而成弟子實因實果因正果傍故於前段明迹因迹果也本門發迹顯本廢方便之近壽明長遠之實果亦明弟子實因實果亦明師門權因權果而顯師門實因實果果正因傍故於後段明本因本果合前因果共為經宗四斷疑生信為用用是如來之妙能此經之勝用如來以權實二智為妙能此經以斷疑生信為勝用迹門用佛菩薩二智斷七方便最大無明同入圓因本門破執近之情生本地深信乃至等覺亦令斷疑生信如是勝用衆經所無故以斷疑生信為用五無上醍醐為教相諸經多是逗會他意令他得益不談佛意意趣何之今經但論如來布教之元始中間取與漸頓適時大事因緣究竟終訖説教之綱格大化之筌罤云云但此法華開權顯本前後二文疑多請倍不比餘經秖為深論佛教妙説聖心近會圓因遠申本果所以疑請不已若精知教相則識佛權實二智也五三分分起盡者經前已作圖經中逐段分科自可見故不重述六四釋消經文者一因緣二約教三本迹四觀心始從如是終至而去句句皆約四釋消文因緣者亦名感應衆生無機雖近不見慈善根力遠而自通感應道交故經云諸佛皆以一大事因緣故出現於世故用因緣釋也十方機感曠若虗空此方以音聲為佛事則甘露門開故經云以種種法門宣示於佛道當知種種聲教若權若實皆為佛道而作筌罤故用約教釋也若應機設教教有權實淺深不同須置指存月亡迹尋本非本無以垂迹非迹無以顯本故經云今天人皆謂我出釋氏宮去伽耶城不遠得菩提然我實成佛甚大久遠又云內祕菩薩行外現是聲聞此師弟皆明本迹故用本迹釋也若尋迹迹廣徒自疲勞若尋本本高高不可極如人數他寶耳但觀己心之高廣扣無窮之聖應機成致感逮得己利故經云若人信汝所説則為見我亦見於汝及比丘僧并諸菩薩當知隨有所聞諦心觀察於信心中得見三寶聞説是法見我是佛見汝等是僧故約觀心釋也既文文之下皆用四釋則文文之下皆可觀心秖如王城耆山其實不離自心即現前一念心中心王名王五陰名舍心王造此舍觀此五陰舍即法性法性即受想行識一切衆生即是涅槃畢竟空寂又觀色陰無知如山識陰如靈三陰如鷲觀此靈鷲山即是三法名祕密藏山城既爾諸字例然故法華一部全是自心法門方免數寶之責荊溪云一一句入心成觀觀與經合非數他寶方知止觀一部是法華三昧之筌罤若得此意方合一部經旨歸趣今録如是一句四釋例因緣及約三教義廣且説圓教經初如是者佛明生死即涅槃亦即中道況復涅槃寧非中道真如法界實性實際遍一切處無非佛法阿難傳此與佛説無異故名為如如如不動故名為是此則圓經初如是也若動俗入如三藏義耳不動俗即是如通教義耳動如入如即別教義耳不動如而是如圓教義也約本迹釋者三世十方橫豎皆爾過去遠遠現在漫漫未來永永皆悉如是何處是本何處是迹且約釋尊最初成道經初如是者本也中間作佛説經今日所説經初如是者皆迹也觀心釋者觀前悉檀教迹等諸如是義悉是因緣生法即通觀也因緣即空即假者別觀也二觀為方便道即入中道第一義雙照二諦者亦別觀也上來悉是中道者非通非別觀也云云法華三分總別之圖妙法蓮華經弘傳序終南山釋道宣述科文分三初翻譯元由五初標經意妙法蓮華經者統諸佛降靈之本致也統該攝十方三世諸佛垂迹出現于世之意願也二傳年數蘊結大廈蘊結積集也大廈夏也西國美號出彼千齡佛生周昭王之代教來後漢明之朝則千年也東傳震旦三百餘載或云真丹或作震旦三諸譯名西晉慧帝永康年中長安青門燉煌菩薩竺法護者初翻此經名正法華初翻有十卷題名無妙蓮東晉安帝隆安年中後秦弘始丘慈沙門鳩摩羅什次翻此經名妙法蓮華次在西晉之後翻加仍妙蓮什法師事迹見經首釋隨氏仁壽大興善寺北天竺沙門闍那笈多後所翻者同名妙法闍那具云闍那崛多笈多具云達磨笈多二師同譯添品法華四判文所尚三經重沓文旨互陳時所宗尚皆弘秦本五支品別偈自餘支品別偈支品如添品添藥草喻品也別偈者如普門品羅什譯無偈笈多後加不無其流具如序歷故所非述二感應所以二初通明機應二初機應相由夫以靈嶽降靈非大聖無由開化適化所及非昔緣無以導心靈嶽降靈者借用詩維嶽降靈生申及甫靈鷲垂迹適機開化自非宿昔大通之緣無由開導其心此言機稱於應二初後示義所以仙苑告成機分小大之別華嚴大機鹿苑小機此二句言應必被機金河顧命道殊半滿之科金河義詳名義諸水篇顧命出書顧命涅槃追説四教藏為半字教通別圓為滿字教此二句言機必稟教豈非教被乘時無足核其高會二別示今經三初揀衆得記是知五千退席為進增慢之儔五百授記俱崇密化之迹五千退席佛云退亦佳矣雖曰斥他意在䇿進在座上慢不生退席之心也五百授記崇其密示輔佛行化之迹也二明序判正所以放光現瑞開發請之教源彌勒疑念文殊決答引昔證今開其教源出定揚德暢佛慧之宏略從三昧起廣略開顯權實之法朽宅通入大之文軌化城引昔緣之不墜繫珠明理性之常在鑿井顯示悟之多方辭義宛然諭陳唯遠舉經中四諭也三總結歎自非大哀曠濟拔滯溺之沈流視勞生皆為己子也一極悲心拯昏迷之失性觀法界性以為機也三時代流通三初判時盛弘自漢至唐六百餘載總歷羣籍四千餘軸受持盛者無出此經二明機比益將非機教相扣並智勝之遺塵皆大通佛所結緣之衆也聞而深敬俱威王之餘績深敬不怖由威王佛所聞常不輕所化也三指文用序三初標起輒於經首序而綜之二弘願庶得早淨六根仰慈尊之嘉會速成四德趣樂土之玄猷三謙贈弘贊莫窮永貽諸後云爾
