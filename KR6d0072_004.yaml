body:
  text: 二後兩品授記二初五百弟子受記品授千二百記二授學無學人記品授二千人記初文又二初品目妙法蓮華經五百弟子受記品第八此品具記千二百聲聞品題但標五百者蓋五百得記名同五百口陳領解故以標品耳二經文二初授滿願記二授千二百記初文又二初敘默領解二如來述記初文又二初敘得解歡喜二初敘得解之由四初聞法譬二周開顯爾時富樓那彌多羅尼子從佛聞是智慧方便隨宜說法聞是智慧即領方便火宅中兩處顯實方便隨宜說法即領兩處開權也二聞授五大弟子記又聞授諸大弟子阿耨多羅三藐三菩提記諸大弟子指身子及四大弟子領開權授菩提記即領顯實也三聞宿世因緣之事復聞宿世因緣之事聞化城品宿世因緣即領顯實也四聞佛力觀久若今復聞諸佛有大自在神通之力如來三達無礙觀彼久遠猶若今日即是大自在神通之力斥異二乘止齊八萬即領開權也二敘得解歡喜二初明內解歡喜得未曾有心淨踊躍由昔未聞開權顯實而今得聞故言得未曾有除保證涅槃之愛斷破塵沙無明別惑故言心淨開佛知見是故踊躍二明外形恭敬即從座起到於佛前頭面禮足却住一面瞻仰尊顏目不暫捨得解由佛故起恭敬也二敘默念領解二初正明默念領解而作是念世尊甚奇特所為希有隨順世間若干種性以方便知見而為說法拔出衆生處處貪著我等於佛功德言不能宣上二周身子等得悟皆發言領解此何默念蓋身子等為下根未悟事須彰言勸動今下根已悟無所勸動故默念不言世尊甚奇特所為希有者即是領實智隨順七種方便根性而為說法即是領權智乃領方便品中開權顯實也拔出衆生處處貪著乃領火宅中開權顯實也我等於佛功德言不能宣乃領藥草喻中如來有無量功德迦葉等四大弟子說不能盡即是領所不及今富樓那意謂四大弟子聞火宅譬具領如來五時施化及法身地鑑機等事如來猶斥其領所不及我今聞此雖欲領會豈能逾於四大弟子當知所領之外不及處多是故亦云言不能宣既云言不能宣亦是念所不及也二默求發迹請記唯佛世尊能知我等深心本願我等者通念請發諸人迹也深心是本今現作是迹本願者大慈誓願也大慈下化故我為誓上求作佛故我有願請上求即是求記請說下化即求發迹又從深心故明其三世助佛宣化從本願故即與授記二如來述記二初長行二偈頌初文又二初述本迹三初就釋迦世行因發迹三初舉示其人爾時佛告諸比丘汝等見是富樓那彌多羅尼子不汝等見否有二意一見其迹為小否二見其本功德否衆人但見迹為聲聞而不能知本是菩薩故云見否二總標本迹二初標其迹我常稱其於說法人中最為第一標其迹為說法人中最為第一若非法身妙本無以垂於第一勝迹昔來但言於迹中說法第一今則不爾於無上法久得第一此舉迹以顯本也二標其本亦常歎其種種功德標其本地福慧萬行法門故云種種本地既有種種法門迹中何但為二乘耶此舉本以明迹也三別釋本迹二初迹中助宣半滿之法精勤護持助宣我法能於四衆示教利喜具足解釋佛之正法而大饒益同梵行者助宣我法者即是迹中助宣半滿之法也在鹿苑迹為下根聲聞即是護持助宣三藏半字之法迹在方等示受彈呵即是護持助宣對半明滿之法迹領般若即是護持助宣帶半明滿之法迹在法華得悟即是護持助宣廢半明滿之法上文云我常稱歎種種功德者即此意也本具權實功德而迹於五味助佛調熟實行衆生豈非精勤助宣之意也能於四衆示教利喜者分別半字教也具足解釋者助宣般若滿字教也而大饒益者助佛饒益半滿之衆生也同梵行者是迹中所化半滿之弟子也二別述本地功德莫測自捨如來無能盡其言論之辨降佛已還七方便人不能知其本地之辨二約過去世顯其本行汝等勿謂富樓那但能護持助宣我法亦於過去九十億諸佛所護持助宣佛之正法於彼說法人中亦最第一又於諸佛所說空法明了通達得四無礙智常能審諦清淨說法無有疑惑具足菩薩神通之力隨其壽命常修梵行彼佛世人咸皆謂之實是聲聞而富樓那以斯方便饒益無量百千衆生又化無量阿僧祇人令立阿耨多羅三藐三菩提為淨佛土故常作佛事教化衆生言富樓那非直止於我所助宣半滿之法而於久遠佛所亦後助宣半滿之法取今日助宣為發迹取過去助宣為顯本顯本有二一遠本二近本遠本冥邈為信良難故今但舉九十億近本言之有宿命智能知近本故舉近以證遠令其生信護持助宣即擬助宣半字之法佛之正法即擬助宣對半明滿之法明六波羅蜜互相收攝旋轉無礙又於空法明了通達即擬助宣帶半明滿之法四無礙智即四無礙辨以智在說故一義無礙智知諸法義了了無滯二法無礙智為知一切義故智慧通達諸法無滯三辭無礙智所謂一切衆生殊方異語男女語能令各各得解辨說無礙一切聞者悉解其言說四樂說無礙智菩薩於一字中能說一切字一語中能說一切語一法中能說一切法於所說法皆是真實皆隨可度者而有所益所謂十二部經八萬四千法藏隨一切衆生根性所樂聞法而為說之聞者無厭由具神通之力故能隨佛壽命修清淨行於彼佛世既未發迹人皆謂之實是聲聞不言是大菩薩也化無量衆生令立三菩提者即是助宣廢半明滿之法如是助宣佛法者蓋與物結淨土緣耳若不與物結緣則菩薩成佛時土穢無機可化也三約三世佛所修因行諸比丘富樓那亦於七佛說法人中而得第一今於我所說法人中亦為第一於賢劫中當來諸佛說法人中亦復第一而皆護持助宣佛法亦於未來護持助宣無量無邊諸佛之法教化饒益無量衆生令立阿耨多羅三藐三菩提為淨佛土故常勤精進教化衆生此亦例前助宣半滿之法利益大小機也七佛者若依諸文所出一毗婆尸佛二尸棄佛三毗舍浮佛四俱留孫佛五拘那含牟尼佛六迦葉佛七釋迦牟尼佛此則以莊嚴劫千佛中後之三佛賢劫千佛中初之四佛為七佛也若據今經釋迦自云今於我所說法人中亦為第一則是以七佛為過去釋迦為現在彌勒等佛為當來應指莊嚴劫中後之四佛賢劫中初之三佛為過去七佛而諸文中或以釋迦共前六佛為過去七佛者意恐劫章經在釋迦滅後結集亦以釋迦為過去佛耳二與授記七初明因圓漸漸具足菩薩之道二明果滿過無量阿僧祇劫當於此土得阿耨多羅三藐三菩提號曰法明如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊三明國淨五初明國大嚴淨其佛以恆河沙等三千大千世界為一佛土七寶為地地平如掌無有山陵溪澗溝壑七寶臺觀充滿其中諸天宮殿近處虗空人天交接兩得相見地平如掌者經直云如掌不言手掌手掌不平則非所引海底有石名掌此石無有一微塵許不平當是類如海掌耳又賢劫經正明如佛手掌非引同人掌也二明純是善道無諸惡道亦無女人一切衆生皆以化生無有淫欲無諸惡道者於中亦有差別不同若無女人必無惡道或有女人亦無惡道者如阿閦佛國雖有女人而無女事無量壽佛國二種俱無三明福慧具足得大神通身出光明飛行自在志念堅固精進智慧普皆金色三十二相而自莊嚴其國衆生常以二食一者法喜食二者禪悅食月藏經第九明法食喜食禪食經文總言法喜禪悅別分應有三種差別四明弟子衆多有無量阿僧祇千萬億那由他諸菩薩衆得大神通四無礙智善能教化衆生之類其聲聞衆算數校計所不能知皆得具足六通三明及八解脫五結功德成就其佛國土有如是等無量功德莊嚴成就月藏經第五明十善各十功德一不殺得十功德者一於一切衆生得無所畏二於衆生得大慈心三斷惡習業四無病五長命六非人所護七無惡夢八無怨九不畏惡道十命終生善道後作佛時國無害杖之具國人長壽乃至第十不邪見得十功德一心性柔善乃至第十死生善道作佛時國人正信是為無量功德莊嚴也四劫國名劫名寶明國名善淨五佛壽量其佛壽命無量阿僧祇劫六法住久法住甚久七供舍利佛滅度後起七寶塔遍滿其國二偈頌二初頌發迹二初總發諸聲聞迹五初明難思之法爾時世尊欲重宣此義而說偈言諸比丘諦聽佛子所行道善學方便故不可得思議此標弟子為行難思已得垂迹之法二明垂迹之由知衆樂小法而畏於大智是故諸菩薩作聲聞緣覺三明垂迹利益以無數方便化諸衆生類自說是聲聞去佛道甚遠度脫無量衆皆悉得成就雖少欲懈怠漸當令作佛少欲者示求小乘懈怠者示退大乘以權行引實行化諸衆生漸令作佛也四明內祕外現內祕菩薩行外現是聲聞少欲厭生死實自淨佛土示衆有三毒又現邪見相我弟子如是方便度衆生非但示為聲聞亦示作外道及三毒凡夫如身子示瞋難陀示貪調達示癡皆其類也五明指略抑廣若我具足說種種現化事衆生聞是者心則懷疑惑二別發滿願迹本二初頌顯過去本今此富樓那於昔千億佛勤修所行道宣護諸佛法為求無上慧而於諸佛所現居弟子上多聞有智慧所說無所畏能令衆歡喜未曾有疲倦而以助佛事已度大神通具四無礙智知諸根利鈍常說清淨法演暢如是義教諸千億衆令住大乘法而自淨佛土二頌三世行因未來亦供養無量無數佛護助宣正法亦自淨佛土常以諸方便說法無所畏度不可許衆成就一切智二頌授記四初頌因圓供養諸如來護持法寶藏二頌果滿其後得成佛號名曰法明三劫國名其國名善淨七寶所合成劫名為寶明四頌國淨菩薩衆甚多其數無量億皆度大神通威德力具足充滿其國土聲聞亦無數三明八解脫得四無礙智以是等為僧其國諸衆生淫欲皆已斷純一變化生具相莊嚴身法喜禪悅食更無餘食想無有諸女人亦無諸惡道富樓那比丘功德悉成滿當得斯淨土賢聖衆甚多如是無量事我今但略說二授千二百記三初念請爾時千二百阿羅漢心自在者作是念我等歡喜得未曾有若世尊各見授記如餘大弟子者不亦快乎千二百人皆已得小乘果不為見思所惱故心自在既聞三周說法又見記富樓那是故歡喜念欲請記二與記二初長行三初總記千二百佛知此等心之所念告摩訶迦葉是千二百阿羅漢我今當現前次第與授阿耨多羅三藐三菩提記二別授憍陳如於此衆中我大弟子憍陳如比丘當供養六萬二千億佛然後得成為佛號曰普明如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊陳如最初悟道居于座首故別與記三別授五百人其五百阿羅漢優樓頻螺迦葉伽耶迦葉那提迦葉迦留陀夷優陀夷阿㝹樓䭾離婆多劫賓那薄拘羅周陀莎伽陀等皆當得阿耨多羅三藐三菩提盡同一號名曰普明迦留陀夷此云黑光亦云粗黑顏色黑而光故周陀或云周利此云大路邊生佛本行經云其母隨夫往他國久而有孕垂産思歸行至中路即誕其子如是二度凡生二子乃以大小別之大即周陀小即莎伽陀亦云般陀伽亦云槃特此云小路邊生問佛許千二百次第與記今何但記五百不見千二百得記答此五百即千二百數頌中末後迦葉汝已知等一行半總授七百故是千二百也二偈頌二初記陳如及與五百爾時世尊欲重宣此義而說偈言憍陳如比丘當見無量佛過阿僧祇劫乃成等正覺常放大光明具足諸神通名聞遍十方一切之所敬常說無上道故號為普明其國土清淨菩薩皆勇猛咸升妙樓閣遊諸十方國以無上供具奉獻於諸佛作是供養已心懷大歡喜須臾還本國有如是神力佛壽六萬劫正法住倍壽像法復倍是法滅天人憂其五百比丘次第當作佛同號曰普明轉次而授記我滅度之後某甲當作佛其所化世間亦如我今日國土之嚴淨及諸神通力菩薩聲聞衆正法及像法壽命劫多少皆如上所說二總授一切聲聞記迦葉汝已知五百自在者餘諸聲聞衆亦當復如是其不在此會汝當為宣說上二句結前五百已得記者次二句即頌七百故云餘諸聲聞衆亦當復如是又次二句為不在此會者令迦葉代為宣說故云其不在此會汝當為宣說後持品中云我先總說一切聲聞皆已授記正指今一行半偈非是止授七百聲聞也三領解二初長行二初經家敘喜二初慶今得解故歡喜二初明內心慶喜爾時五百阿羅漢於佛前得受記已歡喜踊躍二明外形恭敬即從座起到於佛前頭面禮足二愧昔不解故自責悔過自責二自陳領解二初法說二初悔得少為足世尊我等常作是念自謂已得究竟滅度此是悔責昔迷得小為足不知求大二責根鈍難知今乃知之此責根鈍始悟不早知之今知小非究竟大為真實也二譬說二初略譬二初略舉譬況如無智者二釋無智意所以者何我等應得如來智慧而便自以小智為足二正譬二初開譬二初貧人醉酒譬二初親友繫珠譬世尊譬如有人至親友家醉酒而臥是時親友官事當行以無價寶珠繫其衣裏與之而去繫珠譬領上王子結緣也譬如有人者即二乘之機也親友者昔日第十六王子也家即大乘教為家也醉酒而臥者當時大機暫發無明暫伏以得聞經內心微解如至親友家以無明重故還復迷失如醉酒而臥醉有二義一重醉都不覺知二輕醉微覺尋忘亦名不覺雖有二義終成繫珠如毒鼓耳官事當行者明王子餘處機興逗緣往應故云當行弘法化他此非私務故云官事無價寶珠者一乘實相真如智寶也繫其衣裏者慚愧忍辱能遮醜恚及防外惡即是外衣信樂之心內裹善根即是內衣于時聞法微信樂欲即了因智願種子也二醉臥不覺譬其人醉臥都不覺知此領中間懈退不受大法也醉臥不覺知者無明心重尋復不憶也三起已遊行譬起已遊行到於他國為衣食故勤力求索甚大艱難若少有所得便以為足此領上中間接之以小受三乘化也善根欲發厭苦求樂故云起已遊行無明覆解不知向本求大乘衣食故言向他國求於小乘衣食若魔佛相望生死魔界為他國佛法大小皆為本國就大小相望小乘未免生死猶是他國大乘永免生死乃為本國究竟還源也明背大乘國往小乘土不知從珠取給而傭作自資獲一日價得少為足二親友覺悟譬三初呵責於後親友會遇見之而作是言咄哉丈夫何為衣食乃至如是呵責譬上動執生疑二示珠我昔欲令汝得安樂五欲自恣於某年日月以無價寶珠繫汝衣裏今故現在而汝不知勤苦憂惱以求自活甚為癡也此示珠指今故現在下偈所謂示以所繫珠合譬即今授記事是也某日月者指大通佛所也三勸貿汝今可以此寶貿易所須常可如意無所乏短此勸貿者譬得記作佛也二合譬二初合貧人醉酒譬三初合親友繫珠譬佛亦如是為菩薩時教化我等令發一切智心二合醉不覺知譬而尋廢忘不知不覺三合起已遊行譬既得阿羅漢道自謂滅度資生艱難得少為足二合親友覺悟譬三初合呵責一切智願猶在不失今者世尊覺悟我等作如是言諸比丘汝等所得非究竟滅二合示珠我久令汝等種佛善根以方便故示涅槃相而汝謂為實得滅度三合勸貿世尊我今乃知實是菩薩得受阿耨多羅三藐三菩提記以是因緣甚大歡喜得未曾有二偈頌二初頌內心得解二初頌慶喜爾時阿若憍陳如等欲重宣此義而說偈言我等聞無上安穩授記聲歡喜未曾有禮無量智佛二頌悔責今於世尊前自悔諸過咎二頌自陳領解二初頌法說於無量佛寶得少涅槃分頌上得少為足二頌譬說二初頌略譬說二初頌略舉譬況如無智愚人二頌釋無智意便自以為足二頌正舉譬二初頌開譬二初頌捨寶不知譬如貧窮人往至親友家其家甚大富具設諸肴膳以無價寶珠繫著內衣裏默與而捨去時臥不覺知是人既已起遊行詣他國求衣食自濟資生甚艱難得少便為足更不願好者不覺內衣裏有無價寶珠肴膳譬大通佛所先聞方便三教助道繫珠譬王子覆講後結大緣也二頌親友覺悟與珠之親友後見此貧人苦切責之已示以所繫珠貧人見此珠其心大歡喜富有諸財物五欲而自恣二頌合譬我等亦如是世尊於長夜常愍見教化令種無上願我等無智故不覺亦不知得少涅槃分自足不求餘今佛覺悟我言非實滅度得佛無上慧爾乃為真滅我今從佛聞授記莊嚴事及轉次受決身心遍歡喜初一行頌上合譬貧人醉酒中初繫珠譬我等無智下二句頌上合譬中第二醉不覺知得少涅槃下二句頌上合譬中第三起已遊行今佛覺悟下二句頌上合譬親友覺悟中初呵責得佛無上下二句頌上合譬中示珠我今從佛下一行頌上合譬中勸貿得記作佛是故歡喜也二授學無學人記品授二千人記二初品目妙法蓮華經授學無學人記品第九正經云授阿難羅云決品研真斷惑慕求勝見名之為學即三果四向真無漏慧也真窮惑盡勝見已極無所復學名為無學即阿羅漢果約教者折法研真名學惑盡真窮名無學三藏意也體法研真名學無真無惑名無學通意也自淺之深名學通別惑盡權實理窮名無學別意也研如來藏有學無學法性實相非學非無學而學而無學圓意也是二千人或是學或是無學同是一流一時受記同一名號故別為一品本迹者阿難迹為學人羅睺羅迹為無學而本地不可思議以例餘二千人亦應各有本迹此品是授記中第二段也二經文二初請記二初二人請二初默念得記爾時阿難羅睺羅而作是念我等每自思惟設得授記不亦快乎二發言請記二初引例即從座起到於佛前頭面禮足俱白佛言世尊我等於此亦應有分唯有如來我等所歸二引望又我等為一切世間天人阿修羅所見知識阿難常為侍者護持法藏羅睺羅是佛之子若佛見授阿耨多羅三藐三菩提記者我願既滿衆望亦足二人於佛最親時衆所望羅雲是佛子俗中親重阿難持佛法藏道中親勝勝重兩人不蒙別記則衆望不足也問若重若勝應同上流又如列衆二人在多知識中獲記何意居下答總與千二百記二人已同上流今更索別記又阿難是學人羅云弟子位故入學無學章耳二二千請爾時學無學聲聞弟子二千人皆從座起偏袒右肩到於佛前一心合掌瞻仰世尊如阿難羅睺羅所願住立一面二千請記但有默念引例二意同於二人故言如阿難等願耳不發言請者非如二人親重親勝故也二授記二初記二人二授二千初文又二初記阿難五初長行明修因得果爾時佛告阿難汝於來世當得作佛號山海慧自在通王如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊當供養六十二億諸佛護持法藏然後得阿耨多羅三藐三菩提教化二十千萬億恆河沙諸菩薩等令成阿耨多羅三藐三菩提國名常立勝幡其土清淨琉璃為地劫名妙音遍滿其佛壽命無量千萬億阿僧祇劫若人於千萬億無量阿僧祇劫中算數校計不能得知正法住世倍於壽命像法住世復倍正法阿難是山海慧自在通王佛為十方無量千萬億恆河沙等諸佛如來所共讚歎稱其功德阿難為今佛侍者護持法藏於六十二億佛所亦護法藏如今不異爾後方得菩提此自行修因得果也教化二十千萬億菩薩等即果後化他令他修因得果也二偈頌明修因得果爾時世尊欲重宣此義而說偈言我今僧中說阿難持法者當供養諸佛然後成正覺號曰山海慧自在通王佛其國土清淨名常立勝幡教化諸菩薩其數如恆沙佛有大威德名聞滿十方壽命無有量以愍衆生故正法倍壽命像法復倍是如恆河沙等無數諸衆生於此佛法中種佛道因緣三八千菩薩等生疑爾時會中新發意菩薩八千人咸作是念我等尚不聞諸大菩薩得如是記有何因緣而諸聲聞得如是決八千菩薩疑者通疑聲聞今日發心即蒙佛記國淨若此何故昔於方等記諸菩薩無量劫行乃得佛說四如來為發迹釋疑爾時世尊知諸菩薩心之所念而告之曰諸善男子我與阿難等於空王佛所同時發阿耨多羅三藐三菩提心阿難常樂多聞我常勤精進是故我已得成阿耨多羅三藐三菩提而阿難護持我法亦護將來諸佛法藏教化成就諸菩薩衆其本願如是故獲斯記佛因衆疑即為發迹釋疑阿難昔日與我同發大心即是同學由我精進前超得佛由我多聞猶故持經迹為侍者本地如此今授妙記何足可疑五明阿難顯本述歎二初長行阿難面於佛前自聞授記及國土莊嚴所願具足心大歡喜得未曾有即時憶念過去無量千萬億諸佛法藏通達無礙如今所聞亦識本願爾時阿難而說偈言二偈頌世尊甚希有令我念過去無量諸佛法如今日所聞我今無復疑安住於佛道方便為侍者護持諸佛法二記羅云二初長行爾時佛告羅睺羅汝於來世當得作佛號蹈七寶華如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊當供養十世界微塵等數諸佛如來常為諸佛而作長子猶如今也是蹈七寶華佛國土莊嚴壽命劫數所化弟子正法像法亦如山海慧自在通王如來無異亦為此佛而作長子過是已後當得阿耨多羅三藐三菩提二偈頌爾時世尊欲重宣此義而說偈言我為太子時羅睺為長子我今成佛道受法為法子於未來世中見無量億佛皆為其長子一心求佛道羅睺羅密行唯我能知之現為我長子以示諸衆生無量億千萬功德不可數安住於佛法以求無上道本是菩薩迹為小乘以迹覆本名為密行二授二千三初長行爾時世尊見學無學二千人其意柔軟寂然清淨一心觀佛佛告阿難汝見是學無學二千人不唯然已見阿難是諸人等當供養五十世界微塵數諸佛如來恭敬尊重護持法藏末後同時於十方國各得成佛皆同一號名曰寶相如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊壽命一劫國土莊嚴聲聞菩薩正法像法皆悉同等二偈頌爾時世尊欲重宣此義而說偈言是二千聲聞今於我前住悉皆與授記未來當成佛所供養諸佛如上說塵數護持其法藏後當成正覺各於十方國悉同一名號俱時坐道場以證無上慧皆名為寶相國土及弟子正法與像法悉等無有異咸以諸神通度十方衆生名聞普周遍漸入於涅槃三喜記爾時學無學二千人聞佛授記歡喜踊躍而說偈言世尊慧燈明我聞授記音心歡喜充滿如甘露見灌中道種智之慧照徹三諦源底復能破諸衆生煩惱惑暗故云慧燈明也三五品迹門流通四初法師寶塔兩品明弘經功深福重流通未聞益大二提婆達多品引往弘經彼我得益以證功德深重三持品明忍力成者此土弘經新得記者他土弘經四安樂行品為外凡力弱者說依之弘法不慮危害初文又二初法師品二寶塔品初文又二初品目妙法蓮華經法師品第十此品明五種法師一受持二讀三誦四解說五書寫大論明六種法師一信力故受二念力故持三看文為讀四不忘為誦五宣傳為說六聖人經書難解須解釋今經合受持為一合解說為一開讀誦為二足書寫為五若別論則四是自行解說一種是化他若通論則自軌五法名自行法師教他五法名化他法師何以言之法者軌則也師者訓匠也法雖可軌體不自弘通之在人五種通經皆得稱師舉法成其自行皆以妙法為師師於妙法自行成就故名法師又五種人能以妙法訓匠於他故舉法目師名為法師若自軌法若法匠他俱得稱法師品也二經文二初歎五種法師持法人二歎所持法及示通經力初文又二初稟道弟子功深福重二初佛世弟子二初揀出其人類爾時世尊因藥王菩薩告八萬大士藥王汝見是大衆中無量諸天龍王夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人與非人及比丘比丘尼優婆塞優婆夷求聲聞者求辟支佛者求佛道者初因藥王告八萬者因者憑寄也欲以妙法憑寄藥王使其領受告語八萬皆流通也汝見是大衆等者的示持經得福之人也二揀出得記緣如是等類咸於佛前聞妙法華經一偈一句乃至一念隨喜者我皆與授記當得阿耨多羅三藐三菩提若於佛前當機妙悟者是多聞深解五百及二千是也此等皆已現前與總別記竟今所揀者乃是八部四衆三乘之類故言如來等類咸於佛前者明其時節值佛在座也一句一偈者聞法極少也乃至一念者時節最促也隨喜者自未有行但隨喜其法及隨喜其人也皆與記當得菩提者明其聞極少時極促隨喜之功遂得佛果何況具足得聞盡形受持五種流通三業供養聞少解淺者尚記況復多深以少況多普廣若此下周既爾中上亦然可以意知不俟更說二滅後弟子二初出弟子類佛告藥王又如來滅度之後若有人聞妙法華經乃至一偈一句一念隨喜者二亦與授記我亦與授阿耨多羅三藐三菩提記聞極少法亦與授記功報如前解也二明授道師門功深福重二初長行二偈頌初文又二初別二初明現世二初明下品師二初明師相若復有人受持讀誦解說書寫妙法華經乃至一偈於此經卷敬視如佛種種供養華香瓔珞末香塗香燒香繒蓋幢幡衣服伎樂乃至合掌恭敬上明稟道弟子此下明授道師門今明現在下品師相即是五種法師十種供養也二明功報藥王當知是諸人等已曾供養十萬億佛於諸佛所成就大願愍衆生故生此人間藥王若有人問何等衆生於未來世當得作佛應示是諸人等於未來世必得作佛何以故若善男子善女人於法華經乃至一句受持讀誦解說書寫種種供養經卷華香瓔珞末香塗香燒香繒蓋幢幡衣服伎樂合掌恭敬是人一切世間所應瞻奉應以如來供養而供養之當知此人是大菩薩成就阿耨多羅三藐三菩提哀愍衆生願生此間廣演分別妙法華經曾供養者明先世因深也愍衆生故生此人間明現世功大也若有人問下明未來報重也何以故下釋出報重之相也二明上品師二初況出上品相何況盡能受持種種供養者二明上品功報藥王當知是人自捨清淨業報於我滅度後愍生衆故生於惡世廣演此經是人自捨清淨報者大悲願牽捨於清淨之土而生濁惡世中仍是業生未有通應願兼於業故生也如妙玄眷屬妙中明業生願生眷屬是也二明來世二初明下品師二初明師相若是善男子善女人我滅度後能竊為一人說法華經乃至一句竊為一人說一句者雖得一句之解既不廣聞多學異義不可衆中而說一切問難有所不通便令正理不得宣弘若欲申此一句正言且當竊說耳如釋論明有慧無聞譬如小雨無雷二明功報當知是人則如來使如來所遣行如來事經是如智所說說於如理今日行人秉此如教宣於如理即是如來使也行如來事者如來以如智照如理為事今日行人依如教行如理即是行如來事也約自行釋又如來以一如智一如理化衆生為事今日行人能有大悲以此經中真如之理為衆生說令得利益亦名行如來事也約化他釋二明上品師何況於大衆中廣為人說略不格量上品功報者以前下品望今上品此意可知也二總二初明逆者得罪藥王若有惡人以不善心於一劫中現於佛前常毀罵佛其罪尚輕若人以一惡言毀訾在家出家讀誦法華經者其罪甚重此中罪福不論福田濃瘠但約初後心明其輕重初心學人讀誦經者既具煩惱若加毀訾障礙則能令其所學事廢故獲罪多佛既惑盡冤親平等惡不干逼豈能障礙故言罪輕供養亦爾此人有待若得供養所修事成故施之福勝佛則無待衆事滿足雖復供獻於佛無益故言報劣二明順者得福藥王其有讀誦法華經者當知是人以佛莊嚴而自莊嚴佛以定慧莊嚴而說此經若人讀誦此經者則是能修佛之定慧故云以佛莊嚴而自莊嚴也則為如來肩所荷擔在背為荷在肩為擔若人讀誦是經則能得佛非權非實法身之體即是為如來背之所荷亦能得佛能權能實二智之用則是為如來兩肩所擔其所至方應隨向禮一心合掌恭敬供養尊重讚嘆華香瓔珞末香塗香燒香繒蓋幢幡衣服肴饌作諸伎樂人中上供而供養之應持天寶而以散之天上寶聚應以奉獻所以者何是人歡喜說法須臾聞之即得究竟阿耨多羅三藐三菩提故隨所向方應向禮者上明以法為師今明堪為物師此人有所趣向悉與實相相應皆可敬順順即是向敬即是禮敬而順之及興供養等所以者何下釋上應供之意也二偈頌三初勸自行利他爾時世尊欲重宣此義而說偈言若欲住佛道成就自然智常當勤供養受持法華者其有欲疾得一切種智慧當受持是經并供養持者二頌師門別總二初頌別二初頌現世二初頌下品師二初明師相若有能受持妙法華經者二明功德當知佛所使愍念諸衆生二頌上品師二初明師相諸有能受持妙法華經者二明功報捨於清淨土愍衆故生此當知如是人自在所欲生能於此惡世廣說無上法應以天華香及天寶衣服天上妙寶聚供養說法者二頌來世二初超頌上品師二初頌師相吾滅後惡世能持是經者二頌功報當合掌禮敬如供養世尊上饌衆甘美及種種衣服供養是佛子冀得須臾聞長行中本缺功報今偈則有二追頌下品師二初頌出人若能於後世受持是經者二頌功報我遣在人中行於如來事二頌總二初頌逆者得罪若於一劫中當懷不善心作色而罵佛獲無量重罪其有讀誦持是法華經者須臾加惡言其罪復過彼二頌順者得福有人求佛道而於一劫中合掌在我前以無數偈讚由是讚佛故得無量功德嘆美持經者其福復過彼於八十億劫以最妙色聲及與香味觸供養持經者如是供養已若得須臾聞則應自欣慶我今獲大利三頌歎經尊妙藥王今告汝我所說諸經而於此經中法華最第一二長行偈頌歎美所持法示弘經方軌二初長行二偈頌初文又二初歎經法五初約法歎爾時佛復告藥王菩薩摩訶薩我所說經典無量千萬億已說今說當說而於其中此法華經最為難信難解已今當說此經為最此約法歎也已者大品已上漸頓諸說也今者同一座席謂無量義經也當者謂涅槃也大品等漸頓諸說皆帶方便取信為易無量義一生無量無量未還一是亦易信今法華論法則一切差別融通歸一論人則師弟本迹俱皆久遠人法悉與昔異故難信解當鋒難事法華已說涅槃在後則可信也藥王此經是諸佛祕要之藏不可分布妄授與人祕要之藏者隱而不說為祕總一切法為要真如實相包蘊為藏不可分布者法妙難信深智可授無智不信謗乃獲罪故不可妄說也諸佛世尊之所守護從昔已來未曾顯說從昔已來未曾顯說者於三藏中不說二乘作佛亦不明師弟本迹方等般若雖說實相之藏亦未說五乘作佛亦未發迹顯本頓漸諸經皆未融會故名為祕此法華經具說昔所祕法即是開祕密藏亦即是祕密藏如是祕藏從昔守護今方顯說也而此經者如來現在猶多怨嫉況滅度後如來在世猶多怨嫉者四十餘年不得即說今雖欲說而五千尋即退座佛世尚爾何況未來理在難化也二約人歎藥王當知如來滅後其能書持讀誦供養為他人說者如來則為以衣覆之又為他方現在諸佛之所護念是人有大信力及志願力諸善根力當知是人與如來共宿則為如來手摩其頭此約人歎也此法在人則人尊貴如來衣覆者言若能持說此經即是修學大忍是為如來衣覆即上文云如來莊嚴也佛護念者實相為佛實智為子尊崇實相發生實智即為諸佛所護念也四信為信力三寶及戒四弘為願力大智為善根力信則信理理即法身志願是立行行即解脫善根根固難動此即般若當知三力即是三德祕密之藏初心栖此與佛不殊故名與如來共宿也手摩頭者此人以願力善力自行權實以為機感機感名頭如來以化他權實二智名手開發前人自行權實之頭感應道交故言摩頭摩頭即授記也三約處歎藥王在在處處若說若讀若誦若書若經卷所住處皆應起七寶塔極令高廣嚴飾不須復安舍利所以者何此中已有如來全身此塔應以一切華香瓔珞繒蓋幢幡伎樂歌頌供養恭敬尊重讚嘆若有人得見此塔禮拜供養當知是等皆近阿耨多羅三藐三菩提此約處歎也此法在處即處貴夫佛生處得道轉法輪入涅槃等處法王所遊皆應起塔此經是法身生處得道之場法輪正體大涅槃窟此經所在須塔供養不須復安舍利者釋論云碎骨是生身舍利經卷是法身舍利此經是法身舍利不須更安生身舍利生法二身各有全碎皆可解云云四約因歎藥王多有人在家出家行菩薩道若不能得見聞讀誦書持供養是法華經者當知是人未善行菩薩道若有得聞是經典者乃能善行菩薩之道此約因歎也若未善行菩薩道者稟前三教未能巧度若聞是經即入圓教名為巧度巧度為善行也五約果嘆五初明近其有衆生求佛道者若見若聞是法華經聞已信解受持者當知是人得近阿耨多羅三藐三菩提當知必得近三菩提果者安樂行中名為近處此菩提果者佛眼佛智知見處為體則有二種一者初心菩提即初住二者後心菩提即妙覺今言近者正近初住菩提也二開譬藥王譬如有人渴乏須水於彼高原穿鑿求之猶見乾土知水尚遠施功不已轉見濕土遂漸至泥其心決定知水必近此有二釋一約觀門二約教門觀門者衆生之心具諸煩惱名高原修習觀智名穿掘方證理味如得清水若依通觀乾慧地如乾土性地為濕土泥知水必近見諦為得清水若依別觀初從假入空但見空不見不空斷四住惑如鑿乾土去水尚遠次從空出假先知非假今知非空因茲二觀得入中道能伏無明轉見濕土去水則近初地為得清水也若依圓觀中道非空非假而照空假如漸至濕泥四住已盡無明已伏已得中道相似圓解故言如泥若入初住發真中解即破無明如泥澄清得見中道如見清水次約教門者土譬經教水喻中道教詮中道如土含水三藏教未詮中道猶如乾土方等般若帶於方便說中道義如見濕土法華教正直顯露說無上道如見泥因法華教生聞思修即悟中道如獲清水三合譬菩薩亦復如是若未聞未解未能修習是法華經當知是人去阿耨多羅三藐三菩提尚遠若得聞解思惟修習必知得近阿耨多羅三藐三菩提於法華中獲聞思修即是圓觀三慧方能近果非三藏方等般若教中聞思修也四釋近所以者何一切菩薩阿耨多羅三藐三菩提皆屬此經此經開方便門示真實相是法華經藏深固幽遠無人能到今佛教化成就菩薩而為開示此釋得近之意一切菩薩者明諸教中權因也三菩提者明一切菩薩所得權果也此權因權果皆攝屬此經如乾濕等土悉依於水故言攝屬也開方便門者在昔為實施權不知權是方便故方便門閉今皆開之即是實相故方便門開昔說一切世間治生産業何曾是於方便今皆開之即是實相不相違背昔說小乘方便及小乘果小乘果尚非實相門況小乘方便而當是門今皆開之即是實相汝等所行是菩薩道決了聲聞法是諸經之王咸令衆生開示悟入佛之知見一色一香無非佛法若不開者則深固幽遠無人能到而今開之即得見水無乾土也五揀非藥王若有菩薩聞是法華經驚疑怖畏當如是為新發意菩薩若聲聞人聞是經驚疑怖畏當知是為增上慢者若菩薩聲聞聞此說而驚疑者悉是乾土尚非濕土況見水耶二示方軌二初示方法三初標章藥王若有善男子善女人如來滅後欲為四衆說是法華經者云何應說是善男子善女人入如來室著如來衣坐如來座爾乃應為四衆廣說斯經室衣座三名為三軌末世弘經必藉此三自軌軌他方獲大利修無緣慈是入如來室修寂滅忍是著如來衣修於中空是坐如來座也二解釋如來室者一切衆生中大慈悲心是如來衣者柔和忍辱心是如來座者一切法空是三勸修安住是中然後以不懈怠心為諸菩薩及四衆廣說是法華經五種法師用此三法自軌故云安住是中用此化他故云然後以不懈怠心等此勸修也修如來室是大慈悲若就同體即法身也若被衆生即是解脫能令衆生會於同體即是般若修如來衣者若就所覆即法身也若就能覆嚴身即寂滅忍是般若也若就和光利物即解脫也修如來座者若就能坐即般若也若就所坐即法身也身座冥稱即解脫也二明利益五初遣化人藥王我於餘國遣化人為其集聽法衆正經曰若復處他方世界化作化人及與眷屬比丘比丘尼清信士清信女頒宣此法設使有聞而不樂者吾起令樂必使愛憘斯文意謂我度他方化作遣於化人及與眷屬為令宣說斯經化衆示信順而勾引彼聽法衆即是佛力變化宣揚大事也二隨遣化四衆亦遣化比丘比丘尼優婆塞優婆夷聽其說法是諸化人聞法信受隨順不逆三遣八部若說法者在空閒處我時廣遣天龍鬼神乾闥婆阿修羅等聽其說法四見佛身我雖在異國時時令說法者得見我身五與總持若於此經忘失句逗我還為說今得具足二偈頌三初總勸爾時世尊欲重宣此義而說偈言欲捨諸懈怠應當聽此經是經難得聞信受者亦難二正頌二初頌歎經法二初頌開譬如人渴須水穿鑿於高原猶見乾燥土知去水尚遠漸見濕土泥決定知近水二頌合譬藥王汝當知如是諸人等不聞法華經去佛智甚遠若聞是深經決了聲聞法是諸經之王聞已諦思惟當知此人等近於佛智慧二頌示方軌二初頌方軌三初頌標章若人說此經應入如來室著於如來衣而坐如來座處衆無所畏廣為分別說二頌解釋大慈悲為室柔和忍辱衣諸法空為座處此為說法三頌勸修若說此經時有人惡口罵加刀杖瓦石念佛故應忍二頌利益六初明五益意我千萬億土現淨堅固身於無量億劫為衆生說法此總明如來以五事利益之意也正由應身遍滿十方能為五事守護行人五事者如前第一遣化人乃至第五與總持是也二頌遣四衆若我滅度後能說此經者我遣化四衆比丘比丘尼及清信士女供養於法師三頌遣化人引導諸衆生集之令聽法若人欲加惡刀杖及瓦石則遣變化人為之作衛護四頌與總持若說法之人獨在空間處寂寞無人聲讀誦此經典我爾時為現清淨光明身若忘失章句為說令通利五頌見佛身若人具是德或為四衆說空處讀誦經皆得見我身六頌遣八部若人在空間我遣天龍王夜叉鬼神等為作聽法衆是人樂說法分別無罣礙諸佛護念故能令大衆喜三結勸若親近法師速得菩薩道隨順是師學得見恆沙佛二寶塔品二初品目妙法蓮華經見寶塔品第十一塔具云塔婆或云偷婆或云窣堵波此云大聚亦云方墳亦翻靈廟或曰有舍利名塔無舍利名支提支提又名脂帝浮圖新云制底此翻聚相謂疊石等高以為相也舍利復論全碎者如釋迦碎身為八斛四斗阿育王後造八萬四千寶塔以供養之遍布閻浮提勝地今多寶佛全身舍利不散故唯一塔又阿育王經四處起塔謂佛降生處得道處轉法輪處入涅槃處今法華實相諸佛三身皆從此生諸佛於此而坐道場諸佛於此而轉法輪諸佛於此而般涅槃祗此法華即是三世佛之四塔先佛已居今佛並坐當佛亦然此塔出來明顯此事四衆皆覩故言見寶塔品世界觀心釋者依經修觀與法身相應境智必會如塔來證經境智既會則大報圓滿如釋迦與多寶同坐一座大報圓故則隨機出應如分身皆集由多寶出故三佛得顯由持經故即具三身普賢觀云佛三種身從方等生即此義也二經文二初長行二偈頌初文又三初明多寶湧現六初塔現之相爾時佛前有七寶塔高五百由旬縱廣二百五十由旬從地涌出住在空中種種寶物而莊校之七寶為塔者性德七覺支七聖財為塔四教各論七覺七財今唯在圓既是佛塔又證實經故也塔者實相之境法身所依之處也高五百由旬者是二萬里蓋用竪表因中萬行果中萬德以因望果即高義也縱廣二百五十由旬者即是一萬里橫表萬善莊嚴當位具足即是廣義也地者無明心地空者第一義空也以無所破破無明地以無所住住第一義空故言從地涌出住在空中此亦證前起後七方便人藏理未開無明所隱如塔在地今聞三周開三顯實開佛知見顯出法身如塔湧空此即證前修得法身久已明著如塔在空無能開者表本地久成衆所不識若發迹顯本了達無疑此則起後若塔從地出表法身顯與餘經亦同亦異菩薩顯法身則同二乘顯法身則異若塔在空開門見佛表發迹顯本與餘經永異若塔來證前事已彰灼蓋不須疑塔來起後密有其意衆所未知種種寶物者衆多定慧而莊校定慧無多對暗散說又定慧遍攝故亦云多五千欄楯龕室千萬無數幢幡以為嚴飾垂寶瓔珞寶鈴萬億而懸其上四面皆出多摩羅跋栴檀之香充遍世界其諸幡蓋以金銀琉璃硨磲瑪瑙真珠玫瑰七寶合成高至四天王宮欄楯是總持龕室千萬者無量慈悲之室亦是無量空舍幢幡是神通勝相垂寶瓔珞者四十地戒定慧陀羅尼德上嚴法身下被衆生也垂寶等者從因至果德皆藉因中萬行由莊嚴故即能下化如嚴復垂寶鈴萬億即八音四辨四面出香者四諦道風吹四德香也高至四天王宮者窮四諦理也二諸天供養三十三天雨天曼陀羅華供養寶塔餘諸天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等千萬億衆以一切華香瓔珞幡蓋伎樂供養寶塔恭敬尊重讚歎諸天供養事解可知更復約理釋之住行向三十心為三十十地為一等覺為一妙覺為一合為三十三同依一實相境如三十三天同居須彌頂也雨天曼陀羅者必雨四華表初心具四十二地功德後心亦爾皆以四十地所有因華歸向法身如三十三天雨華供養寶塔也餘諸天龍等供養寶塔即是內凡外凡等亦依實相向果行因也三多寶稱歎爾時寶塔中出大音聲歎言善哉善哉釋迦牟尼世尊能以平等大慧教菩薩法佛所護念妙法華經為大衆說如是如是釋迦牟尼世尊如所說者皆是真實此多寶稱歎釋迦正是證前開權顯實不虗也平等大慧即是諸佛智慧也平等有二一法平等即大慧所觀中道理也二衆生平等謂一切衆生皆用因理以至於果同得佛慧也若所觀理與衆生異不名大慧大者如前高廣義約觀心者空觀竪等假觀橫等中觀橫竪平等平等雙照即是平等大慧也如是如是者一如法相是歎佛所說稱於實故二如根性是歎佛至第五時方說法華不差機故皆是真實者如法相說故言真實也四時衆驚疑二初得法喜爾時四衆見大寶塔住在空中又聞塔中所出音聲皆得法喜二衆疑怪怪未曾有從座而起恭敬合掌却住一面五大樂說問三初問何因有此實塔爾時有菩薩摩訶薩名大樂說知一切世間天人阿修羅等心之所疑而白佛言世尊以何因緣有此寶塔二問何故塔從地出從地涌出三問何故發是音聲又於其中發是音聲六如來答釋三初答第二問爾時佛告大樂說菩薩此寶塔中有如來全身乃往過去東方無量千萬億阿僧祇世界國名寶淨彼中有佛號曰多寶其佛本行菩薩道時作大誓願若我成佛滅度之後於十方國土有說法華經處我之塔廟為聽是經故涌現其前為作證明讚言善哉善哉上問何故從地涌出佛今答云此佛有願為證法華故從地涌出也二追答第一問彼佛成道已臨滅度時於天人大衆中告諸比丘我滅度後欲供養我全身者應起一大塔上問以何因緣有此寶塔今答云由彼臨滅有命令造此塔也三答第三問其佛以神通願力十方世界在在處處若有說法華經者彼之寶塔皆涌出其前全身在於塔中讚言善哉善哉大樂說今多寶如來塔聞說法華經故從地涌出讚言善哉善哉上問何故發是音聲佛今答云彼佛為作證明故發是音聲也釋論明多寶佛不得說法而取滅度何謂不說當是多寶亦得開三但不得至法華顯實故釋論云不說法耳以是義故雖復滅度在在處處凡有說法華經便隨喜作證也二明分身遠集七初請見多寶是時大樂說菩薩以如來神力故白佛言世尊我等願欲見此佛身承佛神力者欲開塔須集分身佛佛集即付囑付囑即召下方下方弟子涌出即應開近顯遠此是大事之由豈非佛神力令問也二應集分身佛告大樂說菩薩摩訶薩是多寶佛有深重願若我寶塔為聽法華經故出於諸佛前時其有欲以我身示四衆者彼佛分身諸佛在於十方世界說法盡還集一處然後我身乃出現耳大樂說我分身諸佛在於十方世界說法者今應當集三樂說請集大樂說白佛言世尊我等亦願欲見世尊分身諸佛禮拜供養四放光遠召爾時佛放白毫一光即見東方五百萬億那由他恆河沙等國土諸佛彼諸國土皆以玻瓈為地寶樹寶衣以為莊嚴無數千萬億菩薩充滿其中遍張寶幔寶網羅上彼國諸佛以大妙音而說諸法及見無量千萬億菩薩遍滿諸國為衆說法南西北方四維上下白毫相光所照之處亦復如是五諸佛同來爾時十方諸佛各告衆菩薩言善男子我今應往娑婆世界釋迦牟尼佛所并供養多寶如來寶塔六嚴淨國界三初變娑婆時娑婆世界即變清淨琉璃為地寶樹莊嚴黃金為繩以界八道無諸聚落村營城邑大海江河山川林藪燒大寶香曼陀羅華遍布其地以寶網幔羅覆其上懸諸寶鈴唯留此會衆移諸天人置於他土是時諸佛各將一大菩薩以為侍者至娑婆世界各到寶樹下一一寶樹高五百由旬枝葉華果次第莊嚴諸寶樹下皆有師子之座高五由旬亦以大寶而校飾之爾時諸佛各於此座結跏趺坐如是展轉遍滿三千大千世界而於釋迦牟尼佛一方所分之身猶故未盡此以八背捨三昧之力能變娑婆之穢土而成清淨之土表淨除見思惑也八背捨釋見化城喻品中二變八方時釋迦牟尼佛欲容受所分身諸佛故八方各更變二百萬億那由他國皆令清淨無有地獄餓鬼畜生及阿修羅又移諸天人置於他土所化之國亦以琉璃為地寶樹莊嚴樹高五百由旬枝葉華果次第嚴飾樹下皆有寶師子座高五由旬種種諸寶以為莊校亦無大海江河及目真鄰陀山摩訶目真鄰陀山鐵圍山大鐵圍山須彌山等諸山王通為一佛國土寶地平正寶交露幔遍覆其上懸諸幡蓋燒大寶香諸天寶華遍布其地此以八勝處三昧轉變自在之力第二變二百萬億那由他國皆令清淨表淨除塵沙惑也八勝處者一內有色相外觀色少觀道未增故須觀少二內有色相外觀色多觀心既調觀多無妨故言多三內無色相外觀色少四內無色相外觀色多準上可解五青勝處若觀青色轉變自在少能多多能少勝於背捨所見名青勝處六黃勝處七赤勝處八白勝處俱類青勝處中分別今用四色為勝處依大智論也若瓔珞經則以四大為四勝處三重更變釋迦牟尼佛為諸佛當來坐故復於八方各更變二百萬億那由他國皆令清淨無有地獄餓鬼畜生及阿修羅又移諸天人置於他土所化之國亦以琉璃為地寶樹莊嚴樹高五百由旬枝葉華果次第莊嚴樹下皆有寶師子座高五由旬亦以大寶而校飾之亦無大海江河及目真鄰陀山摩訶目真鄰陀山鐵圍山大鐵圍山須彌山等諸山王通為一佛國土寶地平正寶交露幔遍覆其上懸諸幡蓋燒大寶香諸天寶華遍布其地爾時東方釋迦牟尼所分之身百千萬億那由他恆河沙等國土中諸佛各各說法來集於此如是次第十方諸佛皆悉來集坐於八方爾時一一方四百萬億那由他國土諸佛如來遍滿其中此以十一切處三昧於境無閡所觀普遍之力第三變二百萬億那由他國皆令清淨表淨除無明惑也十一切處者一青一切處還取前背捨勝處中少青色使遍一切處皆青也二黃一切處三赤一切處四白一切處五地一切處還取前背捨勝處中少地色使一切處皆地也六水一切處七火一切處八風一切處九空一切處還入前空背捨定使一切處皆空也十識一切處還入前識處背捨使一切處皆有識也七與欲開塔五初諸佛問訊說欲是時諸佛各在寶樹下坐師子座皆遣侍者問訊釋迦牟尼佛各齎寶華滿掬而告之言善男子汝往詣耆闍崛山釋迦牟尼佛所如我辭曰少病少惱氣力安樂及菩薩聲聞衆悉安穩不以此寶華散佛供養而作是言彼某甲佛與欲開此寶塔諸佛遣使亦復如是諸佛同與欲開塔如僧中作法與欲意也大集經明若干佛與欲華嚴經亦說十方若干佛同說華嚴大品經亦云千佛同說般若皆不云是釋迦分身準今經者應是分身彼大集等猶帶方便故時中不顯說是分身耳今經非但數多亦復直說是我分身咸來與欲開塔也二釋迦指開塔戶爾時釋迦牟尼佛見所分身佛悉已來集各各坐於師子之座皆聞諸佛與欲同開寶塔即從座起住虗空中一切四衆起立合掌一心觀佛於是釋迦牟尼佛以右指開七寶塔戶出大音聲如却關鑰開大城門開塔表開權見佛表顯實亦是證前復將開後也如却關鑰者即猶除也關是橫木持其門者鑰即鎖也表執迹之障除顯本之機動也三四衆皆同見聞即時一切衆會皆見多寶如來於寶塔中坐師子座全身不散如入禪定又聞其言善哉善哉釋迦牟尼佛快說是法華經我為聽是經故而來至此爾時四衆等見過去無量千萬億劫滅度佛說如是言歎未曾有以天寶華聚散多寶佛及釋迦牟尼佛上四二佛分座而坐爾時多寶佛於寶塔中分半座與釋迦牟尼佛而作是言釋迦牟尼佛可就此座即時釋迦牟尼佛入其塔中坐其半座結跏趺坐古佛塔現示滅而不滅釋迦入塔示生而不生不生不滅故竝坐表之又多寶久滅今出證經生不生也往昔滅度猶現全身滅非滅也既非生滅常住不移可表法身釋迦入塔二身相稱如智稱境故可表報分身表應文理自成如境智相冥故能起應可表應身五四衆念請加被爾時大衆見二如來在七寶塔中師子座上結跏趺坐各作是念佛坐高遠惟願如來以神通力令我等輩俱處虗空即時釋迦牟尼佛以神通力接諸大衆皆在虗空三明釋迦唱募三初明大聲唱募以大音聲普告四衆誰能於此娑婆國土廣說妙法華經今正是時二明付囑時至如來不久當入涅槃三明付囑有在佛欲以此妙法華經付囑有在有在者若佛在世隨機利物自說正法無待他人今佛化緣既盡欲令此法利益無窮故須付囑流通也付囑有在者此有二意一近令有在付八萬二萬舊住菩薩此土弘宣二遠令有在付本弟子下方千界微塵數菩薩令觸處流通二偈頌三初頌多寶滅度爾時世尊欲重宣此義而說偈言聖主世尊雖久滅度在寶塔中尚為法來諸人云何不勤為法此佛滅度無央數劫處處聽法以難遇故彼佛本願我滅度後在在所往常為聽法二頌分身遠集又我分身無量諸佛如恆沙等來欲聽法及見滅度多寶如來各捨妙土及弟子衆天人龍神諸供養事令法久住故來至此為坐諸佛以神通力移無量衆令國清淨諸佛各各詣寶樹下如清淨池蓮華莊嚴其寶樹下諸師子座佛坐其上光明嚴飾如夜暗中然大炬火身出妙香遍十方國衆生蒙熏喜不自勝譬如大風吹小樹枝以是方便令法久住此八行半頌分身佛集上文有七今文甚略仍不次第初三行頌第二應集義兼大樂說欲見及以請集次一行頌土淨次四行半頌諸佛同來三頌釋迦付囑二初舉三佛以勸流通三初募覔其人告諸大衆我滅度後誰能護持讀說斯經今於佛前自說誓言自制其心名之曰誓必須弘經約心不退二舉勸流通其多寶佛雖久滅度以大誓願而師子吼多寶如來及與我身所集化佛當知此意諸佛子等誰能護法當發大願令得久住三釋勸之意其有能護此經法者則為供養我及多寶此多寶佛處於寶塔常遊十方為是經故亦復供養諸來化佛莊嚴光飾諸世界者若說此經則為見我多寶如來及諸化佛能持此經即是供養三佛及見三佛以釋勸意也二舉難持法勸流通三初正舉勸三初誡勸發願諸善男子各諦思惟此為難事宜發大願二舉難持勸諸餘經典數如恆沙雖說此等未足為難若接須彌擲置他方無數佛土亦未為難若以足指動大千界遠擲他國亦未為難若立有頂為衆演說無量餘經亦未為難若佛滅後於惡世中能說此經是則為難假使有人手把虗空而以遊行亦未為難於我滅度若自書持若使人書是則為難若以大地置足甲上升於梵天亦未為難佛滅度後於惡世中暫讀此經是則為難假使劫燒擔負乾草入中不燒亦未為難我滅度後若持此經為一人說是則為難若持八萬四千法藏十二部經為人演說令諸聽者得六神通雖能如是亦未為難於我滅度聽受此經問其義趣是則為難若人說法令千萬億無量無數恆沙衆生得阿羅漢具六神通雖有是益亦未為難於我滅後若能奉持如斯經典是則為難八萬四千及十二部皆通大小若通於小但令聽者得小乘神通亦未為難若立有頂此約不得通者為況故知圓經暫讀暫說誠為不易三釋難持意我為佛道於無量土從始至今廣說諸經而於其中此經第一若有能持則持佛身若有能持則持佛身此意豈易則持佛身者經有體宗用三衣座室三即三身故體室約同體故即法身中理宗座即報身空智用衣約和光利物故即應身假也二釋勸意三初重募持經之人諸善男子於我滅後誰能受持讀誦此經今於佛前自說誓言二能持難持佛喜此經難持若暫持者我則歡喜諸佛亦然如是之人諸佛所歎三能持則成勝行是則勇猛是則精進是名持戒行頭陀者則為疾得無上佛道能於來世讀持此經是真佛子住淳善地佛滅度後能解其義是諸天人世間之眼於恐畏世能須臾說一切天人皆應供養恐畏世者梵云颰陀此云賢劫有千佛故梵云沙悖此云恐畏而又具五濁八苦故劫之異名耳
