body:
  text: 二觀世音普門品二初品目妙法蓮華經觀世音菩薩普門品第二十五依天台釋此品別有玄疏撮彼釋品有通有別通則十雙也別有五隻十雙者一人法乃至第十智斷此品以人法合題觀世音人也普門法也問答有二番觀世音者以大悲拔苦依前問答百千苦惱皆得解脫普門者大慈與樂依後問答應以得度而為説法也五隻者一觀觀有多種謂折空體空次第三觀圓融三觀等云云今簡前三唯圓觀也二世世亦多種謂有為世無為世二邊世不思議世今取不思議世三音音者機也機亦多種有人天機二乘機菩薩機佛機今唯取佛機而設應也四普普者周遍也諸法無量若不得普者則是偏法也若得普者即圓法也約十法名普云云五門者空門假門中門今正通實相雙照二諦故名普能通故名門普門即圓通門也故此品題乃是菩薩以圓融妙觀觀不思議世界佛機之音聲普令入圓通之門也故名觀世音菩薩普門品也二經文二初兩番問答二聞品得益初文又二初長行二偈頌初文又二初一番問答二次番問答初文又二初問二初經家敘爾時無盡意菩薩即從座起偏袒右肩合掌向佛而作是言無盡意者非盡非無盡為對小乘明盡也小乘明盡者為對無生智滅色取空故也無盡義多虗空不可盡一切法不可盡空假中俱不可極大品云即色是空非色滅空空故無盡也二正興問世尊觀世音菩薩以何因緣名觀世音有兩番問答今初問觀音人後問普門法此中即初番問也大經云汝具二莊嚴故能問我具二莊嚴故能答爾釋論云問有多種有不解故問有試問有赴機問今即赴機問也以何因緣者其義甚衆今略言境智則以衆生善惡兩機為因菩薩靈智慈悲為緣以是因緣名觀世音二答三初總答機應四初標人數佛告無盡意菩薩善男子若有無量百千萬億衆生十法界機其數無量百千萬億者蓋通途就同業者語也舉多種以明種種業遭苦者稱名一時有機一時能應耳二明遭苦受諸苦惱百千業同故云諸苦惱也此由結業果多而因亦多即總答文略而意廣三聞名稱號聞是觀世音菩薩一心稱名此明生善善惡合為機若能通達而聞即是聞慧心無住著即是思慧一心稱名即是修慧一心有事有理念念相續及數息繫念一心不亂皆事一心也若能達此心性自他共無因皆不可得無心無念空慧相應此乃無一亦無心也知聲相皆空呼響不實能稱所稱皆不可得是名無稱即理一心也四得解脫觀世音菩薩即時觀其音聲皆得解脫上受苦即稱名是機速也今稱即應是應機赴感之速也故皆得解脫也二別答三業三初口機應二初明七難七初火難四初持名者若有持是觀世音菩薩名者行人須憶持名字是謂持名也二遭苦設入大火三冥應火不能燒四結成由是菩薩威神力故事迹晉人謝敷篤信大法平居寫華嚴經撰觀音傳竺長舒晉元康中為延火所及一心稱名風回火轉將鄰所居其火滅約觀解火有果報火業火煩惱火若果報火至初禪天業火通三界煩惱火通三乘人故果報火劫盡自初禪以降無能免者業火者五戒十善為三毒火燒諸善根煩惱火者若聲聞人厭惡生死見三界猶如火宅勤求方便爭出火宅即得解脫支佛六度通別圓教變易土行人修道為五住煩惱惑火所燒方便未成火難恆逼稱名便得解脫菩薩法門無量不出別圓兩觀本起慈悲故能遍應二水難若為大水所漂稱其名號即得淺處事迹應驗傳云有海鹽人溺水稱菩薩名遇石得免又劉澄赴廣州牧遇風波其母及兩尼稱菩薩名得免難約觀解有果報水至二禪天下至地獄皆不免難惡業水通三界漂壞善根煩惱水通三乘人經云煩惱大河能漂香象愛欲水增長邪見沒溺生死難登涅槃彼岸二乘截生死河前路遠稱名發真見諦名淺處至無學彼岸也支佛六度等次第皆然也三羅剎難若有百千萬億衆生為求金銀琉璃硨磲碼瑙珊瑚琥珀真珠等寶入於大海假使黑風吹其船舫飄墮羅剎鬼國其中若有乃至一人稱觀世音菩薩名者是諸人等皆得解脫羅剎之難以是因緣名觀世音阿含云風加以黑怖之甚也羅剎是食人鬼也約觀釋不但世間風但黑業名風華嚴云嫌恨猛風吹罪心火常熾然吹諸行商人墮于惡趣失人道善寶及無漏法財復次始從地獄上至三禪皆有果報風難地獄疾風猛浪餓鬼道中寒風裂骨畜生傾巢覆卵修羅亦有風難至若劫盡風災起時諸山搏擊上至三禪宮殿碎為微塵當此之時一心稱念觀音爾時菩薩以王三昧力或以手鄣或以口吸無量方便令得解脫又黑業惡風吹壞五戒十善吹船舫墮三途四趣鬼國及愛見境中二乘採聖財寶為煩惱風吹慈行船墮見愛境為見愛羅利所害稱名得脫見愛二輪永免二十五有黑業也支佛及六度行通別圓變易等入煩惱海採一切智寶八倒暴風飄諸行船墮二邊鬼國用正觀心體達諸法不生不滅入實際中即得解脫事迹應驗傳云外國百餘人自師子國泛海遇惡風墮鬼國時羅剎欲食舉舶俱稱觀音名中有一小乘沙門不信觀音不肯稱名鬼索此沙門沙門狼狽學稱亦得解脫四王難若復有人臨當被害稱觀世音菩薩名者彼所執刀杖尋段段壞而得解脫約觀釋惡業亦能傷善身命六塵三毒皆名刀箭破壞善心割斷戒皮定肉萬劫不復起怖畏心稱觀世音即蒙救護三毒無傷清升受樂即菩薩力也又聲聞厭患生死觀三界見思劇於刀箭支佛及六度行通別圓變易等五住刀箭傷法身損慧命若能稱名即蒙聖應免離通別刀杖二種生死事迹應驗傳云晉太元中彭城人遭賊被杻斯人常供觀音金像帶在髻中刀下但聞金聲刀三斫而頸無傷及解髻看像像有三痕因是獲放免難五鬼難若三千大千國土滿中夜叉羅剎欲來惱人聞其稱觀世音菩薩名者是諸惡鬼尚不能以惡眼視之況復加害滿中者鬼之心識相延故滿其中也聞其人稱名不能加惡者若非畏威即是懷恩故也約觀釋以果報論鬼難地獄亦有大力鬼惱於罪人畜生中鬼噉畜生人中可知諸天既領鬼何容為惱阿含云有大力鬼忽坐帝釋床帝釋起嗔鬼光明愈熾帝釋發慈心鬼光明即滅尋便離去天主尚為惱況四王修羅耶如是等處鬼難稱觀音名不能加害也復次修因者自有惡業名為鬼阿含云淫鬼入人心使人淫佚無度或使瞋癡等然三毒當體是鬼且如淫破梵行瞋破慈悲戒貪鬼惱不盜戒嗜鬼惱不飲戒乃至十善諸禪亦復如是皆為惡業鬼毀損人天動不動業若能稱名即不加害復次煩惱鬼者見心為男鬼愛心為女鬼見使歷三界有八十八愛歷三界有九十八豈不遍滿來惱二乘人乃至六度通別圓等行人也大經云唯願世尊善良咒師當為我等除無明鬼又云愚癡羅剎止住其中豈非煩惱鬼耶若稱名誦念觀智成就能令見愛塵勞隨意所轉去聲不能為害也六枷鎖難設復有人若有罪若無罪杻械枷鎖檢繫其身稱觀世音菩薩名者皆悉斷壞即得解脫事路應驗傳云蓋護山陽人繫獄當死於三日三夜稱名不歇即蒙觀音放光照燭鎖脫門開尋光而行二十里其光乃息約觀釋地獄體是囹圄鬼畜亦有籠繫修羅亦被五縛然北洲及天上自在應無此難降斯以還無免幽厄若能稱名皆悉斷壞也復次修因者惡業即是枷鎖耳然業雖有力隨作不作若有造因果終不失故云不失法如券若人修習諸善被惡業遮如彼大山映覆於心使善敗壞更增惡業即招果縛無由可解若欲脫者應稱觀音令惡業壞故經云妻子為鎖械錢財為牢獄王法為獄籍遮礙行人不得修道現在是報縛望過去即業七怨賊難若三千大千國土滿中怨賊有一商主將諸商人齎持重寶經過險路其中一人作是唱言諸善男子勿得恐怖汝等應當一心稱觀世音菩薩名號是菩薩能以無畏施於衆生汝等若稱名者於此怨賊當得解脫衆商人聞俱發聲言南無觀世音菩薩稱其名故即得解脫滿中之言假設也怨賊是重難也賊本求財怨本奪命今稱怨賊是財命兩圖也事迹應驗傳云釋慧達晉隆安二年於北隴上荷鋤采藥時羌餓皆捕人食之達為羌所得收閉在一柵中擇肥者先食達於是極誠稱名誦經羌食餘人既盡唯達及小兒存焉竟夜懇切猶冀感格向曉羌欲取忽見一虎從草邊出咆哮諸羌迸散虎因齧柵作一穴而去達將小兒走叛得免難約觀釋果報怨賊從地獄至第六天皆有鬬諍如此怨會稱名得脫復次修善之時惡覺既多是名為怨若能稱名惡退善增暗滅明生復次一切煩惱是出世法怨賊商主是三師羯磨受戒是商人無作戒是重寶五塵是怨賊或可法師是商主徒衆是商人理教是重寶二邊魔事是怨賊或可心王是商主心數是商人正觀之智是重寶覺觀為怨賊或可般若是商主五度萬行是商人法性實相是重寶六蔽是怨賊以茲多意歷諸教悉成稱名即得解脫也二結無盡意觀世音菩薩摩訶薩威神之力巍巍如是巍巍即是穹崇高出之詞以喻觀音之力出於二土之外竪經者也二意機應二初明三毒若有衆生多於淫欲常念恭敬觀世音菩薩便得離欲若多瞋恚常念恭敬觀世音菩薩便得離瞋若多愚癡常念恭敬觀世音菩薩便得離癡以三毒侵陵行人也多於者多尚得離少可知矣大論云女人違戒垢謗法墮餘殃不擇禽獸不避高墻破家滅國禍延其身大經云若習近貪欲是報熟時此多欲相也瞋恚多者令人不喜見遺教云劫功德賊無過瞋恚華嚴云一念瞋起鄣百法明門愚癡多者邪畫諸見撥無因果毀謗大乘應一心存想觀音即得免離常念即正念體達煩惱性無所有住貪瞋際即實際亡能所了念性本淨即定慧也二結饒益無盡意觀世音菩薩有如是等大威神力多所饒益是故衆生常應心念三身機應二初明二求二初求男三初立願若有女人設欲求男人願莫重於嗣續故得男續莫大焉女人從夫必求生男二修行禮拜供養觀世音菩薩三生男德便生福德智慧之男福則勢位高外慧則名聞博達若愚癡不善又何益二求女二初立願設欲求女二德業便生端正有相之女宿植德本衆人愛敬端正有相者即是有端正之相而無惡邪之相此則婦人之德早著也故人愛而敬之由宿世植德本故二結不虗無盡意觀世音菩薩有如是力若有衆生恭敬禮拜觀世音菩薩福不唐捐菩薩如是神力若敬禮者皆獲福不至於虗棄也三勸持名答三初勸持是故衆生皆應受持觀世音菩薩名號二格量無盡意若有人受持六十二億恆河沙菩薩名字復盡形供養飲食衣服臥具醫藥於汝意云何是善男子善女人功德多不無盡意言甚多世尊佛言若復有人受持觀世音菩薩名號乃至一時禮拜供養是二人福正等無異於百千萬億劫不可窮盡持名號多福田多時節多四事供多以格持一名號少一時禮拜少與種子福田皆少而二人福正等以佛眼稱量不增不減三結歎無盡意受持觀世音菩薩名號得如是無量無邊福德之利一時稱名福不可盡大品云一華散空乃至畢苦其福不盡第二番問答二初問三初問身無盡意菩薩白佛言世尊觀世音菩薩云何遊此娑婆世界前已問菩薩緣何得名佛答謂衆生三業顯機為境菩薩法身靈智冥然為應以慈悲境智因緣和合名觀世音今問云何遊此世界佛答以普門示現三業應彼衆生冥機等十義初問遊此世界即是身業應二問口云何而為衆生説法次問説法即口業應也三問意方便之力其事云何三問方便即意業應也此聖人之三業無謀而化應一切也亦名三不失謂三輪不思議也亦名三不護此明觀音住不思議圓音法門實不作意籌量如明鏡隨對而現一時普應故言三業不護也三不失者衆生根機有深淺觀音雖不作意逗機而事理冥會高下宛符故言不失也三輪不思議化至如現為佛身即示佛之心口乃至現執金剛神亦示執金剛神心口普現色身而於法身智慧無所損減淨名云善能分別諸法相於第一義而不動此不思議化也二答三初別答八初聖身三初佛身佛告無盡意菩薩善男子若有國土衆生應以佛身得度者觀世音菩薩即現佛身而為説法應以者答方便之力也當知意地觀機見其所宣宜示何身為説何法隨以化之此答意業也現身答身業説法答口業例下皆同然別答中凡三十三身十九説法束為十法界身而文中缺二界何也或曰觀音即菩薩身何須更現又無地獄界者別釋雖無總答中則有文云以種種形遊諸國土何得言無又請觀音云或遊戲地獄釋論云菩薩化地獄多現佛身以此推之則十法界身具矣問現佛身者是應是化答無而倐有者名化應同終始者名應若法身是真佛非應化説法人也二緣覺身應以辟支佛身得度者即現辟支佛身而為説法此如文殊二萬億劫作支佛化衆生三聲聞身應以聲聞身得度者即現聲聞身而為説法或藏通兩教或隨五味轉內祕外現莊嚴四枯四榮引導衆生二天身六初梵王身應以梵王身得度者即現梵王身而為説法即色界天主名尸棄瓔珞明四禪皆有王此梵王應是初禪猶有覺觀語言得為千界之主也觀音修白色三昧不取故不隨禪生不捨故應為梵王現身以權引實二帝釋身應以帝釋身得度者即現帝釋身而為説法地居天主也具云釋迦提桓因陀羅此云能天帝謂能與諸天作主者也觀音修難伏三昧現身以權引實三自在天身應以自在天身得度者即現自在天身而為説法是欲界頂名他化自在天假他所作以成己樂魔王也觀音住赤色三昧應為魔王令魔界即佛界四大自在天身應以大自在天身得度者即現大自在天身而為説法即色界頂摩醯首羅也樓炭稱阿迦尼吒天華嚴云色究竟釋論云騎白牛而有八臂三目是諸天之將五天大將軍身應以天大將軍身得度者即現天大將軍身而為説法光明中即以散脂為大將大經云八健是天中力士也釋論云鳩摩伽此云童子擎雞持鐸捉赤幡六毗沙門身應以毗沙門身得度者即現毗沙門身而為説法此云多聞居須彌北面即護世四天王之一三人身五初小王身應以小王身得度者即現小王身而為説法或云天王為大人王為小或云國有小大或是王子二長者身應以長者身得度者即現長者身而為説法長者有長人之德十譬喻品已列其文三居士身應以居士身得度者即現居士身而為説法謂多財居業者也或曰居道居山居財之士四宰官身應以宰官身得度者即現宰官身而為説法宰主也官管也以主宰管領為義有勳業輔相王者是也又郡邑長官皆稱宰官五婆羅門身應以婆羅門身得度者即現婆羅門身而為説法此名淨行劫初種族即西域四姓之一林野自間隱逸肥遁竺乾仙人通稱也四四衆身四應以比丘比丘尼優婆塞優婆夷身得度者即現比丘比丘尼優婆塞優婆夷身而為説法比丘之義序品列衆已釋比丘尼即出家女也優婆塞即近事男優婆夷即近事女謂受歸戒堪任親近奉事出家二衆故也或翻清信男女等五婦女身四應以長者居士宰官婆羅門婦女身得度者即現婦女身而為説法如上妙音品云於王後宮變為女身説法是也六童男女身二應以童男童女身得度者即現童男童女身而為説法應法師云七八歲已上俱可名童子七八部身八應以天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等身得度者即皆現之而為説法上已釋大威德天竟今更舉者或是星宿掌人間者也龍者是鱗蟲之長有四種一者守天宮殿二者興雷致雨三者地龍開決江河者也四者伏藏龍守護輪王寶藏者也夜叉此云捷疾鬼居海島空中天上三處傳傳相持不得食人佛初成道及轉法輪傳唱上至梵天即此鬼也乾闥婆者此云香陰去聲帝釋樂神也居須彌南面金剛窟中阿修羅者或有千頭二千手或萬頭二萬手或三頭六手此云無酒神昔持不飲戒男醜女端在衆相山中住或云在海底風輪持水如雲彼居其下迦樓羅此云金翅鳥王如上已釋緊那羅者天帝絲竹樂神委如上釋摩睺羅伽者什法師云是地龍肇法師云是腹行大蟒人非人非向之緊那羅乃總結八部各有所將之衆耳八執金剛身應以執金剛神得度者即現執金剛神而為説法此金剛非八部數但手執此寶而護法也或言在欲色天上教化諸天即大權神也二總答無盡意是觀世音菩薩成就如是功德以種種形遊諸國土度脫衆生橫遍十方豎通三土隨機應化非止三十三身三勸供養二初勸供是故汝等應當一心供養觀世音菩薩是觀世音菩薩摩訶薩於怖畏急難之中能施無畏是故此娑婆世界皆號之為施無畏者佛答前問是前總後別後勸持名以衆生仰荷冥益但可持名字而已佛答後問是前別後總後勸供養以衆生仰荷顯益見色聞聲故勸供養也菩薩能施與衆生無畏衆生於畏得脫為作此字也二受旨六初奉命無盡意菩薩白佛言世尊我今當供養觀世音菩薩即解頸衆寶珠瓔珞價直百千兩金而以與之作是言仁者受此法施珍寶瓔珞瓔珞經云初住是銅瓔珞乃至等覺是摩尼珠瓔珞無盡意其位高而言價直百千兩金者語略也約觀釋頸表中道一實之理以衆無著法門莊嚴也解者表常捨行以願行功德至菩提不住不著不依倚故言解也大集云戒定慧陀羅尼以為瓔珞莊嚴法身百千是十萬表一地萬功德為十地也法施以財通法也二不受時觀世音菩薩不肯受之不受三昧廣大之用故無所受也三重奉無盡意復白觀世音菩薩言仁者愍我等故受此瓔珞我為四衆故施仁愍四衆應受以無所受而受之也四佛勸爾時佛告觀世音菩薩當愍此無盡意菩薩及四衆天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等故受是瓔珞佛意云菩薩為物故應受施也五即受即時觀世音菩薩愍諸四衆及於天龍人非人等受其瓔珞分作二分一分奉釋迦牟尼佛一分奉多寶佛塔奉二分表事理二因也奉二佛表二因趣二果也當知理圓即法佛事圓即報佛也六結無盡意觀世音菩薩有如是自在神力遊於娑婆世界偈頌三初雙頌二問二初歎德爾時無盡意菩薩以偈問曰此偈是闍那崛多譯智者出時此偈未行故無所解荊溪輔行中引還著於本人之文故慈雲分節其文對於長行兩種問答宛如符契今依彼科消文世尊妙相具歎佛相德也二雙問二初含上二問我今重問彼長行先問得名因緣次問三業遊化之相今重頌此一句含兩意也二別頌初問佛子何因緣名為觀世音二雙頌二答二初經家敘具足妙相尊偈答無盡意此經家緝綴之語也二頌佛答二初總頌行願汝聽觀音行善應諸方所弘誓深如海歷劫不思議侍多千億佛發大清淨願觀音行即一心三觀智行令衆生得解脫也諸方所即微塵剎土也弘誓即四弘願行行經劫時長值多佛發淨願二別頌二答二初頌總答觀音得名二初頌總答我為汝略説聞名及見身心念不空過能滅諸有苦説即口業見身即身業心念即意業淨三業故能滅諸有之苦二頌別答二初頌七難十二初火難假使興害意推落大火坑念彼觀音力火坑變成池二水難或漂流巨海龍魚諸鬼難念彼觀音力波浪不能沒三加頌墮須彌難或在須彌峰為人所推墮念彼觀音力如日虗空住四加頌墮金剛難或被惡人逐墮落金剛山念彼觀音力不能損一毛五超頌賊難或值怨賊繞各執刀加害念彼觀音力咸即起慈心六追頌刀杖難或遭王難苦臨刑欲壽終念彼觀音力刀尋段段壞七追頌枷鎖難或囚禁枷鎖手足被杻械念彼觀音力釋然得解脫八追頌呪毒難呪詛諸毒藥所欲害身者念彼觀音力還著於本人九追頌羅剎難或遇惡羅剎毒龍諸鬼等念彼觀音力時悉不敢害十加頌惡獸難若惡獸圍繞利牙爪可怖念彼觀音力疾走無邊方十一加頌毒蛇難蚖蛇及蝮蝎氣毒煙火然念彼觀音力尋聲自回去十二加頌雷難雲雷鼓掣電降雹澍大雨念彼觀音力應時得消散二頌三毒二求衆生被困厄無量苦逼身觀音妙智力能救世間苦衆生多於界內貪瞋邪見及界外三毒外無報得男女內乏定慧法財致招二種生死故云無量苦逼身也若能正助為機即感真身之應救於二種世間之苦也二頌次答普門示現二初正頌示現二初超頌總答具足神通力廣修智方便十方諸國土無剎不現身此頌種種形遊諸國土也二追頌別答三初身業普應種種諸惡趣地獄鬼畜生生老病死苦以漸悉令滅種種惡趣通於九界望佛皆名惡舉惡趣併及之令滅苦得道耳二意業普觀二初本觀慈悲真觀清淨觀廣大智慧觀悲觀及慈觀常願常瞻仰此五觀字皆去呼具明三觀及慈悲二觀真者空觀也清淨假觀也假從空得無見思染即清淨也廣大智慧中觀也雙遮雙照絶待絶對平等大慧也三觀皆慈悲是觀如四無量心四禪禪即是觀觀音以無緣慈悲觀衆生名慈悲觀也用三觀以拔苦名悲觀用三觀以與樂名慈觀須常修常仰斯觀也二智光遍照無垢清淨光慧日破諸暗能伏災風火普明照世間智光遍照果上益物也無垢淨光照窮正理察彼本源若其不破三毒諸暗二死火風何能普益二種世間之機耶三口業普説二初頌二輪為化之本悲體戒雷震慈意妙大雲法身為悲體先用戒德以警人如天震雷物無不肅慈意大雲者以慈為雲無緣而被物無不覆如彼大雲二輪既施如可授法而澍甘露即口轉説法也二頌口輪説法澍甘露法雨滅除煩惱焰甘露者天台云諸天不死之神藥所宣至理解必無生無生即不死故澍法雨甘露羣生受苦三惑焰消以茲三普為入道門故當別頌普門也二加頌顯機諍訟經官處怖畏軍陳中念彼觀音力衆怨悉退散昔沙門道𭯺為賊圍𭯺與弟子共稱名俄頃黑雲中有金甲神於是賊走免害三雙頌二勸二初勸受持二初明智境勸常念妙音觀世音梵音海潮音勝彼世間音是故須常念衆生稱唱之音菩薩妙智觀故皆成妙境三智照故音成三境雙遮空有即成妙音雙照空有即成二世間音此二音中智境也梵音者是慈悲喜捨四觀照之即成俗諦海潮音者稱俗照機若熟若脫時節不差此二音假智境也勝彼世間音者畢竟空智出九界情照衆生音超二世間此一音即空智境也言雖次第觀在一心智外無音音外無智境智冥一思慮頓忘是故須常念即勸持義也此音聲雖是衆生口業所稱以彼聖人三智照我三諦即是三身也故勸進行者念此三身言常念即正念也二明感應勸勿疑念念勿生疑觀世音淨聖於苦惱死厄能為作依怙此明感應難測以止疑也上文先舉境智次勸常念今先勸勿疑次陳感應蓋互顯念念相續之謂也念彼觀音深妙智境也雖達常住未免遷流即於遷流照常境智是念念不離觀音此如天台示衆云實心契實境實緣次第生實實迭相注自然入實理然實緣者剎那念也次第而起一一皆是實觀之緣如是念唯恐生疑疑兕生則理境鄣縱求之未應須信淨聖冥資功不虗棄如父母可依怙念念受持必彰感應耳二頌勸供養具一切功德慈眼視衆生福聚海無量是故應頂禮二聞品功德二初持地歎功德爾時持地菩薩即從座起前白佛言世尊若有衆生聞是觀世音菩薩品自在之業普門示現神通力者當知是人功德不少二聞品獲益佛説是普門品時衆中八萬四千衆生皆發無等等阿耨多羅三藐三菩提心荊溪云以八教判方應今經也聞是觀世音者是聞向來冥益一段問也普門品是聞顯益一段答也自在業者若凡夫之業為愛所潤有漏因緣不得自在觀音為調十法界示此三業慈悲力潤隨感受生不為煩惱之所惑纍故言自在業也聞者能得觀行真似微妙功德故云不少也八萬四千衆生發無等等心者約心中八萬四千塵勞門為如來種發實相心等於八萬四千法門也無等等者二乘雖出三界猶有上法非無等佛是極地以發求佛心故無等等則等於佛也經云發心畢竟二不別如是二心前心難今發初心等後心故言無等等於後心名無等等即四悉檀意明發心也當知發心有三一名字發即五品弟子二相似發即六根清淨三分真發即初住以上名真發心者也私謂此一品正文純是慈悲拔苦與樂至受供養分奉釋迦多寶方顯在法華流通段一切菩薩皆慈悲而觀音普門示現神通自在能以無畏施衆生者稱名感應慈悲尤為顯著世人靡不先讀此品而後讀法華全部故特分印廣行三陀羅尼品明惡世弘經呪護二初品目妙法蓮華經陀羅尼品第二十六正經曰總持品陀羅尼此翻總持總持惡不起善不失世界又翻能遮能持能持善遮惡故也為人對治又遮二邊之惡持中道之善第一義衆經開遮所用不同或專用治病如那達居士或專護法如此文或專用滅罪如方等陀羅尼或通用治病滅罪護經如請觀音消伏毒害陀羅尼或大明呪無上明呪無等等明呪則非治病非滅罪非護經若通方者亦應兼之若別論者幸須依經勿乖教也二經文四初問持經功德爾時藥王菩薩即從座起偏袒右肩合掌向佛而白佛言世尊若善男子善女人有能受持法華經者若讀誦通利若書寫經卷得幾所福二答功德甚多四初立格量本佛告藥王若有善男子善女人供養八百萬億那由他恆河沙等諸佛二舉問多否於汝意云何其所得福寧為多不三實答甚多甚多世尊四格出功德佛言若善男子善女人能於是經乃至受持一四句偈讀誦解義如説修行功德甚多三請以呪守護五初藥王四初請爾時藥王菩薩白佛言世尊我今當與説法者陀羅尼呪以守護之二説即説呪曰安爾一曼爾二摩禰三摩摩禰四旨隸五遮梨弟六賖咩彌夜切七賖履罔雉切多瑋八羶輸千切帝九目帝十目多履十一娑履十二阿瑋娑履十三桑履十四娑履十五叉裔十六音曳阿叉裔十七阿耆膩十八羶帝十九賖履二十陀羅尼二十一阿盧伽婆娑蘇奈切簱蔗毗叉膩二十二禰毗剃二十三阿便哆都餓切邏郎佐切禰履剃二十四阿亶多罕切哆波輸地途賣切二十五歐究二十六牟究二十七阿羅二十八波羅二十九首迦差初几切三十阿三磨三履三十一佛陀毗吉利帙音姪帝三十二達磨波利差猜離切帝三十三僧伽涅瞿沙禰三十四婆舍婆舍輸地三十五曼哆邏三十六曼哆邏叉夜多三十七郵樓哆三十八郵樓多憍舍略力者來加二切三十九惡叉邏四十惡叉冶多冶四十一阿婆盧四十二阿摩若荏蔗切那多夜四十三三歎世尊是陀羅尼神呪六十二億恆河沙等諸佛所説若有侵毀此法師者則為侵毀是諸佛已四印時釋迦牟尼佛讚藥王菩薩言善哉善哉藥王汝愍念擁護此法師故説是陀羅尼於諸衆生多所饒益二勇施三初請爾時勇施菩薩白佛言世尊我亦為擁護讀誦受持法華經者説陀羅尼若此法師得是陀羅尼若夜叉若羅剎若富單那若吉蔗若鳩槃荼若餓鬼等伺求其短無能得便富單那此云臭餓鬼主熱病鬼也吉蔗或名吉遮此云所作即起尸鬼也若人若夜叉俱有此鬼鳩槃荼亦俱槃荼此云甕形舊云冬瓜此鬼陰如冬瓜行置肩上坐便踞之即是魘魅鬼也二説即於佛前而説呪曰痤誓螺切一摩訶痤二郁枳音紙三目枳四阿五阿羅婆弟六涅弟七涅多婆弟八伊緻豬里切柅女紙切九韋緻柅十於緻柅十一涅墀柅十二涅犁墀婆底十三三歎世尊是陀羅尼神呪恆河沙等諸佛所説亦皆隨喜若有侵毀此法師者則為侵毀是諸佛已三多聞三初請爾時毗沙門天王護世者白佛言世尊我亦為愍念衆生擁護此法師故説是陀羅尼大論云毗沙門此云多聞福德之名聞四方故居半須彌北水精埵主夜叉羅剎二説即説呪曰阿梨一那梨二免那梨三阿那盧四那履五拘那履六三歎世尊以是神呪擁護法師我亦自當擁護持是經者令百由旬內無諸衰患四持國三初請爾時持國天王在此會中與千萬億那由他乾闥婆衆恭敬圍繞前詣佛所合掌白佛言世尊我亦以陀羅尼神呪擁護持法華經者梵語提頭賴吒亦云提多羅吒此云持國又翻安民以能護持國土等故二説即説呪曰阿伽禰一伽禰二瞿利三乾音虔陀利四旃陀利五摩蹬音鄧耆六常求利七浮樓莎柅八頞音暹底九三歎世尊是陀羅尼神呪四十二億諸佛所説若有侵毀此法師者則為侵毀是諸佛已五十女五初列名爾時有羅剎女等一名藍婆二名毗藍婆三名曲齒四名華齒五名黑齒六名多髮七名無厭足八名持瓔珞九名皋帝十名奪一切衆生精氣是十羅剎女與鬼子母并其子及眷屬俱詣佛所二請説同聲白佛言世尊我等亦欲擁護讀誦受持法華經者除其衰患若有伺求法師短者令不得便即於佛前而説呪曰伊提履一伊提泯二伊提履三阿提履四伊提履五泥履六泥履七泥履八泥履九泥覆十樓醯呼難切十一樓醯十二樓醯十三樓醯十四多醯十五多醯十六多醯十七兜醯十八免醯十九三歎功寧上我頭上莫惱於法師若夜叉若羅剎若餓鬼若富單那若吉蔗若毗陀羅若犍馱若烏摩勒伽若阿跋摩羅若夜叉吉蔗若人吉蔗若熱病若一日若二日若三日若四日若至七日若常熱病若男形若女形若童男形若童女形乃至夢中亦復莫惱即於佛前而説偈言若不順我呪惱亂説法者頭破作七分如阿梨樹杖如殺父母罪亦如壓油殃斗稱欺誑人調達破僧罪犯此法師者當獲如是殃四誓護諸羅剎女説此偈已白佛言世尊我等亦當身自擁護受持讀誦修行是經者令得安穩離諸衰患消衆毒藥五印可佛告諸羅剎女善哉善哉汝等但能擁護受持法華名者福不可量何況擁護具足受持供養經卷華香瓔珞抹香塗香燒香幡蓋伎樂然種種燈酥燈油燈諸香油燈蘇摩那華油燈薝蔔華油燈婆師迦華油燈優鉢羅華油燈如是等百千種供養者皋帝汝等及眷屬應當擁護如是法師四聞品獲利益説是陀羅尼品時六萬八千人得無生法忍四妙莊嚴王本事品明以人護二初品目妙法蓮華經妙莊嚴王本事品第二十七正經曰往世淨復淨王品此因緣出他經昔佛末法有四比丘於法華經極生殷重雖卷舒祕教甘露未沾日夜翹誠刻無忘歎云苟非其人乎地非其處乎世間紛愀靜散相乖直爾求間尚須厭棄況崇道乎於是結契山林志欣佛慧幽居日積衣糧單罄有待多煩無時不乏一䬸喀喀廢萬里之行十旬九飯屈雲霄之志可得言哉其一人云吾等四窮尚不存身法當安寄君三人者但以命奉道莫慮朝中我一人者捨此身力誓給所須於是振錫門閭以求供繼自春至冬周而復始如僕奉大家甘苦無喜慍三人得展其誠功圓事辦一世之益當無量生其一人者數涉人間屢逢聲色壞器未火難可護持偶逢王出車馬駢闐旌旗吸赫生心動念愛彼光榮功德熏修隨念受報人中天上常得為王福雖不資亦有限也三人得道會而議云我免籠樊功由此王其耽果報增長有為從此死已不復為王方沈火坑良難可救幸其未苦正可開化其一人云此王著欲而復邪見若非愛鈎無由可拔一人可為端正婦二作聰明兒兒婦之言必當從順如宜設化果獲改邪昔時婦者今光照莊嚴相菩薩是即妙音也昔二子者今藥王藥上二菩薩是昔時王者今華德菩薩是所以白毫東召升紫臺而西引神呪護經使流通而大益説四聖之前緣故名妙莊嚴王本事品世界又妙莊嚴者妙法功德莊嚴諸根也為人此王往日於妙法有緣道薰時熟諸相應淨對治生雖未獲其理必臻靈瑞感通嘉名早立例如善吉雖未無諍已號空生故下文云得清淨功德莊嚴三昧以是義故名妙莊嚴王也第一義前品説呪護今品説人護人護尚爾況護彌良普勸流通也二經文六初總明事本爾時佛告諸大衆乃往古世過無量無邊不可思議阿僧祇劫有佛名雲雷音宿王華智多陀阿伽度阿羅訶三藐三佛陀國名光明莊嚴劫名喜見二雙標能所彼佛法中有王名妙莊嚴其王夫人名曰淨德有二子一名淨藏二名淨眼是二子有大神力福德智慧久修菩薩所行之道所謂檀波羅蜜尸羅波羅蜜羼提波羅蜜毗離耶波羅蜜禪波羅蜜般若波羅蜜方便波羅蜜慈悲喜捨乃至三十七品助道法皆悉明了通達又得菩薩淨三昧日星宿三昧淨光三昧淨色三昧淨照明三昧長莊嚴三昧大威德藏三昧於此三昧亦悉通達科為標能所者一人是所化三人是能化俱出其名別顯二子福慧六度四等餘經指此為十波羅蜜橫法門也三十七助道竪法門也餘經以三十七道品為正道九想十想不淨觀等行行為助道今經指十度為正道呼三十七品是助道也禪度中具有三昧道品中唯四念處屬慧四正勤屬精進餘五科內皆有定名定即三昧也更標七種三昧者當知隨用立名其理不異耳三能化方便三初時至爾時彼佛欲引導妙莊嚴王及愍念衆生故説是法華經彼佛出世常宣正法於王緣弱則非其時若説法華則其時矣故云引導等也二論議四初二子白母時至時淨藏淨眼二子到其母所合十指爪掌白言願母往詣雲雷音宿王華智佛所我等亦當侍從親近供養禮拜所以者何此佛於一切天人衆中説法華經宜應聽受先白母者父邪母正故先白母共設化方若據其本母子元知今約化儀機熟應發鎚砧相扣物器方成是故云白若附世情則母慈先白若就法釋利他之本慈復居先是故白母二母讓令其化父母告子言汝父信受外道深著婆羅門法汝等應往白父與共俱去三子怨生邪見家淨藏淨眼合十指爪掌白母我等是法王子而生此邪見家四母責令憂念父母告子言汝等當憂念汝父為現神變若得見者心必清淨或聽我等往至佛所三現化於是二子念其父故踴在虗空高七多羅樹現種種神變於虗空中行住坐臥身上出水身下出火身下出水身上出火或現大身滿虗空中而復現小小復現大於空中滅忽然在地入地如水履水如地現如此等種種神變令其父王心淨信解現化應十八變一右脅出水二左脅出火三左出水四右出火身上下各出水火為四并前為八九履水如地十履地如水十一從空中沒而復在地十二從地沒而復升空又於空中行住坐臥為四兼上十二成十六現大身滿虗空成十七大復現小成十八變也四所化得益十初信子伏師時父見子神力如是心大歡喜得未曾有合掌向子言汝等師為是誰誰之弟子二子白言大王彼雲雷音宿王華智佛今在七寶菩提樹下法座上坐於一切世間天人衆中廣説法華經是我等師我是弟子父語子言我今亦欲見汝等師可共俱往二父信白母於是二子從空中下到其母所合掌白母父王今已信解堪任發阿耨多羅三藐三菩提心我等為父已作佛事願母見聽於彼佛所出家修道爾時二子欲重宣其意以偈白母願母放我等出家作沙門諸佛甚難值我等隨佛學如優曇鉢華值佛復難是脫諸難亦難願聽我出家母即告言聽汝出家所以者何佛難值故此父已信宮中八萬四千又熟白毋稱慶願放出家母亦聽之矣三言佛難值於是二子白父母言善哉父母願時往詣雲雷音宿王華智佛所親近供養所以者何佛難得值如優曇鉢羅華又如一眼之龜值浮木孔而我等宿福深厚生值佛法是故父母當聽我等令得出家所以者何諸佛難值時亦難遇此重催父母今正是時佛難遇故一眼龜者約事是祗譬難值耳若作所表凡龜魚之眼兩向看之既云一眼所見非正在生死海而又邪見何可值於佛法浮木實諦之孔四化功已著彼時妙莊嚴王後宮八萬四千人皆悉堪任受持是法華經淨眼菩薩於法華三昧久已通達淨藏菩薩已於無量百千萬億劫通達離諸惡趣三昧欲令一切衆生離諸惡趣故其王夫人得諸佛集三昧能知諸佛祕密之藏二子如是以方便力善化其父令心信解好樂佛法此化功已著佛歎功德也法華三昧者攝一切法歸一實相如前説離惡趣者一往以三途為惡趣具論二十五有皆乖真起妄悉是惡趣今皆離之即二十五三昧破二十五有也佛集三昧者即三德祕密之藏佛集其中唯佛行處非餘人也五俱詣佛所於是妙莊嚴王與群臣眷屬俱淨德夫人與後宮采女眷屬俱其王二子與四萬二千人俱一時共詣佛所到已頭面禮足繞佛三匝却住一面爾時彼佛為王説法示教利喜王大歡悅爾時妙莊嚴王及其夫人解頸真珠瓔珞價直百千以散佛上於虗空中化成四柱寶臺臺中有大寶牀敷百千萬天衣其上有佛結跏趺坐放大光明爾時妙莊嚴王作是念佛身希有端嚴殊特成就第一微妙之色六佛與受記時雲雷音宿王華智佛告四衆言汝等見是妙莊嚴王於我前合掌立不此王於我法中作比丘精勤修習助佛道法當得作佛號娑羅樹王國名大光劫名大高王其娑羅樹王佛有無量菩薩衆及無量聲聞其國平正功德如是七出家修行其王即時以國付弟與夫人二子并諸眷屬於佛法中出家修道王出家已於八萬四千歲常勤精進修行妙法華經過是已後得一切淨功德莊嚴三昧八稱歎二子即升虗空高七多羅樹而白佛言世尊此我二子已作佛事以神通變化轉我邪心令得安住於佛法中得見世尊此二子者是我善知識為欲發起宿世善根饒益我故來生我家九佛述行高爾時雲雷音宿王華智佛告妙莊嚴王言如是如是如汝所言若善男子善女人種善根故世世得善知識其善知識能作佛事示教利喜令入阿耨多羅三藐三菩提大王當知善知識者是大因緣所謂化導令得見佛發阿耨多羅三藐三菩提心大王汝見此二子不此二子已曾供養六十五百千萬億那由他恆河沙諸佛親近恭敬於諸佛所受持法華經愍念邪見衆生令住正見佛讚善知識大有義能作佛事此則外護善知識示教利喜此則教授善知識化導令見佛此則同行善知識令入菩提此則實際實相善知識外護教授同行此三種已見達多品十歎佛自誓妙莊嚴王即從虗空中下而白佛言世尊如來甚希有以功德智慧故頂上肉髻光明顯照其眼長廣而紺青色眉間毫相白如珂月齒白齊密常有光明唇色赤好如頻婆果爾時妙莊嚴王讚歎佛如是等無量百千萬億功德已於如來前一心合掌復白佛言世尊未曾有也如來之法具足成就不可思議微妙功德教戒所行安穩快善我從今日不復自隨心行不生邪見憍慢瞋恚諸惡之心説是語已禮佛而出五結會古今二初結會佛告大衆於意云何妙莊嚴王豈異人乎今華德菩薩是其淨德夫人今佛前光照莊嚴相菩薩是哀愍妙莊嚴王及諸眷屬故於彼中生其二子者今藥王菩薩藥上菩薩是二結歎是藥王藥上菩薩成就如此諸大功德已於無量百千萬億諸佛所植衆德本成就不可思議諸善功德若有人識是二菩薩名字者一切世間諸天人民亦應禮拜六聞品悟道佛説是妙莊嚴王本事品時八萬四千人遠塵離垢於諸法中得法眼淨聞品益中法眼淨者有云初果也王及夫人與八萬等皆持此經皆當作佛而聞品者豈得小果耶名同義殊善須斟酌注者亦云所見清淨不云小乘初果位也私謂雖云法眼名同體異定非初果須判為六根清淨法眼位耳即七信已上也三普賢勸發品約自行勸流通二此品舉普賢誓願力大以勸流通也初品目妙法蓮華經普賢菩薩勸發品第二十八正經曰樂普賢品大論及觀經皆名遍吉此經稱普賢皆漢語梵音邲輸颰陀悲華經云我誓於穢惡世界行菩薩道使得嚴淨我行要當勝諸菩薩寶藏佛言以是因緣今改汝字名為普賢今論等覺之位居於衆伏之頂伏道周遍故名為普斷道才盡所較無幾鄰終際極故名為賢勸發者戀法之辭也遙在彼國具聞此經始末既周欲令自行化他永永無已故自東自西而來勸發具四悉檀意文云我為供養法華經故自現其身若見我身甚大歡喜世界以見我故轉復精進即得三昧及陀羅尼為人得此陀羅尼故無有非人能破壞者亦復不為女人之所惑亂對治三千世界微塵菩薩具普賢道第一義如此明文即四悉檀而來勸發也二經文四初經家敘三初上供爾時普賢菩薩以自在神通力威德名聞與大菩薩無量無邊不可稱數從東方來所經諸國普皆震動雨寶蓮華作無量百千萬億種種伎樂自在者理一也神通者行一也威德者人一也名聞者教一也又自在者常也神通者樂也威德者我也名聞者淨也言説如此即一而四德無不備自在義焉淨力故雨華樂力故奏伎神通力故動地自在力故隨意而雨隨去隨雨隨動隨奏譬如大龍飛行不息身邊雲雨流起無窮普賢及眷屬以菩薩身用四德力來勸四一所經歷處自行上供其事如此二下化又與無數諸天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等大衆圍繞各現威德神通之力所經歷處下化利益隨他所宜現八部像略用二力隨所堪忍其事如此上文自在等四以表四德今略無自在及以名聞但二兼二故也經文既云與無數等各現二力者當知所隨皆法身也主伴並具四德故云各也三修敬到娑婆世界耆闍崛山中頭面禮釋迦牟尼佛右繞七匝二明勸發二初請問勸發二初請問白佛言世尊我於寶威德上王佛國遙聞此娑婆世界説法華經與無量無邊百千萬億諸菩薩衆共來聽受惟願世尊當為説之若善男子善女人於如來滅後云何能得是法華經此請問勸發中有問有答者普賢既於彼國遙聞經竟戀法無已遠來之志志在勸發共來聽受等是更請正説勸發自行若善男子等是更請流通勸發化他如來若許二途正宗流通再演光光無極是故雙請也二佛答三初總佛告普賢菩薩若善男子善女人成就四法於如來滅後當得是法華經二別一者為諸佛護念二者植衆德本三者入正定聚四者發救一切衆生之心普賢既雙請如來巧答略舉四以蔽諸何者四法之要該括正通何者佛雖無偏若能遠惡從善反迷還正開權知見顯佛知見者則稱可聖心諸佛護念若佛知見開則般若照明是植衆德本亦是入正定聚不亂不味不取不捨亦是發救衆生當知此四與開權顯實名異體同無二無別又佛護念者是開佛知見植衆德本是示佛知見發救衆生是悟佛知見入正定聚是入佛知見迹門之要此四收矣又迹則有本從本開示悟入故有迹中開示悟入今開迹即顯本本迹無二無別以四法答其請正於義明矣以四法答謂流通流通之方唯三唯四唯三者發救衆生是入如來室入正定聚佛所護念是著如來衣植衆德本是坐如來座是弘宣之要即四而三唯四者發救衆生是誓願安樂行入正定聚是意安樂行植衆德本是口安樂行護念是身安樂行當知後四即前四也一答酬其兩請舉四冠一經法華之重演正宗斯經之再宣流通遠來之勸發其義如此三結善男子善女人如是成就四法於如來滅後必得是經於如來滅後必得是經舊云能行四法於未來世當手得是經今謂不爾上文云諸法實相義已為汝等説又云咸令衆生開示悟入佛之知見蓋法華之正體能行四法必得此解名解為經此結其請正之問若能運此解行傳與他人他人得斯信解成初依人能得真解成第二第三第四依人此結其請流通之問此意不見浪作餘説耶二誓願勸發二初護人六初攘其外難二初總攘其難爾時普賢菩薩白佛言世尊於後五百歲濁惡世中其有受持是經典者我當守護除其哀患令得安隱使無伺求得其便者二別攘其難若魔若魔子若魔女若魔民若為魔所著者若夜叉若羅剎若鳩槃荼若毗舍遮若吉蔗若富單那若韋陀羅等諸惱人者皆不得便二教其內法三初行立讀誦此經是人若行若立讀誦此經我爾時乘六牙白象王與大菩薩衆俱詣其所而自現身供養守護安慰其心亦為供養法華經故二坐則思惟其義是人若坐思惟此經爾時我復乘白象王現其人前其人若於法華經有所忘失一句一偈我當教之與共讀誦還令通利爾時受持讀誦法華經者得見我身甚大歡喜轉復精進以見我故即得三昧及陀羅尼名為旋陀羅尼百千萬億旋陀羅尼法音方便陀羅尼得如是等陀羅尼旋陀羅尼者旋假入空也百千旋者旋空出假也方便者二為方便道得入中道第一義諦也三三七一心精進世尊若後世後五百歲濁惡世中比丘比丘尼優婆塞優婆夷求索者受持者讀誦者書寫者欲修習是法華經於三七日中應一心精進滿三七日已我當乘六牙白象與無量菩薩而自圍繞以一切衆生所喜見身現其人前而為説法示教利喜亦復與其陀羅尼呪得是陀羅尼故無有非人能破壞者亦不為女人之所惑亂我身亦自常護是人惟願世尊聽我説此陀羅尼呪即於佛前而説呪曰阿檀地途賣切一檀陀婆地二檀陀婆帝三檀陀鳩舍隸四檀陀修陀隸五修陀隸六修陀羅婆底七佛陀波羶禰八薩婆陀羅尼阿婆多尼九薩婆婆沙阿婆多尼十修阿婆多尼十一僧伽婆履叉尼十二僧伽涅伽陀尼十三阿僧祇十四僧伽婆伽地十五帝𨽻阿惰僧伽兜略盧遮切阿羅帝波羅帝十六薩婆僧伽三摩地伽蘭地十七薩婆達磨修波利剎帝十八薩婆薩埵樓馱憍舍略阿䨲伽地十九辛阿毗吉利地帝二十三覆以神力世尊若有菩薩得聞是陀羅尼者當知普賢神通之力若法華經行閻浮提有受持者應作此念皆是普賢威神之力四示其勝因若有受持讀誦正憶念解其義趣如説修行當知是人行普賢行於無量無邊諸佛所深種善根為諸如來手摩其頭若能為五種法師流通法華即是於三世佛所為種為熟為脫此人同未來諸佛得脫故言同普賢行此人已於先佛植善故言深種善根此人為現佛所熟故言手摩其頭五示其近果若但書寫是人命終當生忉利天上是時八萬四千天女作衆伎樂而來迎之其人即著七寶冠於采女中娛樂快樂何況受持讀誦正憶念解其義趣如説修行若有人受持讀誦解其義趣是人命終為千佛授手令不恐怖不墮惡趣即往兜率天上彌勒菩薩所彌勒菩薩有三十二相大菩薩衆所共圍繞有百千萬億天女眷屬而於中生有如是等功德利益但能書寫近在忉利具五法師次在兜率六總結功德是故智者應當一心自書若使人書受持讀誦正憶念如説修行二護法世尊我今以神通力故守護是經於如來滅後閻浮提內廣令流布使不斷絶三明述發二初超述護法爾時釋迦牟尼佛讚言善哉善哉普賢汝能護助是經令多所衆生安樂利益汝已成就不可思議功德深大慈悲從久遠來發阿耨多羅三藐三菩提意而能作是神通之願守護是經我當以神通力守護能受持普賢菩薩名者如來舉勝述成其劣增進行者勇鋭弘宣今先述護法云汝能如是外多利益內積慈悲又久劫已來作如此護我亦以佛之神力守護是法況復汝耶二追述護人五初述示身教法普賢若有受持讀誦正憶念修習書寫是法華經者當知是人則見釋迦牟尼佛如從佛口聞此經典當知是人供養釋迦牟尼佛當知是人佛讚善哉當知是人為釋迦牟尼佛手摩其頭當知是人為釋迦牟尼佛衣之所覆當知是人見釋迦牟尼佛者述其示身教法也其尚見我萬德果身況汝因中六牙白象其尚從佛口具足聞經況汝所教忘失章句其尚為佛口讚手摩佛衣所覆況汝因人陀羅尼覆耶二超述舉勝因如是之人不復貪著世樂不好外道經書手筆亦復不喜親近其人及諸惡者若屠兒若畜豬羊雞狗若獵師若衒賣女色是人心意質直有正憶念有福德力是人不為三毒所惱亦不為嫉妬我慢邪慢增上慢所惱是人少欲知足能修普賢之行廣舉因中無諸過惡少欲知足修普賢行述勝因也三超述示近果普賢若如來滅後後五百歲若有人見受持讀誦法華經者應作是念此人不久當詣道場破諸魔衆得阿耨多羅三藐三菩提轉法輪擊法鼓吹法螺雨法雨當坐天人大衆中師子法座上普賢若於後世受持讀誦是經典者是人不復貪著衣服臥具飲食資生之物所願不虗亦於現世得其福報其人當詣道場必成遠果況近果耶亦於現世得其近果不但生天也四追述攘外難若有人輕毀之言汝狂人耳空作是行終無所獲如是罪報當世世無眼若有供養讚歎之者當於今世得現果報若復見受持是經者出其過惡若實若不實此人現世得白癩病若輕笑之者當世世牙齒疏缺醜脣平鼻手腳繚戾眼目角睞身體臭穢惡瘡膿血水腹短氣諸惡重病佛廣示毀者之罪令知過必改不相惱亂非但持經者難滅亦乃欲毀者福生無毀無難彼此安樂曠濟無偏慈之至也切惟上聖預彰鑑戒猶為燈峨而施籠其仁育之何以加夫何群生業深遽難剪拂見有留情此道者則百端求瑕戮力譏毀而沮壞之此惟快利於一時必貽禍於浩劫矣悲夫五述信者功德是故普賢若見受持是經典者當起遠迎當如敬佛四明發益二初聞品得道説是普賢勸發品時恆河沙等無量無邊菩薩得百千萬億旋陀羅尼三千大千世界微塵等諸菩薩具普賢道百千萬億旋陀羅尼是初地位具普賢道是十地位二聞經利益佛説是經時普賢等諸菩薩舍利弗等諸聲聞及諸天龍人非人等一切大會皆大歡喜受持佛語作禮而去大衆歡喜是聞經得益也此中猶稱聲聞者乃是結集經家存其本位耳又經家稱其是大乘聲聞以佛道聲令一切聞斯義彌顯也
