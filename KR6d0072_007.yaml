body:
  text: 三常不輕品引信毀罪福者勸流通二初品目妙法蓮華經常不輕菩薩品第二十正本名常被輕慢品順勸流通雖是未見逆化流通故佛引昔為證內懷不輕之解外敬不輕之境由身口意合於解行而起教化法華論云以衆生有佛性不敢輕之佛性有五種正因佛性通亘本當緣了佛性種子本有非適今也若果性果果性定當得之決不虗也雖為罵辱徹見此理而不輕之今證佛果號釋迦文本迹難思逆順安測故以目品二經文二初長行二偈頌初文又三初雙指前品罪福二初指罪爾時佛告得大勢菩薩摩訶薩汝今當知若比丘比丘尼優婆塞優婆夷持法華經者若有惡口罵詈誹謗獲大罪報如前所說二指福其所得功德如向所說眼耳鼻舌身意清淨二雙開今品信毀二初明事本七初時節得大勢乃往古昔過無量無邊不可思議阿僧祇劫二名號有佛名威音王如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊三劫國劫名離衰國名大成四說法其威音王佛於彼世中為天人阿修羅說法為求聲聞者說應四諦法度生老病死究竟涅槃為求辟支佛者說應十二因緣法為諸菩薩因阿耨多羅三藐三菩提說應六波羅蜜法究竟佛慧五壽命得大勢是威音王佛壽四十萬億那由他恆河沙劫六正像正法住世劫數如一閻浮提微塵像法住世劫數如四天下微塵其佛饒益衆生已然後滅度七後佛正法像法滅盡之後於此國土復有佛出亦號威音王如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊如是次第有二萬億佛皆同一號二明本事三初總指時節最初威音王如來既已滅度正法滅後二雙標人名於像法中增上慢比丘有大勢力爾時有一菩薩比丘名常不輕三雙明得失二初論信者得得大勢以何因緣名常不輕是比丘凡有所見若比丘比丘尼優婆塞優婆夷皆悉禮拜讚歎而作是言我深敬汝等不敢輕慢所以者何汝等皆行菩薩道當得作佛而是比丘不專讀誦經典但行禮拜乃至遠見四衆亦復故往禮拜讚歎而作是言我不敢輕於汝等汝等皆當作佛故就信者論得謂得正說之宏宗流通之妙益者也名常不輕是人一凡有所見是理一皆悉禮拜是行一而作是言是教一此是迹門開權顯實之四一乃至遠見四衆是本理一故往禮拜是本行一而作是言是本教一少人一其義可解此是本門開近顯遠之四一也不專讀誦但行禮拜者是初隨喜人之位也隨喜一切法悉有安樂性皆是一實相隨喜一切人皆有三佛性讀誦經典是了因性皆行菩薩道即緣因性不敢輕慢而復深敬即正因性敬人敬法不起諍競即隨喜意深敬是如來座也忍於打罵是著如來衣也以慈悲常行不替即如來室也又深敬是意業不輕之說是口業故往禮拜是身業此三與慈悲俱即誓願安樂行也如此三四非流通妙益而何耶二明毀者失四衆之中有生瞋恚心不淨者惡口罵詈言是無智比丘從何所來自言我不輕汝而與我等授記當得作佛我等不用如是虗妄授記如此經歷多年常被罵詈不生瞋恚常作是言汝當作佛說是語時衆人或以杖木瓦石而打擲之避走遠住猶高聲唱言我不敢輕於汝等汝等皆當作佛以其常作是語故增上慢比丘比丘尼優婆塞優婆夷號之為常不輕心不淨者不受四一也詈言無智智知於理既言無智不受理一也比丘即不受人一也從何所來不受行一也虗妄授記不受教一也歷多年常被罵詈結不受開權顯實迹中之四一也避走遠住下不受開近顯遠本地之四一也常作是語故此結深信不休也四衆為作不輕名者此結訾毀不住也問釋迦出世踟蹰不說不輕一見造次而言何也答本已有善釋迦以小而將護之本未有善不輕以大而強毒之三雙勸後二逆順亦名雙明信毀報二初明信者報二初明得果報是比丘臨欲終時於虗空中具聞威音王佛先所說法華經二十千萬億偈悉能受持即得如上眼根清淨耳鼻舌身意根清淨得是六根清淨已更增壽命二百萬億那由他歲廣為人說是法華經於時增上慢四衆比丘比丘尼優婆塞優婆夷輕賤是人為作不輕名者見其得大神通力樂說辨力大善寂力聞其所說皆信伏隨從是菩薩復化千萬億衆令住阿耨多羅三藐三菩提命終之後得值二千億佛皆號日月燈明於其法中說是法華經以是因緣復值二千億佛同號雲自在燈王於此諸佛法中受持讀誦為諸四衆說此經典故得是常眼清淨耳鼻舌身意諸根清淨於四衆中說法心無所畏得大勢是常不輕菩薩摩訶薩供養如是若干諸佛恭敬尊重讚歎種諸善根於後復值千萬億佛亦於諸佛法中說是經典功德成就當得作佛現報得六根淨生報值燈明佛後報值雲自在燈佛神通力身業淨說辨力口業淨善寂力意業淨二結會古今二初正結會得大勢於意云何爾時常不輕菩薩豈異人乎則我身是二舉信勸順若我於宿世不受持讀誦此經為他人說者不能疾得阿耨多羅三藐三菩提我於先佛所受持讀誦此經為人說故疾得阿耨多羅三藐三菩提二明毀者果報二初明得果得大勢彼時四衆比丘比丘尼優婆塞優婆夷以瞋恚意輕賤我故二百億劫常不值佛不聞法不見僧千劫於阿鼻地獄受大苦惱畢是罪已復遇常不輕菩薩教化阿耨多羅三藐三菩提此明毀者得善惡兩果謗故墮惡聞佛性名毒鼓之力獲善果報此所謂謗亦成種也譬如人之倒地還依地起矣然因謗毀尚獲妙果況復不生毀謗而能讚歎隨喜者耶二結古今二初正結會得大勢於汝意云何爾時四衆常輕是菩薩者豈異人乎今此會中跋陀婆羅等五百菩薩師子月等五百比丘尼思佛等五百優婆塞皆於阿耨多羅三藐三菩提不退轉者是二舉逆勸得大勢當知是法華經大饒益諸菩薩摩訶薩能令至於阿耨多羅三藐三菩提是故諸菩薩摩訶薩於如來滅後常應受持讀誦解說書寫是經經有大力終感大果務當勤習五種之行二偈頌二初但頌信毀因果二初總頌本事爾時世尊欲重宣此義而說偈言過去有佛號威音王神智無量將導一切天人龍神所共供養二頌本事三初頌雙標二人是佛滅後法欲盡時有一菩薩名常不輕時諸四衆計著於法言著法者是法不可示若定謂是有即是著法定謂非有非無亦名著法故佛藏云刀輪害閻浮提人其失猶少以有所得心說大乘者其罪過彼也大論云執有與無諍乃至執非有非無與有無諍如牛皮龍繩俱不免患中論云諸佛說空法本為化於有若有著空者諸佛所不化若定言諸法非有非無者是名愚癡論若得四悉檀意自行化他俱無著也二頌雙明得失三初頌得不輕菩薩往到其所而語之言我不輕汝汝等行道皆當作佛二頌失諸人聞已輕毀罵詈三重明得不輕菩薩能忍受之三舉信毀果及結會古今二初果報其罪畢已臨命終時得聞此經六根清淨神通力故增益壽命復為諸人廣說是經諸著法衆皆蒙菩薩教化成就令住佛道不輕命終值無數佛說是經故得無量福漸具功德疾成佛道二結會彼時不輕則我身是時四部衆著法之者聞不輕言汝當作佛以是因緣值無數佛此會菩薩五百之衆并及四部清信士女今於我前聽法者是我於前世勸是諸人聽受斯經第一之法開示教人令住涅槃世世受持如是經典二頌勸受持果報億億萬劫至不可議時乃得聞是法華經億億萬劫至不可議諸佛世尊時說是經是故行者於佛滅後聞如是經勿生疑惑應當一心廣說此經世世值佛疾成佛道所謂億生罕際浩劫難聞或能受持決定成佛金口委喻可不信順而勉之哉此品蓋是如來於過去劫中值佛出世號威音王於彼佛所修菩薩行號常不輕為諸四衆下強毒種而彼四衆根器眇劣不堪大化遂以瓦石而打擲之坐乘罪咎沈墜泥犁復於地獄起三念各相謂言我等今者何因緣故而墜此處復各相謂以由前世愚無所知詈及不輕復以杖木楚毒由茲罪惡所以沈淪既而興善革惡永離三途即獲勝果譬槁木生春寒灰再焰此經勝妙力用其若是也大意云夫踊出開士仰尊顏而發願舊住賢哲覽神力而增悅靈山法主覆長舌於梵世樹下諸佛放毛光於法界謦咳之聲遍至十方彈指之響地振六種是以十方之衆生見娑婆法會無邊之羣生聞虗空妙聲人人加念佛而散諸寶物國國融鐵圍而同一佛土云云二神力品下八品明囑纍流通三初神力囑纍二品明付囑流通二藥王下五品約化他流通三普賢一品約自行勸流通初文又二初神力品明菩薩受命弘經二囑纍品明如來付囑初文又二初品目妙法蓮華經如來神力品第二十一如來如上已釋神力者神名不測力名斡用不測則天然之體深幹用則轉變之力大此中為付囑深法現十種大神力故名如來神力品也二經文二初長行二偈頌初文又二初菩薩受命二初經家敘儀爾時千世界微塵等菩薩摩訶薩從地涌出者皆於佛前一心合掌瞻仰尊顏二發誓弘經三初時節而白佛言世尊我等於佛滅後二處所世尊分身所在國土滅度之處三誓願當廣說此經所以者何我等亦自欲得是真淨大法受持讀誦解說書寫而供養之二佛現神力二初所對之衆爾時世尊於文殊師利等無量百千萬億舊住娑婆世界菩薩摩訶薩及諸比丘比丘尼優婆塞優婆夷天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等一切衆前二正現神力十初吐舌相現大神力出廣長舌上至梵世今經所演開三顯一內祕外現廢近顯遠明三世益物誠諦不虗福德人舌至鼻端三藏佛至髮際今至梵天者出過凡聖之外極於淨天之頂也二通身放光一切毛孔放於無量無數色光皆悉遍照十方世界衆寶樹下師子座上諸佛亦復如是出廣長舌放無量光釋迦牟尼佛及寶樹下諸佛現神力時滿百千歲通身毛孔遍體放光周遍十方無處不明表智境罄也上迹門白毫吐耀始在東方表七方便初見一理今本門既竟放一切光照一切土能令初因終于等覺究竟佛慧分身諸佛亦復如是三謦咳之聲然後還攝舌相一時謦咳謦咳者將語之狀亦是通暢之相也四十餘年隱祕真實今獲伸舒無有遺滯是我出世大事通暢是故謦咳欲以此法付諸菩薩令於後世導利衆生將語斯事是故謦咳又謦咳二義一謦咳其事了二謦咳付他也四彈指之聲俱共彈指彈指者即隨喜七方便人同入圓道隨喜圓道增智損生隨喜諸菩薩持真淨大法隨喜後世獲無上寶此一彈指竪徹三世橫亘十方者也五地六種動是二音聲遍至十方諸佛世界地皆六種震動地六種動者表初心至後心六番動無明惑也六普見大會其中衆生天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等以佛神力故皆見此娑婆世界無量無邊百千萬億衆寶樹下師子座上諸佛及見釋迦牟尼佛共多寶如來在寶塔中坐師子座又見無量無邊百千萬億菩薩摩訶薩及諸四衆恭敬圍繞釋迦牟尼佛既見是已皆大歡喜得未曾有此表諸佛道同也而今而後亦復如是五千起去三變被移既失本心不能現益宜以非滅現滅從諸菩薩弘經得道入於佛慧如今會無異亦表未來有機一也七空中唱聲即時諸天於虗空中高聲唱言過此無量無邊百千萬億阿僧祇世界有國名娑婆是中有佛名釋迦牟尼今為諸菩薩摩訶薩說大乘經名妙法蓮華教菩薩法佛所護念汝等當深心隨喜亦當體拜供養釋迦牟尼佛此表未來有教一也八咸皆歸命彼諸衆生聞虗空中聲已合掌向娑婆世界作如是言南無釋迦牟尼佛南無釋迦牟尼佛表未來有人一九遙散諸物以種種華香瓔珞幡蓋及諸嚴身之具珍寶妙物皆共遙散娑婆世界所散諸物從十方來譬如雲集變成寶帳遍覆此間諸佛之上此表未來有行一也十同一佛土于時十方世界通達無礙如一佛土此表理一也問何以知十相表現在四一復表將來四一答下文云若我以是神力於無量劫為囑纍故說此經功德猶不能盡表現表將其義明矣三結要勸持四初稱歎付囑爾時佛告上行等菩薩大衆諸佛神力如是無量無邊不可思議若我以是神力於無量無邊百千萬億阿僧祇劫為囑纍故說此經功德猶不能盡二結要付囑以要言之如來一切所有之法一切皆佛法也此結一切皆妙名也如來一切自在神力通達無礙具八自在此結妙用也如來一切祕要之藏遍一切處皆是實相此結妙體也如來一切甚深之事是一乘因果此結妙宗也皆於此經宣示顯說總結一經唯四而已撮其樞柄而授與之三勸㢡付囑是故汝等於如來滅後應當一心受持讀誦解說書寫如說修行所在國土若有受持讀誦解說書寫如說修行若經卷所住之處若於園中若於林中若於樹下若於僧坊若白衣舍若在殿堂若山谷曠野是中皆應起塔供養勉諭四衆在處流通隨所在處皆當起塔者以此經即是如來真身舍利四釋付囑意所以者何當知是處即是道場釋甚深之事也諸佛於此得阿耨多羅三藐三菩提此是法身即釋祕要之藏也諸佛於此轉於法輪此即般若釋一切法也諸佛於此而般涅槃此即解脫釋自在神力也二偈頌二初頌十神力爾時世尊欲重宣此義而說偈言諸佛救世者住於大神通為悅衆生故現無量神力舌相至梵天身放無數光為求佛道者現此希有事諸佛謦咳聲及彈指之聲周聞十方國地皆六種動以佛滅度後能持是經故諸佛皆歡喜現無量神力二頌結要囑纍三初總頌四法囑纍是經故讚美受持者於無量劫中猶故不能盡是人之功德無邊無有窮如十方虗空不可得邊際二別頌四法四初頌一切之法能持是經者則為己見我亦見多寶佛及諸分身者又見我今日教化諸菩薩二頌自在神力能持是經者令我及分身滅度多寶佛一切皆歡喜十方現在佛并過去未來亦見亦供養亦令得歡喜三頌祕要之藏諸佛坐道場所得祕要法能持是經者不久亦當得四頌甚深之事能持是經者於諸法之義名字及言辭樂說無窮盡如風於空中一切無鄣礙於如來滅後知佛所說經因緣及次第隨義如實說如日月光明能除諸幽冥斯人行世間能滅衆生暗教無量菩薩畢竟住一乘三總頌結意是故有智者聞此功德利於我滅度後應受持斯經是人於佛道決定無有礙二囑纍品明如來摩頂付囑二初品目妙法蓮華經囑纍品第二十二囑是佛所付囑纍是煩爾宣傳此從佛旨得名囑是頂受所囑纍是甘而弗勞此從菩薩敬順得名囑是如來金口所囑纍是菩薩丹心頂荷此從授受合論故言囑纍又如來躬從座起摩頂授之大衆如世尊敕當奉行殷勤授受故言囑纍品也二經文二初正明付囑三初如來付囑三初正付爾時釋迦牟尼佛從法座起現大神力以右手摩無量菩薩摩訶薩頂而作是言我於無量百千萬億阿僧祇劫修習是難得阿耨多羅三藐三菩提法今以付囑汝等汝等應當一心流布此法廣令增益如是三摩諸菩薩摩訶薩頂而作是言我於無量百千萬億阿僧祇劫修習是難得阿耨多羅三藐三菩提法今以付囑汝等汝等當受持讀誦廣宣此法令一切衆生普得聞知佛以權智善巧之手摩三千三百那由他國土畟塞虗空諸菩薩實智之頂如來授道化他故名權智手菩薩自行受道故名實智頂申手摩頂即身付囑權智臨實智即意付囑而作是言即口付囑也文有四悉檀意我於無量劫修難得法此從前佛受學今以付爾爾當授彼三世繼嗣即世界悉檀一心流布即為人廣令增益即對治也益者即第一義也二釋付所以者何如來有大慈悲無諸慳吝亦無所畏能與衆生佛之智慧如來智慧自然智慧如來是一切衆生之大施主汝等亦應隨學如來之法勿生慳吝大慈悲如來室無諸慳吝即如來衣無所畏即如來座佛智即一切智如來智即道種智自然智即一切種智於如來室中能施衆生三種智慧乃至座中亦復如是如是施主故無慳吝故無所畏故汝等當學如來此法是名釋出佛意而付囑之三誡付於未來世若有善男子善女人信如來智慧者當為演說此法華經使得聞知為令其人得佛慧故若有衆生不信受者當於如來餘深法中示教利喜汝等若能如是則為已報諸佛之恩若根深智利直說佛慧若不堪者於餘深法中示教利喜佛慧是深而非餘六方便是餘而非深別教次第是餘亦是深汝能以餘深之法助申佛慧即善巧報佛恩是名誡付囑也二菩薩領受時諸菩薩摩訶薩聞佛作是說已皆大歡喜遍滿其身益加恭敬曲躬低頭合掌向佛俱發聲言如世尊敕當具奉行唯然世尊願不有慮諸菩薩摩訶薩衆如是三反俱發聲言如世尊敕當具奉行唯然世尊願不有慮皆大歡喜是意領受曲躬低頭是身領受俱發聲言是口領受如世尊敕領受如來是大施主入如來室意當具奉行領受無諸慳吝著如來衣意願不有慮領受無所畏坐如來座意三事畢唱散爾時釋迦牟尼佛令十方來諸分身佛各還本土而作是言諸佛各隨所安多寶佛塔還可如故多寶為證經故來今迹本二門已訖故須敬遣復閉如故分身為開塔故集開塔事了故令分身各還本土塔不可重開故分身去而不現塔猶聽法故閉而猶在問塔若聽法亦應不閉答證正已故閉聽流通故在二時衆歡喜說是語時十方無量分身諸佛坐寶樹下師子座上者及多寶佛并上行等無邊阿僧祇菩薩大衆舍利弗等聲聞四衆及一切世間天人阿修羅等聞佛所說皆大歡喜諸佛為化他事遂故喜菩薩為自行得法故喜又能說之人清淨故喜佛是也又聞清淨法故喜妙經是也又聞法獲證故喜現在未來得益者是也三事具足故大歡喜也二藥王下五品約化他勸流通四初藥王菩薩品明勗化他之師唯願大法大得弘宣大願衆生獲大饒益所以竭其神力盡其形命殷殷虔虔志猶未已庶令弟子宗法如師我傳爾明爾復傳明明明無己師之志也故知此品勗弘法之師也次妙音觀音兩品明他方大士奉命弘經普現色身形無定準不可以牛羊眼看不可以凡愚識度於所聞處勿生輕想輕想則法不染心故知二品勗受法弟子也三陀羅尼品明惡世弘經喜多惱難以呪護之使道流通也四妙莊嚴王品明人護前品說呪護今品說人護人護尚爾呪護彌良普勸流通也今品二初品目妙法蓮華藥王菩薩本事品第二十三觀經曰昔名星光從尊者日藏聞說佛慧以雪山上藥供養衆僧願我未來能治衆生身心兩病舉世歡喜號曰藥王此文明一切衆生喜見頓捨一身復燒兩臂輕生重法命殞道存舉昔事以顯今故目之為本事品也二經文四初菩薩請問二如來決答三利益四多寶稱善初文又三初通問遊化爾時宿王華菩薩白佛言世尊藥王菩薩云何遊於娑婆世界二別問苦行世尊是藥王菩薩有若干百千萬億那由他難行苦行三請佛答釋善哉世尊願少解說諸天龍神夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等又他國土諸來菩薩及此聲聞衆聞皆歡喜二如來決答二初答苦行二歎經初文又二初明事本三初時節久遠爾時佛告宿王華菩薩乃往過去無量恆河沙劫二有佛聲聞等有佛號日月淨明德如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊其佛有八十億大菩薩摩訶薩七十二恆河沙大聲聞衆佛壽四萬二千劫菩薩壽命亦等三明國土莊嚴彼國無有女人地獄餓鬼畜生阿修羅等及以諸難地平如掌琉璃所成寶樹莊嚴寶帳覆上垂寶華幡寶瓶香爐周遍國界七寶為臺一樹一臺其樹去臺盡一箭道此諸寶樹皆有菩薩聲聞而坐其下諸寶臺上各有百億諸天作天伎樂歌歎於佛以為供養二明本事三初佛說法爾時彼佛為一切衆生喜見菩薩及衆菩薩諸聲聞衆說法華經佛普為一切而獨為喜見一人者以其是對揚須付囑流通如今身子寄一而言諸耳二修供養二初現在二初修行得法是一切衆生喜見菩薩樂習苦行於日月淨明德佛法中精進經行一心求佛滿萬二千歲已得現一切色身三昧得現一切色身三昧者即普現色身三昧也此有三義一者內現如今經說身根清淨十法界依正於身中現如淨明鏡現諸色像二者外現如妙音觀音隨機示現十界色身三者內外現如大集經觀於己身衆生身諸佛身悉於己身中現又見己身衆生身現佛身中至若衆生身亦復如是故名普現耳二作念報恩二初以三昧力得此三昧已心大歡喜即作念言我得現一切色身三昧皆是得聞法華經力我今當供養日月淨明德佛及法華經即時入是三昧於虗空中雨曼陀羅華摩訶曼陀羅華細抹堅黑栴檀滿虗空中如雲而下又雨海此岸栴檀之香此香六銖價直娑婆世界以供養佛二正報身力三初自燒身作是供養已從三昧起而自念言我雖以神力供養於佛不如以身供養即服諸香栴檀薰陸兜樓婆畢力迦沈水膠香又飲瞻蔔諸華香油滿千二百歲已香油塗身於日月淨明德佛前以天寶衣而自纏身已灌諸香油以神通力願而自燃身光明遍照八十億恆河沙世界二佛稱歎其中諸佛同時讚言善哉善哉善男子是真精進是名真法供養如來若以華香瓔珞燒香抹香塗香天繒幡蓋及海此岸旃檀之香如是等種種諸物供養所不能及假使國城妻子布施亦所不及善男子是名第一之施於諸施中最尊最上以法供養諸如來故作是語已而各默然真法供養者當是內運智觀觀煩惱因果皆用空慧蕩之故言真法又觀若身若火能供所供皆是實相誰燒誰燃能所皆不可得故名真法也天台智者大禪師諱智顗荊州華容人姓陳氏母徐氏娠師之日夢五色雲紆懷生之日祥光燭室七歲至果願寺聞僧誦普門品隨誦之自憶七卷之文了無差誤十八親沒至果願寺為僧二十進受具足依曠律師通於律藏聞光州大蘇山慧思禪師遙餐風德涉險而去思初見笑曰昔共靈山聽法華經宿緣所追今復來矣即示普賢道場行法華三昧經二七日行道誦經至此品諸佛同讚藥王言是真精進是名真法供養豁然大悟照了法華將證白師師曰非爾弗證非我莫識所證者法華三昧前方便旋陀羅尼縱文字法師千萬衆莫能窮汝之辨也三時節久其身火燃千二百歲過是已後其身乃盡二未來五初化生王家一切衆生喜見菩薩作如是法供養已命終之後復生日月淨明德佛國中於淨德王家結跏趺坐忽然化生二自說本事即為其父而說偈言大王今當知我經行彼處即時得一切現諸身三昧勤行大精進捨所愛之身說是偈已而白父言日月淨明德佛今故現在我先供養佛已得解一切衆生語言陀羅尼復聞是法華經八百千萬億那由他甄迦羅頻婆羅阿閦婆等偈大王我今當還供養此佛三往到佛所白已即坐七寶之臺上升虗空高七多羅樹往到佛所頭面禮足合十指爪以偈讚佛容顏甚奇妙光明照十方我適曾供養今復還親近爾時一切衆生喜見菩薩說是偈已而白佛言世尊世尊猶故在世四如來付囑爾時日月淨明德佛告一切衆生喜見菩薩善男子我涅槃時到滅盡時至汝可安施床座我於今夜當般涅槃又敕一切衆生喜見菩薩善男子我以佛法囑纍於汝及諸菩薩大弟子并阿耨多羅三藐三菩提法亦以三千大千七寶世界諸寶樹寶臺及給侍諸天悉付於汝我滅度後所有舍利亦付囑汝當令流布廣設供養應起若干千塔如是日月淨明德佛敕一切衆生喜見菩薩已於夜後分入於涅槃五奉命任持五初起塔爾時一切衆生喜見菩薩見佛滅度悲感懊惱戀慕於佛即以海此岸栴檀為𧂐供養佛身而以燒之火滅已後收取舍利作八萬四千寶瓶以起八萬四千塔高三世界表剎莊嚴垂諸幡蓋懸衆寶鈴例如遍覆三千大千世界小千至初禪中千至二禪大千至三禪云高三者即至第四禪二燒臂爾時一切衆生喜見菩薩復自念言我雖作是供養心猶未足我今當更供養舍利便語諸菩薩大弟子及天龍夜叉等一切大衆汝等當一心念我今供養日月淨明德佛舍利作是語已即於八萬四千塔前燃百福莊嚴臂七萬二千歲而以供養三利益令無數求聲聞衆無量阿僧祇人發阿耨多羅三藐三菩提心皆使得住現一切色身三昧四現報爾時諸菩薩天人阿修羅等見其無臂憂惱悲哀而作是言此一切衆生喜見菩薩是我等師教化我者而今燒臂身不具足于時一切衆生喜見菩薩於大衆中立此誓言我捨兩臂必當得佛金色之身若實不虗令我兩臂還復如故作是誓已自然還復由斯菩薩福德智慧淳厚所致當爾之時三千大千世界六種震動天雨寶華一切天人得未曾有三總結會二初結會佛告宿王華菩薩於汝意云何一切衆生喜見菩薩豈異人乎今藥王菩薩是也其所捨身布施如是無量百千萬億那由他數二勸修宿王華若有發心欲得阿耨多羅三藐三菩提者能燃手指乃至足一指供養佛塔勝以國城妻子及三千大千國土山林河池諸珍寶物而供養者能然一指勝捨外身外輕內重故功德有異妻子者外身也國城等外財也二歎經妙三初歎能持者若復有人以七寶滿三千大千世界供養於佛及大菩薩辟支佛阿羅漢是人所得功德不如受持此法華經乃至一四句偈其福最多二歎所持法二初歎法體宿王華譬如一切川流江河諸水之中海為第一此法華經亦復如是於諸如來所說經中最為深大此法華教譬醍醐海也說窮本地為深遍一切處為大又如土山黑山小鐵圍山大鐵圍山及十寶山衆山之中須彌山為第一此法華經亦復如是於諸經中最為其上十寶山名出華嚴及衆經土黑鐵圍故非是寶十山雖寶或一或二神龍雜居須彌四寶所成純天所住此法華經所說諦理常樂我淨如四寶所成開示悟入者之所依也又如衆星之中月天子最為第一此法華經亦復如是於千萬億種諸經法中最為照明星月同是陰精同於夜現星無虧盈明不及月諸經說權智不得自在此經明權智權即實實即權盈虧相指不二而二如此權智勝餘教也又如日天子能除諸暗此經亦復如是能破一切不善之暗日是陽精獨能破暗諸經明實智破惑尚不及即實而權那得並即權而實故知此經明實智最為第一又如諸小王中轉輪聖王最為第一此經亦復如是於衆經中最為其尊又如帝釋於三十三天中王此經亦復如是諸經中王輪王號令止在四域帝釋齊三十三天又如大梵天王一切衆生之父此經亦復如是一切賢聖學無學及發菩薩心者之父梵號令總上冠下譬餘經說三諦三昧各不相收不得自在此經所說以實相入真決了聲聞法是諸經之王實相入俗一切治生産業不相違背實相入中諸法無非佛法文云一切學無學及發菩薩心者之父是也又如一切凡夫人中須陀洹斯陀含阿那含阿羅漢辟支佛為第一此經亦復如是一切如來所說若菩薩所說若聲聞所說諸經法中最為第一凡夫四果支佛第一者此明任運無功用也餘經要因功用乃得入流如四果人因聞思修方得悟入此經明無作四諦不雜方便自然流入薩婆若海如大白牛肥壯多力行步平正其疾如風有能受持是經典者亦復如是於一切衆生中亦為第一一切聲聞辟支佛中菩薩為第一此經亦復如是於一切諸經法中最為第一如佛為諸法王此經亦復如是諸經中王二乘中菩薩第一者明因如來第一者明果也餘經明果近在寂場此經明果遠指本地故最第一二歎法用三初歎拔苦用宿王華此經能救一切衆生者此經能令一切衆生離諸苦惱二歎與樂用此經能大饒益一切衆生充滿其願如清涼池能滿一切諸渴乏者如寒者得火如裸者得衣如商人得主如子得母如渡得船如病得醫如暗得燈如貧得寶如民得王如賈客得海如炬除暗三總結與拔此法華經亦復如是能令衆生離一切苦一切病痛能解一切生死之縛三明持經福二初全聞經福若人得聞此法華經若自書若教人書所得功德以佛智慧籌量多少不得其邊若書是經卷華香瓔珞燒香抹香塗香幡蓋衣服種種之燈蘇燈油燈諸香油燈瞻蔔油燈須曼那油燈波羅羅油燈婆利師迦油燈那婆摩利油燈供養所得功德亦復無量二聞品福二初格量宿王華若有人聞是藥王菩薩本事品者亦得無量無邊功德若有女人聞是藥王菩薩本事品能受持者盡是女身後不復受若如來滅後後五百歲中若有女人聞是經典如說修行於此命終即往安樂世界阿彌陀佛大菩薩衆圍繞住處生蓮華中寶座之上不復為貪欲所惱亦復不為瞋恚愚癡所惱亦復不為憍慢嫉妬諸垢所惱得菩薩神通無生法忍得是忍已眼根清淨以是清淨眼根見七百萬二千億那由他恆河沙等諸佛如來是時諸佛遙共讚言善哉善哉善男子汝能於釋迦牟尼佛法中受持讀誦思惟是經為他人說所得福德無量無邊火不能燒水不能漂汝之功德千佛共說不能令盡汝今已能破諸魔賊壞生死軍諸餘怨敵皆悉摧滅善男子百千諸佛以神通力共守護汝於一切世間天人之中無如汝者唯除如來其諸聲聞辟支佛乃至菩薩智慧禪定無有與汝等者宿王華此菩薩成就如是功德智慧之力若有人聞是藥王菩薩本事品能隨喜讚善者是人現世口中常出青蓮華香身毛孔中常出牛頭旃檀之香所得功德如上所說口出香是現報餘是後報二囑纍是故宿王華以此藥王菩薩本事品囑纍於汝我滅度後後五百歲中廣宣流布於閻浮提無令斷絶惡魔魔民諸天龍夜叉鳩槃茶等得其便也宿王華汝當以神通之力守護是經所以者何此經則為閻浮提人病之良藥若人有病得聞是經病即消滅不老不死宿王華汝若見有受持是經者應以青蓮華盛滿抹香供散其上散已作是念言此人不久必當取草坐於道場破諸魔軍當吹法螺擊大法鼓度脫一切衆生老病死海是故求佛道者見有受持是經典人應當如是生恭敬心不老不死者此須觀解不老是樂不死是常謂聞此經得常樂之解坦然在懷無所畏忌又不老不死就所證法身說耳非謂四大假合幻化妄業之身二明得利益說是藥王菩薩本事品時八萬四千菩薩得解一切衆生語言陀羅尼此結聞品之益四多寶稱善多寶如來在寶塔中讚宿王華菩薩言善哉善哉宿王華汝成就不可思議功德乃能問釋迦牟尼佛如此之事利益無量一切衆生二妙音觀音兩品明他方大士奉命弘經弟子二初妙音品二觀音品初文又二初品目妙法蓮華經妙音菩薩品第二十四文中自釋昔奉雲雷音王佛十萬種伎樂今遊化他方音樂自隨昔奉八萬四千寶鉢今爾許道器眷屬圍繞昔得一切衆生語言陀羅尼今以普現色身及妙音聲遍吼十方弘宣此教故名妙音品此品明菩薩以難思之力隨類通經物覩其迹莫測其本但甘其味無擇其形當卑其地自壅其流即是化他門中第二意也二經文六初放光東召二奉命西來三十方弘經四二土得益五還本國六聞品進道今初爾時釋迦牟尼佛放大人相肉髻光明及放眉間白毫相光遍照東方百八萬億那由他恆河沙等諸佛世界過是數已有世界名淨光莊嚴其國有佛號淨華宿王智如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊為無量無邊菩薩大衆恭敬圍繞而為說法釋迦牟尼佛白毫光明遍照其國大人相者大相海也遍體毛功德不及一好功德衆好功德不及一相功德諸相從下向上展轉相勝不及白毫功德白毫功德不及肉髻功德故名大人相也此相業者從孝順師長起今放是光召本弟子使弘中道之經利益大機者也白毫從一道清淨起今放此光令弘此法也問佛一一相皆法界海何故勝負答他經所明宜作此說耳問佛有緣弟子滿十方何故召東說西不論八方耶答此有所表淨名云日月何意行閻浮提欲以光明除衆幽暗東是光始西是光終有始有終其唯聖人乎未發心者令其發心未究竟者令其究竟一菩薩既爾諸衆亦然一方既爾諸方亦然二奉命西來二初發來緣二正發來初文又六初經家敘三初敘福田爾時一切淨光莊嚴國中有一菩薩名曰妙音久已植衆德本供養親近無量百千萬億諸佛二敘智慧而悉成就甚深智慧即智慧莊嚴也三敘福德得妙幢相三昧法華三昧淨德三昧宿王戲三昧無緣三昧智印三昧解一切衆生語言三昧集一切功德三昧清淨三昧神通遊戲三昧慧炬三昧莊嚴王三昧淨光明三昧淨藏三昧不共三昧日旋三昧得如是等百千萬億恆河沙等諸大三昧十六三昧即福德莊嚴皆是法華三昧異名隨義說之耳二被光照釋迦牟尼佛光照其身三辭本佛即白淨華宿王智佛言世尊我當往詣娑婆世界禮拜親近供養釋迦牟尼佛及見文殊師利法王子菩薩藥王菩薩勇施菩薩宿王華菩薩上行意菩薩莊嚴王菩薩藥上菩薩四誡至誠爾時淨華宿王智佛告妙音菩薩汝莫輕彼國生下劣想善男子彼娑婆世界高下不平土石諸山穢惡充滿佛身卑小諸菩薩衆其形亦小而汝身四萬二千由旬我身六百八十萬由旬汝身第一端正百千萬福光明殊妙是故汝往莫輕彼國若佛菩薩及國土生下劣想然法身大士固不肅而成所將眷屬或未達者故寄彼而規此耳夫佛身與理相應不可見卑小而忘其尊嚴此約如來座為誡也且師及弟子智斷具足師既施權弟子亦隱其實此約如來衣為誡也其依報國土皆正報所感如來以慈臨大千宜須高須下勿覩依報而忽正報也此約如來室為誡也此佛弘經亦敕三意彼尊誡約諸佛道同也五受佛旨妙音菩薩白其佛言世尊我今詣娑婆世界皆是如來之力如來神通遊戲如來功德智慧莊嚴如來力是座力神通力是室力莊嚴力是衣力此受弘經之大旨利物之宗要故能不動此會而遊化十方也六現來相六初遣蓮華於是妙音菩薩不起于座身不動搖而入三昧以三昧力於耆闍崛山去法座不遠化作八萬四千衆寶蓮華閻浮檀金為莖白銀為葉金剛為鬚甄叔迦寶以為其臺二文殊問爾時文殊師利法王子見是蓮華而白佛言世尊是何因緣先現此瑞有若干千萬蓮華閻浮檀金為莖白銀為葉金剛為鬚甄叔迦寶以為其臺三釋迦答爾時釋迦牟尼佛告文殊師利是妙音菩薩摩訶薩欲從淨華宿王智佛國與八萬四千菩薩圍繞而來至此娑婆世界供養親近禮拜於我亦欲供養聽法華經四請見相文殊師利白佛言世尊是菩薩種何善本修何功德而能有是大神通力行何三昧願為我等說是三昧名字我等亦欲勤修行之行此三昧乃能見是菩薩色相大小威儀進止唯願世尊以神通力彼菩薩來令我得見問若文殊位下辭不應求見若文殊位高相來那忽不識答雖同一位有始中終止此一事不知亦無忝高位又衆中見瑞不了所以發起令知故設問五明推功爾時釋迦牟尼佛告文殊師利此久滅度多寶如來當為汝等而現其相六命來時多寶佛告彼菩薩善男子來文殊師利法王子欲見汝身二正發來六初眷屬經歷于時妙音菩薩於彼國沒與八萬四千菩薩俱共發來所經諸國六種震動皆悉雨於七寶蓮華百千天樂不鼓自鳴二敘相登臺是菩薩目如廣大青蓮華葉正使和合百千萬月其面貌端正復過於此身真金色無量百千功德莊嚴威德熾盛光明照曜諸相具足如那羅延堅固之身入七寶臺上升虗空去地七多羅樹諸菩薩衆恭敬圍繞而來詣此娑婆世界耆闍崛山三問訊傳旨到已下七寶臺以價直百千瓔珞持至釋迦牟尼佛所頭面禮足奉上瓔珞而白佛言世尊淨華宿王智佛問訊世尊少病少惱起居輕利安樂行不四大調和不世事可忍不衆生易度不無多貪欲瞋恚愚癡嫉妬慳慢不無不孝父母不敬沙門邪見不善心不攝五情不世尊衆生能降伏諸魔怨不久滅度多寶如來在七寶塔中來聽法不又問訊多寶如來安穩少惱堪忍久住不四請見多寶世尊我今欲見多寶佛身唯願世尊示我令見分身既散塔閉如故多寶居於塔內故願示之令見五世尊為通爾時釋迦牟尼佛語多寶佛是妙音菩薩欲得相見六塔中稱善時多寶佛告妙音言善哉善哉汝能為供養釋迦牟尼佛及聽法華經并見文殊師利等故來至此三十方弘經二初問答善根神力二初問二初問種何善根爾時華德菩薩白佛言世尊是妙音菩薩種何善根是問昔也二問有是神力修何功德有是神力是問今也二答二初答種善根佛告華德菩薩過去有佛名雲雷音王多陀阿伽度阿羅訶三藐三佛陀國名現一切世間劫名喜見妙音菩薩於萬二千歲以十萬種伎樂供養雲雷音王佛并奉上八萬四千七寶鉢以是因緣果報今生淨華宿王智佛國有是神力華德於汝意云何爾時雲雷音王佛所妙音菩薩伎樂供養奉上寶器者豈異人乎今此妙音菩薩摩訶薩是華德是妙音菩薩已曾供養親近無量諸佛久植德本又值恆河沙等百千萬億那由他佛二答其神力華德汝但見妙音菩薩其身在此而是菩薩現種種身處處為諸衆生說是經典或現梵王身或現帝釋身或現自在天身或現大自在天身或現天大將軍身或現毗沙門天王身或現轉輪聖王身或現諸小王身或現長者身或現居士身或現宰官身或現婆羅門身或現比丘比丘尼優婆塞優婆夷身或現長者居士婦女身或現宰官婦女身或現婆羅門婦女身或現童男童女身或現天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人等身而說是經諸有地獄餓鬼畜生及衆難處皆能救濟乃至於王後宮變為女身而說是經華德是妙音菩薩能救護娑婆世界諸衆生者是妙音菩薩如是種種變化現身在此娑婆國土為諸衆生說是經典於神通變化智慧無所損減是菩薩以若干智慧明照娑婆世界令一切衆生各得所知於十方恆河沙世界中亦復如是若應以聲聞形得度者現聲聞形而為說法應以辟支佛形得度者現辟支佛形而為說法應以菩薩形得度者現菩薩形而為說法應以佛形得度者即現佛形而為說法如是種種隨所應度者而為現形乃至應以滅度而得度者示現滅度華德妙音菩薩摩訶薩成就大神通智慧之力其事如是此答神力之問示三十四凡身四聖人身結成十法界六道也二問答今住何定二初問爾時華德菩薩白佛言世尊是妙音菩薩深種善根世尊是菩薩住何三昧而能如是在所變現度脫衆生問今住何定而能如此自在利益也二答佛告華德菩薩善男子其三昧名現一切色身妙音菩薩住是三昧中能如是饒益無量衆生佛答如文四二土得益說是妙音菩薩品時與妙音菩薩俱來者八萬四千人皆得現一切色身三昧此娑婆世界無量菩薩亦得是三昧及陀羅尼五還歸本國爾時妙音菩薩摩訶薩供養釋迦牟尼佛及多寶佛塔已還歸本土所經諸國六種震動雨寶蓮華作百千萬億種種伎樂既到本國與八萬四千菩薩圍繞至淨華宿王智佛所白佛言世尊我到娑婆世界饒益衆生見釋迦牟尼佛及見多寶佛塔禮拜供養又見文殊師利法王子菩薩及見藥王菩薩得勤精進力菩薩勇施菩薩等亦令是八萬四千菩薩得現一切色身三昧六聞品進道說是妙音菩薩來往品時四萬二千天子得無生法忍華德菩薩得法華三昧
