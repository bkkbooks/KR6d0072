body:
  text: 三藥草品二初題目妙法蓮華經藥草喻品第五正法華稱藥草品法華論號雲雨品此品文具山川雲雨獨標藥草者何土地是能生雲雨是能潤草木是所生所潤所生所潤通皆有用而藥草用強有漏諸善悉能除惡而最無漏無漏衆中四大弟子以窮子譬領火宅喻深會聖心所以如來述其得解以喻其人故稱藥草喻品世界夫藥草叢育日久一蒙雲雨扶疏暐曄芽莖豐蔚於外力用充潤於內譬諸無漏住最後身今得聞經自乘佛乘兼以運人文云我等今者真是聲聞以佛道聲令一切聞內外自他具勝力用故稱藥草喻品為人二釋文當品如來述成二初略述成二初雙述善哉爾時世尊告摩訶迦葉及諸大弟子善哉善哉迦葉善說如來真實功德誠如所言兩稱善哉雙述意也一述兩處領實一述兩處領權善說真實等者辭致曲巧故言善說皆是佛法故言真實真實是述其領實功德是述其領權誠如所言者印定之旨也妙樂云兩處者謂方便火宅即法譬二周也二領所不及如來復有無量無邊阿僧祇功德汝等若於無量億劫說不能盡二乘齊教止領二乘得益不道人天退不及及藏通別菩薩進不及得益是為領所不及也二廣述成二初長行二偈頌初文又二初法說二初舉法王不虗迦葉當知如來是諸法之王若有所說皆不虗也佛法雖多不出權實權實之外更無別法而向言無量者此意難信故舉法王發言誠諦以勸信也又為大雲譬作本也二述開三顯一二初約教明開權顯實二初約教述開權於一切法以智方便而演說之一切法者謂七方便法也此法雖多以方便波羅蜜隨其類音說之無不逗會為人天說戒善為二乘說諦緣為三藏菩薩說事度為通教說無生為別教說次第開如來藏是名述其領開三也二約教述顯實其所說法皆悉到於一切智地地者實相究竟非二其性廣博故名為切寂而常照故名為智無住之本立一切法故名為地妙樂云究竟等者此明諸權皆歸實相是故三教教智未會不名為一智所依地能生諸智故名智地也二約智明開權顯實二初約智述開權如來觀知一切諸法之所歸趣亦知一切衆生深心所行通達無礙觀一切歸趣是權智能照權知所歸趣是能識藥知深心所行是能知病俱是權法權法各有所趣戒善等近趣人天若作遠緣低頭舉手遠趣佛果念處道品等近趣涅槃若作福德莊嚴汝等所行是菩薩道遠趣寶所乃至六度通別等法近遠歸趣途轍不同可解深心所行有二種若深心著於依正者起深重十惡障人天乘若著所執法者起四倒三道六蔽四住五住障四聖乘當知深心病相不同如來以權智照之通達無礙也二約智述顯實又於諸法究盡明了示諸衆生一切智慧諸法明了者實智所照也一切權法無不入實故言究盡佛眼所見實智所知故言明了若此智照種別不同權智照也一智遍照一切藥一切病實智照也又上權智文言通達無礙者是約權論實今實智文言又於諸法者是約實論權二文互現正明實是權實權是實權當知究竟非權非實非差不差以智方便權有差別悉到智地則無差別也二譬說二初正明二初開譬二初有差別譬譬述權教智六初土地譬迦葉譬如三千大千世界山川溪谷土地大千世界譬衆生世間山川溪谷譬五陰世間世界無別法為土地所成衆生無別法為五陰所成土地既通譬識陰則山川溪谷譬餘四陰要解云大千同為一地而有山川溪谷之高下譬一真境而有三界諸趣之別也二卉木譬所生卉木叢林及諸藥草種類若干名色各異卉草都名木樹總稱衆草成叢衆樹成林治病力用勝稱為藥如善法皆能治惡而無漏善治惑義勝故譬藥草樹林枝幹蔭廣用大喻二菩薩五乘七善因果不一故言若干如是種類各有稱謂各有體相即是名色故言各異三密雲譬密雲彌布遍覆三千大千世界密雲者譬佛三密也雲有形色譬佛應世即身密雲能覆蔭譬佛慈悲即意密下文雷聲遠震譬佛說教即口密以慈悲熏應身說法遍十法界故言彌布四注雨譬一時等澍譬佛用口密八音四辨宣注法雨利潤衆生五受潤譬其澤普洽卉木叢林及諸藥草小根小莖小枝小葉中根中莖中枝中葉大根大莖大枝大葉法雨普潤七種衆生心地所有習因種子即生聞慧名為普洽根莖枝葉者信為根戒為莖定為枝慧為葉次第相資故譬此四也小根莖等即人天信戒中根莖等即二乘信戒定慧大根莖等即菩薩信戒定慧也六增長譬諸樹大小隨上中下各有所受一雲所雨稱其種性而得生長華果敷實此明草木隨分受潤七種衆生習報兩因善法既蒙法雨習報兩果各得增長稱其種性者明施權稱機小者不過分大者不減少即是七種習報兩因也華果敷實者即是七種習報二果也二無差別譬譬述實教智三初一地所生譬雖一地所生道前心地所生終因道後智地二一雲所雨譬一雨所潤一音所宣一乘法門開發五種善根終是一音平等之教三三草二木譬而諸草木各有差別三草二木稟益不自覺知五種善根蒙佛法雨隨分增長而不自知五種之因皆依一佛性亦不自知五乘之教皆是大乘亦不自知同歸佛慧唯有如來乃能知之二合譬二初合差別譬二初正合六初合密雲迦葉當知如來亦復如是出現於世如大雲起以大音聲普遍世界天人阿修羅如彼大雲遍覆三千大千國土先舉佛身密合雲有形出現於世正合應身出世如大雲起即舉譬帖合明如來大慈現身覆育一切也以大音聲者即是舉佛口密合雲有聲也天人阿修羅者別舉三善道稟口密之益即是三乘根性別稟聲益也如彼大雲即是舉譬帖合雲有聲也遍覆大千者通舉一切皆是佛子俱蒙口密之益也二合注雨二初標章門六初首唱十號於大衆中而唱是言我是如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊二唱四弘誓未度者令度未解者令解未安者令安未涅槃者令得涅槃別行玄云弘誓本成慈悲慈悲既緣苦樂弘誓亦約四諦若見苦諦逼迫楚毒緣此起誓故云未度令度若見集諦顛倒流轉生死浩然而無涯畔甚可哀傷約此起誓故云未解令解清淨之道衆生不識行此道者能出生死至安樂地欲示衆生立於此道故云未安令安滅煩惱處名為涅槃子果縛斷獲二涅槃約此起誓故云未得令得三唱三達知今世後世如實知之箋難云宿命達過去天眼達未來漏盡達現生此即三達亦曰三明四一心三智我是一切知者一切知者即具足三智也五唱具五眼一切見者一切見者具足五眼也六三業智俱知道者開道者說道者知道謂意不護開道謂身不護說道謂口不護如來三業常與智俱則無有失故不須護名三不護二勸聽受汝等天人阿修羅衆皆應到此為聽法故從多為論勸三善道宜應往聽法也三合土地爾時無數千萬億種衆生來至佛所而聽法攬果報而有衆生如依山川即是土地得有世界百千萬億者即是十法界衆生也今正語七方便衆生差別耳四合卉木如來于時觀是衆生諸根利鈍精進懈怠上譬中有卉木差別大小不同今合中明根有利鈍行有進退正是習因淺深與卉木義同非長出于時者若論漸初即是鹿苑說三乘時若論中間處處得論于時利鈍者若總判者三途因惡果苦不能受道名為鈍七種方便聞教得益名為利若別判者人天但受果報不肯受道名為鈍三乘根性斷惑出界名為利又聲聞觀生滅名為鈍菩薩觀不生滅名為利通別圓三教迭論利鈍可知精進懈怠者三途放逸名為怠人天持戒善名為進人天不厭苦為怠二乘怖畏無常為進二乘貪證不求作佛為怠菩薩志求佛道為進五合受潤隨其所堪而為說法種種無量皆令歡喜快得善利隨其所堪即是稱會機宜無增減之失歡喜得善利即是各蒙法潤受益六合增長是諸衆生聞是法已現世安穩後生善處以道受樂亦得聞法既聞法已離諸障礙於諸法中任力所能漸得入道現世安穩後生善處者即是報因感報果合華敷增長亦得聞法乃至入道者即是習因牽習果合佛如大雲普覆一切三途亦得沾潤增長如說般若方等亦明地獄得益若火滅湯冷即是現世安穩或生天上人中即是後生善處於天人中修道即是以道受樂若人天聞法持戒福德扶身即是現世安穩或天還生天人還生人或天人互生即是後生善處生能悟解即是以道受樂二乘聞法得有餘涅槃是現世安穩生方便土是後生善處於彼聞經是以道受樂若生身菩薩聞盧舍那佛說法得無生忍即是現世安穩生實報土是後生善處以道受樂離諸障礙者即是現世安穩任力入道即後世以道受樂也二帖合如彼大雲雨於一切卉木叢林及諸藥草如其種性具足蒙潤各得生長大雲帖合第一形聲兩益雨於一切帖合第二六章法門卉木叢林帖合第四受化衆生利鈍怠進習因深淺如其種性具足蒙潤帖合第五受潤得益各得生長帖合第六現世安穩增長二合無差別二初合一地一雨如來說法一相一味所謂解脫相離相滅相究竟至於一切種智一相者衆生之心同一真如相是一地也一味者一乘之法同詮一理是一雨也昔於一實相方便開為七相於一乘法分別說有七教佛知究竟終歸一相一味也所謂下雙釋一相一味衆生心性即是性德解脫遠離寂滅三種之相所謂解脫相者無生死相離相者無涅槃相滅相者無相亦無相唯有實相故名一相此一相中三相也如來一音說此三相即是一味中三味此三相則以為境界緣生中道之行終則得為一切智果故言究竟至一切種智也又轉釋一相即無住本立一切法無住無相即無差別立一切法即有差別差別如卉木無差別如一地一味即是實教純一無雜例一相可解二差別意合上草木差別五初衆生不知其有衆生聞如來法若持讀誦如說修行所得功德不自覺知其有衆生者舉不知之人法謂聞一音之法若持說者正明不知持說不同修行亦異人天作戒善之解三乘作諦緣度解解既不同即是差別所得不知者明五人雖各稟教不知佛是一味無差別教是不識實亦不知七種方便差別之教而各執已解為實是不知權故云不自覺知也二如來能知四初約四法知所以者何唯有如來知此衆生種相體性種者三道是三德種淨名云一切煩惱之儔為如來種此明由煩惱道即有般若又云五無間皆生解脫相此由不善即有善法解脫也一切衆生即涅槃相不可復滅此即生死為法身也此就相對論種若就類論種一切低頭舉手悉是解脫種一切世智三乘解心即般若種夫有心者皆當作佛即法身種諸種差別差即無差無差即差如來能知相體性約十界十如中釋若論差別即十界相若論無差即一佛界相差即無差無差即差如來亦能知體性例然可解二約三法知三初明三慧境念何事思何事修何事三法即是聞思修三慧也事是三慧之境即所聞所思所修如向教下所詮種相體性之法也皆言何者指所取境隨教則有思修不同二明三慧體云何念云何思云何修云何念者念是記録所聞之法正是念慧之體也三三慧因緣以何法念以何法思以何法修此是三慧取境聞法是其因緣如此三乘三慧昔謂境體因緣有異即是差別若入圓妙三慧即無差別此差無差如來能知三約二法知以何法得何法以何法即是因得何法即是果五乘之因各得其果即是差別衆生諸佛一如無二即無差別差無差如來能知差即無差無差即差如來亦能知四約一法知衆生住於種種之地唯有如來如實見之明了無礙七方便住七位故言種種之地此即差別如來用如實佛眼見之如衆流入海失於本味則無差別隨他意語以智方便而演說之則如來能知差別其所說法皆悉到於一切智地則如來能知無差別也三帖合不知如彼卉木叢林諸藥草等而不自知上中下性喻彼七方便人各不自知以其不知所以顯於如來唯能知耳四牒前釋能知如來知是一相一味之法所謂解脫相離相滅相究竟涅槃常寂滅相終歸於空一相一味如前已釋相味解脫離滅等為緣分別即是一中無量究竟涅槃終歸於空即是無量中一此是牒前重釋無差別也何者一相一味解脫離滅若是二乘法體猶是差別言宣今作大乘究竟涅槃終歸於空即通無差別究竟涅槃結上諸句皆非二乘有餘無餘乃是究竟涅槃也常寂滅相結上諸句非是小乘寂滅乃是常住寂滅上文云諸法從來常自寂滅相即此義也終歸於空者非是灰斷之空乃是中道第一義空也五釋其衆疑佛知是已觀衆生心欲而將護之是故不即為說一切種智此釋物疑佛昔既知始末皆一何不鹿苑即為說實釋云觀衆生心欲隨三悉檀而將護之恐其誹謗故不即說也二復宗稱歎亦名結歎二初述歎汝等迦葉甚為希有能知如來隨宜說法能信能受復宗稱述欲釋疑也疑者聞佛無量功德謂四弟子齊教領解何必是實故佛稱述雖未及佛地齊教不虗也亦是引發下根令同得悟先歎希有者凡夫有反復聞能得益菩薩是己事解不多奇無為正位能捨證入實甚為希有能知隨喜說法者述其能領開三次言能信能受者即述其領顯一二釋歎所以者何諸佛世尊隨宜說法難解難知此明佛於一道說三深玄難解而汝能信受故歎希有也二偈頌二初頌法說二初頌法王不虗爾時世尊欲重宣此義而說偈言破有法王出現世間二十五王三昧破二十五有如來已破此有為法中王故云破有法王即對治意也二頌開三顯一二初頌二教二初頌權教隨衆生欲種種說法隨其樂欲方便說三即世界意二頌實教如來尊重智慧深遠久默斯要不務速說不輕所說故云尊重深鑑小機知其未堪是故四十餘年默而不說今大機既發方為說也二頌二智二初頌釋權智有智若聞則能信解無智疑悔則為永失問既云有智若聞此必屬機云何屬佛權智答若非有智人說云何能令有智人信故屬佛也是為人意已上三悉檀是頌上以智方便而演說之二頌釋實智是故迦葉隨力為說以種種緣令得正見此頌上到一切智地隨種種緣說種種教悉為令得大乘正見自此之前皆名邪見即第一義悉檀意也二頌譬說二初頌開譬二初頌差別六初頌密雲迦葉當知譬如大雲起於世間遍覆一切慧雲含潤電光晃曜雷聲遠震令衆悅豫日光掩蔽地上清涼靉靆垂布如可承攬雲譬應身應身隨智慧行故云慧雲能具十二部經之法故言含潤若應身不說法如須扇多多寶者此雲不含潤也身放大光如電曜口震四辨如雷聲聞法歡喜故言悅豫九十五種邪光不現故言掩蔽除九十八種見思熱惱如地上清涼應身降世似同三有有心往取實不可得故云如可承攬二頌注雨其雨普等四方俱下流澍無量率土充洽八音四辨宣注法雨一時俱聞故曰四方俱下凡有心者皆蒙利潤故言率土充洽此則成上又成下山川譬也三頌土地山川險谷頌上土地即是七方便衆生五陰今蒙法雨身口柔軟如地得澤也四頌卉木幽邃所生卉木藥草幽邃所生者頌上衆生習因差別譬衆生久遠所植習因隱在陰界入內故言幽邃今蒙法雨悉得開發故言所生五頌受潤大小諸樹百穀苗稼甘蔗蒲萄雨之所潤無不豐足乾地普洽藥木並茂其雲所出一味之水草木叢林隨分受潤百穀語通取五穀譬五乘能生百善也甘蔗蒲桃譬定慧乾地普洽譬未信者令信也餘譬如文六頌增長一切諸樹上中下等稱其大小各得生長根莖枝葉華果光色一雨所及皆得鮮澤二頌無差二初正頌無差如其體相性分大小所潤是一初二句頌所生所潤次一句頌能潤則是頌無差別二頌差別不知而各滋茂二頌合譬二初頌合差別六初頌合密雲二初正合佛亦如是出現於世二帖合譬如大雲普覆一切二頌合注雨二初標章門二初頌十號既出於世為諸衆生分別演說諸法之實大聖世尊於諸天人一切衆中而宣是言我為如來兩足之尊出於世間猶如大雲此頌十號文略義含出世即無上士及佛為說即正遍知明行足世尊即第十號於天人中即調御丈夫及天人師如來即第一號來善去善兼於善逝出於世間即世間解二頌四弘充潤一切枯槁衆生皆令離苦得安穩樂世間之樂及涅槃樂充潤一切即衆生誓願度皆令離苦皆令離於因果之苦即煩惱誓願斷得安穩樂即法門誓願學及涅槃樂即佛道誓願成五乘咸有世間樂皆令得涅槃第一之樂也二勸聽受諸天人衆一心善聽皆應到此覲無上尊我為世尊無能及者安穩衆生故現於世為大衆說甘露淨法其法一味解脫涅槃以一妙音演暢斯義常為大乘而作因緣勸聽受中文二初二行先歎佛次為大下歎其說能說人尊故所說法妙甘露是藥今聞妙法慧命不夭故云甘露淨法七善無不皆歸一乘一味故勸聽受三頌合山川我觀一切普皆平等無有彼此愛憎之心我無貪著亦無限礙恆為一切平等說法山川譬七種五陰衆生如雨注不擇溪谷佛平等說故無彼此有機為此無機為彼植善為愛造惡為憎不於佛機愛餘機者憎故無貪著限礙也如為一人衆多亦然常演說法曾無他事去來坐立終不疲厭充足世間如雨普潤佛事為自魔事為他應初為來應後為去入實為坐出權為立佛觀衆生如此平等即是等雨山川之意此頌上無數億衆生也四頌合卉木貴賤上下持戒毀戒威儀具足及不具足正見邪見利根鈍根等雨法雨而無懈倦貴賤約位持毀約行利鈍約習貴賤至利鈍亦須具歷五乘七善展轉說之也五頌合受潤三初總明受潤一切衆生聞我法者隨力所受住於諸地二別明受潤五初小草人天或處人天轉輪聖王釋梵諸王是小藥草人天俱未斷惑合為小草二中草二乘知無漏法能得涅槃起六神通及得三明獨處山林常行禪定得緣覺證是中藥草二乘俱有智斷合為中草六通三明釋見譬品三上草三藏菩薩求世尊處我當作佛行精進定是上藥草六度菩薩志求作佛化他勝二乘故獨為上草四小樹通教菩薩又諸佛子專心佛道常行慈悲自知作佛決定無疑是名小樹通教菩薩已斷通惑誓扶餘習涉有化他望下為優比上為劣故名小樹五大樹別教菩薩安住神通轉不退輪度無量億百千衆生如是菩薩名為大樹別教菩薩自行化他高廣為勝故名大樹妙樂云大樹中既云轉不退輪別人初地能轉法輪是念不退也藏通至果方轉法輪豈得名為如是菩薩故知在別三結所潤能潤二初帖釋所潤佛平等說如一味雨隨衆生性所受不同如彼草木所稟各異二明能潤佛以此喻方便開示種種言辭演說一法於佛智慧如海一滴能潤佛智多故如海如上所潤七種衆生為少如海一滴也六頌合增長二初總頌增長二初正頌增長我雨法雨充滿世間一味之法隨力修行世間者十法界三十種世間也法本一味修之不同故云隨力修行二舉譬疊釋如彼叢林藥草諸樹隨其大小漸增茂好二別頌增長四初明人天增長諸佛之法常以一味令諸世間普得具足漸次修行皆得道果普得具足是頌現世安穩漸次修行是頌後世以道受樂二明二乘增長聲聞緣覺處於山林住最後身聞法得果是名藥草各得增長住最後身有二解一云二乘此身若不值佛此身未必無後由見佛故成最後身即是增長義二云二乘得有餘涅槃住最後身蒙佛五味調熟乃至法華聞大乘教得入一實方名增長義三明通教菩薩若諸菩薩智慧堅固了達三界求最上乘是名小樹而得增長堅固是體法之智了達三界是斷惑盡四明別教菩薩復有住禪得神通力聞諸法空心大歡喜放無數光度諸衆生是名大樹而得增長聞諸法空十住修空也放光度生十行修假也二頌合無差二初頌無差之差如是迦葉佛所說法譬如大雲以一味雨潤於人華各得成實大雲一味頌上無差別人華成實頌上差別也以華喻人故云人華從因為喻耳二頌差之無差迦葉當知以諸因緣種種譬喻開示佛道是我方便諸佛亦然今為汝等說最實事諸聲聞衆皆非滅度汝等所行是菩薩道漸漸修學悉當成佛以諸因緣下即是明權權即差別合上所生也今為汝等說最實事即是顯實實即無差別合上一地也非滅度者未度變易生死也獨言二乘者為其保證真空執小之心強也人天不計果為涅槃菩薩不於中間取證故但言二乘耳汝等所行是菩薩道者菩薩行道亦須斷通惑今二乘已斷此惑盡即是菩薩道道即因也蓋言二乘智斷既是菩薩之因二乘豈宜執此智斷為果故斥言是菩薩道更令修習破無明惑方得成佛故云漸漸修學悉當成佛妙樂云隋朝笈多所譯名添品法華者自餘諸文全依妙本彼見正本偈後更有一長行偈頌乃重譯之添此文後其所添者如長行中先以日月譬用歎佛智又明五趣中有三乘等因與前文已重故什公不譯四授記品授與決二初品目妙法蓮華經授記品第六正經云授聲聞決品梵和伽羅此云授記亦云受記受決受莂授是與義受是得義記是記事決是決定莂是了莂四大弟子聞法譬二周開三顯一具足領解如來述成雖自知作佛而時事未審若蒙佛誠言授其當果劫國決定近遠了莂則大歡喜今從佛授與得名故言授記品然記有多種若通記如法師品初云聞法華經一句一偈乃至一念隨喜者我皆與授記當得阿耨菩提若別記如三周中法說後記舍利弗譬說後記四大弟子周緣後記五百弟子等若正因記如常不輕云我不敢輕於汝等汝等皆當作佛若緣因記如法師品以華香等十種供養當知此人是大菩薩成就阿耨菩提若了因記如三周授三根人若正因記則廣若緣了記則狹或遲記如聲聞或速記如龍女或佛記如此文或菩薩記如不輕品雖無劫國之定亦得是記又懸記如化城品為現在弟子則曰是諸人等應以是法漸入佛道為未來弟子則曰而於彼土求佛智慧等他經但記菩薩不記二乘但記善不記惡但記男不記女但記人天不記畜今經皆記也原諸佛本為大事因緣故出現於世意令衆生開示悟入佛之知見今大事已彰佛已說竟衆生已入暢佛本懷衆生願滿法應與記如父遇子豈不付財乎二經文二初正與中根授記二許與下根說緣初文又二初授迦葉記二初長行六初行因爾時世尊說是偈已告諸大衆唱如是言我此弟子摩訶迦葉於未來世當得奉覲三百萬億諸佛世尊供養恭敬尊重讚歎廣宣諸佛無量大法二得果於最後身得成為佛名曰光明如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊增治云最後身者遠即等覺後心方名最後近則且據今記相似位後入初住時也三劫國國名光德劫名大莊嚴四壽命佛壽十二小劫五正像正法住世二十小劫像法亦住二十小劫六國淨國界嚴飾無諸穢惡瓦礫荊棘便利不淨其土平正無有高下坑坎堆阜琉璃為地寶樹行列黃金為繩以界道側散諸寶華周遍清淨其國菩薩無量千億諸聲聞衆亦復無數無有魔事雖有魔及魔民皆護佛法魔及魔民護佛法者寶積經云阿閦佛剎波旬魔王不能障礙菩薩聲聞而皆信樂不動佛法咸自悔責為魔波旬今迦葉成佛亦例彼佛國土也二偈頌六初頌行因爾時世尊欲重宣此義而說偈言告諸比丘我以佛眼見此迦葉於未來世過無數劫當得作佛而於來世供養奉覲三百萬億諸佛世尊為佛智慧淨修梵行供養最上二足尊已修習一切無上之慧二頌得果於最後身得成為佛三頌國淨其土清淨琉璃為地多諸寶樹行列道側金繩界道見者歡喜常出好香散衆名華種種奇妙以為莊嚴其地平正無有丘坑諸菩薩衆不可稱計其心調柔逮大神通奉持諸佛大乘經典諸聲聞衆無漏後身法王之子亦不可計乃以天眼不能數知四頌壽命其佛當壽十二小劫五頌正像正法住世二十小劫像法亦住二十小劫六總結成光明世其事如是二授三人記二初請記四初正請爾時大目犍連須菩提摩訶迦旃延等皆悉悚栗一心合掌瞻仰尊顏目不暫捨即共同聲而說偈言大雄猛世尊諸釋之法王哀愍我等故而賜佛音聲三人記中各有行因得果劫國壽命法住數量悉如文二開譬若知我深心見為授記者如以甘露灑除熱得清涼如從饑國來忽遇大王膳心猶懷疑懼未敢即便食若復得王教然後乃敢食三合譬我等亦如是每惟小乘過不知當云何得佛無上慧雖聞佛音聲言我等作佛心尚懷憂懼如未敢便食若蒙佛授記爾乃快安樂四結大雄猛世尊常欲安世間願賜我等記如饑須教食二與記三初與須菩提記二初長行五初行因爾時世尊知諸大弟子心之所念告諸比丘是須菩提於當來世奉覲三百萬億那由他佛供養恭敬尊重讚歎常修梵行具菩薩道二得果於最後身得成為佛號曰名相如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊三劫國劫名有寶國名寶生其土平正頗梨為地寶樹莊嚴無諸丘坑砂礫荊棘便利之穢寶華覆地周遍清淨其土人民皆處寶臺珍妙樓閣聲聞弟子無量無邊算數譬喻所不能知諸菩薩衆無數千萬億那由他四壽命佛壽十二小劫五法住正法住世二十小劫像法亦住二十小劫其佛常處虗空為衆說法度脫無量菩薩及聲聞衆二偈頌六初誡誠聽爾時世尊欲重宣此義而說偈言諸比丘衆今告汝等皆當一心聽我所說二頌行因我大弟子須菩提者當得作佛號曰名相當供無數萬億諸佛隨佛所行漸具大道三頌得果最從身得三十二相端正姝妙猶如寶山四頌國淨其佛國土嚴淨第一衆生見者無不愛樂佛於其中度無量衆其佛法中多諸菩薩皆悉利根轉不退輪彼國常以菩薩莊嚴諸聲聞衆不可稱數皆得三明具六神通住八解脫有大威德其佛說法現於無量神通變化不可思議諸天人民數如恆沙皆共合掌聽受佛語八解脫即八背捨之果智度論云背是淨潔五欲捨是著心故名背捨若發真無漏斷三界結業盡即名解脫也言八背捨者一內有色相外觀色內有色相者不壞內色內不淨色不滅內色相以是不淨心觀外色白骨觀等此初背捨位在初禪能捨自地及下地故名背捨二內無色相外觀色內無色相者壞內色滅內色相也外觀色者不壞滅外色相所以然者行者為入二禪內淨故壞滅內骨人欲界結使難斷故猶觀外不淨相也三淨背捨身作證行者除外不淨相但於定中鍊八色光明清淨皎潔猶如妙寶之色故名淨以無著心而受三禪中遍身樂故名身作證四虗空處背捨若滅根本四禪色一心緣無邊虗空入定而不受著也五識處背捨若捨虗空一心緣識入定而不受著也六無所有處背捨若捨識一心緣無所有入定而不受著也七非有想非無想背捨若捨無所有處一心緣非有想非無想入定而不受著也八滅受想背捨背滅受想諸心心數法是為滅受想背捨五頌壽命其佛當壽十二小劫六頌法住正法住世二十小劫像法亦住二十小劫二與迦旃延記二初長行五初行因爾時世尊復告諸比丘衆我今語汝是大迦旃延於當來世以諸供具供養奉事八千億佛恭敬尊重諸佛滅後各起塔廟高千由旬縱廣正等五百由旬以金銀琉璃硨磲碼瑙真珠玫瑰七寶合成衆華瓔珞塗香抹香燒香繒蓋幢幡供養塔廟過是已後當復供養二萬億佛亦復如是供養是諸佛已具菩薩道由旬此云限量大論云由旬三別大八十里中六十里下十里也二得果當得作佛號曰閻浮那提金光如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊閻浮樹名那提河名此樹在南洲無熱惱池北岸樹側有河河水之下産紫磨金其金之光映蔽日月為萬國之所重今佛之名恐取諸此矣三國淨其土平正玻瓈為地寶樹莊嚴黃金為繩以界道側妙華覆地周遍清淨見者歡喜無四惡道地獄餓鬼畜生阿修羅道多有天人諸聲聞衆及諸菩薩無量萬億莊嚴其國四壽命佛壽十二小劫五法住正法住世二十小劫像法亦住二十小劫二偈頌四初頌誠聽爾時世尊欲重宣此義而說偈言諸比丘衆皆一心聽如我所說真實無異二頌行因是迦旃延當以種種妙好供具供養諸佛諸佛滅後起七寶塔亦以華香供養舍利三頌得果其最後身得佛智慧成等正覺四頌國淨國土清淨度脫無量萬億衆生皆為十方之所供養佛之光明無能勝者其佛號曰閻浮金光菩薩聲聞斷一切有無量無數莊嚴其國一切有即二十五有也三與目連記二初長行五初行因爾時世尊復告大衆我今語汝是大目犍連當以種種供具供養八千諸佛恭敬尊重諸佛滅後各起塔廟高千由旬縱廣正等五百由旬以金銀琉璃硨磲碼瑙真珠玫瑰七寶合成衆華瓔珞塗香抹香燒香繒蓋幢幡以用供養過是已後當復供養二百萬億諸佛亦復如是二得果當得成佛號曰多摩羅跋旃檀香如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊三劫國劫名喜滿國名意樂其土平正玻瓈為地寶樹莊嚴散真珠華周遍清淨見者歡喜多諸天人菩薩聲聞其數無量四壽命佛壽二十四小劫五法住正法住世四十小劫像法亦住四十小劫二偈頌五初頌行因爾時世尊欲重宣此義而說偈言我此弟子大目犍連捨是身已得見八千二百萬億諸佛世尊為佛道故供養恭敬於諸佛所常修梵行於無量劫奉持佛法諸佛滅後起七寶塔長表金剎華香伎樂而以供養諸佛塔廟金剎者法苑云阿育王取金幡金華懸諸剎上故曰金剎具云剎摩此云土田此乃通取國土名剎又伽藍號梵剎者西域以柱表剎示所居處也二頌得果及國名漸漸具足菩薩道已於意樂國而得作佛號多摩羅旃檀之香三頌壽命其佛壽命二十四劫四頌國淨常為天人演說佛道聲聞無量如恆河沙三明六通有大威德菩薩無數志固精進於佛智慧皆不退轉五頌法住佛滅度後正法當住四十小劫像法亦爾二許與下根更說緣二初許與總記我諸弟子威德具足其數五百皆當授記於未來世咸得成佛二更說宿緣我及汝等宿世因緣吾今當說汝等善聽下根之人已聞法譬二周開三顯一復見上中二根授記而猶疑不了深生愧恥今欲增進其道先許總記更說宿緣也三三品為下根人因緣說二初化城品正說二後兩品授記初文又二初品目妙法蓮華經化城喻品第七正經名往古品化者神力所為以神力故無而欻有名之為化防非禦敵稱之為城若合法者二乘涅槃權智所為以權智力無而說有用教為化防思禦見名為涅槃穌息引入實未究竟而言滅度權假施設故言化城喻如前說因緣三藏二乘於涅槃生安穩想生滅度想通教二乘亦爾菩薩不然誓扶餘習入於生死而不以空為證別教不道城如化用城防險生死從城門徑過不道此為極圓教知無賊亦不須城故言化城今是圓教意故題為化城喻品也約教本迹觀心不記問此品說因緣事下根得悟應名宿世品答品初廣說因緣末則結譬化城若從前應稱宿世今從末故言化城問化城是權寶所是實何意棄實從權答由知城是化則知寶所是實故標化則不失實二經文二初先明知見久遠二初長行三初明出所見事佛告諸比丘乃往過去無量無邊不可思議阿僧祇劫爾時有佛名大通智勝如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊其國名好城劫名大相諸比丘彼佛滅度已來甚大久遠欲說宿世因緣故先舉過去佛以為結緣之所也二舉譬明久遠譬如三千大千世界所有地種假使有人磨以為墨過於東方千國土乃下一點大如微塵又過千國土復下一點如是展轉盡地種墨於汝等意云何是諸國土若算師若算師弟子能得邊際知其數不不也世尊諸比丘是人所經國土若點不點盡抹為塵一塵一劫彼佛滅度已來復過是數無量無邊百千萬億阿僧祇劫地種者即地大種也俱舍界品頌曰大種謂四界即地水火風三義釋大一體寬廣故謂四大種遍所造色其體寬廣二增盛聚中形相大故謂大地大山地增盛等三能起種種大事用故如地能持世界等大則是種故名大種今之所謂即地大一也三結見昔如今我以如來知見力故觀彼久遠猶如今日二偈頌三初頌出所見事爾時世尊欲重宣此義而說偈言我念過去世無量無邊劫有佛兩足尊名大通智勝二頌舉譬明久如人以力磨三千大千土盡此諸地種皆悉以為墨過於千國土乃下一塵點如是展轉點盡此諸塵墨如是諸國土點與不點等復盡抹為塵一塵為一劫此諸微塵數其劫復過是彼佛滅度來如是無量劫三頌見昔如今如來無礙智知彼佛滅度及聲聞菩薩如見今滅度諸比丘當知佛智淨微妙無漏無所礙通達無量劫無漏者於三諦法無漏失也二正明宿世因二初長行二偈頌初文又二初明結緣由二明正結緣初文又二初遠由二近由初文又二初大通佛成道二十方梵請初文又五初佛壽長遠佛告諸比丘大通智勝佛壽五百四十萬億那由他劫那由他是百萬億也二成道前事二初佛坐道場所經時節其佛本坐道場破魔軍已垂得阿耨多羅三藐三菩提而諸佛法不現在前如是一小劫乃至十小劫結跏趺坐身心不動而諸佛法猶不在前成道前事諸佛道同為緣事異釋迦苦行六年草生鑽䯗至肘不覺諸天哭喚動地不聞移坐得道彌勒即出家日得道大通十劫猶不現前者非根有利鈍道有難易緣宜賖促應示短長耳二諸天供養爾時忉利諸天先為彼佛於菩提樹下敷師子座高一由旬佛於此坐當得阿耨多羅三藐三菩提適坐此座時諸梵天王雨衆天華面百由旬香風時來吹去萎華更雨新者如是不絶滿十小劫供養於佛乃至滅度常雨此華四王諸天為供養佛常擊天鼓其餘諸天作天伎樂滿十小劫至于滅度亦復如是面百由旬者四面各百由旬也三正明成道諸比丘大通智勝佛過十小劫諸佛之法乃現在前成阿耨多羅三藐三菩提四眷屬供養其佛未出家時有十六子其第一者名曰智積諸子各有種種珍異玩好之具聞父得成阿耨多羅三藐三菩提皆捨所珍往詣佛所諸母涕泣而隨送之其祖轉輪聖王與一百大臣及餘百千萬億人民皆共圍繞隨至道場咸欲親近大通智勝如來供養恭敬尊重讚歎到已頭面禮足繞佛畢已一心合掌瞻仰世尊以偈頌曰頭面禮足身業一心合掌意業以偈頌曰口業為之三業供養大威德世尊為度衆生故於無量億歲爾乃得成佛諸願已具足善哉吉無上世尊甚希有一坐十小劫身體及手足靜然安不動其心常憺怕未曾有散亂究竟永寂滅安住無漏法今者見世尊安穩成佛道我等得善利稱慶大歡喜衆生常苦惱盲瞑無導師不識苦盡道不知求解脫長夜增惡趣減損諸天衆從冥入於冥永不聞佛名今佛得最上安穩無漏法我等及天人為得最大利是故咸稽首歸命無上尊智積成佛即今東方阿閦佛也盲瞑等者悲昔不見佛不聞佛名義同盲瞑衆生暗昧輪回不休死此生彼即是從冥入冥也喜今得見佛得聞是故稽首歸命耳五請轉法輪爾時十六王子偈讚佛已勸請世尊轉於法輪咸作是言世尊說法多所安穩憐愍饒益諸天人民重說偈言世雄無等倫百福自莊嚴得無上智慧願為世間說度脫於我等及諸衆生類為分別顯示令得是智慧若我等得佛衆生亦復然世尊知衆生深心之所念亦知所行道又知智慧力欲樂及修福宿命所行業世尊悉知已當轉無上輪既云無上輪即十六子請轉滿字教如今佛說華嚴也二十方現瑞二初威光照動佛告諸比丘大通智勝佛得阿耨多羅三藐三菩提時十方各五百萬億諸佛世界六種震動其國中間幽冥之處日月威光所不能照而皆大明其中衆生各得相見咸作是言此中云何忽生衆生又其國界諸天宮殿乃至梵宮六種震動大光普照遍滿世界勝諸天光過去因果經云薩婆悉達處胎時三千國土朗然大光日月所不照處而皆大明其中衆生各得相見初成道時亦如是朝為色天中為欲天晡為鬼神三時說法夜亦如是引今證昔其相即同觀解忽生衆生者心性本淨陰入界覆之則暗若修觀慧本性理顯震動前釋二十方梵請二初九方二上方初文又二初東方七初覩其瑞相爾時東方五百萬億諸國土中梵天宮殿光明照耀倍於常明二各各驚駭諸梵天王各作是念今者宮殿光明昔所未有以何因緣而現此相三遞相問決是時諸梵天王即各相詣共議此事時彼衆中有一大梵天王名救一切為諸梵衆而說偈言我等諸宮殿光明昔未有此是何因緣宜各共求之為大德天生為佛出世間而此大光明遍照於十方四尋光見佛爾時五百萬億國土諸梵天王與宮殿俱各以衣裓盛諸天華共詣西方推尋是相見大通智勝如來處于道場菩提樹下坐師子座諸天龍王乾闥婆緊那羅摩睺羅伽人非人等恭敬圍繞及見十六王子請佛轉法輪五三業供養即時諸梵天王頭面禮佛繞百千匝即以天華而散佛上其所散華如須彌山并以供養佛菩提樹其菩提樹高十由旬華供養已各以宮殿奉上彼佛而作是言唯見哀愍饒益我等所獻宮殿願垂納處時諸梵天王即於佛前一心同聲以偈頌曰世尊甚希有難可得值遇具無量功德能救護一切天人之大師哀愍於世間十方諸衆生普皆蒙饒益我等所從來五百萬億國捨深禪定樂為供養佛故我等先世福宮殿甚嚴飾今以奉世尊唯願哀納受三業供養已見次上禮佛身業一心意業偈讚口業既運身口意有其中下文準知六請佛說法爾時諸梵天王偈讚佛已各作是言唯願世尊轉於法輪度脫衆生開涅槃道時諸梵天王一心同聲而說偈言世雄兩足尊唯願演說法以大慈悲力度苦惱衆生兩足尊者具足定慧二嚴也既云度苦惱即是請轉半字教如今佛於鹿苑中說三藏教度五濁八苦衆生也七佛默然許爾時大通智勝如來默然許之二東南方七初覩其瑞相又諸比丘東南方五百萬億國土諸大梵王各自見宮殿光明照耀二各各驚駭昔所未有歡喜踊躍生希有心三遞相問決即各相詣共議此事時彼衆中有一大梵天王名曰大悲為諸梵衆而說偈言是事何因緣而現如此相我等諸宮殿光相昔未有為大德天生為佛出世間未曾見此相當共一心求過千萬億土尋光共推之多是佛出世度脫苦衆生四尋光見佛爾時五百萬億諸梵天王與宮殿俱各以衣裓盛諸天華共詣西北方推尋是相見大通智勝如來處于道場菩提樹下坐師子座諸天龍王乾闥婆緊那羅摩睺羅伽人非人等恭敬圍繞及見十六王子請佛轉法輪五三業供養時諸梵天王頭面禮佛繞百千匝即以天華而散佛上所散之華如須彌山并以供養佛菩提樹華供養已各以宮殿奉上彼佛而作是言唯見哀愍饒益我等所獻宮殿願垂納受爾時諸梵天王即於佛前一心同聲以偈頌曰聖主天中天迦陵頻伽聲哀愍衆生者我等今敬禮世尊甚希有久遠乃一現一百八十劫空過無有佛三惡道充滿諸天衆減少今佛出於世為衆生作眼世間所歸趣救護於一切為衆生之父哀愍饒益者我等宿福慶今得值世尊迦陵頻伽此云妙聲鳥大論云如迦陵頻伽鳥在㲉中未出發聲微妙勝於餘鳥正法念經云山名曠野其中多有迦陵頻伽出妙音聲如此美音若天若人緊那羅等無能及者唯除如來音聲故云迦陵頻伽聲也衆生盲瞑失正見不知出要佛為指示引之令出故云為衆生作眼也六請佛說法爾時諸梵天王偈讚佛已各作是言唯願世尊哀愍一切轉於法輪度脫衆生時諸梵天王一心同聲而說偈言大聖轉法輪顯示諸法相度苦惱衆生令得大歡喜衆生聞此法得道若生天諸惡道減少忍善者增益既云顯示法相度苦衆生即與上東方請轉半字同七佛默然許爾時大通智勝如來默然許之三南方七初覩其瑞相又諸比丘南方五百萬億國土諸大梵王各自見宮殿光明照耀二各各驚駭昔所未有歡喜踊躍生希有心三遞相問決即各相詣共議此事以何因緣我等宮殿有此光曜而彼衆中有一大梵天王名曰妙法為諸梵衆而說偈言我等諸宮殿光明甚威耀此非無因緣是相宜求之過於百千劫未曾見是相為大德天生為佛出世間四尋光見佛爾時五百萬億諸梵天王與宮殿俱各以衣裓盛諸天華共詣北方推尋是相見大通智勝如來處于道場菩提樹下坐師子座諸天龍王乾闥婆緊那羅摩睺羅伽人非人等恭敬圍繞及見十六王子請佛轉法輪五三業供養時諸梵天王頭面禮佛繞百千匝即以天華而散佛上所散之華如須彌山并以供養佛菩提樹華供養已各以宮殿奉上彼佛而作是言唯見哀愍饒益我等所獻宮殿願埀納處爾時諸梵天王即於佛前一心同聲以偈頌曰世尊甚難見破諸煩惱者過百三十劫今乃得一見諸飢渴衆生以法雨充滿昔所未曾覩無量智慧者如優曇婆羅今日乃值遇我等諸宮殿蒙光故嚴飾世尊大慈悲唯願埀納受六請佛說法爾時諸梵天王偈讚佛已各作是言唯願世尊轉於法輪令一切世間諸天魔梵沙門婆羅門皆獲安穩而得度脫時諸梵天王一心同聲以偈頌曰唯願天人尊轉無上法輪擊于大法鼓而吹大法螺普雨大法雨度無量衆生我等咸歸請當演深遠音既云轉無上輪即諸梵請轉對半明滿如今佛說方等也七默許爾時大通智勝如來默然許之四總明六方西南方乃至下方亦復如是此西南方并西方西北方北方東北方下方總六方既云亦復如是則與上南方請轉對半明滿是同也二上方六初覩其瑞相爾時上方五百萬億國土諸大梵王皆悉自覩所止宮殿光明威曜二各各驚駭昔所未有歡喜踊躍生希有心三遞相問決即各相詣共議此事以何因緣我等宮殿有斯光明而彼衆中有一大梵天王名曰尸棄為諸梵衆而說偈言今以何因緣我等諸宮殿威德光明曜嚴飾未曾有如是之妙相昔所未聞見為大德天生為佛出世間四尋光見佛爾時五百萬億諸梵天王與宮殿俱各以衣裓盛諸天華共詣下方推尋是相見大通智勝如來處于道場菩提樹下坐師子座諸天龍王乾闥婆緊那羅摩睺羅伽人非人等恭敬圍繞及見十六王子請佛轉法輪五三業供養時諸梵天王頭面禮佛繞百千匝即以天華而散佛上所散之華如須彌山并以供養佛菩提樹華供養已各以宮殿奉上彼佛而作是言唯見哀愍饒益我等所獻宮殿願埀納處時諸梵天王即於佛前一心同聲以偈頌曰善哉見諸佛救世之聖尊能於三界獄勉出諸衆生普智天人尊愍哀羣萌類能開甘露門廣度於一切於昔無量劫空過無有佛世尊未出時十方常暗瞑三惡道增長阿修羅亦盛諸天衆轉減死多墮惡道不從佛聞法常行不善事色力及智慧斯等皆減少罪業因緣故失樂及樂想住於邪見法不識善儀則不蒙佛所化常墮於惡道佛為世間眼久遠時乃出哀愍諸衆生故現於世間超出成正覺我等甚欣慶及餘一切衆喜歎未曾有我等諸宮殿蒙光故嚴飾今以奉世尊唯垂哀納受願以此功德普及於一切我等與衆生皆共成佛道六請佛說法爾時五百萬億諸梵天王偈讚佛已各白佛言唯願世尊轉於法輪多所安穩多所度脫時諸梵天王而說偈言世尊轉法輪擊甘露法鼓度苦惱衆生開示涅槃道唯願受我請以大微妙音哀愍而敷演無量劫習法既云擊甘露法鼓復云度苦惱衆生即諸梵請轉帶半明滿如今佛說般若也二近由二初先轉半字法輪三初受請爾時大通智勝如來受十方諸梵天王及十六王子請此結緣近由也由佛受請說法故十六王子後得覆講正作結緣二正轉即時三轉十二行法輪三轉者謂示勸證也示轉者謂此是苦乃至此是道勸轉者謂苦應知集應斷滅應證道應修證轉者謂苦我已知不復更知乃至道我已修不復更修示謂示其相狀勸謂勸其令修證謂引己證彼聲聞根鈍為其三轉緣覺次之為其再轉菩薩根利為其一轉此且一往說耳通方例皆三轉諸佛語法法至於三為衆生有三根故大論及婆沙悉作此說十二行者一約教謂四諦各有示勸證即十二教法輪也二約行謂四諦三轉皆生眼智明覺即十二行法輪也或通三人或約一人今就見諦道三人利根聞示轉其次聞勸轉其次聞證轉各生眼智明覺三人合舉故言十二行也教行相循共能摧惑名之為輪也若沙門婆羅門若天魔梵及餘世間所不能轉所不能轉者沙門不聞尚不知名何況能轉支佛雖悟口不能說婆羅門雖聞其名不解其理魔王梵王亦爾夫轉者轉此法度入他心令彼得悟破六十二見乃名轉法輪為無此義魔梵等所以不能轉也謂是苦是苦集是苦滅是苦滅道此為聲聞人先轉生滅四諦法輪也謂是苦者苦以逼惱為義一切有為心行為無常纍三界六道生死是其苦也集以招集為義即見思惑惑與業俱能招生死故名為集集為因苦為果果必有因故云是苦集此世間因果也滅以滅無為義惑業既盡則無生死之纍故云是苦滅也滅諦之體是二涅槃若子縛已盡名有餘涅槃若灰身滅智名無餘涅槃道以能通為義正道及助道是二相扶能通至涅槃故名為道道能滅苦故云是苦滅道略則戒定慧廣則三十七道品道為因滅為果此出世因果也及廣說十二因緣法無明緣行行緣識識緣名色名色緣六入六入緣觸觸緣受受緣愛愛緣取取緣有有緣生生緣老死憂悲苦惱此為支佛轉十二因緣法輪也展轉感果為因互相由藉為緣無明者過去一切煩惱皆是無明體即是癡迷暗為性無所明了故曰無明即是惑也行者於過去世造作諸業名之為行由惑造業故云無明緣行此二屬過去因識者有了別義名之為識以業成故牽生三界意識妄念投託母胎故云行緣識既託母胎即有緣息識三事七日一轉而成心色名是心色是質故云識緣名色六入者六根成此胎中以根有入塵之義名之為入既有心色即成就六根故云名色緣六入觸者出胎已後至三四歲由根對塵而未能了知是名為觸故云六入緣觸受者領納名受從五六歲至十二三因六塵觸六根即領納前境好惡等事雖能了別然未能起貪愛之心故云觸緣受此五屬現在果愛者從十四五歲至十八九貪於種種勝妙資具及色欲等境然猶未能廣遍追求由領納故即起貪愛故云受緣愛取者從二十歲後凡見一切境皆生取著心由愛生著故云愛緣取此之愛取又為未來生死之因屬煩惱與過去無明同有者既著諸境起善惡業積集牽引當生三有故云取緣有亦為未來生死之因屬業與過去行同生者謂六道中受生也從有還受後世之生故云有緣生老死者受生之身熟壞名老死故云生緣老死此二屬未來果也文末而云憂悲苦惱者如妙玄云老死必憂悲也無明滅則行滅行滅則識滅識滅則名色滅名色滅則六入滅六入滅則觸滅觸滅則受滅受滅則愛滅愛滅則取滅取滅則有滅有滅則生滅生滅則老死憂悲苦惱滅十二因緣還是別相細觀四諦耳約苦集即有無明乃至老死約道滅即有無明滅乃至老死滅也逆順觀察並由無明為本故無明滅則行滅乃至生滅則老死滅也三聞法得道佛於天人大衆之中說是法時六百萬億那由他人以不受一切法故而於諸漏心得解脫皆得深妙禪定三明六通具八解脫第二第三第四說法時千萬億恆河沙那由他等衆生亦以不受一切法故而於諸漏心得解脫從是已後諸聲聞衆無量無邊不可稱數不受一切法者不受諸見悟初果也得解脫者脫子果兩縛得無學也深妙定者即俱解脫人具足觀練熏修事定名深妙耳三明等如前釋初說四諦十二因緣時六百萬億那由他人得道第二三四說法時得悟之人轉多於前故不可稱數二轉滿字法輪七初王子出家爾時十六王子皆以童子出家而為沙彌諸根通利智慧明了已曾供養百千萬億諸佛淨修梵行求阿耨多羅三藐三菩提諸根者六根也六根清淨故言通利又六根互用故言通入佛境界故言利智慧明了者開示悟入也二請修學法俱白佛言世尊是諸無量千萬億大德聲聞皆已成就世尊亦當為我等說阿耨多羅三藐三菩提法我等聞已皆共修學世尊我等志願如來知見深心所念佛自證知十六子再請廢半明滿如今佛說法華也彼佛初說圓頓諸子大乘功德悉皆具足復愍諸方便未為究竟故重請佛開權顯實也聲聞皆已成就者明其障除大乘機動是故為請我等志願如來知見者此法華經但明佛之知見唯志於此即正請滿字廢半之文明顯為若此也三所將出家爾時轉輪聖王所將衆中八萬億人見十六王子出家亦求出家王即聽許四受請說法爾時彼佛受沙彌請過二萬劫已乃於四衆之中說是大乘經名妙法蓮華教菩薩法佛所護念說是經已十六沙彌為阿耨多羅三藐三菩提故皆共受持諷誦通利過二萬劫者上既為三乘說諦緣等教後受諸子請又說法華故知不容中間默然無說二萬劫中必說方等般若故下偈文云說六波羅蜜及諸神通事般若是行神通是事如今諸方等經多明不思議諸神通事故知是彼佛說方等也又偈云分別真實法即是大品明實相般若意故知是彼佛說般若也五衆解不解說是經時十六菩薩沙彌皆悉信受聲聞衆中亦有信解其餘衆生千萬億種皆生疑惑十六沙彌及二乘即信解衆其餘千萬皆生疑惑是不解衆此不解衆即於十六子聽覆講結法華之緣者也六說經時節佛說是經於八千劫未曾休廢七說已入定說此經已即入靜室住於禪定八萬四千劫彼佛說法華後入定正是結緣之近由由佛入定不出千萬億種諸疑惑者無所咨問故十六沙彌為其覆講說法華經也二正結緣二初法說結緣二譬說結緣初文又三初明昔共結緣四初知佛入定是時十六菩薩沙彌知佛入室寂然禪定二王子覆講各升法座亦於八萬四千劫為四部衆廣說分別妙法華經由佛入定所以得說佛知一化將畢不復熟此一段之人故令王子共其結緣又知此等必由王子究竟得度所以入定久而不出也三衆得利益一一皆度六百萬億那由他恆河沙等衆生示教利喜令發阿耨多羅三藐三菩提心皆發菩提心故云度若初發心時誓願當作佛已過於世間即是度七方便彼岸義也那由他衆生即上不解之衆也示教利喜者指示為示教詔為教令彼得益為利使彼心喜為喜四定起稱歎二初稱歎菩薩大通智勝佛過八萬四千劫已從三昧起往詣法座安詳而坐普告大衆是十六菩薩沙彌甚為希有諸根通利智慧明了已曾供養無量千萬億數諸佛於諸佛所常修梵行受持佛智開示衆生令入其中佛從定起歎菩薩者以為勸進其徒而已安詳者謂宴安詳雅也甚為希有此即正歎菩薩耳二勸物親近二初勸親近汝等皆當數數親近而供養之即是勸於菩薩所化二釋勸意所以者何若聲聞辟支佛及諸菩薩能信是十六菩薩所說經法受持不毀者是人皆當得阿耨多羅三藐三菩提如來之慧二明中間值遇佛告諸比丘是十六菩薩常樂說是妙法蓮華經一一菩薩所化六百萬億那由他恆河沙等衆生世世所生與菩薩俱從其聞法悉皆信解以此因緣得值四萬億諸佛世尊于今不盡此明結緣已後中間常相逢值逢值三種一若相逢遇常受大乘此輩中間皆已成就不至於今二若相逢遇遇其退大仍接以小此輩中間猶故未盡今得還聞大乘之教三但論遇小不論遇大則中間未度于今亦不盡今方始受大乃至滅後得道者是也問如上塵數多許時節今始得羅漢如此則無生法忍何易可階答大聖善巧依四悉檀作如是說或為厭佛道長遠者說短於佛道生輕易想者說長此對治悉檀也或為發生宿善作長短說此為人悉檀也或隨世間所欲作長短說此世界悉檀也或為聞說長短即得入理此第一義悉檀也當知言如許劫方今得羅漢者此是權行四悉檀引諸實行令入道耳三明今還說法華經二初結會古今二初結師古今諸比丘我今語汝彼佛弟子十六沙彌今皆得阿耨多羅三藐三菩提於十方國土現在說法有無量百千萬億菩薩聲聞以為眷屬其二沙彌東方作佛一名阿閦在歡喜國二名須彌頂東南方二佛一名師子音二名師子相南方二佛一名虗空住二名常滅西南方二佛一名帝相二名梵相西方二佛一名阿彌陀二名度一切世間苦惱西北方二佛一名多摩羅跋旃檀香神通二名須彌相北方二佛一名雲自在二名雲自在王東北方佛名壞一切世間怖畏第十六我釋迦牟尼佛於娑婆國土成阿耨多羅三藐三菩提阿閦淨名經云有國名妙喜佛號無動疏云阿之言無閦之言動阿彌陀清淨平等覺經翻無量清淨無量壽經翻無量壽釋迦翻能仁是姓牟尼翻寂默是字能仁則慈悲利物寂默則智慧冥理以利物故不住涅槃以冥理故不住生死餘佛名未見所出不敢妄解娑婆亦曰索訶此云堪忍乃三千大千世界為一佛化境也悲華經云何名娑婆是諸衆生忍受三毒及諸煩惱能忍斯惡故名忍土也二會徒古今二初會現在徒四初不退住大諸比丘我等為沙彌時各各教化無量百千萬億恆河沙等衆生從我聞法為阿耨多羅三藐三菩提此言下大種之後中間不退住無上道二退住聲聞此諸衆生于今有住聲聞地者我常教化阿耨多羅三藐三菩提是諸人等應以是法漸入佛道此言下種之後中間退大向小住聲聞位佛以大乘教化于今漸入佛道三釋退住意所以者何如來智慧難信難解此釋退住之意雖下大種蓋緣佛之智慧難以信解所以退大向小四正結古今爾時所化無量恆河沙等衆生者汝等諸比丘爾時者指大通佛所為其下種時也二會未來徒二初正會及我滅度後未來世中聲聞弟子是也二釋疑我滅度後復有弟子不聞是經不知不覺菩薩所行自於所得功德生滅度想當入涅槃我於餘國作佛更有異名是人雖生滅度之想入於涅槃而於彼土求佛智慧得聞是經唯以佛乘而得滅度更無餘乘除諸如來方便說法疑者云現在者得聞佛說法華得入一道可是結緣之流若未來者不聞法華而入滅度此等豈能捨小得入一乘釋云雖滅度之我於餘國作佛終當得聞是經餘國者三乘通教有餘國也除諸如來方便說者斷疑也三乘是方便說其實無三也二明說法華三初時衆清淨諸比丘若如來自知涅槃時到衆又清淨信解堅固了達空法深入禪定涅槃時到者諸佛出世化道將畢之時即說法華如迦葉佛日月燈明佛等出於淨土說法華竟即入涅槃釋迦出於穢土說法華竟仍唱當滅更說涅槃衆又清淨者既得三藏教益免於五濁八苦之難也信解堅固者於方等教心相體信也了達空法者聞般若說法於空法中心得了達即是轉教意也二正說法華便集諸菩薩及聲聞衆為說是經世間無有二乘而得滅度唯一佛乘得滅度耳集諸菩薩是聚會親族及聲聞衆是命其子上釋親族法身大士為影響衆以此文驗之其義明也世間無有二乘等者準理世無一人合永入滅會必歸大三釋前開三意比丘當知如來方便深入衆生之性知其志樂小法深著五欲為是等故說於涅槃是人若聞則便信受此承上文意若世無二乘得滅度者如來何故施三釋云比丘當知如來以方便權智深知衆生有小性欲著於五塵弊於五濁故先說三乘涅槃令破弊免難後說一也二譬說結緣二初開譬二合譬初文又二初導師譬五初五百由旬譬譬如五百由旬五百由旬譬上未度衆樂著諸有輪回處所即擬火宅中其家廣大三界無安方便品安穩對不安穩處之意也約土言之三界同居土為三百方便有餘土為四百實報土為五百下文合譬云知諸生死生死即是處所明矣約惑言之見惑為一百五下分惑為二百五上分惑為三百塵沙惑為四百無明惑為五百下文合譬云煩惱惡道險難義相扶也約觀言之入空觀能過三百入假觀能過四百入中觀能過五百下文合譬云善知險道通塞之相即雙知因果二種五百義相扶也由旬如前釋二險難惡道險難惡道曠絶無人怖畏之處險難惡道譬上未度之衆煩惱垢重即擬火宅中火起方便品安穩對不安穩之法也分段變易二種生死此即果險難也見思塵沙無明此即因險難也由此因果故言惡道也無人者道有二種一曠絶有人可依二曠絶無人可依有人可依者譬生死中有涅槃煩惱中有菩提雖復曠絶則有人可依此通指衍門三教也若生死煩惱無涅槃菩提如藥中無病病中無藥此則曠絶無人可依多是三藏二乘據理通於通教二乘也三若有多衆譬若有多衆譬上王子所化百千萬億種皆生疑惑不解之衆生也即擬火宅中三十子五百人方便品中知衆生性欲意四欲至寶處譬欲過此道至珍寶處二乘斷見思出三界故言欲過此道更斷塵沙無明求至無上種覺故言至珍寶處五有一導師譬有一導師聰慧明達善知險道通塞之相有一導師者即第十六王子也眼耳清淨曰聰意根清淨曰達總而言之即六根清淨也慧即一心三智明即具足五眼又三明為明十力為達二將導譬三初所將人衆譬將導衆人欲過此難譬本結緣未得度者本緣不失而為導師所將二中路懈退譬二初退大三初中路懈退所將人衆中路懈退所將人衆者正譬中間相值退大取小之人也中路者非是半途名中路但以發心為始至佛為終此兩楹之間而起退大之意故名中路也二白導師言白導師言我等疲極而復怖畏言導師者自有通途慈悲導師如文云有一導師將導衆人者是也自有結緣導師如文云所將人衆白導師言是也自有權智導師如文云導師多諸方便者是也自有實智導師如文云導師知此人衆是也今言白導師者正白結緣之導師也以其退大則大滅接小則小生一生一滅感於法身呼此為白王子知其退大即是聞其所白善根微弱無明所翳故言疲極憚生死名為怖畏三不能復進不能復進前路猶遠今欲退還不能復進前路猶遠者見思塵沙無明難可卒斷也用小乘接之不令頓還本處亦有進義二接小四初多方便導師多諸方便此譬擬宜即以小接也二傷失寶而作是念此等可愍云何捨大珍寶而欲退還傷其失寶譬知有小無大也三化作城二初作化作是念已以方便力於險道中過三百由旬化作一城此正用方便之教教化二乘斷見思惑出三界苦故云過三百由旬令其權證真空涅槃故云化作一城二說化告衆人言汝等勿怖莫得退還今此大城可於中止隨意所作若入是城快得安穩若能前至寶所亦可得去此譬擬上勸示證三轉也汝等勿怖莫得退還是勸轉勸令進入城也今此大城等是示轉示城可住也若入是城快得安穩是證轉證城安穩也前至寶所亦可得去者三藏教中未論前進義在衍門約共菩薩寶所有二義若用究竟則以極果為寶所故上文云唯佛與佛乃能究盡諸法實相若分入即以初發心住為寶所故上文云無上寶聚不求自得又云得佛法分佛子所應得者皆已得之四入城譬是時疲極之衆心大歡喜歎未曾有我等今者免斯惡道快得安穩於是衆人前入化城生已度想生安穩想大歡喜即聞慧未曾有即暖位免惡道即頂位快安穩即忍位前入城即見諦位已度想即無學位此與火宅適子願故勇鋭推排出宅同也生已度想如得盡智安穩想如得無生智又具智德如已度證斷德如安穩也三引至寶所二初知息已爾時導師知此人衆既得止息無復疲倦既得止息無復疲倦者譬上涅槃時到衆又清淨而得免難大機當發也二向寶所即滅化城語衆人言汝等去來寶處在近向者大城我所化作為止息耳即滅化城引向寶所譬上正說法華示真實相寶處在近尚者大城我所化作即舉廢權譬以帖顯實譬也上云是諸人等應以是法漸入佛慧所以者何如來智慧難信難解擬方便中云我令脫苦縛逮得涅槃者佛以方便力示以三乘教也問凡五處開三顯一為有何異答通論無異別論有差方便品約教開三顯一文云如來但以一佛乘故為衆生說法無二亦無三也火宅約行開三顯一車是運義運則譬行文云各乘大車遊於四方嬉戲快樂也信解品中約人開三顯一結會傭作之人即是長者之兒文云我等昔來真是佛子也藥草喻中約差別無差別明權實不的去取但明衆生不知佛令其知若七種差別即知權同依一理無差別即知實差別無差別無差別而差別令知此意耳終不說言無一有一此約自行權實二知隨自意語故佛能知衆生不知亦具通前通後知不知明權實也今化城正約理開三顯一寶所化城皆是大小兩理破除二乘化理顯於寶所化實一理也下去五百領解舉繫珠為喻亦是約理也二合譬二初正合二初合導師譬五初正合上導師諸比丘如來亦復如是二合多諸人衆今為汝等作大導師此以能將顯於所將三合險難惡道知諸生死煩惱惡道險難四合五百由旬長遠五合聰慧明達亦合至珍寶處應去應度合上聰慧明達善知險道通塞之相亦是合上欲過險道至珍寶處二合將導譬三初合所將人衆若衆生二合退大接小二初合退大三初合中路懈退但聞一佛乘者合上中路懈退無大機意也二合白導師言則不欲見佛不欲親近合上白導師不受勸誡也三合不能前進便作是念佛道長遠久受勤苦乃可得成合上不能前進息化意也二合接小三初合導師方便佛知是心合上中間退大復以小接之意譬本有四合但有三今正合上導師多方便擬宜之意二合此等可愍怯弱下劣以方便力合上此等可愍知有小機也三合現作化城而於中道為止息故說二涅槃合上現作化城譬也而於中道說二涅槃者三界惑盡塵沙無明未破於此兩楹判有餘無餘涅槃亦是聲聞緣覺涅槃又分段已盡變易未除二死之間判為有餘無餘故言中道三合將至寶所二初合知息已若衆生住於二地二合向寶所如來爾時即便為說汝等所作未辦汝所住地近於佛慧當觀察籌量所得涅槃非真實也但是如來方便之力於一佛乘分別說三二舉譬帖合二初牒接退譬來合施三如彼導師為止息故化作大城二牒滅化譬來合顯一既知息已而告之言寶處在近此城非實我化作耳二偈頌二初頌結緣由二頌正結緣初文又二初頌遠由二初頌大通成道三初頌成道前事爾時世尊欲重宣此義而說偈言大通智勝佛十劫坐道場佛法不現前不得成佛道諸天神龍王阿修羅衆等常雨於天華以供養彼佛諸天擊天鼓并作衆伎樂香風吹萎華更雨新好者二頌正成道過十小劫已乃得成佛道諸天及世人心皆懷踊躍三請法兼供養彼佛十六子皆與其眷屬千萬億圍繞俱行至佛所頭面禮佛足而請轉法輪聖師子法雨充我及一切頌上請轉法輪兼頌成道已眷屬申供養二頌十方請二初頌威光動曜世尊甚難值久遠時一現為覺悟群生震動於一切二頌尋光而來二初別頌東方東方諸世界五百萬億國梵宮殿光曜昔所未曾有諸梵見此相尋來至佛所散華以供養并奉上宮殿請佛轉法輪以偈而讚歎佛知時未至受請默然坐二總頌九方三方及四維上下亦復爾散華奉宮殿請佛轉法輪世尊甚難值願以大慈悲廣開甘露門轉無上法輪二頌近由二初頌轉小乘法輪三初頌佛受請無量慧世尊受彼衆人請二正頌轉法輪為宣種種法四諦十二緣無明至老死皆從生緣有如是衆過患汝等應當知三時衆聞法得道宣暢是法時六百萬億姟得盡諸苦際皆成阿羅漢第二說法時千萬恆沙衆於諸法不受亦得阿羅漢從是後得道其數無有量萬億劫算數不能得其邊十萬為億十億為兆百億為京千億為秭萬億為姟諸法不受者謂能伏斷見思也二頌轉大乘法輪五初頌王子出家時十六王子出家作沙彌二頌請轉大乘皆共請彼佛演說大乘法我等及營從皆當成佛道願得如世尊慧眼第一淨三頌方等般若佛知童子心宿世之所行以無量因緣種種諸譬喻說六波羅蜜及諸神通事分別真實法菩薩所行道六波羅蜜釋見序品四頌說法華經說是法華經如恆沙偈五頌說已入定彼佛說經已靜室入禪定一心一處坐八萬四千劫二正頌結緣二初頌法說三初頌昔結緣三初頌佛入定是諸沙彌等知佛禪未出二頌正覆講為無量億衆說佛無上慧各各坐法座說是大乘經於佛宴寂後宣揚助法化三頌聞法益一一沙彌等所度諸衆生有六百萬億恆河沙等衆二頌中間相值彼佛滅度後是諸聞法者在在諸佛土常與師俱生三頌今還說法華二初結會師弟是十六沙彌具足行佛道今現在十方各得成正覺爾時聞法者各在諸佛所其有住聲聞漸教以佛道我在十六數曾亦為汝說是故以方便引汝趣佛慧二頌還說法華二初頌時衆清淨以是本因緣以本昔因緣所以今日時衆免難機發也二頌為說是經今說法華經令汝入佛道慎勿懷驚懼二頌譬說二初頌開譬二頌合譬初文又二初頌導師譬五初頌險難惡道譬如險惡道逈絶多毒獸又復無水草人所怖畏處毒獸譬惑無水草者喻不修習菩提之道水澄渟表定草差別表慧二頌多諸人衆無數千萬衆欲過此險道第四欲至寶所譬在此欲過此險道句中三頌五百由旬其路甚曠遠經五百由旬四頌有一導師時有一導師五頌聰慧明達強識有智慧明了心決定在險濟衆難二頌將導譬三初正頌將導衆人二懈怠作化二初正頌懈怠皆疲倦而白導師言我等今頓乏於此欲退還二頌作化接退四初傷失大導師作是念此輩甚可愍如何欲退還而失大珍寶二頌作念尋時思方便當設神通力三頌作化二初頌作化化作大城郭莊嚴諸舍宅周匝有園林渠流及浴池重門高樓閣男女皆充滿諸舍宅者諸空觀境也園林者二乘總持無漏法林也九次第定為渠流八解脫為浴池重門是三空門又是重空三昧盡無生智為樓閣高出也男女是定慧也觀心解者智體周備如城隍善法圓足如郭之圍繞畢竟空為舍宅真善能成自行如男幹家事慈悲外化如女之外適二頌說化即作是化已慰衆言勿懼汝等入此城各可隨所樂四頌入城諸人既入城心皆大歡喜皆生安穩想自謂已得度三頌滅化向寶所二初頌知息已導師知息已二頌滅化引至寶處集衆而告言汝等當前進此是化城耳我見汝疲極中路欲退還故以方便力權化作此城汝今勤精進當共至寶所二頌合譬二初正合二初合五百由旬我亦復如是為一切導師二合將導譬二初合懈退二初合中路退見諸求道者中路而懈廢不能度生死煩惱諸險道二合接退作化故以方便力為息說涅槃言汝等苦滅所作皆已辦二合滅化至寶處二初合知息已既知到涅槃皆得阿羅漢二合滅化引向寶處爾乃集大衆為說真實法諸佛方便力分別說三乘唯有一佛乘息處故說二今為汝說實汝所得非滅為佛一切智當發大精進汝證一切智十力等佛法具三十二相乃是真實滅此偈文即有三德祕密藏義汝證一切智即是般若具三十二相即是法身乃是真實滅即是解脫三法不縱不橫即是見佛性也二頌舉譬帖合諸佛之導師為息說涅槃既知是息已引入於佛慧
