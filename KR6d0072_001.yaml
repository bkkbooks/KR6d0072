body:
  text: 四明信人習善徐行善依科入注四明海慧教門住持必升校證姚秦三藏法師鳩摩羅什奉詔譯姚秦者即後秦姚氏也三藏即經律論也法師者傳譯弘通之人也鳩摩羅什者具云鳩摩羅耆婆父名鳩摩羅琰母名耆婆是丘慈王妹什從父母立名此云童壽以童子之年有壽者之智耳自七歲出家日誦三萬二千言九歲同母至罽賓國彼有法師盤頭達多者三藏通曉什依而師之至十二同母至月氏北山有羅漢一見乃云此小沙彌將大弘佛法也什公之母體道悟明位證三果尋往天竺臨行語什曰方等諸經汝必大闡震旦唯汝自無少益耳什言若使大化流傳雖泥犁苦何憾還彼丘慈悟大乘法要其盤頭達多反師於什時前秦符堅僭號關中謂呂光曰朕聞有羅什者深解佛乘矧賢哲者國之大寶也光克丘慈因得羅什還至涼州而符堅已為姚萇所害光遂僭號關外光死其子襲位至于呂隆已經十八年矣萇復卒其子興立弘始三年有連理枝生于廟庭有蔥數畦悉變為茝音止香草也瑞異既作秦主遂西伐呂隆方迎得什師入關以其年十二月至長安譯諸經論續於偽秦弘始十一年八月入寂垂終誓曰若平時翻宣無誤俾火後舌不焦黑至闍維竟其舌作紅蓮華色什公位證三賢譯經首從七佛其來尚矣妙法蓮華經序品第一序有訓義訓者庠序也謂階位賓主問答悉庠序也義者有三謂次由述也如是等五事冠於經首次序也放光六瑞發起之端由序也問答決疑正説之弄引敘述也具此三義故稱為序義類同者聚在一段故名品也大段分為三初序分次正宗分三流通分初文又二通序二別序初文又五初舉所聞法體如是所聞法體亦指法之辭三世佛經皆安如是亦信順之辭信則所聞之理會順則師資之道成此下言通序者由諸經通有之故言通也二舉能持人我聞即阿難自稱也大論云耳根不壞聲在可聞處意欲聞即聞我是耳之主舉我攝衆緣也三聞持和合非異時一時肇師云法王啓運嘉會之時天台云機應會在一時也四時從佛聞及聞持之處佛梵語佛陀此云覺者究竟覺了諸法唯只是心又覺有三義自覺覺他覺滿天台云佛名覺者知者於道場樹下知覺世間出世間總相別相覺世即苦集覺出世即道滅亦能覺他身長丈六壽八十老比丘像菩提樹下生草為座三十四心正習俱盡即三藏佛自覺覺他也帶比丘像現尊特身樹下一念相應斷餘殘習即通佛自覺覺他也單現尊特坐蓮華臺受佛職者即別佛自覺覺他也隱前三相唯示不可思議如虗空相即圓佛自覺覺他也今經教主即圓教佛也佛身本一赴緣即三在昔雖三於今即一昔之三若展拳為指今之一若斂指為拳體用似殊其實則一一則三三則一非一非三即三即一記云法華以前三佛離明隔偏小故來至今經從劣辨勝即三而一也住王舍城佛為能住王城為所住王舍梵云羅閲祇城云伽羅其城東北十五里至鷲峯是説法華處記云如來本住王三昧三德之城迹居忍土之王舍城耳耆闍崛山中此云靈鷲山以山峯似鷲故名其山又云南有尸陀林鷲食尸已棲其上時呼為鷲又前佛今佛皆居此山佛滅後羅漢支佛常居為聖所居故呼為靈中者以此山居五山之中天台云佛好居中所以升中天降中國中日生中夜滅居中山説中道也五聞持之伴二初列衆二總結衆集初文又三初聲聞衆二初比丘衆二初多知識六初舉類與大比丘衆與共也有大道大用大知故言大也比丘有三義怖魔破惡乞士既出家將離生死乖於魔意故魔懼而名怖魔又出家破身口七支之惡故云破惡又佛不許如在家而營生業唯乞食自資身安道存福利檀越故云乞士衆者梵云僧伽此翻和合衆二明數萬二千人俱此數衆本是菩薩迹言比丘耳三明位皆是阿羅漢阿經云應真瑞應經云真人悉約無生義釋或言無翻名含三義一無明粳脫後有田中不受生死果報名無生二者九十八使煩惱惑盡名殺賊三者具智斷兩德堪為人天福田名應供此藏通意耳若別圓釋者非但殺賊亦殺不賊非但無生無生亦無非但應供亦能供應此歎別圓地住功德也又觀解者從假入空觀亦有三義乃至中道觀殺無明賊不生三乘心能供養此人如供養世尊也四歎德諸漏已盡無復煩惱逮得己利盡諸有結心得自在漏者三漏成論云失道故名漏律云癡人造業開諸漏門毗曇云漏落生死亡法身慧命皆是賊義此歎殺賊也煩惱即是九十八使逮得己利歎應供也三界因果名為他智斷兩德名己利己利具足故名應供諸有即二十五有生處結即二十五有生因因盡果亡此歎無生也定具足故心自在慧具足故名慧自在今言心自在即是定慧具足俱解脫人五列名其名曰阿若憍陳如阿若是名翻已知又無知乃能知無也憍陳如是姓翻火器婆羅門種其先事火從此名族也摩訶迦葉此翻大龜氏其先學道靈龜負仙圖而應以此命族又翻飲光身光炎涌優樓頻螺迦葉螺亦作蠡此翻木瓜林也伽耶迦葉迦耶此云城那提迦葉那提此云江又云河也舍利弗此云身子母好形身所生故名身子又云珠子母聰明相在眼珠之所生故也大目犍連此云萊茯根又翻胡豆皆以古仙嗜此二物因此命族也摩訶迦旃延此云文飾亦云好肩阿菟樓馱亦云阿那律亦名阿泥盧豆此翻無貧也劫賓那此云房宿父禱房星得子故名憍梵波提此云牛呞宿習不忘避世所笑多居天上離婆多此云星宿亦云假和合也畢陵伽婆蹉此云餘習樹下苦坐不避風雨也薄拘羅此翻善容端正無病年一百六十歲摩訶拘絺羅此云大膝舍利弗舅難陀亦云牧牛難陀此云善歡喜大論云牧牛者頻婆娑王請佛及僧三月安居令牧牛人近住送乳因得見佛出家成果也孫陀羅難陀此云端正即佛之親弟也其妻名孫陀利因妻而名揀餘難陀名也富樓那彌多羅尼子上三字翻滿願從父得名下五字從母得名諸梵人呼為滿慈子天竺男通稱那女通稱尼從父母得名須菩提此云善吉亦云空生生之日室皆空父母驚異問相師占云此是吉相因名善吉又名空生出家見空得道得無諍三昧等也阿難此翻歡喜佛成道日生舉國歡喜因以名之又名慶喜即佛叔父白飯王之子羅睺羅又云羅云此云覆障是佛的子佛為太子時欲求出家父王不許殷勤不已王言若汝有子聽汝出家太子即指妃腹云却後六年汝當生男在胎六年故言覆障佛出家後耶輸有孕諸釋感嗔欲治欲殺妃臨火坑誓曰我若為非母子俱滅若其遺體天當為證因抱子投坑變為蓮池蓮華捧體王及國人始復不疑佛還國耶輸羅云奉佛歡喜丸羅云以幼稚於大衆中徑持上佛耶輸以此息謗國人歡喜六結如是如上也衆所知識大阿羅漢等肇師云大士處世猶日月升天有目之徒莫不知識二少知識復有學無學二千人三藏中十八種學人九種無學又通教九地皆名學十地為無學別圓約有功用無功用明有學無學二比丘尼衆摩訶波闍波提比丘尼與眷屬六千人俱此名大愛道亦名憍曇彌此翻衆主尼者出家女也羅睺羅母耶輸陀羅比丘尼亦與眷屬俱此云華色亦云名聞以子標母故云羅睺羅母在家為菩薩之妻天人知識出家為尼衆主位居無學即名聞也二菩薩衆六初氣類菩薩摩訶薩具云菩提薩埵摩訶薩埵什師略去提埵二字菩提云道薩埵云心摩訶云大此大道心氣類也二大數八萬人餘經集衆甚多此經少者語其大數耳觀心釋約十法界性相十善具萬法約八正道即八萬法門也三階位皆於阿耨多羅三藐三菩提不退轉阿耨多羅此云無上三藐此云正又三云遍菩提云知即無上正遍知不退轉者約位行念論之應歷四教各有三今略論圓教位行念如初住得一身無量身具三不退是也然此不退轉者意兼兩向今且從上釋應以此句貫通十三句下文釋之若成上即顯階位若向下即成歎德以對初歡喜地喜其不退墮二邊入于中道三不退也四歎德一十二句皆得陀羅尼此下十二句連上不退轉一句作橫豎二意釋豎約十地橫約初住上文不退轉一句已對初歡喜地釋矣此皆得陀羅尼者歎第二離垢地此地亦名離達是遮離諸惡達持衆善即總持義樂説辨才歎第三發光地內智既明外説則辨轉不退轉法輪歎第四炎慧地以由炎能破暗又能焦炷轉法輪自害己惑如焦炷也破他迷妄如除暗也供養無量百千諸佛歎第五難勝地得深禪定用神通力難勝難及於一念頃遍至十方供養諸佛於諸佛所植衆德本歎第六現前地得深禪定能供諸佛福德所資種智現前智是德本如植種於地常為諸佛之所稱歎歎第七遠行地二智方便出過一切廣修利益稱會佛心以慈修身歎第八不動地正智不動不出三界以慈薰身應入五道薰口為説諸法薰心為設方便者也善入佛慧歎第九善慧地深入實際妙徹本源通達大智歎第十法雲地法身如虗空禪定如大雲智慧如大雨到於彼岸歎十地內德到於三諦之彼岸名稱普聞無量世界歎十地外德由內德深廣而聲名普聞能度無數百千衆生餘地度人或一界至九界不名能度十地勝前故能度也諸地歎德以豎義已釋次約橫義歎約初住一位説之餘住例然所謂初發心住一發一切發出過二邊革凡超聖入于中道其心寂滅是不退轉也初句既爾餘十二句歎德例然且初住歎功德更有不可思議二住已去乃至等覺亦復如是五列名其名曰文殊師利菩薩此云妙德大經云了了見佛性猶如妙德等在北方常喜世界號歡喜藏摩尼寶積如來新譯云曼殊室利此翻云妙吉祥也觀世音菩薩天竺云婆樓吉泜稅思益云若衆生見者必定得菩提稱名者得脫衆苦悲華云若有衆生受苦稱我名念我者為我天眼天耳所見所聞不得免苦不取正覺也得大勢菩薩思益云我投足之處震動三千大千世界及魔宮殿常精進菩薩大寶積云是菩薩為一切衆生經無量劫隨逐不捨或不受化而無一念棄捨不休息菩薩思益云恆河沙劫為一日一夜是三十日為月十二月為年過百千萬億劫得值一佛如是值恆河沙佛行諸梵行修習功德然後受記心不休息故名耳寶掌菩薩普超三昧經云被上德鎧乃至於佛無能沮敗令釋大乘若於夢中不志二乘常以實心諸通慧心為人講宣於諸珍寶心無吝惜故名寶掌耳藥王菩薩悲華云願賢劫一千四佛初成道時我皆供養諸佛入滅我皆起塔劫盡苦惱我皆救護刀兵疾疫作大醫王然後作佛寶藏佛言字汝為火淨藥王在後作佛即樓至如來也勇施菩薩世間內外財出世無上法財悉能遍施勇敢無惜寶月菩薩尊貴如寶種智圓明清涼如月月光菩薩分證中道智光能破昏暗使之頓明滿月菩薩百福嚴備妙相圓明如月滿故大力菩薩境智冥合拔苦與樂勝諸偏小無量力菩薩本高迹下力大用深普救遍提越三界菩薩妙悟千如洞遣百非超世出世跋陀婆羅菩薩此云善守亦云賢守思益云若衆生聞名者必定得三菩提彌勒菩薩此云慈氏思益云若衆生見者即得慈心三昧是菩薩現居知足內院當來出興于堪忍補釋迦之處號彌勒世尊於華林園內龍華樹下而成正覺寶積菩薩分證三德尊貴如寶名寶圓融微妙名積導師菩薩於墮邪道衆生生大悲心令入正道不求恩報故名六結如是等菩薩摩訶薩八萬人俱三雜衆八初欲界天爾時釋提桓因與其眷屬二萬天子俱復有名月天子月天普香天子星天寶光天子日天子皆帝釋內臣四大天王與其眷屬萬天子俱即帝釋外臣如武將護世金光明四天王品爾時提頭賴叱毗留勒叉毗留博叉毗沙門始自東方終于北方自在天子化樂天也大自在天子他化自在天乃欲天主也與其眷屬三萬天子俱二色界天娑婆世界主梵天王尸棄大梵標梵王又尸棄似二人今舉位顯名目一人耳初禪有梵衆梵輔大梵今舉王攝諸光明大梵等與其眷屬萬二千天子俱光明者二禪也此有少光無量光極光等者三禪三天四禪九天即是色界十八梵天也三龍王有八龍王難陀龍王跋難陀龍王難陀此云歡喜跋此云善即兄弟二龍護摩竭提雨澤以時國無飢年即目連所降者娑伽羅龍王此云鹹海從居海受名此如華嚴云本住智度大海迹處滄溟和修吉龍王此云多頭亦云寶稱德叉迦龍王此云現毒亦云多舌阿那婆達多龍王從池得名此云無熱阿含云雪山有池名阿耨達池其中有五柱堂龍常居此龍有三患一熱風熱沙著身燒皮肉二惡風暴起吹其宮殿失寶飾等龍身自現以為苦惱三諸龍娛樂時金翅鳥王入宮搏撮始生龍子諸龍恐怖今此池無彼三患若鳥欲起心往便即命終故云無熱惱也摩那斯龍王此云大身或大力大意本住無邊身法門迹為大體優鉢羅龍王等各與若干百千眷屬俱亦云漚鉢羅此云黛色蓮華龍依此住從池得名四緊那羅有四緊那羅王法緊那羅王妙法緊那羅王大法緊那羅王持法緊那羅王各與若干百千眷屬俱此云疑神似人而有一角故號人非人天帝法樂神四緊奏四教法門之樂讚佛也五乾闥婆有四乾闥婆王樂乾闥婆王樂音乾闥婆王美乾闥婆王美音乾闥婆王各與若干百千眷屬俱此云嗅香以香為食亦云香陰其身出香此天帝俗樂之神也六阿修羅有四阿修羅王婆稚阿修羅王佉羅騫馱阿修羅王毗摩質多羅阿修羅王羅睺阿修羅王各與若干百千眷屬俱此云無酒四天下採華釀于大海魚龍業力其味不變嗔妬誓斷故云無酒婆稚此云被縛五惡物繫頭不解脫故亦云為天帝所縛故佉羅騫馱此云廣肩胛毗摩質多羅此云淨心羅睺此云障持即障持日月也舉手障日世謂日蝕掩月亦爾或作大聲世言天獸吼氣呵日月失光來訴於佛佛告羅睺莫吞日月羅睺顫動身流白汗即放日月佛力衆生力不能為害七迦樓羅有四迦樓羅王大威德迦樓羅王大身迦樓羅王大滿迦樓羅王如意迦樓羅王各與若干百千眷屬俱迦樓羅此云金翅翮作金色兩翅相去三百三十六萬里居瞻部大樹上莊子呼為大鵬也八人衆韋提希子阿闍世王與若干百千眷屬俱韋提希此云思惟即阿闍世之母也阿闍世亦云未生怨或呼為婆留支此云無指內人將護呼為善見大經云阿闍名不生世名怨以不見佛性故煩惱怨生普超云阿闍世從文殊懺悔得柔順忍命終入賓吒羅地獄即入即出生上方國土得無生忍彌勒出時復來名不動菩薩後當作佛號淨界如來二總結衆集各禮佛足退坐一面退坐一面總結衆集作禮退坐而聽法也疏問云佛在人中説法今列人衆何少答文略不載人實不少如下文云及諸小王轉輪聖王等第二別序五初衆集序二現瑞序三疑念序四發問序五答問序初文又二初衆集威儀爾時世尊四衆圍繞別序者望通而得名也爾時者欲現六瑞之時也世尊者福慧具足世出世間尊無過上四衆者舊言在家出家各二合為四衆今約一衆更開為四謂發起當機影響結緣也權謀智鑒知機知時激揚發動成辦利益等者名發起夙植德本緣合時熟如癰欲潰不起于座聞即得道此名當機往古諸佛隱其圓極匡輔法王如星繞月雖無作為而有巨益此名影響力無引導激動之能德非伏物鎮嚴之用而過去根淺覆漏汙雜三慧不生雖現世見佛聞法而無四悉檀益但作未來得度因緣此名結緣比丘既爾餘三衆亦然是則合為一十六衆矣圍繞者約因緣釋佛初出世人未知法淨居天下化為人像到已右旋旋已敬禮禮已却坐聽法因於天敬而人用為式焉約教者行旋威儀表四門機動俱見圓理以圓對偏例有四義約觀心者佛身周匝相好莊嚴四旋瞻仰增念佛定約本迹者若觀色身即見法身也二衆集供養供養恭敬尊重讚歎通語三業皆是供養別卑謹虔禮為恭敬至心專注為尊重發言稱美為讚歎施其依報為供養二現瑞序二初此土六瑞六初説法為諸菩薩説大乘經名無量義教菩薩法佛所護念大乘者善戒經有七大一法大謂十二部二心大謂求菩提也三解大謂解菩薩藏四淨大謂見道淨心五莊嚴大謂福德智慧六時大謂三阿僧祇行行七具足大謂相好自嚴得菩提也六因也七果也以大因大果合為大乘也名無量義者經云從一法生其一法者謂無相無相不相名為實相從此實相生無量法所謂二法三道四果言無相者無生死相也不相者不涅槃相即指中道為實相也二法者頓漸二也三道即三乘四果即羅漢支佛菩薩佛也此等諸法名為無量即指實相為義處耳教菩薩法者以此無量義處用教菩薩法義處即諦理也文云盡教以佛道是也佛所護念者以由無量義處是佛自證得是故護念雖欲開示衆生根鈍而久默斯要不務速説者是名護念二入定佛説此經已結跏趺坐入於無量義處三昧身心不動入三昧者慧定相成非禪不智須先入定非智不禪故先説法即智而定即定而智先後出入無有隔礙也説經已更入定者是為法華作序耳若不先開則後無所合所以先入開定為合定作序名為瑞相也若作次第説者先入無量義處三昧已應入法華三昧若明言彰顯時衆則知何待彌勒殷勤文殊靳固是知作序明矣身心不動者與所緣處相應也其身之本源湛若虗空心之理性畢竟常寂所以稱無量義處者此定寂而常照故知世出世間從此一法出無量法也三雨華是時天雨曼陀羅華摩訶曼陀羅華曼殊沙華摩訶曼殊沙華而散佛上及諸大衆曼陀羅此云適意又云白華曼殊沙此云柔軟又云赤華雨此四華者表其當獲佛因佛因者住行向地圓因也小白表銅輪習種性十住開佛知見大白表銀輪性種種十行示佛知見小赤表金輪道種性十回向悟佛知見大赤表琉璃輪聖種性十地入佛知見也此四輪之因從中道生所以從天雨華而表之以因有趣果之義故云散佛上如此因果誰當感尅只是此會時衆故言及諸大衆四地動普佛世界六種震動此表圓家六番破無明也無明若轉即變為明故普佛世界六種震動六種表住行向地等妙六番也六種者謂動起踊震吼覺六也一一有三謂動三者動遍動等遍動也起三者謂起遍起等遍起也踊三者踊遍踊等遍踊也震三者震遍震等遍震也吼三者吼遍吼等遍吼也覺三者覺遍覺等遍覺也此十八種表破十八界也搖揚不安為動自下升高為起𡑝隴凹凸為踊隱隱聲為震聲大名吼悟物名覺也五衆喜爾時會中比丘比丘尼優婆塞優婆夷天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人及諸小王轉輪聖王是諸大衆得未曾有歡喜合掌一心觀佛今但列四衆者當機也今略菩薩者影響也小王者即世主如輪王也應知雨華地動是外瑞也大衆心喜是內瑞也知甘露將降是以欣躍內充此非常喜也故能一心觀佛安得非瑞若喜動陰心者人天義也喜動真諦無漏心者藏通義也喜動即假心者別義也喜動實相心者圓義也比丘翻除饉男比丘尼翻除饉女優婆塞翻清信男優婆夷翻清信女六放光爾時佛放眉間白毫相光照東方萬八千世界靡不周遍放光即表應機設教破惑除疑也白毫者具種種功德其毫中表俱空狀如白琉璃筒內外清淨從初發心行行至涅槃一切功德皆現毫中矣毫在二眉中間表中道常其相柔軟表樂卷舒自在表我白即表淨也放光破暗表其中道生智慧光照此土他土者表自覺覺他也照東方者東為方之始表十住是位之始也是以迹門説法生身菩薩朗然見理入於十住開佛知見舉初即知中後也故云靡不周遍耳所言遍者諸方亦然諸位亦然若就本門説法四方佛集即表本門法身菩薩增道損生四位增長也二他土六瑞六初見六趣下至阿鼻地獄上至阿迦尼吒天於此世界盡見彼土六趣衆生阿鼻此云無間在地之下也阿迦尼吒此云質礙究竟即色究竟天從地獄至有頂即是六凡又見佛菩薩比丘等則十法界具足矣二見諸佛又見彼土現在諸佛彼佛現在此佛亦然明彼此二土佛皆出世間三聞佛説法及聞諸佛所説經法是現彼佛初從無相一法非頓而頓與此土初説華嚴同四見四衆得道并見彼諸比丘比丘尼優婆塞優婆夷諸修行得道者是現彼佛非漸而漸與此土佛次説三藏意同五見菩薩行行復見諸菩薩摩訶薩種種因緣種種信解種種相貌行菩薩道是現彼佛説三藏後説方等般若諸經與此土佛三藏之後所説意同也種種因緣者昔善為因今教為緣種種相貌者共不共各四門一一門復有無量相貌如五百比丘各説身因即共義也不共四門亦如是故知因緣相貌種別無量皆是彼與此同六見佛涅槃復見諸佛般涅槃者復見諸佛般涅槃後以佛舍利起七寶塔是現彼土開權顯實收無量法還歸一法唱入涅槃息化起塔當知此土從一出無量法必當收無量法還入一法開權顯實息化歸真與彼同也三疑念序二初彌勒疑念三初念六瑞爾時彌勒菩薩作是念今者世尊現神變相以何因緣而有此瑞神變者神名天心天然內慧變名變動即是六瑞外彰首楞嚴云佛住不二法能作於神通法王法力超蓋一切彌勒不測神變故興疑念又彌勒值佛植善既多何容不髣佛知應須隱明權言不知二念問誰今佛世尊入于三昧是不可思議現希有事當以問誰誰能答者三念問文殊復作此念是文殊師利法王之子已曾親近供養過去無量諸佛必應見此希有之相我今當問問經稱文殊是法王子此諸菩薩何人不是法王之子答有二義故一於王子中德推文殊二諸經中文殊並為菩薩衆首二大衆疑念二初念六瑞爾時比丘比丘尼優婆塞優婆夷及諸天龍鬼神等咸作此念是佛光明神通之相二念問誰今當問誰問文殊彌勒德位相亞何故一問一答耶答位雖齊等賓主異宜聖人乘機非問者不能答也又法門有權實權者須問實者須答又迹有久近近問久答又名有便易彌勒名慈慈為衆生應須問文殊名妙德德應須答此即四種消文記云此諸大衆遍歷多會久知文殊神用莫測衆亦精誠專注妙德四發問序二初長行二初經家述二初述自疑爾時彌勒菩薩欲自決疑二述他疑又觀四衆比丘比丘尼優婆塞優婆夷及諸天龍鬼神等衆會之心二發問二初問此土而問文殊師利言以何因緣而有此瑞神通之相放大光明二問他土照于東方萬八千土悉見彼佛國界莊嚴二偈頌二初頌上問二請答初文又二初問此土六瑞於是彌勒菩薩欲重宣此義以偈問曰長行之後復有偈頌者龍樹毗婆娑云一隨其國土天竺有散華貫華之説二隨其樂欲不同有樂散説有樂章句三隨其生解不同或散説得解或於章句得解四隨其利鈍不同利者一聞即悟鈍者再説始明五表佛殷勤重説乃至十為衆集前後故具茲多義故有偈也文殊師利道師何故眉間白毫大光普照雨曼陀羅曼殊沙華栴檀香風悅可衆心以是因緣地皆嚴淨而此世界六種震動時四部衆咸皆歡喜身意快然得未曾有總問此土六瑞此偈中長出香風地淨而無説法入定者導師是也良以説法入定能導於人即是説法入定也風本無香而香為奇以成瑞耳天華至妙豈有色而無香此表因運至果如華有香風華既集地地則嚴淨因若趣果果則嚴淨光明云聚集功德莊嚴佛身故以二事顯成四華也二問他土六瑞六初問六趣眉間光明照于東方萬八千土皆如金色從阿鼻獄上至有頂諸世界中六道衆生生死所趣善惡業緣受報好醜於此悉見衆生是能趣之人生死是所趣之處善惡業緣是趣因受報好醜是趣果也二問見彼佛説法又覩諸佛聖主師子演説經典微妙第一其聲清淨出柔軟音教諸菩薩無數億萬梵音深妙令人樂聞各於世界講説正法種種因緣以無量喻照明佛法開悟衆生上直見佛此廣明説法之相謂説頓教逗大根性聖主師子如此土盧舍那像也演説經典微妙第一如此土日照高山演華嚴也教諸菩薩如此土七處八會無聲聞人也照明佛法開悟衆生如此土始見佛身入如來慧也三問他土衆三初開聲聞乘若人遭苦厭老病死為説涅槃盡諸苦際若遭苦厭集復厭依果感佛説涅槃者此人則能盡諸苦際耳二開中乘若人有福曾供養佛志求勝法為説緣覺若供養佛多雖遭苦而致福故云聲聞三生種福支佛百劫種福形彼聲聞故言有福志求勝法者支佛求道故修行深求緣起勝妙之理即是他土開中乘也三開大乘若有佛子修種種行求無上慧為説淨道運真慈悲能紹佛種故言佛子修於六度故言種種行志求佛道故言無上慧於六度中無其六蔽如藥中無病故言淨道非畢竟淨也四結前開後文殊師利我住於此見聞若斯及千億事如是衆多今當略説見聞若斯即結前也如是衆多是開後也五問他土菩薩修行三初總問我見彼土恆沙菩薩種種因緣而求佛道二次第問六初問檀三初問捨財或有行施金銀珊瑚真珠摩尼硨磲碼瑙金剛諸珍奴婢車乘寶飾輦輿歡喜布施回向佛道願得是乘三界第一諸佛所歎或有菩薩駟馬寶車欄楯華蓋軒飾布施珍寶奴婢為施者貴賤共能也若駟馬寶車者則王者所施以此行檀故云布施二問捨身復見菩薩身肉手足及妻子施求無上道身肉等內身妻子等外身三問捨命又見菩薩頭目身體欣樂施與求佛智慧捨頭目即捨命也而不言法施者讓後般若故也又約身命財與生死後際等得不壞常住即是法施二問戒文殊師利我見諸王往詣佛所問無上道便捨樂土宮殿臣妾剃除鬚髮而被法服在家施易而戒難出家戒易而施難故約比丘明戒記云往詣者表往非餘故詣佛所所問尊極故云無上道所捨不輕故云樂土身心俱離故云剃除如五王經云昔有五王互為親友有一王名普安習菩薩行餘四王邪見熾盛普安愍之呼來殿上七日娛樂送之還國大王自送半途問之曰卿等各何所樂四王各言世間之樂已回問王何所樂王答曰我所樂者不生不滅不苦不樂存亡自在四王問曰如此之樂何所有耶王曰吾師號佛近在祇洹諸王歡喜俱詣佛所佛説八苦王及侍從百千萬人得須陀洹捨國入道而被法服者如瓔珞經云此袈裟衣龍得一縷則金翅不吞明如僧祇律三問忍或見菩薩而作比丘獨處間靜樂誦經典忍有三種而作比丘即苦行忍獨處間靜即生忍樂誦經典即第一義忍四問精進又見菩薩勇猛精進入於深山思惟佛道夫深山可畏非窳怯者所居唯勇進者能安之傍若無物思修實相念念不休進求佛道五問禪二初問修根本禪藏通又見離欲常處空間深修禪定得五神通通途皆有根本之修也離欲得五通者此通教定也別教兼離二乘欲中道又離順道法愛欲深修者初禪一品乃至九品傳傳為深轉變自在能發諸通凡夫五通二乘六通別教菩薩讓佛分有無漏亦稱五通圓教初後皆具六通二問出世上上禪別圓又見菩薩安禪合掌以千萬偈讚諸法王安禪偈讚者是別圓上上禪寂散不相妨所以不起滅定現諸威儀如修羅琴不拊而韻無緣無念有感則形六問般若二初問自行復見菩薩智深志固能問諸佛聞悉受持智深慧窮理本也志固者誓願廣大也即二種莊嚴能問能持也二問化他又見佛子定慧具足以無量喻為衆講法欣樂説法化諸菩薩破魔兵衆而擊法鼓未到慧多無色定多四禪等又背捨慧多九定定多十一切處中等又二乘定多菩薩慧多於佛則等破魔者空觀破四魔假觀次第破八魔中觀圓破八魔十魔一切魔擊鼓者初發心便成正覺分身百佛界作佛圓擊梵輪法鼓三不次第問七初問禪二一問入捨禪又見菩薩寂然宴默天龍恭敬不以為喜二問入悲禪又見菩薩處林放光濟地獄苦令入佛道次第問者是漸一途不次第問不定一途今初一行問入捨禪即是自行記云捨禪者第四禪也亦可別圓忘懷之捨忘彼禪故名捨次一行入悲禪即是化他然菩薩入定放光種種利益具出華嚴思益也婆娑云初禪修悲易二禪修喜易三禪修慈易四禪修捨易此慈悲喜捨四禪名為四無量心是菩薩行也二問精進又見佛子未嘗睡眠經行林中勤求佛道即是般舟念佛等法門耳般舟翻佛立此舉除睡中最以九十日常行故也未嘗睡眠精進可知三問戒又見具戒威儀無缺淨如寶珠以求佛道威儀無缺即初不缺戒淨如寶珠即第十究竟戒此於十戒中舉其初後十戒名出大論大經四問忍又見佛子住忍辱力增上慢人惡罵捶打皆悉能忍以求佛道問生法二忍也阿含云力有六種一小兒啼為力二女人瞋為力三國王憍為力四羅漢進為力五諸佛悲為力六比丘忍為力也五更問禪又見菩薩離諸戲笑及癡眷屬親近智者一心除亂攝念山林億千萬歲以求佛道除五蓋也離戲笑是却掉悔蓋離癡眷屬是除瞋蓋親近智者是除疑蓋一心除亂是除貪蓋攝念山林是除眠蓋六問檀二初明四事施或見菩薩肴膳飲食百種湯藥施佛及僧名衣上服價直千萬或無價衣施佛及僧千萬億種旃檀寶舍衆妙臥具施佛及僧清淨園林華果茂盛流泉浴池施佛及僧二結成施如是等施種種微妙歡喜無厭求無上道前三行正明四事施謂飲食衣服臥具湯藥也第四行施園林等第五行結成所施之意名衣者阿含云迦葉出家時選擇家中最下衣裳得一弊衣其價直十萬兩金作僧伽梨衣肴𦵔也膳美食也七問般若三初不可説而説般若或有菩薩説寂滅法種種教詔無數衆生二不可觀而觀般若或見菩薩觀諸法性無有二相猶如虗空三而説而觀論般若又見佛子心無所著以此妙慧求無上道此三行科文已明第三一行言語道斷心行所滅即説不可説觀不可觀而論般若也六問涅槃六初總標起塔文殊師利又見菩薩佛滅度後供養舍利二塔數又見佛子造諸塔廟無數恆沙嚴飾國界三塔量寶塔高妙五千由旬縱廣正等二千由旬四塔相一一塔廟各千幢幡珠交露幔寶鈴和鳴五供養諸天龍神人及非人香華伎樂常以供養六總結文殊師利諸佛子等為供舍利嚴飾塔廟國界自然殊特妙好如天樹王其華開敷今見他土佛般涅槃佛子慕德為樹塔廟即表無量悉歸一也梵云塔婆此云方墳樹王者即波利質多正供舍利傍嚴佛國土天龍伎樂等者以塔藏身界故供養者福大不同殿堂形貌安處長阿含云佛臨滅時有梵摩比丘在佛前執扇扇佛佛却去之阿難思念此比丘常隨侍佛今末後乃却之者云何佛告阿難今俱尸城十二由旬天神畟塞諸天神等皆欲供養而此比丘有大威德光明映蔽使不近近是故令却阿難問以何因緣故有是身光佛言昔於毗婆尸佛時以歡喜心手執火炬照彼佛塔由是福光明乃爾火照既爾餘皆準知二請答二初舉疑事述請三初舉見此土事佛放一光我及衆會見此國界種種殊妙二舉見他土事諸佛神力智慧希有放一淨光照無量國初舉此土事以白毫為本故先舉及諸事故言種種二他土事以諸佛為本總攝餘五瑞三請答決衆疑我等見此得未曾有佛子文殊願決衆疑二釋四伏難二初正釋四衆欣仰瞻仁及我世尊何故放斯光明連下三行釋四伏難者文殊內心構難不肯時答其意有三一此瑞希奇不可倉卒輕爾有判二智衆如海謙光推高三靳固前却生衆渴仰故以伏難潛而拒之彌勒彰灼釋難意亦有三一瑞大疑大若不為釋憂兕在懷妨聞正説二衆海乃多機在仁者三闔衆瞻仁故知注誠殷重所以彰言釋難請令時答初伏難者因正請生請云佛子文殊願決衆疑文殊仍此起初伏難汝云衆疑衆未曾疑若疑應問衆既不疑我何所決彌勒即以第一偈釋云四衆欣仰瞻仁及我及我欲令我問瞻仁欲得仁答佛子時答決疑令喜何所饒益演斯光明文殊因此又起第二難衆同有疑不易可答待佛出定然後決疑彌勒即以第二偈釋若有疑在懷憂兕不泰應以時答復知如來何時定起佛坐道場所得妙法為欲説此為當授記文殊因此又起第三難我與仁者同居學地欲測佛意微共籌量獨令我答於理不可彌勒即以第三偈釋我亦微心下思踟蹰兩楹為説妙法為當授記故言佛坐道場乃至為當授記示諸佛土衆寶嚴淨及見諸佛此非小緣文殊因此起第四難若如汝説即是釋疑何煩我答彌勒即以第四偈釋安得以我猶豫之心而判大事故言示諸佛土此非小緣文殊伏難既窮謙光亦止後一偈結請答也此四伏難者昔光宅受於次師次師受於江北釗音昭師既是先賢文外巧思故今用之下文文殊決答於偈後分明判答處即斷此四伏疑其意例然二結請文殊當知四衆龍神瞻察仁者為説何等五答問序二初長行二偈頌初文又四初惟忖答二初標章爾時文殊師利語彌勒菩薩摩訶薩及諸大士善男子等如我惟忖惟思忖量也惟今如昔忖昔如今然文殊古佛豈應不知迹示思惟也二正惟忖今佛世尊欲説大法雨大法雨吹大法螺擊大法鼓演大法義欲説大法者答説法瑞雨大法雨者答雨華瑞吹大法螺者答大衆心喜瑞擊大法鼓者答地動瑞演大法義者答放光瑞欲説大法者惟昔諸佛説無量義後則開權顯實收無量而歸于一忖於今佛既説法已亦應開權顯實會無量以歸一一者即大法也雨大法雨者惟昔諸佛雨華之後普入圓因住行向地忖於今佛亦然吹大法螺者惟昔四衆見瑞歡喜得未曾有鄣除機動即改人行教理皆一忖今衆喜亦然擊大法鼓者惟昔地動已後即有六番破無明賊忖於今佛亦然聲教極妙故演大法義者惟昔諸佛放白毫光後即説法華忖於今佛亦然廣明五佛道同既是佛道故言演大法義也唯少入定一瑞然而五瑞莫不皆由入定意則兼含矣又別釋欲説大法是總下四句是別雨吹擊演開示悟入以對住行向地是也初如種子得雨萌開開於十住佛知見次如吹螺改號得十住聞法改入十行示佛知見三如擊鼓戒兵從十行聞法改入十向悟佛知見也演之言布橫竪廣深乃展演之義在十向聞法入於十地入佛知見窮源盡邊深廣備足矣也二略曾見答諸善男子我於過去諸佛曾見此瑞放斯光已即説大法是故當知今佛現光亦復如是欲令衆生咸得聞知一切世間難信之法故現斯瑞初以己智惟忖今以略曾見答他土問也今見如昔昔秪如今欲令衆生聞知者即是聞思兩慧亦是信法兩行三廣曾見答三初引一佛同三初明時節諸善男子如過去無量無邊不可思議阿僧祇劫彌勒因光橫見以問文殊引昔竪見以答如過去劫既云無量無邊是則不可思議矣二標名爾時有佛號日月燈明如來應供正遍知明行足善逝世間解無上士調御丈夫天人師佛世尊標名同者其通號同也日是慧月是定定慧是自行德燈明是化他德又日月燈是三智今佛亦三智故言同耳記云通號者應身皆具十號故名為通法身望應亦得義立吾今此身即是法身故應號即法號也然釋法號須從法立如止觀云乘無二智來契正覺即名如來以無二理遍入諸法名應供了不二智智體無偏名正遍知知無二法互通法界雖無來往遍入三世名明行足無二之法性冥三德名善逝理遍一切具三世間名世間解能解此理無復有過上名無上士解此理故能調難調調十法界名調御了法界法名丈夫契此理故一切宗仰過於人天之上名天人師覺此理故名之為佛達此理故而為三世之所敬故名世尊三説法三初始説頓教同演説正法初善中善後善其義深遠其語巧妙純一無雜具足清白梵行之相初開頓教大乘七善也初中後善者即是頓教序正流通名為時節善其義深遠則頓教了義之理此名為義善其語巧妙即頓教八音所吐也會理直説悅菩薩心此名為語善純一無雜者不與二乘共即是頓教獨一善具足者明界內外滿字法即頓教圓滿善清白者無二邊瑕穢即頓教調柔善南嶽云是行善耳梵行之相即頓教無緣慈善二頓後開漸同為求聲聞者説應四諦法度生老病死究究涅槃為求辟支佛者説應十二因緣法為諸菩薩説應六波羅蜜四諦法即是古佛於頓後開漸與今同答上問為説涅槃也十二因緣者答上問為説緣覺也説六波羅蜜者答上問修種種行也三開權顯實同令得阿耨多羅三藐三菩提成一切種智此明古佛開頓漸後即顯實之説也始終究竟此答彌勒見他土佛般涅槃涅槃後起塔之問也二引中二萬佛同次復有佛亦名日月燈明次復有佛亦名日月燈明如是二萬佛皆同一字號日月燈明又同一姓姓頗羅墮彌勒當知初佛後佛皆同一字名日月燈明十號具足所可説法初中後善初引一佛備舉頓漸説法同中引二萬佛但舉説頓同故言初中後善後引一佛但舉開漸同所以然者互舉耳指前可知姓頗羅墮者即婆羅門十八姓中一姓也本行集翻名重幢三引最後一佛同三初曾見事與今已同其最後佛未出家時有八王子一名有意二名善意三名無量意四名寶意五名增意六名除疑意七名響意八名法意是八王子威德自在各領四天下是諸王子聞父出家得阿耨多羅三藐三菩提悉捨王位亦隨出家發大乘意常修梵行皆為法師已於千萬佛所植諸善本昔佛八子今佛一子數雖不等並出同居之土土有見思俱示有子有子事同一八赴緣別有所表生一子表一道清淨生八子表八正道數異義同二曾見事與今今同二初現相同二初明此土六瑞是時日月燈明佛説大乘經名無量義教菩薩法佛所護念説法同説是經已即於大衆中結跏趺坐入於無量義處三昧身心不動入定同是時天雨曼陀羅華摩訶曼陀羅華曼殊沙華摩訶曼殊沙華而散佛上及諸大衆雨華同普佛世界六種震動地動同爾時會中比丘比丘尼優婆塞優婆夷天龍夜叉乾闥婆阿修羅迦樓羅緊那羅摩睺羅伽人非人及諸小王轉輪聖王等是諸大衆得未曾有歡喜合掌一心觀佛衆喜同爾時如來放眉間白毫相光照東方萬八千佛土靡不周遍放光同二明他土六瑞如今所見是諸佛土總云如今所見則知昔佛他土六瑞亦與今同二疑念同彌勒當知爾時會中有二十億菩薩樂欲聽法是諸菩薩見此光明普照佛上得未曾有欲知此光所為因緣爾時會中菩薩疑念即與今彌勒同二曾見事與今當同六初因人同時有菩薩名曰妙光有八百弟子昔佛定起因妙光菩薩説經今佛定起因身子説經即是所因人同也昔佛八子師於妙光如來定起對告妙光又付託妙光今佛子羅云亦師身子今佛從定起亦對告身子至迹門竟又付託身子是則古今與同矣疑者云妙光是菩薩身子是聲聞此云何同須知昔事已彰稱為菩薩今事未發且言聲聞比及發迹身子是大菩薩非同何謂昔妙光垂迹何必不作聲聞特是文殊巧説方便隱顯耳二説法名同是時日月燈明佛從三昧起因妙光菩薩説大乘經名妙法蓮華教菩薩法佛所護念説經名同即妙法同耳也三時節同六十小劫不起于座時會聽者亦坐一處六十小劫身心不動聽佛所説謂如食頃是時衆中無有一人若身若心而生懈倦四唱滅同日月燈明佛於六十小劫説是經已即於梵魔沙門婆羅門及天人阿修羅衆中而宣此言如來於今日中夜當入無餘涅槃昔佛説法華即時唱入滅亦如迦葉佛以土淨故於法華唱滅即入滅也今佛説寶塔品中明如來不久當入涅槃化導已畢唱滅事齊也五授記同時有菩薩名曰德藏日月燈明佛即授其記告諸比丘是德藏菩薩次當作佛號曰淨身多陀阿伽度阿羅訶三藐三佛陀昔佛授德藏菩薩記今佛授身子聲聞記豈得是同昔事已成故言菩薩記正是會三歸一聲聞得記也若説昔授聲聞記者佛從定起更何所論此蓋文殊巧談故不發迹耳不發迹者明所隱意意待定記耳多陀阿伽度此云如來阿羅訶此云應供三藐三佛陀此云正遍知此十號中舉其三也淨名云若我分別此三者窮劫不盡六滅後通經同五初明時節佛授記已便於中夜入無餘涅槃二出其人佛滅度後妙光菩薩持妙法蓮華經三明久近滿八十小劫為人演説四明所化衆二初明已成弟子日月燈明佛八子皆師妙光妙光教化令其堅固阿耨多羅三藐三菩提是諸王子供養無量百千萬億佛已皆成佛道其最後成佛者名曰然燈已成即八子行成久已得佛二明當成弟子八百弟子中有一人號曰求名貪著利養雖復讀誦衆經而不通利多所忘失故號求名是人亦以種諸善根因緣故得值無量百千萬億諸佛供養恭敬尊重讚歎引八子八百者近則釋疑密開壽量釋疑者或謂彌勒是補處為大文殊非補處為小小不應答大不應問故舉八百宜應有問也妙光昔親對佛先又為師所以釋疑非謬密開壽量者八子最小得成佛號曰然燈即是定光妙光即是文殊是釋迦九世祖師孫今成佛祖為弟子師弟無定將密顯生非生滅非滅之意也問彌勒昔見諸佛曾聞法華今何疑問答時衆機宜應須扣發耳妙樂云九代祖師者若據八子皆師妙光得妙光居八代之首八子最後名然燈然燈既為釋迦之師是故妙光為九代祖也生非生等者既師弟更互當知師弟之生實非生爾前曾滅實非滅也必久曾證非生非滅常住之理故今迹示生滅耳又迹難測故生非生本理妙故滅非滅本迹雖殊不思議一也五結會古今彌勒當知爾時妙光菩薩豈異人乎我身是也求名菩薩汝身是也四分明判答今見此瑞與本無異是故惟忖今日如來當説大乘經名妙法蓮華教菩薩法佛所護念今昔六瑞既同惟忖決定不謬略曾廣曾皆決定也當説大乘者決定前云説法瑞也名妙法蓮華者決定前云雨華瑞也教菩薩法者決定前云衆喜瑞也佛所護念者決定前云地動瑞也兼總入定悉在其中矣二偈頌二初頌廣曾見答二初頌最初一佛同爾時文殊師利於大衆中欲重宣此義而説偈言我念過去世無量無數劫有佛人中尊號日月燈明世尊演説法度無量衆生無數億菩薩令入佛智慧二頌最後佛三同三初頌曾見事與今已同佛未出家時所生八王子見大聖出家亦隨修梵行二頌曾見事與今今同二初頌此彼六瑞同二初此土六瑞時佛説大乘經名無量義於諸大衆中而為廣分別佛説此經已即於法座上跏趺坐三昧名無量義處天雨曼陀華天鼓自然鳴諸天龍鬼神供養中尊一切諸佛土即時大震動佛放眉間光現諸希有事於中而長出天鼓自然鳴者表無問而自説也現諸希有事即總頌諸瑞二他土六瑞五初見六趣同此光照東方萬八千佛土示一切衆生生死業報處有見諸佛土以衆寶莊嚴琉璃頗梨色斯由佛光照及見諸天人龍神夜叉衆乾闥緊那羅各供養其佛三行為四初半行重頌總瑞次一句正舉六趣故云一切次一句總明生死因果及處生死兩字總標也業因報果處即二十有次一行明所依土前長行之文及問答中皆不云光色乃至此方云者前豈應無次一行明諸趣供養意表機成當知前亦非無也問既云莊嚴即是淨土那云道同耶答淨由光照元具六道淨土則無惡道之名故知非但色淨由光亦乃衆寶具足各供則指萬八千土二頌見佛同又見諸如來自然成佛道身色如金山端嚴甚微妙如淨琉璃中內現真金像自然成佛道者方便道則加心修習發真道即是自然任運與理合也又自然成佛道是報身琉璃是法身本淨金像是應物現形也三頌説頓同世尊在大衆敷演深法義此則將法約人法既深玄當知必運大機而開頓教此頌上純一無雜也四頌説三乘同一一諸佛土聲聞衆無數因佛光所照悉見彼大衆或有諸比丘在於山林中精進持淨戒猶如護明珠又見諸菩薩行施忍辱等其數如恆沙斯由佛光昭此即將人約法人既二乘必知開三藏説也是頌上為求聲聞者説應四諦法雖不頌出緣覺兼攝在中次二行頌上六度大乘也行施忍辱等等餘禪慧二度耳而以比丘為六度菩薩者前發問偈中既云又見菩薩而作比丘於此比丘為菩薩義亦無妨也五頌菩薩修行同又見諸菩薩深入諸禪定身心寂不動以求無上道又見諸菩薩知法寂滅相各於其國土説法求佛道二四衆疑念同爾時四部衆見日月燈佛現大神通力其心皆歡喜各各自相問是事何因緣頌昔佛四衆疑念如文可解也三頌曾見事與今當同六初頌因人同天人所奉尊適從三昧起讚妙光菩薩汝為世間眼一切所歸信能奉持法藏如我所説法唯汝能證知世尊既讚歎令妙光歡喜世間眼者言菩薩為世間出世間之眼目化導於人也二頌説法同説是法華經三頌時節同滿六十小劫不起於此座所説上妙法是妙光法師悉皆能受持此約難思延促劫智也妙光皆悉受持昔佛法也此亦如身子受佛付囑也四頌唱滅同四初唱滅佛説是法華令衆歡喜已尋即於是日告於天人衆諸法實相義已為汝等説我今於中夜當入於涅槃此是昔佛唱滅與今佛同尋繼二囑纍汝一心精進當離於放逸諸佛甚難值億劫時一遇此是昔佛囑纍亦與今佛同如遺教經云汝等比丘我滅度後當珍敬波羅木叉如暗遇明如貧得寶當知此則是汝等大師若我住世無異此也三悲泣世尊諸子等聞佛入涅槃各各懷悲惱佛滅一何速此時衆聞佛入滅而生悲泣亦與今佛同如大經云涕泣盈目遍體血現如波羅奢華此即重法慕人之志也四安慰聖主法之王安慰無量衆我若滅度時汝等勿憂怖此昔佛慰諭時衆亦與今佛同如遺教經云汝等比丘勿懷悲惱若我住世一劫二劫會亦應滅會而不離終不可得自利利人法皆具足若我久住更無所益例如今佛付彌勒其義見記五頌授記同是德藏菩薩於無漏實相心已得通達其次當作佛號曰為淨身亦度無量衆無漏實相謂圓妙三諦之法也無漏者收攝三諦無漏失也實相者離虗妄分別之相名為實相即無相之相也六頌滅後通經同五初頌滅後時節四衆得益佛此夜滅度如薪盡火滅分布諸舍利而起無量塔比丘比丘尼其數如恆沙倍復加精進以求無上道薪盡火滅者大小乘中各自不同小乘佛以果報身為薪智慧為火慧依報身身滅智亡大乘佛以機為薪逗應為火衆生機盡應形亦亡倍復加精進者應以滅度度者也二頌能弘經人是妙光法師奉持佛法藏三頌弘經時節八十小劫中廣宣法華經四頌所益弟子二初頌已成弟子是諸八王子妙光所開化堅固無上道當見無數佛供養諸佛已隨順行大道相繼得成佛轉次而授記最後天中天號曰然燈佛諸仙之導師度脫無量衆二頌當成弟子是妙光法師時有一弟子心常懷懈怠貪著於名利求名利無厭多遊族姓家棄捨所習誦廢忘不通利以是因緣故號之為求名亦行衆善業得見無數佛供養於諸佛隨順行大道具六波羅蜜今見釋師子其後當作佛號名曰彌勒廣度諸衆生其數無有量五結會古今彼佛滅度後懈怠者汝是妙光法師者今則我身是三頌分明判答三初頌説大乘經我見燈明佛本光瑞如此以是知今佛欲説法華經此頌説經科文已見又前彌勒釋四伏難令文殊決定有答此中是文殊斷四伏疑令彌勒莫復更問初第一疑因文殊廣引先佛曾説法華故彌勒潛疑欲問諸佛赴緣人時各異古佛雖名法華今佛何必如此文殊即以此第一偈斷云我見燈明佛本光瑞如此以是知今佛欲説法華經此斷其疑名之問也二頌教菩薩法今相如本瑞是諸佛方便今佛放光明助發實相義彌勒因此又疑自有名同義同自有名同義異此名何所顯召文殊即以第二偈斷云今相如本瑞是諸佛方便今佛放光明助發實相義此斷其疑體之問也諸人今當知合掌一心待佛當雨法雨充足求道者彌勒因而又疑實相無相何人會之故文殊以此第三偈斷其疑宗之問三頌佛所護念諸求三乘人若有疑悔者佛當為除斷令盡為有餘彌勒因而又疑佛雨法雨止洽菩薩亦潤二乘文殊即以第四偈斷其疑用之問也彌勒聯翩構疑文殊頻煩為斷既事窮理盡即得之於懷可謂善於問答具二莊嚴光宅但知述於釗師釋四伏難使文殊必答顯彌勒之美不見文殊釋四伏疑令彌勒不問抑於妙德之能此義出天台非傳他疏妙法蓮華經方便品第二此品一經之正宗萬法之都會證信證此發起發此譬喻譬此乃至流通通此釋此品題為二先略次廣略則三種方便廣則十雙權實三種方便謂法用能通祕妙三也言法用者方即法便即用也法有方圓用有差會三權是矩是方一實是規是圓此義可釋他經非今品意言能通者方便者門也門名能通通於所通方便權略皆是弄引為真實作門真實得顯功由方便此從能顯得名故以門釋方便經云開方便門示真實相此義可釋他經非今品意言祕妙者方者祕也便者妙也妙達於方即是真祕點衣內之珠與王頂之珠無二無別指客作人是長者子亦無二無別方法及門即是祕妙經云唯我知是相十方佛亦然止止不須説我法妙難思故以祕妙釋方便正是今品之意故言方便品也言十雙權實者一事理二理教三教行四縛脫五因果六體用七漸頓八開合九通別十悉檀於此十中復約生起次第權實本迹等八意詳而釋之然亦不出自行因果化他能所之義二就正説分為兩初略開三顯一二廣開三顯一初文又二初開三顯一二勝疑致請初文又二初長行并十七行半偈歎二智二三行半偈正略開顯動執生疑初文又二初長行二十七行半偈初文又二初寄言歎二智二絶言歎二智初文又二初明諸佛權實二明釋迦權實初文又三初雙歎二雙釋三雙結初文又二初經家提記爾時世尊從三昧安詳而起告舍利弗問佛常在定何故言起答此有所示往古諸佛説此經時必先入無量義定即入法華三昧今佛亦然入定緣理安心實相出定令他亦安心實相告舍利弗者小乘中智慧第一將欲因其破小智顯大智故先告之以動群輩二正歎二智二初歎實智諸佛智慧甚深無量諸佛智慧即實智也此智慧體即一心三智也甚深無量者明佛實智竪徹如理之底故言甚深橫窮法界之邊故言無量二歎權智其智慧門難解難入一切聲聞辟支佛所不能知智慧門即權智也蓋是自行道前方便有進趣之力故名為門從門入道中道中名實道前名權也難解難入者七種方便不能測度十住始解十地為入舉其初後中間難示難悟可知矣別舉小乘不能知者彼執重故別破之無機逃走故言不知華嚴聾啞瞽聵故言不知方等彈斥保住草庵故言不知般若轉教心無希取故言不知今大機啓發放光動地彼此今古諸佛道同猶懷疑惑故言不知利根菩薩節節能知鈍同二乘是亦不知也二雙釋二初釋實智所以者何佛曾親近百千萬億無數諸佛盡行諸佛無量道法外值佛多稟承至要所以實智甚深內行純厚盡行道法所以實智無量二釋權智勇猛精進名稱普聞由於勇猛精進所以能入難入之門既入門已澤被無疆物欽德化所以名稱普聞三雙結二初結實智成就甚深未曾有法稱理究竟故言成就到彼岸底故言甚深二結權智隨宜所説意趣難解稱機適會故言隨宜非七方便人所知故言難解二明釋迦權實三初雙歎二初歎智舍利弗吾從成佛已來實智不圓則佛道不成既云成佛一成一切成二歎權實種種因緣種種譬喻廣演言教無數方便引導衆生令離諸著四十餘年以三種化他權實逗會衆生故言種種因緣譬喻者小乘以芭蕉水沫為譬大乘以乾城鏡幻等為譬廣演者能於一法出無量義也無數方便者即七方便也引導離諸著者説散十善離三塗著説靜十善離欲界著説三藏法離見思著説菩薩法離涅槃著説佛法則離順道法愛著二雙釋所以者何如來方便知見波羅蜜皆已具足如來二字釋實智良以從真如實相中來而成正覺也方便釋權智知見波羅蜜者雙舉權實之知見也然一切種智名實知佛眼名實見道種智名權知法眼名權見以其俱到事理邊底故名波羅蜜具足者權實悉究竟也三雙結二初結實智舍利弗如來知見廣大深遠廣大明橫深遠明豎如此實智非橫非竪寄言往歎論其橫豎照無限極如函蓋俱大也二結權智無量無礙力無所畏禪定解脫三昧深入無際成就一切未曾有法無量者即佛地四等也無礙即佛地四辨也能於一辭一義旋出無量樂説不窮力即十力畏即四無畏禪盡禪之實相定即首楞嚴定三昧即王三昧深入無際結成竪深也成就下結成橫廣也二絶言歎二智二初絶歎因由二初舉絶歎之由舍利弗如來能種種分別巧説諸法言辭柔軟悅可衆心再舉權實為絶歎之由表鄭重殷勤耳能善分別巧説諸法者舉權智也言辭悅可衆心者舉實智也二指絶言之境舍利弗取要言之無量無邊未曾有法佛悉成就舉要創指之端也無量無邊指權未曾有法指實言此二法佛悉成就修道得故此那可説若單明一事不應言悉既雙指權實其意明矣二正絶言歎二初絶言歎止舍利弗不須復説印師云欲令因止生其疑請之心也觀師云實法難知故先抑止驚其常情今明此法深寂言語道斷體不可説故止而歎之設慈悲為説聞不能解傷其善根所以止之二釋止歎意二初明佛是最上人修得最上法不可説二初明最上人權實橫滿不可説所以者何佛所成就第一希有難解之法二明最上人權實竪深不可説唯佛與佛乃能究盡此釋止歎之意成就對不成就乃至難解對不難解此是橫明成就修道得故不可説唯佛與佛能究盡邊底如十五日之月體無不圓光無不遍如此豎深修道得故故不可説二明甚深境不可思議故不可説二初略標權實章諸法實相諸法權也實相實也二廣釋權實相所謂諸法如是相如是性如是體如是力如是作如是因如是緣如是果如是報如是本末究竟等諸法實相者略標甚深權實境也諸法謂百界千如即實之權也實相謂中道理體即權之實也所謂諸法等者廣釋甚深權實境也相以據外覽而可別性以據內自分不改主質名為體功能為力構造為作習因為因助因為緣習果為果報果為報初相為本後報為末所歸趣為究竟等若作如義初後皆空為等若作性相義初後相在為等若作中義初後皆實相為等今不依此等三法具足為究竟等南嶽師讀此文皆云如故呼為十如也天台云依義讀文凡有三轉一云是相如乃至是報如二云如是相乃至如是報三云相如是乃至報如是若皆稱為如者如名不異即空義也若作如是相等點空相性名字施設即假義也若作相如是等如中道實相之是即中義也分別令易解故明空假中得意為言空即假中約如明空一空一切空點相明相一假一切假就是論中一中一切中非一二三而一二三不縱不橫名為實相若依義便便作三意分別若依讀便當依偈文云如是大果報種種性相義唯佛與佛究竟此法此之十如乃是十界上因果之法是十法攝一切法又一法界具十如是十法界具百如是又一法界具九法界則有百法界千如是九界為權佛界為實細論各具權實一界各具九故然此權實不可思議乃是諸佛二智之境以此為境何法不收此境發智何智不發故荊溪云指的妙境出自法華正指此也文句云今作四番釋一約十法界二約佛法界三約離合四約位經云諸法故用十法界釋經云佛所成就希有之法故用佛法界釋經云止止不須説我法妙難思故用離合釋經云唯佛與佛乃能究盡故用位釋也一約十法界者謂六凡四聖法雖無量數不出十一一界中雖復多派不出十如如地獄界當分自具相性乃至本末亦具畜生界相性本末乃至具佛法界相性本末無有缺減故阿毗曇婆沙云地獄之道成就他化天法即是其例餘九法界亦如是當知一一界皆互具餘九界十如若照自位九界十如皆名為權照其自位佛界十如名之為實一中具無量無量中具一所以名為不可思議凡夫雖具絶理情迷二乘雖具捨離求脫菩薩雖具照則不周名不了了如來洞覽橫豎具足唯獨自明了餘人所不見不可宣示故止止絶言耳玄義境妙中已説今不具記二約佛法界釋者佛界非相非不相而名如是相指萬善緣因故下文云衆寶莊校也佛界非性非不性而名如是性指智慧了因故下文云有大白牛也云云佛界非本非末非不本非不末而言本末本即佛相末即佛報是自行權也佛界非等非不等而言究竟等指於實相故標章云實相是自行實也即實而權故言本末即權而實故言為等此是如來自行權實最為無上無上相乃至無上果報橫廣豎深而無有上故標章云諸法實相例亦應言諸法實性實體乃至實究竟等但略舉一以蔽諸耳如來遍照橫竪悉周如觀掌果祇為凡夫如雙盲二乘如眇目菩薩夜視矇朧不曉不可得説故止止絶言也三約離合釋者若佛心中所觀十界十如皆無上相乃至無上果報惟是一佛法界如海總萬流如千車共轍此即自行權實若隨他意則有九法界十如相性等即是化他權實即是自行化他權實隨他則開隨自則合橫豎周照開合自在惟佛與佛乃能究盡凡夫則誹謗不信二乘則迷悶不受菩薩則塵未明為此義故止止絶言也四約位釋者如是相謂一切衆生皆有實相本自有之乃如來藏之相貌也如是性即是性德智慧第一義空也如是體即是中道法性之理也是為三德通十法界位位皆有故是不可思議不可得説所以止止絶言也妙樂云所以四釋者明理攝遍故約十界釋明自證極故約佛界釋明佛化用故約離合釋明三德遍故約諸位釋若望止觀互有寬狹今具四釋則此寬彼狹此但正報不語三千則此狹彼寬名目雖然理必齊等因必具果正必有依二十七行半偈頌長行二初寄言歎二智二初合頌歎二佛二智二初頌歎諸佛二智爾時世尊欲重宣此義而説偈言世雄不可量諸天及世人一切衆生類無能知佛者世雄者頌上諸佛智慧也不可量頌上甚深無量此頌諸佛實智也次三句即頌諸佛權智也二頌歎釋迦二智佛力無所畏解脫諸三昧及佛諸餘法無能測量者佛者頌吾從成佛也正頌實智力無畏等頌諸功德是頌權智餘法者即指化他之權是實智之餘助耳正頌上種種因緣等也二合頌二佛釋歎結歎本從無數佛具足行諸道甚深微妙法難見難可了初二句此頌上諸佛釋歎佛曾親近百千諸佛盡行道法之文甚深微妙法頌上結歎實智成就甚深未曾有法難見難可了頌上結歎權智意趣難解也於無量億劫行此諸道已道場得成果我已悉知見頌上釋迦知見波羅蜜皆已得具足行道已舉因具足成果舉果具足我已悉知見頌知見廣大深遠二絶言歎二智五初頌不思議境如是大果報種種性相義頌上不思議境十如但舉初後中間略可知義之一字兼究竟等二追頌絶言境我及十方佛乃能知是事追頌取要言之佛悉成就也三追頌正絶言歎是法不可示言辭相寂滅追頌止止不須説實相非方所故不可示言語道斷故云相寂滅四頌不知人八初總揀不入者諸餘衆生類無有能得解即是七方便人也二揀能入者除諸菩薩衆信力堅固者即圓教十信故言信力堅固者長行明究竟佛知今頌中明初信知此乃互舉耳三揀二乘不知諸佛弟子衆曾供養諸佛一切漏已盡住是最後身如是諸人等其力所不堪四舉身子不知假使滿世間皆如舍利弗盡思共度量不能測佛智盡思度量即極力竭思之謂餘皆準此五舉諸弟子不知正使滿十方皆如舍利弗及餘諸弟子亦滿十方剎盡思共度量亦復不能知六舉支佛不知辟支佛利智無漏最後身亦滿十方界其數如竹林斯等共一心於億無量劫欲思佛實智莫能知少分七舉發心菩薩不知新發意菩薩供養無數佛了達諸義趣又能善説法如稻麻竹葦充滿十方剎一心以妙智於恆河沙劫咸皆共思量不能知佛智發心語通或可六度菩薩三僧祇未斷惑名為發心或可指上諸天及世人等自攝得六度而發心之語別擬通別二教初心之人皆名新發意菩薩也八揀不退菩薩不知不退諸菩薩其數如恆沙一心共思求亦復不能知通教不退斷界內惑所以不知別理別教地前亦有證行位不退等亦所不知也五頌難解法唯佛能知實相境又告舍利弗無漏不思議甚深微妙法我今已具得唯我知是相十方佛亦然不思議者頌所止之境甚深妙法頌第一希有難解之法我今下三句頌唯佛與佛乃能究盡也此明諸佛道同俱皆究竟故云唯我知是相十方佛亦然二三行半正略開顯動執生疑二初諸佛顯實三初明諸佛道同舍利弗當知諸佛語無異此論諸佛化道是同二勸信於佛所説法當生大信力三正顯實世尊法久後要當説真實即是顯真動昔之執生今之疑故下文云將非魔作佛正由聞此語佛既以如實語而勸信之何事翻疑為防因疑起謗者所以勸信開顯二釋迦開三三初正明開三告諸聲聞衆及求緣覺乘我令脫苦縛逮得涅槃者將顯二乘昔證俱非故云逮得涅槃者又解可擬於六度菩薩乘何以知之修六度行即免四趣縛未能入滅度三祇百劫乃得涅槃逮之言遠乃及耳又六度行前是度他故言我令脫苦縛後取無漏故言逮得涅槃此義推之知是六度乘也又下句云佛以方便力示以三乘教若不指此將何為三不應重數二乘為三乘也二正斥三乘佛以方便力示以三乘教皆是虗偽三出立三之意衆生處處著引之令得出意是權引離諸苦故非真實但是方便門耳二騰疑致請二初敘疑二初經家敘二初千二百疑爾時大衆中有諸聲聞漏盡阿羅漢阿若憍陳如等千二百人二四衆疑及發聲聞辟支佛心比丘比丘尼優婆塞優婆夷上既斥三乘皆是方便今此敘疑但在二乘者何以其執重疑深所以偏舉耳至下文陳疑中即云求佛諸菩薩是知三乘俱疑矣二正生疑二初疑佛二智二初總疑二智各作是念今者世尊何故殷勤稱歎方便二別疑二智二初疑實智而作是言佛所得法甚深難解二疑權智有所言説意趣難知一切聲聞辟支佛所不能及此三段文疑權實二智總別己分蓋由聞諸佛語無異要當説真實疑何則佛昔説三乘智慧同證不差但其餘習有盡不盡耳今忽稱歎如來二智非我所及是故疑佛二智也二疑己所得佛説一解脫義我等亦得此法到於涅槃而今不知是義所趣一解脫者藏教三人同一解脫此是自疑所得三乘聖道是真出要我修此理亦到涅槃今者忽言皆是方便未審何法是其真實故言不知是義所趣二正請決文有三請三止三第一請二初長行二初陳疑爾時舍利弗知四衆心疑自亦未了而白佛言世尊何因何緣殷勤稱歎諸佛第一方便甚深微妙難解之法二陳請我自昔來未曾從佛聞如是説今者四衆咸皆有疑唯願世尊敷演斯事世尊何故殷勤稱歎甚深微妙難解之法此正請文中有三請二止之文兼前為三止也瑤龍二師云初止為理深難解初請為自他求決次止為驚疑不信次請為久植必解後止為必謗墮苦後請為利根得益天台云佛預知三周得益前後不俱是故三抑俟其三請也二偈頌六初頌疑實智爾時舍利弗欲重宣此義而説偈言慧日大聖尊久乃説是法二頌疑權智自説得如是力無畏三昧禪定解脫等不可思議法道場所得法無能發問者我意難可測亦無能問者無問而自説稱歎所行道智慧甚微妙諸佛之所得三明三乘四衆疑無漏諸羅漢及求涅槃者今皆墮疑網佛何故説是其求緣覺者比丘比丘尼諸天龍鬼神及乾闥婆等相視懷猶豫瞻仰兩足尊是事為云何願佛為解説初一句明聲聞後二行明緣覺中間及求涅槃者即明六度菩薩何以得知上云逮得涅槃者此中稱及及者此菩薩自求涅槃又以及他故異二乘知是菩薩也四明身子疑於諸聲聞衆佛説我第一我今自於智疑惑不能了為是究竟法為是所行道身子今疑三乘依教修證未嘗有謬若云方便非真實者為是所證果非實耶為是所行因非真耶智據正經屬身子爾五明佛子疑佛口所生子合掌瞻仰待願出微妙音時為如實説六總明同疑請諸天龍神等其數如恆沙求佛諸菩薩大數有八萬又諸萬億國轉輪聖王至合掌以敬心欲聞具足道第二止爾時佛告舍利弗止止不須復説若説是事一切世間諸天及人皆當驚疑止意者恐懷疑故第二請舍利弗重白佛言世尊唯願説之唯願説之所以者何是會無數百千萬億阿僧祇衆生曾見諸佛諸根猛利智慧明了聞佛所説則能敬信爾時舍利弗欲重宣此義而説偈言法王無上尊唯説願勿慮是會無量衆有能敬信者第三止佛復止舍利弗若説是事一切世間天人阿修羅皆當驚疑增上慢比丘將墜於大坑爾時世尊重説偈言次佛止之護上慢故止止不須説我法妙難思諸增上慢者聞必不敬信第三請爾時舍利弗重白佛言世尊唯願説之唯願説之今此會中如我等比百千萬億世世已曾從佛受化如此人等必能敬信長夜安隱多所饒益無明黑暗名長夜若能敬信必出生死海名安穩爾時舍利弗欲重宣此義而説偈言無上兩足尊願説第一法我為佛長子唯垂分別説是會無量衆能敬信此法佛已曾世世教化如是等皆一心合掌欲聽受佛語我等千二百及餘求佛者願為此衆故唯垂分別説是等聞此法則生大歡喜二廣明開三顯一七品半文為三周三初為上根人法説二為中根人譬説入譬喻品中三為下根因緣説入化城品初初文又五初正法説二身子領解起譬喻品初三佛述成四與授記五四衆喜初文又二初長行二偈頌初文又三初許説三初順許爾時世尊告舍利弗汝已殷勤三請豈得不説初是順豈下許二戒許汝今諦聽善思念之吾當為汝分別解説初是誠吾下許諦聽是聞慧善思是思慧念之是修慧三揀許説此語時會中有比丘比丘尼優婆塞優婆夷五千人等即從座起禮佛而退所以者何此輩罪根深重及增上慢未得謂得未證謂證有如此失是以不住世尊默然而不制止説此語時是揀衆許五千在座故如來三止今將許説威神遣去故名揀衆五濁障多名罪重執小翳大名根深未得謂得名增上慢未得三果未證無學有如此失者謂障執慢三種之失也而不制止者上聞開三顯一言略義隱猶未生謗足作繫珠因緣去則有益若聞廣開三顯一乖情起謗住則有損是不制止也爾時佛告舍利弗我今此衆無復枝葉純有貞實舍利弗如是增上慢人退亦住矣汝今善聽當為汝説枝葉細末不任器用此等執方便之方便於大非器大品云攀附枝葉棄於根本是人為不黠即此義也退亦佳矣者既以小自翳復妨他大光今退無謗法之愆復無障他之過故言佳矣上枝葉未去如來三止貞實願聞故身子四請師弟鑒機非徒靳固也汝下即結許也二受旨舍利弗言唯然世尊願樂欲聞受旨者即遵承稟命之謂三正説二初明四佛章廣明上諸佛權實二釋迦章廣明上釋迦權實初文又二初總明諸佛章二列三世佛章初文又四初歎法希有佛告舍利弗如是妙法諸佛如來時乃説之如優曇鉢華時一現耳法譬雙歎時乃説之者諸佛同出五濁必前開三如今世尊四十餘年始顯真實久久稀疏故言時乃説之久而不説者為人未堪故時未至故五千未退故今人已堪時已至五千已去決定説大乘也優曇華此云靈瑞三千年一現現則金輪王出此表三乘調熟已後方説妙法授法王記也二説無虗妄舍利弗汝等當信佛之所説言不虗妄汝等當信者勸信無虗妄也此理至深理與昔異此言至妙言與昔反此行至普行與昔乖此人至勝勝於昔劣還指客作四種之粗而今皆妙恐物生謗故勸信也信無虗妄人説無虗妄法也三開方便三初開舍利弗諸佛隨宜説法意趣難解諸佛隨三種機以方便説故云隨宜佛意在實物莫能解故云意趣難解二釋所以者何我以無數方便種種因緣譬喻言辭演説諸法舉今佛之權能以釋諸佛之方便耳巧慧同故借此釋彼如我以無數方便者諸佛開權亦如我也三結四示真實五初標勝人法是法非思量分別之所能解唯有諸佛乃能知之是法非思量等此有兩義或作結開權或正作顯實結開權者佛意難知唯佛與佛能了稟教者謂三諸佛知一耳作顯實者即屬後文初標人法舉無分別法惟是佛所知佛以無分別智解知無分別法即是顯實義也二標出世意所以者何諸佛世尊唯以一大事因緣故出現於世初總釋次分字總釋者諸佛覺知如實之相乘此實道出應於世只令衆得此實道唯為此事曾無他事除諸法實相餘皆名魔事次分字釋者一謂一實相也非三五七九故言一也其性廣博博三五七九故名為大是諸佛出世之儀式故名為事衆生有機能感於佛故名為因佛承機而應故名為緣此為如來出世之本意也三重標舍利弗云何名諸佛世尊唯以一大事因緣故出現於世將欲分別重更提起以作解釋之端耳四正釋四初理一二初正釋諸佛世尊欲令衆生開佛知見使得清淨故出現於世欲示衆生佛知見故出現於世欲令衆生悟佛知見故出現於世欲令衆生入佛知見道故出現於世此釋理一復為四意一約四位二約四智三約四門四約觀心一約四位釋者諦境不可知見唯佛智佛眼乃能知見若二智四眼則不能知見今取圓教住行向地分得佛眼佛智則能知見故寄此四位以釋理一即約位顯理也開者即是十住初破無明開如來藏見實相理如日出暗滅眼目有用故名為開緣修破惑故云使得清淨示者即是十行惑障既除知見體顯法界衆德顯示分明故名為示悟者即是十向障除體顯法界行明事理融通更無二趣故名為悟入者即是十地事理既融自在無礙任運從阿到荼入薩婆若海故名為入二約四智釋者一道慧見道實性實性中得開佛知見也二道種慧知十法界諸道種別解惑之相一一皆示佛知見也三一切智知一切法一相寂滅即悟佛知見也四一切種智知一切法一相寂滅相種種行類相貌皆識即入佛知見也三約圓教四門橫釋者空門一空一切空即開佛知見也有門一有一切有即示佛知見也亦空亦有門一切亦空亦有即悟佛知見也非空非有門一切非空非有即入佛知見也能通則四所通則一開示悟入是能通之門所知所見是所通之理也四約觀心釋者觀於心性三諦之理不可思議此觀門淨名為開雖不可思議而能分別空假中心宛然無濫名為示空假中心即三而一即一而三名為悟空假中心非空假中而齊照空假中名為入是為一心三觀而分開示悟入之殊也所以約四種釋者見理由位位立由智智發由門門通由觀觀故則門通門通故智成智成故位立位立故見理見理故名為理一也二結成舍利弗是為諸佛唯以一大事因緣故出現於世結成理一昔方便教亦得義論開示悟入而非佛知見故是權今明佛知見故是實實即理一也二人一佛告舍利弗諸佛如來但教化菩薩若就昔方便謂教化三乘理實而言即是化菩薩如彼窮子自謂客作賤人長者所觀實為己子此即人一也三行一諸有所作常為一事唯以佛之知見示悟衆生三乘衆行名之為諸為圓故諸即是一事此行何所至到唯趣佛之知見即行一意也四教一舍利弗如來但以一佛乘故為衆生説法無有餘乘若二若三圓頓之教名一佛乘故序品云説大乘經即是教義也自別教已去皆名有餘即不了義非佛一乘今但以一佛乘者純説佛法圓教乘也無餘乘者無別教帶方便有餘之説無二者無般若中之帶二無三者無方等中所對之三也如此二三皆無況三藏中三耶五總結法同舍利弗一切十方諸佛法亦如是二列三世佛章三初過去佛二初開權舍利弗過去諸佛以無量無數方便種種因緣譬喻言辭而為衆生演説諸法二顯實是法皆為一佛乘故是諸衆生從諸佛聞法究竟皆得一切種智皆為一佛乘教一從佛聞法是誰聞法被衆生兼得人一究竟皆得一切種智種智所知即是理一能知即是行一雖不次第四一兼足二未來佛二初開權舍利弗未來諸佛當出於世亦以無量無數方便種種因緣譬喻言辭而為衆生演説諸法二顯實是法皆為一佛乘故是諸衆生從佛聞法究竟皆得一切種智三現在佛三初標出世意舍利弗現在十方無量百千萬億佛土中諸佛世尊多所饒益安樂衆生如諸佛章中唯以一大事因緣出現於世此亦如是唯為饒益安樂衆生故而出於世也二開權是諸佛亦以無量無數方便種種因緣譬喻言辭而為衆生演説諸法三顯實二初別明現在教一行一是法皆為一佛乘故是諸衆生從佛聞法究竟皆得一切種智文具四一三總明三世人一理一舍利弗是諸佛但教化菩薩欲以佛之知見示衆生故欲以佛之知見悟衆生故欲令衆生入佛知見道故但教化菩薩是人一欲以下是理一二釋迦章五初開權舍利弗我今亦復如是知諸衆生有種種欲深心所著隨其本性以種種因緣譬喻言辭方便力故而為説法我即現在釋迦佛也先三後一如四佛不異故言亦復如是知諸衆生有種種欲者即是五乘根性欲也過去名根現在名欲未來名性深心所著者即是根也方便者即是隨宜開三乘權法也二顯實舍利弗如此皆為得一佛乘一切種智故如此等者指權是實也佛乘是教一種智所知即理一能知即行一能得佛乘能得種智即兼人一三舉五濁釋方便二初標意舍利弗十方世界中尚無二乘何況有三將舉五濁先標其意上已説諸佛開權顯實未明隱實施權其法清淨湛如一空尚無帶二般若帶三方等之權況有單三三乘單五加入天之權秪為五濁障重實不得宣須施單三單五之權亦施帶三帶二之權故言於一佛乘分別説三二舉五濁四初唱數舍利弗諸佛出於五濁惡世二列名所謂劫濁煩惱濁衆生濁見濁命濁三體相如是劫濁無別體劫是長時剎那是短時但約四濁立此假名名為劫濁文云劫濁亂時即其義也衆生濁者只是攬彼見慢果報立此假名名衆生濁煩惱濁指五鈍使為體見濁指五利使為體命濁指連持色心為體五濁相者四濁增劇聚在此時所謂嗔恚增極刀兵起貪欲增劇飢餓起愚癡增極疾疫起三災起故煩惱倍隆諸見轉熾粗弊色心惡名穢稱摧年減壽衆濁交煎如水奔昏風波鼓怒魚龍攪撓無一憀賴時使之然亦如劫初光音天墮地地使有欲如忉利諸天入粗澀園園生鬬心是名劫濁相貪海納流未嘗滿足嗔虺吸毒擾諸世間癡暗頑嚚過於漆黑慢高凌下凌忽無度疑網無信不可告實是為煩惱濁相無人謂有人無我謂有我十六知見六十二等猶如羅網又似稠林纏縛屈曲不能自出是見濁相攬於色心立一主宰譬黐膠無物不著流宕六道處處受生是為衆生濁相朝生暮殞晝出夕亡波轉煙回瞬息不住此即命濁相若約次第以煩惱見為根本從此二濁成於衆生也從於衆生有連持命此四經時謂為劫濁如是者明五濁體相也濁體及相不可具頒但略云如是經雖不具疏文略述四釋結舍利弗劫濁亂時衆生垢重慳貪嫉妬成就諸不善根故諸佛以方便力於一佛乘分別説三劫濁亂時即劫濁衆生垢重即衆生濁慳貪是煩惱濁嫉妬是見濁不善之言通煩惱濁見濁諸根成就即命濁祗由此土衆生五濁障重能障大乘故如來於一佛乘分別説三四揀偽敦信二初揀真偽二初若不聞知非真弟子舍利弗若我弟子自謂阿羅漢辟支佛者不聞不知諸佛如來但教化菩薩事此非佛弟子非阿羅漢非辟支佛若佛弟子自能信解若不信解非真弟子亦非羅漢所以敦逼時衆令信受解文分二意初揀真偽若不聞不知非真弟子如世弟子隨順師法繼嗣傳燈若不聞不知則無法可順何謂弟子如來昔説五濁開三汝既隨順得涅槃得聞得知名為弟子今五濁既除為汝説一何意不聞不知不聞者即不聞教一不知者即不知行一非真即非理一非弟子即非人一也二聞不信受成增上慢又舍利弗是諸比丘比丘尼自謂已得阿羅漢是最後身究竟涅槃便不復志求阿耨多羅三藐三菩提當知此輩皆是增上慢人所以者何若有比丘實得阿羅漢若不信此法無有是處此第二明不信成上慢敦其使信何者汝自謂是後身身尚無量實非後身汝自謂究竟實非究竟未得謂得豈非增上慢耶真羅漢者濁除根利知非究竟不起上慢知非究竟信於究竟即信理一無增上慢即成行一信則信教是為教一是佛弟子則是人一也二開除釋疑二初開除二初除佛滅後除佛滅度後現前無佛若佛在世正説此經不信不受非真羅漢成增上慢若佛滅後方得羅漢者偏執權經不信圓法聽許非增上慢二好人難得所以者何佛滅度後如是等經受持讀誦解其義者是人難得佛雖入滅此經尚在不信不受應是上慢耶即得開除佛滅度後雖有此經解其義者此人難遇致令羅漢不信不解亦聽許非增上慢二釋疑若遇餘佛於此法中便得決了若佛滅後解經之人難遇得羅漢者永入涅槃耶即釋云是人雖生滅度之想捨命已後便生界外有餘之國值遇餘佛得聞此經即便決了南嶽云餘佛者四依也羅漢遇之聞經決了又羅漢修念佛定見十方佛為説此經便得決了又凡夫行人苦到懺悔見十方佛為説亦得決了五明無虗妄三初勸信釋迦舍利弗汝等當一心信解受持佛語二勸信諸佛諸佛如來言無虗妄諸佛道同彌加信受三結成不虗無有餘乘唯一佛乘二偈頌二初頌上許答二初頌揀許二初頌五千退席爾時世尊欲重宣此義而説偈言比丘比丘尼有懷增上慢優婆塞我慢優婆夷不信如是四衆等其數有五千不自見其過於戒有缺漏護惜其瑕疵是小智已出衆中之糟粳佛威德故去斯人鮮福德不堪受是法上慢我慢不信四衆通有但出家二衆多修道得禪謬謂聖果偏起上慢在俗矜高多起我慢女人智淺多生邪僻不自見其過者三失覆心藏玼揚德不能自省是無慚人也若自見過是有羞僧也於戒有缺漏者律儀有失名缺定共道共有失名漏無道定等故內起惡覺如玉含瑕無律儀故外動身口如玉露玼覆罪自得故名護惜小智者不得學無學智而有世間小智妄謂有漏以為無漏小中之小故言小智也糟粳者是五千等但有世間禪無無漏禪定潤故如糟但有文字解無理會之實故如粳又糟粳譬其無大機二頌衆已清淨此衆無枝葉唯有諸貞實枝葉譬非好器悉不任用故須遣之二頌誡許舍利弗善聽誡令善聽二頌正答二初頌四佛章二頌釋迦章初文又四初頌諸佛章二頌過去佛章三頌未來佛章四頌現在佛章初文又五初頌施權二初頌正施權諸佛所得法無量方便力而為衆生説衆生心所念種種所行道若干諸欲性先世善惡業佛悉知是已以諸緣譬喻言辭方便力令一切歡喜或説修多羅伽陀及本事本生未曾有亦説於因緣譬喻并祇夜優波提舍經諸佛所得法者修道得於諸權法也無量方便力下頌上無數方便種種因緣演説諸法也衆生心所念者頌上隨宜説法也頌中廣出隨宜之相即是照九法界機説七方便總言九七不可定判故言若干過去所習名性現在欣樂名欲善惡業者七方便傳傳迭為善惡佛悉知是己等者佛以權智照諸性欲然後隨其所宜説九部經修多羅此云契經有通有別通則聖教之都名別則為十二部中直説法相者名修多羅伽陀此云孤起不重頌者是也本事者説本昔世界等事也本生者説本昔受生事也未曾有者佛現種種神力衆生怪未曾有也因緣者一切佛語緣起事神皆名因緣也譬喻者如云月隱重山舉扇喻之風息大虗動樹訓之祇夜此云重頌重頌上直説修多羅也優波提舍此云論議已上九部言昔施權為七方便人説也若十二部更有方廣無問自説授記二頌結施權意鈍根樂小法貪著於生死於諸無量佛不行深妙道衆苦所惱亂為是説涅槃前世根鈍今世無機不堪聞大故云不行深妙道前世貪著鄣重今世衆苦所惱唯可聞小故言為是説涅槃二頌顯實四初頌理一我設是方便令得入佛慧未曾説汝等當得成佛道所以未曾説説時未至故今正是其時決定説大乘我此九部法隨順衆生説入大乘為本以故説是經令得入佛慧頌上一大事因緣也決定説大乘總頌開示悟入佛知見也我此九部法或云小乘法大乘則有十二部小乘是灰斷教無如意珠身故無方廣無天鼓自然鳴故無無問而自説雖有授記以其少故故無授記此且從別為説通大為語大小俱有十二部部者類也亦謂十二分教此九部名在前已釋二頌人一有佛子心淨柔軟亦利根無量諸佛所而行深妙道為此諸佛子説是大乘經我記如是人來世成佛道以深心念佛修持淨戒故此等聞得佛大喜充遍身佛知彼心行故為説大乘聲聞若菩薩聞我所説法乃至於一偈皆成佛無疑頌上諸佛如來但教菩薩以明人一上直云云教化菩薩頌中廣出諸方便人皆成實人有佛子心淨即別教之人為此佛子説大乘經得記心喜即成圓教真實之人聲聞若菩薩者聲聞兼得緣覺若菩薩兼收六度及通教等菩薩皆成佛無疑即是七種方便無非佛子也三頌教一十方佛土中唯有一乘法無二亦無三除佛方便説但以假名字引導於衆生説佛智慧故頌上如來但一佛乘故為衆生説法無有餘乘若二若三若十方佛唯説一法即是教一假名引導即方便教牒假名三教顯佛慧一教其文分明無二者無通中半滿相對之二也無三者無三藏中之三也此皆假名引導衆生今唯一佛圓乘故云説佛智慧也四頌行一諸佛出於世唯此一事實餘二則非真終不以小乘濟度於衆生佛自住大乘如其所得法定慧力莊嚴以此度衆生自證無上道大乘平等法若以小乘化乃至於一人我則墮慳貪此事為不可頌上諸有所作常為一事事即是行終不以小乘等即是頌上常為一事之意也佛自住大乘等頌上唯以佛之知見示悟衆生後一行釋不以小乘度之意三頌勸信二初舉果勸信二初舉內心若人信歸佛如來不欺誑亦無貪嫉意斷諸法中惡故佛於十方而獨無所畏此明佛心清淨無明慳吝衆惡已斷淨心中説故是可信二舉外色我以相嚴身光明照世間無量衆所尊為説實相印身相炳著光色端嚴內無惑暗外有光明口無欺誑為衆所尊説大乘印則可信受二舉因勸信二初舉昔誓願舍利弗當知我本立誓願欲令一切衆如我等無異我昔誓願非但自誓菩提亦誓衆生同入佛慧今酬誓故説是亦可信也二明今願滿如我昔所願今者已滿足化一切衆生皆令入佛道今菩提既滿衆生亦入汝既自證佛慧亦驗我誓不虗問本誓既普今衆生尚多願云何滿答佛三世益物今明現在論願滿也四舉五濁四初總明五濁障大若我遇衆生盡教以佛道無智者錯亂迷惑不受教衆生受苦諸佛興悲悲苦相對故云相遇遇則盡令入於佛道故五濁不能障大無智不受故云障大也二別明五濁障三五初衆生濁我知此衆生未曾修善本堅著於五欲癡愛故生惱以諸欲因緣墜墮三惡道輪回六趣中備受諸苦毒善本者真如實相由不能於此種善根不感大也堅著於五欲即諸惡之本淨名云由癡有愛則我病生二命濁受胎之微形世世常增長薄德少福人衆苦所逼迫觀心釋者一念心起即為未來作業業即胎胎業無窮世世不斷即增長形即五陰陰亦名世壽命連持諸陰入世初從薄酪已至老死故名世世增長下二句明命濁相三見濁入邪見稠林若有若無等依止此諸見具足六十二五見交加如稠林密茂若有是常見若無是斷見因此二見生六十二如外道計我有四句色即是我離色是我色大我小我住色中我大色小色住我中四陰亦爾是為二十三世為六十并根本斷常二見為六十二也四煩惱濁深著虗妄法堅受不可捨我慢自矜高諂曲心不實五劫濁於千萬億劫不聞佛名字亦不聞正法如是人難度長時無佛法即是劫濁又上來四濁聚在時中故故名劫濁如是人難度者五濁障故不信一乘則不可度也三為五濁故説小是故舍利弗我為設方便説諸盡苦道示之以涅槃為説三藏四諦也苦即苦諦苦必有因即集諦道即道諦涅槃即滅諦四為大説小我雖説涅槃是亦非真滅諸法從本來常自寂滅相佛子行道已來世得作佛折三界妄盡滅色取空則非真滅若體達無明本無常寂即是真滅本無雖寂若不修道無由契會故言佛子行道已來世得作佛五頌不虗三初明釋迦先開三我有方便力開示三乘法二明諸佛後顯實一切諸世尊皆説一乘道釋迦開三諸佛顯實此互現耳三正明不虗今此諸大衆皆應除疑惑諸佛語無異唯一無二乘前權後實誠言不虗諸佛道同勿生疑也二過去佛章二初頌開三過去無數劫無量滅度佛百千萬億種其數不可量如是諸世尊種種緣譬喻無數方便力演説諸法相二頌顯一二初略頌上三一是諸世尊等皆説一乘法化無量衆生令入於佛道皆説一乘法是頌教一化無量衆生是頌人一令入於佛道是頌理一兼得行一二約五乘廣顯一二初總約五乘顯一又諸大聖主知一切世間天人羣生類深心之所欲更以異方便助顯第一義天人群生類此舉諸乘以明人一更以異方便是舉諸行以顯行一而兼得教一第一義即是理一若用圓妙正觀即是實相方便此不名為異若用七方便觀助顯第一義者名異方便二別約五乘顯一三初開菩薩乘若有衆生類值諸過去佛若聞法布施或持戒忍辱精進禪智等種種修福德如是諸人等皆已成佛道若作五乘釋但是六度菩薩乘若作七方便則兼得通別菩薩乘何者三教大乘皆行六度而運心有異相心行六度即三藏菩薩無相則通教非相無相次第行六度即別教菩薩今但列六度未知定判屬誰尋上文云更以異方便者非獨六度菩薩即三教菩薩方便也昔聞法皆已成教一昔六度行皆已成行一如是諸人等皆已成人一皆已成佛道皆已成理一二開二乘諸佛滅度已若人善軟心如是諸衆生皆已成佛道此開聲聞緣覺皆入一乘何以得知大品歎阿羅漢心調柔軟又淨名云住調伏心是賢聖行是以知之昔善軟心皆成行一諸衆生是人一成佛道是理一三開人天乘二初約天人小善成緣因種子顯實十初造塔明天乘諸佛滅度已供養舍利者起萬億種塔金銀及頗梨硨磲與碼瑙玫瑰琉璃珠清淨廣嚴飾莊校於諸塔或有起石廟旃檀及沈水木樒并餘材甎瓦泥土等若於曠野中積土成佛廟因時至心傾財捨寶果時任運自然受樂故是人天乘也木樒者長安有木名樒亦任造像金光明云以佛舍利如芥粟許置小塔中三十三天已有自然果報即其義也二戲沙作塔明人乘乃至童子戲聚沙為佛塔如是諸人等皆已成佛道童子戲沙作塔即是人業因時泛泛悠然作善果時作意勤求得樂故是人業三志心造像明天業若人為佛故建立諸形像刻雕成衆相皆已成佛道或以七寶成鍮鉐赤白銅白鑞及鉛鍚鐵木及與泥或以膠膝布嚴飾作佛像如是諸人等皆已成佛道彩畫作佛像百福莊嚴相自作若使人皆已成佛道優婆塞戒經不許用膠得失意罪而此經用者古師云外國用樹膠耳妙樂云造像功德經言造像功德有十一種一世世眼目清淨二者生處無惡三者常生貴家四者身如紫磨金色五者珍玩豐饒六者生賢善家七者生得為王八者作金輪王九者生於梵天壽命一劫十者不墮惡道十一者後生還能敬重三寶又云若人臨命終時發言造像乃至大如麥能除三世八十億劫生死之罪四戲畫佛明人業乃至童子戲若草木及筆或以指爪甲而畫作佛像五結成顯實如是諸人等漸漸積功德具足大悲心皆已成佛道但化諸菩薩度脫無量衆諸人等皆成人一漸漸積功德具足大悲心即成行一佛道即成理一既已成佛復能化他但化菩薩即是教一六約諸塵供明天業若人於塔廟寶像及畫像以華香幡蓋敬心而供養若使人作樂繫鼓吹角貝簫笛琴箜篌琵琶鐃銅鈸如是衆妙音盡持以供養或以歡喜心歌唄頌佛德乃至一小音皆已成佛道貝大螺也唄者或云唄匿此云讚頌七約散心用塵供明人業若人散亂心乃至以一華供養於畫像漸見無數佛賢愚經有長者生一男天雨衆華名天華由前世以草華散僧故出家證羅漢果八約身業供明天人業或有人禮拜或復但合掌乃至舉一手或復小低頭五體投地是上禮即天業合掌低頭是中禮是人業九結成供養者顯實以此供養像漸見無量佛自成無上道廣度無數衆入無餘涅槃如薪盡火滅非但自入佛道亦能化度衆生入涅槃子果縛盡名曰無餘機薪既盡應火云亡故云薪盡火滅也十約口業供明人業若人散亂心入於塔廟中一稱南無佛皆已成佛道南無或云那謨或云南摩此翻歸命或翻度我大品云佛言若有一人稱南無佛乃至畢苦其福不盡二約了因種子明顯實於諸過去佛現在或滅後若有聞是法皆已成佛道例上皆具相無相非相無相至心散心等五乘種子今皆開入一實至心聞一句是天業散心聞一句是人業問何意約過去佛門廣明五乘皆入實耶答三世佛皆有開權但未來未起現在始行於證義弱過去開權已久受化之人皆成四一並於十方施權顯實證義事強構之虗言不如驗之以實故於過去佛廣説五乘也三頌未來佛章二初頌開三未來諸世尊其數無有量是諸如來等亦方便説法一切諸如來以無量方便二頌顯一四初頌人一度脫諸衆生入佛無漏智若有聞法者無一不成佛二頌行一諸佛本誓願我所行佛道普欲令衆生亦同得此道三頌教一未來世諸佛雖説百千億無數諸法門其實為一乘諸佛兩足尊知法常無性佛種從緣起是故説一乘知法常無性者謂實相常住無自性乃至無因性無性亦無性是名無性佛種從緣起者中道無性即是佛種迷此理者由無明為緣則有衆生起解此理者由教行為緣則有正覺起欲起佛種須一乘教此為頌教一也四頌理一是法住法位世間相常住於道場知已導師方便説是法住法位者衆生正覺一如無二悉不出如皆如法為位世間相常住者出世正覺以如為位亦以如為相衆生亦然世間相既常住豈非理一又釋世間者即是陰界入也常住者即是正因也然此正因不即六法緣了不離六法正因常故緣了亦常故言世間相常住也於道場知已者此舉果而釋成開顯道場朗然其理久暢物情鄣重方便施三四頌現在佛章三初標施化意天人所供養現在十方佛其數如恆沙出現於世間安穩衆生故亦説如是法即是施化之意正為安穩衆生也二頌顯實知第一寂滅以方便力故雖示種種道其實為佛乘第一寂滅即頌理一實為佛乘或頌教一或頌行一三頌開權知衆生諸行深心之所念過去所習業欲性精進力及諸根利鈍以種種因緣譬喻亦言辭隨應方便説二頌釋迦章二初略頌上權實為下總譬作本二初頌顯實今我亦如是安穩衆生故以種種法門宣示於佛道今我亦如是者我即釋迦一化之主同以一實教化衆生故言如是為下長者譬為本安穩者即大涅槃常樂住處此處寂靜無五濁障故名安穩安對不安謂三界有五濁障名不安穩即為下火宅譬作本衆生即是五道受化之徒為下五百人譬作本種種法門即對不種種為下唯有一門譬作本二頌開權我以智慧力知衆生性欲方便説諸法皆令得歡喜智慧力者即權智力也知衆生性欲者即是五道根性有三乘差別為下三十子譬作本諸法即三乘法也知者鑑小機也方便説者正施權也皆令得歡喜者隨宜稱機也二偈雖略收佛一化開權顯實原始要終罄無不盡故稱略頌為下總譬本也二廣頌上六義為下別譬作本六初頌上五濁二頌施化方便三頌顯實四頌歎法希有五頌上不虗六頌上敦信初文又三初明佛能見眼舍利弗當知我以佛眼觀佛眼觀見為下長者能見譬作本明佛在法身地以常寂佛眼鑑羣機若根利濁輕則以盧舍那像説一乘法若根鈍濁重則脫瓔珞以老比丘像驚入火宅方便開三祗是于時鑑機故言我以佛眼觀見二明所見五濁五初衆生濁見六道衆生貧窮無福慧妙樂云貧故由無福癡故由無慧貧癡衆生聚在一處故名衆生濁二命濁入生死險道相續苦不斷妙樂云於生死中又加險道險道之中命易斷故即短壽處而猶相續為命濁也三煩惱濁深著於五欲如𤛆牛愛尾以貪愛自蔽盲瞑無所見𤛆牛者獸如牛而尾長牛愛其尾就身護尾人貪其尾殺為旌旄譬人貪五欲而害其身亦若是也四頌劫濁不求大勢佛及與斷苦法妙樂云劫中無佛故名為濁四濁生此亦無所求劫若有佛雖濁能破故經云唯我一人能為救護五頌見濁深入諸邪見以苦欲捨苦諸見是受受即是苦行此苦因欲望捨苦豈可得耶妙樂云六十二多故名為諸由此見故則有三受故云見即是受三受皆苦以此苦受欲捨苦者無有此處三明起大悲應赴為是衆生故而起大悲心前舉能見次明所見今明大悲熏心應入三界施設方便引趣佛慧故也二頌施化方便二初念用大乘擬宜不得三初明用大擬宜我始坐道場觀樹亦經行於三七日中思惟如是事我所得智慧微妙最第一始坐道場者至理無時假時化物為化之初故言始也約事釋者初在此處修治得道故云道場坐此樹下得三菩提故名道樹觀心釋者樹即十二因緣大樹深觀緣起自成菩提欲以無漏法林樹蔭蓋衆生故言觀樹經行者大乘三十七品是行道法自以道品履一切地得成佛道欲以此法化度衆生是故起行也三七日者過去因果經云佛成道初一七思惟我法微妙無能受者二七思惟衆生上中下根三七思惟誰應先聞即趣波羅奈為五人説四諦等且以三乘而為三根此就小乘釋也今明佛在法身之地寂而常照恆以佛眼洞覽無遺豈始至道場淹留三七方思此事言三七者明有所表也若通途約大乘釋者初七思惟欲説圓教次七思惟欲説別教後七思惟欲説通教皆無機不得是故息大説三藏三乘為方便之化也二明衆生無機三初明障重衆生諸根鈍著樂癡所盲二明不堪聞如斯之等類云何而可度三明諸天請爾時諸梵王及諸天帝釋護世四天王及大自在天并餘諸天衆眷屬百千萬恭敬合掌禮請我轉法輪諸梵雖請説大佛知無機所以不説妙樂云問何得知梵王請大答據佛酬云若但讚佛乘等故知是請大也若據一四天下只一梵王為三界天主今云諸梵王者如來統御大千世界有百億四天下則有百億梵王又禪禪各一梵王故云諸也若論請法正在初禪三界天主也三明念欲息化二初無機我即自思惟若但讚佛乘衆生沒在苦不能信是法破法不信故墜於三惡道明無機強説聞則有損二息化我寧不説法疾入於涅槃説則有損滅但無益故此思惟為下施權之張本也二念同諸佛用三乘化稱宜二初正明化得四初明三乘機宜尋念過去佛所行方便力我今所得道亦應説三乘尋念者仍念彼雖無大機不容永捨要以方便而誘濟之非都不知開三欲引同諸佛故云尋念二明有小機二初明諸佛歎五初釋迦自敘諸佛現作是思惟時十方佛皆現梵音慰喻我佛現者由念佛方便力故現現由擬法會機二義故佛現也二諸佛正歎釋迦能隱實現權善哉釋迦文第一之導師得是無上法隨諸一切佛而用方便力上欲大化於彼無機故諸佛不歎今欲説小曲會根緣則始終得度所以佛歎善哉為一施三引入佛慧即是第一導師得是無上法者即是得實智微妙第一也而用方便力者隨諸一切佛隱實用權也三明諸佛亦隱實用權我等亦皆得最妙第一法為諸衆生類分別説三乘四雙釋二義少智樂小法不自信作佛是故以方便分別説諸果為衆生少智不堪聞大所以隱實而復樂小所以施權五雙結二我雖復説三乘但為教菩薩雖復説三但為顯實二明釋迦酬順二初發言酬順舍利弗當知我聞聖師子深淨微妙音喜稱南無佛既聞諸佛稱歎即對曰南無南無此云敬從若翻度我等非此意也二念順物機復作如是念我出濁惡世如諸佛所説我亦隨順行三明施化小思惟是事已即趣波羅奈諸法寂滅相不可以言宣以方便力故為五比丘説諸法寂滅相不可以言宣即是前説中道無性佛種之理此理非數又不可説今以方便作三乘説又非生非滅而以方便作生滅説又偏真之理亦不可説以方便作四門説初為五人説無常有門也四明受行悟入是名轉法輪便有涅槃音及以阿羅漢法僧差別名轉佛心中化他之法度入他心名轉法輪陳如初得見諦即斷見惑分證滅諦亦是分得有餘涅槃涅槃之音起自於此由此得成無學便有羅漢之名能説三乘者名佛所説三乘即法見諦羅漢等名僧三寶於是現世間二釋疑念從久遠劫來讚示涅槃法生死苦永盡我常如是説恐疑師云佛初末能鑑機尋念諸佛始知根性即釋云非我不知用於方便特欲引同故念諸佛非始念方知從久遠劫來見其樂小已為讚示令盡衆苦所以聞小即得解脫也恐疑弟子云云何衆生一世暫聞即證羅漢即釋云從久遠劫來為其讚示稱於本習故速得道三頌顯實四初頌人一舍利弗當知我見佛子等志求佛道者無量千萬億咸以恭敬心皆來至佛所曾從諸佛聞方便所説法此二行頌人一三乘行人皆是佛子故也又此二行亦名大乘機發亦云索果明由機發故索果志求佛道者即是索大非求小果索有三意一大機有感果之義機中論索二情中密求為得為不得即此意也三發言索即是殷勤三請也咸以二句大機感佛各到佛所曾從二句此中初味調伏受行三藏六度通別等三教方便由此調熟故使障除機發而求大也二頌理一我即作是念如來所以出為説佛慧故今正是其時此一行頌理一故云為説佛慧即上種智佛知見也又從此至下今我喜無畏二行一句亦名佛歡喜衆生得大乘益故佛為佛慧故出昔障重無機不得説佛慧今機發正是説時故云今正是其時今聞説必信解不畏謗大墮惡故云喜無畏也三教一舍利弗當知鈍根小智人著相憍慢者不能信是法今我喜無畏於諸菩薩中正直捨方便但説無上道此二行頌教一故云但説無上道於下三句亦名正顯實也五乘是曲而非直通別偏傍而非正今皆捨彼偏曲但説正直一道也四行一菩薩聞是法疑網皆已除千二百羅漢悉亦當作佛此一行頌行一故云悉亦當作佛又此一行亦名受行悟入六度通教二菩薩初聞略説動舊執致新疑今悉已除非獨菩薩二乘亦爾而云聲聞皆當作佛者昔教不説二乘作佛今與授記授記豈獨二乘除疑豈獨菩薩互存則兩備四頌歎法希有二初頌上如是妙法如三世諸佛説法之儀式我今亦如是説無分別法如三世者引同諸佛用權也良以權是引物之儀式也説無分別法者引同諸佛顯實也實則言語道斷豈存儀式又權實本無分別為鈍根小智分別權實今還悟入一三不二知佛説三一無分別也諸佛皆爾何獨或耶二頌上時乃説之五初舉人難遇諸佛興出世懸遠值遇難久久懸遠時有佛出此舉人難二舉法難説正使出于世説是法復難如今佛出世四十餘年始顯真實也三舉聞法難無量無數劫聞是法亦難如五千之流梵音盈耳起席而去聞豈不難乎四舉信受難能聽是法者斯人亦復難衆中唯身子前達中下之機雖聽猶未能了五舉華譬四難譬如優曇華一切皆愛樂天人所希有時時乃一出聞法歡喜讚乃至發一言則為已供養一切三世佛是人甚希有過於優曇華曇華一喻譬上四難今但合聞者難餘例可解五頌上不虗二初勿於可信人生疑汝等勿有疑我為諸法王普告諸大衆但以一乘道教化諸菩薩無聲聞弟子法王者夫為人王言則不二佛為法王豈容虗説夫方便可是權假真實寧應是妄聞法王説法勿生疑也二勿於可信法起疑汝等舍利弗聲聞及菩薩當知是妙法諸佛之祕要四十餘年蘊在佛心他無知者名為祕一乘直道總攝萬途故言要也六頌上揀衆敦信二初頌揀衆三初揀非弟子以五濁惡世但樂著諸欲如是等衆生終不求佛道若樂諸欲是行魔業故須揀之上文著涅槃尚非佛弟子此文著生死那是佛弟子互揀非耳終不求佛道者頌上揀增上慢上慢者未得上法謂得上法是故其人不求佛道也二佛滅後解義者難得當來世惡人聞佛説一乘迷惑不信受破法墮惡道當來世惡人者頌佛滅後解義其人難得三若遇餘佛決了有慚愧清淨志求佛道者當為如是等廣讚一乘道二頌敦信二初敦信權舍利弗當知諸佛法如是以萬億方便隨宜而説法其不習學者不能曉了此二敦信實汝等既已知諸佛世之師隨宜方便事無復諸疑惑心生大歡喜自知當作佛方便施權正為於實權實無疑自知作佛
