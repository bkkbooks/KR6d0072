body:
  text: 二提婆品引往弘經彼我得益以證功德深重二初品目妙法蓮華經提婆達多品第十二正經曰梵士品提婆達多亦言提婆達兜亦言調婆達亦言調達此云天熱以其應行三逆所以生時人天心熱因此立名即因緣釋也問惡人出世何名感應答令無量人不敢造惡亦具四悉見者喜己身不作即世界不作善生即為人不作惡邊即對治無障果事即第一義前三教逆只是逆今即逆而順是圓教意本迹者本地清凉眾生煩惱故菩薩示熱同其病行而度脫之大經云提婆達多必不破僧報恩經云若有人言提婆達多實是惡人入阿鼻獄者無有是處大雲經云提婆達多不可思議所修行業同於如來鳩摩羅什譯此經竟命僧睿講之睿開為九轍又有二十八品生起則元有二十八品後因長安宮人請此品淹留在內江東所傳止得二十七品梁有滿法師講經一百遍於長沙郡燒身仍以此品安持品之前然以彼自私安未聞天下陳有南嶽大師次此品在寶塔之後晚以正法華勘之甚相應今四瀆混和見長安舊本故知二師安次深得經意二經文二初明昔日達多通經釋迦成道二明今日文殊通經龍女成佛初文又三初昔師弟持經相二結會古今三斷疑勸信初文又二初長行二偈頌初文又四初求法時節爾時佛告諸菩薩及天人四眾吾於過去無量劫中求法華經無有懈倦二正明求法二初明發願於多劫中常作國王發願求於無上菩提心不退轉二明修行二初明欲滿檀那勤行布施為欲滿足六波羅蜜勤行布施心無恡惜象馬七珍國土妻子奴婢僕從頭目髓腦身肉手足不惜軀命為欲滿足六波羅蜜者然菩薩之道願行相扶既發大願必須修行言六波羅蜜者即是菩薩正行之本也故上文云為求菩薩者說應六波羅蜜勤行布施即是檀那此翻布施者內有信心外有福田中有財物三者和合而運捨心能破慳貪是名為檀然施有二種一財二法財施謂飲食衣服田宅六畜奴婢珍寶一切己所有資身之具及以妻子乃至身命皆屬財施故云捨身猶屬財施隨有須者悉能施與皆名檀也法施者若從諸佛及善知識聞說世出世間善法若從經論中自以觀行力而能諦了以清淨心為人演說皆名法施若菩薩以質直心行此二種皆名檀也波羅蜜梵語然諸經論所譯不同今略約三種一云事究竟二名到彼岸三曰度無極謂菩薩修此六法能究竟成就通別二種因果一切自行化他之事故云事究竟也乘此六法能從二種生死此岸到二種涅槃彼岸故名到彼岸又因此六法能度通別二種事理諸法之曠遠故云度無極也菩薩於檀中能具修五種心者是時布施名波羅蜜何等為五一知施實相二起慈悲心三發願四迴向五具足方便知施實相者謂能施所受中間財物三者皆空也起慈悲心者須知布施三法俱空名實相施而常運慈悲心欲因此施拔一切苦與一切樂也發願者冀因此施得成無上佛果不求人天二乘果報也迴向者於所施時迴此功德向薩婆若海普及一切羣生也具足方便者能於布施一法旋轉通達一切佛法徧修諸行也菩薩若能運此五心隨有皆施因中說果亦名事究竟到彼岸而度無極二明為滿般若推求妙法時世人民壽命無量為於法故捐捨國位委政太子擊鼓宣令四方求法誰能為我說大乘者吾當終身供給走使梵云般若此翻智慧謂照了一切諸法皆不可得而能通達一切無礙也然智慧有三種一聲聞二支佛三如來於聲聞中自有三種謂學及無學非學非無學等乃至辟支佛智等如來智慧者菩薩從初發心已來行六波羅蜜破魔軍眾及諸煩惱得一切智以成佛道乃至入無餘涅槃隨本願力從是中間所有智慧總相別相一切盡知是名佛智若菩薩以質直清淨心修此三種智慧者是名般若波羅蜜仍於其中具五種心一者了智慧實相非境非智心無所得而能徧學三乘智慧及一切世間智見等餘四準上檀中記也三求得法師時有仙人來白王言我有大乘名玅法蓮華經若不違我當為宣說四受法奉行王聞仙言歡喜踊躍即隨仙人供給所須採果汲水拾薪設食乃至以身而為牀座身心無倦于時奉事經於千歲為於法故精勤給侍令無所乏上文既云時世人民壽命無量此則如來往昔因中修菩薩行動經無量劫至若投身飼虎割肉濟鷹身為橋梁肉充魚米四攝同事靡所不為作雪山童子以半偈而棄捨全身為世國君求妙法執勞千歲輕生重法報德詶恩自非均高下齊聖凡一賢愚泯彼此其孰能至此故今道成覺滿彌歷劫塵復露始因難行之行將欲規誘後進覩此異迹拊臆捫心先聖尚爾我何人哉見賢思齊良有故也二偈頌五初頌求法時節爾時世尊欲重宣此義而說偈言我念過去劫為求大法故二頌正明求法難作世國王不貪五欲樂椎鐘告四方誰有大法者若為我解說身當為奴僕三頌得說法師時有阿私仙來白於大王我有微妙法世間所希有若能修行者吾當為汝說阿私此云無比又云端正即達多往世名四頌受法奉行時王聞仙言心生大喜悅即便隨仙人供給於所須採薪及果蓏隨時恭敬與情存妙法故身心無懈倦普為諸眾生勤求於大法木實曰果草實曰蓏五明結證勸信亦不為己身及以五欲樂故為大國王勤求獲此法遂致得成佛今故為汝說二結會古今二初正結會古今佛告諸比丘爾時王者則我身是時仙人者今提婆達多是二明師弟功滿二初明弟子因報已滿三初明因滿由提婆達多善知識故令我具足六波羅蜜慈悲喜捨善知識有三一外護二同行三教授止觀云夫外護者不揀黑白但能營理所須莫見過莫觸惱莫帆舉而致損壞如母養兒如虎啣子調理得所舊行道人乃能為耳是名外護善知識二同行者更相䇿發不昏不散日有其新切磋琢磨同心齊志如乘一船互相敬重如視世尊是名同行善知識三教授者內外方便通塞妨障皆能決了善巧說法示教利喜轉破人心是名教授善知識具足波羅蜜者度義甚多如大論說捨依正名檀防止七支名戒打罵不報名忍為事始終名精進四禪八定名禪分地息諍名般若此就三藏明六度義又引月藏經就第一義圓明六度其略云若行若坐捨攀緣想是檀捨攀緣不息是尸於境界不生瘡疣是羼不捨於離是精通於事心不放逸是禪於諸法體性無生是般若等此舉初後大槩而已又於法界次第略引餘之四度陳之使披閱者知其大綱二尸波羅蜜此云好善謂好行善道不自放逸者也或受戒行善或不受戒行善皆名尸羅也略說有二種一者在家二者出家在家尸羅謂三歸五戒八戒是也出家尸羅謂沙彌沙彌尼十戒式叉摩那尼六法戒比丘比丘尼具足戒乃至三千威儀八萬律行也至若菩薩十重四十八輕則通在家出家此名共戒也若菩薩以質直清淨心住此二種尸羅中兼能具五種心而修習之此尸羅名波羅蜜五者一知尸羅實相雖罪不可得而好行善道不自放逸三羼提波羅蜜此云忍辱謂內心能忍外所忍境故以名焉忍有二種一生忍二法忍於生忍中仍有二種一於恭敬供養中能忍受心不生著不起憍逸二於瞋罵陵害中不生嫌恨怨惱故總名生忍也法忍亦二種一者非心法謂寒熱風雨饑渴交煎老病死等二者生法謂瞋恚憂愁疑悔淫欲驕慢諸邪見等菩薩於此二法安然不動是名法忍四者毗梨耶此云精進謂勤修善法不自放逸故得名也亦有二種一身二心身者勤修善法行道禮誦講說勸導開蒙革頑名身精進心者勤運善念心心相次令不斷絕名心精進復次勤修施戒善法名身精進勤修忍辱禪定智慧名心精進五者禪波羅蜜此云思惟修謂一切攝心繫念學諸三昧皆名思惟修亦有二種一世間二出世間一世禪謂根本四禪四無量心四無色定等此是凡夫所行禪也二出世禪仍有兩種一出世禪二出世上上禪出世者謂六妙門十六特勝通明九想八念十想八背捨八勝處十一切處練禪十四變化願智頂禪無諍三昧王三昧師子奮迅超越三昧乃至三明六通如是等類皆名出世禪亦名二乘共禪二出世上上禪者謂自性等九種大禪首楞嚴等百八三昧諸佛不動等一百二十三昧皆名出世上上禪亦名不共禪謂不與凡夫二乘共也慈悲喜捨者此四皆名無量心者從境得名以所緣眾生無量故能緣之心亦隨境無量故四皆受無量心名一慈者能與他樂之心二悲者能拔他苦之心三喜者慶他得樂生歡悅之心四捨者緣他無憎愛之心此等四心無有瞋恨怨惱廣大無量遍滿十方名四無量心亦曰四無量定此四各有生緣法緣無緣三種不同三藏生緣二乘但為自調止可攝入定學菩薩為度一切別修四無量心若至果成得名大慈大悲大喜大捨通教法緣三乘同修而亦自他利別別教次第修三圓教一心圓具迹四本一也二明果圓三十二相八十種好紫磨金色十力四無所畏四攝法十八不共神通道力成等正覺廣度眾生三十二相八十種好十八不共十力四無所畏諸經論乃廣說故今不煩舉四攝法者一布施攝菩薩以無所捨心行於財法二種布施若為樂財眾生即以財施而攝取之若為樂法眾生即以法施而攝取之二愛語攝菩薩若以善輭之言隨順一切眾生安慰開喻則一切眾生之所樂聞因是生親愛心依附受道三利行攝菩薩隨起身口意行能令一切眾生各沾利益四同事攝菩薩用法眼明見眾生根緣隨有同欣之者即分形散影普和其光同彼事業各使沾益此四通稱攝者眾生情所愛者即是此之四法若用此四法同情接引則眾生方乃依附然後導以大乘正道而度脫之故云先以欲鈎牽後令入佛道正覺者離邪曰正背妄曰覺三結由益皆因提婆達多善知識故二明法師妙果當成三初明果成告諸四眾提婆達多却後過無量劫當得成佛號曰天王如來應供正徧知明行足善逝世間解無上士調御丈夫天人師佛世尊世界名天道二明化度時天王佛住世二十中劫廣為眾生說於妙法恒河沙眾生得阿羅漢果無量眾生發緣覺心恒河沙眾生發無上道心得無生忍至不退轉三滅後益時天王佛般涅槃後正法住世二十中劫全身舍利起七寶塔高六十由旬縱廣四十由旬諸天人民悉以雜華末香燒香塗香衣服瓔珞幢幡寶葢伎樂歌頌禮拜供養七寶妙塔無量眾生得阿羅漢果無量眾生悟辟支佛不可思議眾生發菩提心至不退轉三斷疑勸信佛告諸比丘未來世中若有善男子善女人聞妙法華經提婆達多品淨心信敬不生疑惑者不墮地獄餓鬼畜生生十方佛前所生之處常聞此經若生人天中受勝妙樂若在佛前蓮華化生蓮華化生者胎經云蓮華生者非胎卵濕化之化生也非化而言化耳請觀音經云蓮華化生為父母無量壽觀經云華臺久者為胎生實非胎也例如蓮華生者亦稱濕卵而非濕卵非胎卵濕化之化生者不同界內四生中之化生如諸天化生仍在父膝等生況同四趣中耶今言化生者忽然而有如藥王中云於淨德王家忽然化生亦稱濕卵等者但以蓮華生濕未剖如濕如卵含在華內義之如胎也二明今日文殊通經龍女成佛二初明文殊通經五初智積請退於時下方多寶世尊所從菩薩名曰智積白多寶佛當還本土智積謂多寶為證經故出勸物流通既訖是故請還二釋尊止之釋迦牟尼佛告智積曰善男子且待須臾此有菩薩名文殊師利可與相見論說妙法可還本土釋尊止之者雖迹門事訖本門未彰故託在文殊以留多寶佛之密意非菩薩所知三文殊尋來爾時文殊師利坐千葉蓮華大如車輪俱來菩薩亦坐寶蓮華從於大海娑竭羅龍宮自然涌出住虗空中詣靈鷲山從蓮華下至於佛所頭面敬禮二世尊足修敬已畢往智積所共相慰問却坐一面問文殊序中在座今云何自海而來今為答之豈以凡情而度聖境不起此會於海化物義亦何辜亦可在序一期益訖去時豈要白知來時大利方生與眾自海而至或當彼有廣文具有出會之語而傳至此者略耳問三千世界之外各四百萬億無復大海文殊何故仍云從海涌出答事釋未爽況不思議今以三義通之一者既移天人及變大海若從所移處來應無遠弊二者海眾縱移而龍宮不動龍謂不動而所居已變從變而不變處來有何不可三者無緣者被移有緣者今來此不思議山海宛然令眾不見但是變見非謂改體文殊既不起而往其土亦即穢而淨故淨名云移置佗土都不使人有往來想此中乃使有往來想而本不移故知有其機者則土變眾移而尚來無其緣者土復眾來而不至所以理雖無動化事成規故使所見不同來往時異菩薩化儀尚爾豈佛設變同凡四智積問化智積菩薩問文殊師利仁往龍宮所化眾生其數幾何五文殊決答七初答利益甚眾文殊師利言其數無量不可稱計非口所宣非心所測且待須臾自當證知二蒙益者集證所言未竟無數菩薩坐寶蓮華從海涌出詣靈鷲山住在虗空三皆是文殊化此諸菩薩皆是文殊師利之所化度具菩薩行皆共論說六波羅蜜四聲聞先稟小本聲聞人在虗空中說聲聞行先稟權教住二乘道但說斷生死五今聞實住大今皆修行大乘空義今聞實教悉住大乘法也六文殊結利益文殊師利謂智積曰於海教化其事如是七智積偈讚歎爾時智積菩薩以偈讚曰大智德勇健化度無量眾今此諸大會及我皆已見演暢實相義開闡一乘法廣導諸眾生令速成菩提二明龍女利益九初明文殊自敘文殊師利言我於海中唯常宣說妙法華經二明智積致問智積問文殊師利言此經甚深微妙諸經中寶世所希有頗有眾生勤加精進修行此經速得佛不三明文殊實答文殊師利言有娑竭羅龍王女年始八歲智慧利根善知眾生諸根行業得陀羅尼諸佛所說甚深秘藏悉能受持深入禪定了達諸法於剎那頃發菩提心得不退轉辯才無礙慈念眾生猶如赤子功德具足心念口演微妙廣大慈悲仁讓志意和雅能至菩提四智積執別難智積菩薩言我見釋迦如來於無量劫難行苦行積功累德求菩提道未曾止息觀三千大千世界乃至無有如芥子許非是菩薩捨身命處為眾生故然後乃得成菩提道不信此女於須臾頃便成正覺無量劫行行是別教法智積難今龍女須臾成佛乃是報別疑圓是故不信也五龍女以圓釋二初經家敘言論未訖時龍王女忽現於前頭面禮敬却住一面以偈讚曰二偈頌讚三初明持經得解深達罪福相徧照於十方罪福相者約七方便迭論罪福今既開權無罪無福唯一實相名為深達十方即十法界同以實慧明之故言徧照二明成就二身微妙淨法身具相三十二以八十種好用莊嚴法身天人所戴仰龍神咸恭敬一切眾生類無不宗奉者具三十二相者深得法身之理即備相好如大品明欲得一切法當學般若如得如意珠也二乘但得空空無相好也以彼大品般若平等大慧即今經一實相理故引證焉三明引佛為證又聞成菩提唯佛當證知我開大乘教度脫苦眾生六身子挾藏難二初總難信時舍利弗語龍女言汝謂不久得無上道是事難信所以者何女身垢穢非是法器云何能得無上菩提佛道懸曠經無量劫勤苦積行具修諸度然後乃成二出五礙又女人身猶有五障一者不得作梵天王二者帝釋三者魔王四者轉輪聖王五者佛身云何速得成佛五礙即五障女身由此致有留礙障難梵王即初禪天主釋稱梵王道謂玉帝其實一人兩號各從其教彼宗所譚止齊九天九天以外了無所聞葢彼天有語言覺觀能施號令所以諸佛說法得梵王前導天帝後隨帝釋即忉利天主住善見宮統王三十三天者也魔王即無想天主或別有所化徒黨為彼眾所君淨名云有力大魔皆地住菩薩證不思議解脫法門示邪顯正匡持佛運輪王有四不能盡舉且以金輪王王四天下為號耳佛身則分果具該也七龍女以實釋二初獻珠表得圓解爾時龍女有一寶珠價直三千大千世界持以上佛佛即受之龍女謂智積菩薩尊者舍利弗言我獻寶珠世尊納受是事疾不答言甚疾女言以汝神力觀我成佛復速於此圓珠表其修得圓因奉佛是將因剋果佛受疾者表龍女獲果速也此即一念坐道場成佛不虗也二正示因圓果滿當時眾會皆見龍女忽然之間變成男子具菩薩行即往南方無垢世界坐寶蓮華成等正覺三十二相八十種好普為十方一切眾生演說妙法胎經云魔梵釋女皆不捨身不受身悉於現身得成佛故彼經偈曰法性如大海不說有是非凡夫賢聖人平等無高下唯在心垢滅取證如反掌八時眾聞見得益二初正明見聞爾時娑婆世界菩薩聲聞天龍八部人與非人皆遙見彼龍女成佛普為時會人天說法二人天歡喜心大歡喜悉遙敬禮無量眾生聞法解悟得不退轉無量眾生得受道記無垢世界六變震動娑婆世界三千眾生住不退地三千眾生發菩提心而得受記無量眾生等彼土蒙益也娑婆世界等此土蒙益也南方緣熟宜以八相成道此土緣薄祗以龍女教化此是權巧之力得一身一切身普現色身三昧九智積身子默受智積菩薩及舍利弗一切眾會默然信受聞見既資於目擊信敬即獲於除疑喜兼天人益均彼此三持品明忍力成者此土弘經新得記者他土弘經二初品目妙法蓮華經持品第十三正經名勸說品二萬菩薩奉命弘經故名持品重勸八十萬億那由佗菩薩弘經故名勸持品問何故爾二萬是法師品初別命之數故奉旨受持八十萬億那由佗等前無別命止是通覔故今以佛眼視令其發誓此土通經通經證驗深重佛意殷勤是故蒙勸而弘故有二意也二經文二初明受持三初二萬菩薩奉命此土弘經爾時藥王菩薩摩訶薩及大樂說菩薩摩訶薩與二萬菩薩眷屬俱皆於佛前作是誓言惟願世尊不以為慮我等於佛滅後當奉持讀誦說此經典後惡世眾生善根轉少多增上慢貪利供養增不善根遠離解脫雖難可教化我等當起大忍力讀誦此經持說書寫種種供養不惜身命眾生善少眾生濁也多增上慢見濁也貪利供養煩惱濁也增不善根命濁也遠離解脫劫濁也若非深位菩薩忍力成就安能於此五濁惡世弘通此經耶二諸大聲聞發誓他國流通爾時眾中五百阿羅漢得受記者白佛言世尊我等亦自誓願於異國土廣說此經復有學無學八千人得受記者從座而起合掌向佛作是誓言世尊我等亦當於佗國土廣說此經所以者何是娑婆國中人多弊惡懷增上慢功德淺薄瞋濁諂曲心不實故問此諸聲聞既得授記已登初住破無明惑得無生忍成大菩薩何故不能於此惡世通經答為引初心始行菩薩未能惡世苦行通經復欲發起如來開於安樂行品也三諸比丘尼請菩提記四初姨母請記二初請爾時佛姨母摩訶波闍波提比丘尼與學無學比丘尼六千人俱從座而起一心合掌瞻仰尊顏目不暫捨姨母者本行集云釋種善覺生於八女時淨飯王兄弟四人各納二女淨飯王妃即摩耶愛道摩耶生菩薩已七日命終生忉利天愛道是姨故云姨母二記於時世尊告憍曇彌何故憂色而視如來汝心將無謂我不說汝名授阿耨多羅三藐三菩提記耶憍曇彌我先總說一切聲聞皆已授記今汝欲知記者將來之世當於六萬八千億諸佛法中為大法師及六千學無學比丘尼俱為法師汝如是漸漸具菩薩道當得作佛號一切眾生憙見如來應供正徧知明行足善逝世間解無上士調御丈夫天人師佛世尊憍曇彌是一切眾生憙見佛及六千菩薩轉次授記得阿耨多羅三藐三菩提我先總說一切聲聞皆已授記者即指五百弟子品偈云迦葉汝已知等一行半偈也二耶輸請記二初請爾時羅睺羅母耶輸陀羅比丘尼作是念世尊於授記中獨不說我名二記佛告耶輸陀羅汝於來世百千萬億諸佛法中修菩薩行為大法師漸具佛道於善國中當得作佛號具足千萬光相如來應供正徧知明行足善逝世間解無上士調御丈夫天人師佛世尊佛壽無量阿僧祇劫三諸尼領解爾時摩訶波闍波提比丘尼及耶輸陀羅比丘尼并其眷屬皆大歡喜得未曾有即於佛前而說偈言世尊導師安穩天人我等聞記心安具足四諸尼發願諸比丘尼說是偈已白佛言世尊我等亦能於他方國廣宣此經二明勸持二初長行五初明佛眼視爾時世尊視八十萬億那由佗諸菩薩摩訶薩眼視默勸而不告言者上來雖不別命諸菩薩而如來已舉持經功德深厚引證分明又多寶分身遠來勸發此之殷勤事義已足有欲應命宜即發誓無煩復言又將護聲聞佗方弘經之願故不稱揚此土弘經之事也二菩薩請告是諸菩薩皆是阿惟越致轉不退法輪得諸陀羅尼即從座起至於佛前一心合掌而作是念若世尊告勅我等持說此經者當如佛教廣宣斯法三明佛默然復作是念佛今默然不見告勅我當云何四菩薩知意時諸菩薩敬順佛意并欲自滿本願五發誓通經便於佛前作師子吼而發誓言世尊我等於如來滅後周旋往返十方世界能令眾生書寫此經受持讀誦解說其義如法修行正憶念皆是佛之威力惟願世尊在於他方遙見守護二偈頌四初披衣弘經三初總論時節以明著衣即時諸菩薩俱同發聲而說偈言惟願不為慮於佛滅度後恐怖惡世中我等當廣說二別明所忍之境三初通明邪見之人有諸無智人惡口罵詈等及加刀杖者我等皆當忍此下九行別明所忍之境今一行通明邪見之人即俗眾也二道門增上慢者惡世中比丘邪智心諂曲未得謂為得我慢心充滿三僭聖增上慢者或有阿練若納衣在空閑自謂行真道輕賤人間者貪著利養故與白衣說法為世所恭敬如六通羅漢是人懷惡心常念世俗事假名阿練若好出我等過而作如是言此諸比丘等為貪利養故說外道論義自作此經典誑惑世間人為求名聞故分別於是經常在大眾中欲毀我等故向國王大臣婆羅門居士及餘比丘眾誹謗說我惡謂是邪見人說外道論義阿練若或曰阿蘭若中含翻無事大論翻遠離處薩婆多論翻閑靜處或翻無諍坐禪三昧經云無諍者將護眾生不令起諍也寶雲經云阿蘭若者不與世諍不近不遠便於乞食有樹陰多華果足淨水無難事不險阻易登陟獨無侶誦所聞有王大臣長者等來尋詣之作是言善來善來若至住處應喚令坐勿獨自坐若不就鄙座應種種安慰為其說法若不樂廣說應為略說等云云若不爾者非蘭若行凡居蘭若為調煩惱自舉蔑他非無諍行未知端拱意在何之輕倨師友傲慢王臣况令無識者謂聖使有眼者寒心羅云之行永乖空生之德安在但由心無內實專以身營外虗篤論其道諸無所云審如賓頭盧知王七年失國及稠禪師進否為王故起居適時安得一向假名阿練若此舉其身業不善也好出我等過此舉其意業不善也而作如是言等此舉其口業不善也三明總著衣之意我等敬佛故悉忍是諸惡為斯所輕言汝等皆是佛如此輕慢言皆當忍受之敬佛忍惡此與常不輕意同箋難云為斯所輕言汝等皆是佛者罵法有二謂善惡也罵人為佛輕之甚矣濁劫惡世中多有諸恐怖惡鬼入其身罵詈毀辱我我等敬信佛當著忍辱鎧為說是經故忍此諸難事我不愛身命但惜無上道我等於來世護持佛所囑世尊自當知濁世惡比丘不知佛方便隨宜所說法惡口而顰蹙數數見擯出遠離於塔寺如是等眾惡念佛告敕故皆當忍是事二入室弘經諸聚落城邑其有求法者我皆到其所說佛所囑法三坐座弘經我是世尊使處眾無所畏我當善說法願佛安穩住四總結請知我於世尊前諸來十方佛發如是誓言佛自知我心四安樂行品為外凡力弱者說依之法弘不慮危苦二初品目妙法蓮華經安樂行品第十四釋文三一依事二附文三法門依事者身無危險故安心無憂惱故樂身心安樂則能進行也行即涅槃道從因得名安樂即大涅槃從果得名因果苦樂有四句有因果皆苦如常見外道行於苦行還得苦報有因樂果苦如斷見外道恣情取樂後得苦報有因苦果樂如折法三乘無常拙度加功苦至方入涅槃若因果但樂今安樂行即是大品如實巧度餘皆非安樂行獨此妙因妙果稱安樂行也附文者著如來衣住忍辱地故法身安入如來室而不卒暴故解脫心樂坐如來座觀諸法實相故般若前導其行進矣總此三德為行之境大論云菩薩從初發心常觀涅槃行道因時用此三法導三業為行三業淨即淨六根六根淨發相似解得入真因乃至即絕待名安樂行也法門者安名不動樂名不受行名無行不動者不為生死涅槃二邊所動即安住不動也不受者不受三昧廣大之用凡聖五受皆所不受有受則有苦無受則無苦無苦無樂乃名大樂行名無行者若有所受則有所行不行凡夫行不行聖賢行故無行而行中道也二經文二初問二初歎深行菩薩能如此弘經爾時文殊師利法王子菩薩摩訶薩白佛言世尊是諸菩薩甚為難有敬順佛故發大誓願於後惡世護持讀誦說是法華經此歎前品深行菩薩於濁惡世能奉命弘經也二問淺行菩薩云何說是經世尊菩薩摩訶薩於後惡世云何能說是經此問淺行菩薩云何惡世弘經二答三初總標四行章門二解釋修行方法三總明行成之相今初佛告文殊師利若菩薩摩訶薩於後惡世欲說是經當安住四法四法者總標身口意誓願四安樂行也二解釋修行方法四初身安樂行二口安樂行三意安樂行四誓安樂行初文又二初長行二偈頌初文又二初標行近一者安住菩薩行處親近處能為眾生演說是經行名進趣近名修習又行處是忍辱衣近處是法空座忍辱必內懷至理歷緣耐事名之為行法空必體達外緣棲息真境目之為近也二釋行近二初釋行處文殊師利云何名菩薩摩訶薩行處若菩薩摩訶薩住忍辱地柔和善順而不卒暴心亦不驚又復於法無所行而觀諸法如實相亦不行不分別是名菩薩摩訶薩行處釋此為三初約一法謂一實諦次約二法謂生法二忍三約三法謂不思議三諦也初一實諦者為一切所歸為一切作本而徧無分別為一切所歸故云住忍辱地諸法歸之故名為地眾行休息故名忍辱此即行不行之行如來衣也為一切作本故云柔和善順等眾行得理而成譬如萬物得地而生若得理本在剛能柔在逆能順在暴能治在驚能安無量功德從中道一實地生地無所生而生功德此即不行行之行如來室也徧無分別故云又復於法等謂了知行與不行性相無二見諸法實名不分別亦無不分別相可得名為亦不行不分別即是非行非不行之行如來座也無三行而三行故名為行同一實諦故名為處次生法二忍者即生法二空也此與二乘不同二乘生空但破界內我執二乘法空但破界內邪因緣無因緣法執今明圓教二空約十界假名即中道故無復十界假名可得故名生空約十界實法即中道故無復十界實法可得故名法空若更開者即為四忍謂伏忍順忍無生忍寂滅忍也五忍六忍及四十二忍略又復於法無所行而觀諸法如實相即無生忍亦不行不分別即寂滅忍前二名生忍後二名法忍從始至終以二空理忍諸法是著如來衣安住二空理是坐如來座愍諸眾生是入如來室二空四忍名為行理即是處故云是菩薩行處也三約不思議三諦者住忍辱地總論三諦如有地可據方能忍辱也柔和善順者善順真諦能忍界內界外虗妄見愛寒熱等也而不卒暴心亦不驚者安於俗諦忍眾根緣稱適機宜故不卒暴體忍違從故心不驚也於法無所行等者即安中諦能忍二邊故云無所行正住中道故云觀如實相亦不得中實故云亦不行不分別此則據三諦之地名為處忍五住之辱名為行行亦為三謂止行即行而不行著如來衣觀行即非行非不行坐如來座慈悲行即不行而行入如來室是謂約三法釋菩薩行處明弘經方軌也二釋近處三初即遠而論近十初遠其豪勢即是憍慢之緣云何名菩薩摩訶薩親近處菩薩摩訶薩不親近國王王子大臣官長此下釋近處明遠十惱亂乃即遠而論近也亦是附戒門助觀也上直緣理住忍辱地今戒門廣出眾辱之緣應修遠離不同凡夫刀杖自防亦非二乘棄捨不觀但以正慧而遠離之即遠論近故云親近處也二遠邪人法是邪見之緣不親近諸外道梵志尼犍子等及造世俗文筆讚詠外書及路伽耶陀逆路伽耶陀者此第二遠邪人法也人染邪法迷於正理正觀未成切須防斷不稟內教故名外道梵志即婆羅門此云淨行又翻淨裔其人種類自謂從梵天口生在家事梵天名為梵志出家外道通名尼犍尼犍此云離繫文筆者文謂歌詩之流筆謂銘賦之類讚詠者顯德謂之類寄情謂之詠路伽耶此云惡論亦云破論逆路者逆君父之論又路伽耶名善論亦名師破弟子逆路伽耶名惡論亦名弟子破師三遠兇險戲是散亂緣亦不親近諸有兇戲相扠相撲及那羅等種種變現之戲此第三遠兇戲也相扠相撲即兇戲也那羅此云力即是角力戲亦是設筋力戲也疏云那羅延者上伎戲亦云綵畫其身作變異之相又云緣橦倒擲之類四遠旃陀羅是惡業緣又不親近旃陀羅及畜猪羊雞狗畋獵漁捕諸惡律儀如是人等或時來者則為說法無所希望此第四遠旃陀羅也旃陀羅此云屠者又云嚴熾謂以熾然惡業而自嚴飾也若親近之者令人無慈畜養猪羊雞狗畋獵漁捕者此等皆有殺害之心名惡律儀如是人來當為善巧說法迴其殺害之心不可有於希望之意也五遠二乘眾是小涅槃緣又不親近求聲聞比丘比丘尼優婆塞優婆夷亦不問訊若於房中若經行處若在講堂中不共住止或時來者隨宜說法無所希求此第五遠二乘眾也二乘之人沈滯空寂不能發菩提心故須遠離也六遠欲想相文殊師利又菩薩摩訶薩不應於女人身取能生欲想相而為說法亦不樂見若入佗家不與小女處女寡女等共語此第六遠欲想也欲想能殺害菩提心故或有染其形容姿態語笑威儀折旋俯仰皆能生於欲想須以九想觀治之處女者居處在家未嫁之女也寡女即無夫者也七遠不男人無志操之緣亦復不近五種不男之人以為親厚此第七遠不男也不男壞亂菩提志故五不男者生劇妬變半也生謂從生以來便無男根劇謂以刀去勢妬謂因見他婬方有妬心婬欲即起變謂今生變作半謂半月能男半月不能男也八遠其危害不獨入佗家若有因緣須獨入時但一心念佛此第八遠危害也危害難處不合入故九遠譏嫌事能生他愛緣若為女人說法不露齒笑不現胷臆乃至為法猶不親厚況復餘事此第九遠譏嫌也露齒笑現𮌎臆增佗不善之心為女說法當避譏嫌尚不宜親厚況復餘之事乎十遠樂畜養能生自愛緣不樂畜年少弟子沙彌小兒亦不樂與同師此第十遠畜養也蓋畜養小兒妨修正業故須遠也自初遠豪勢至此遠畜養十種惱亂分為二邊九是生死一是涅槃二俱遠離即寂滅之異名耳如此十法諸教皆然但不近二乘與諸教小異蓋今是圓教行者弘通大乘獨妙之經故須遠離聲聞緣覺小乘之人也二即近論近處常好坐禪在於閑處修攝其心文殊師利是名初親近處今修攝其心乃即近而論近亦是附定門助觀也前遠離十種惱亂即是修戒今常好坐禪即是修定次文觀一切法空即是修慧今修定中有三意謂定心定處定門也心謂能期之心期於破障顯理即修攝其心也處謂五緣中閒居靜處即今在於閒處也門謂修定要門乃五事中調心不沈不浮即今常好坐禪也三非遠近論近三初總標境智復次菩薩摩訶薩觀一切法空此觀一切法空即非遠非近而論近亦是附慧門助觀也初觀字標智即中道能觀之觀智也中間一切法三字標境即十法界所觀之境也後空字但是結成智境能觀之智所觀之境皆不可得即境智皆空二別釋境智如實相不顛倒不動不退不轉如虗空無所有性一切語言道斷不生不出不起無名無相實無所有無量無邊無礙無障如實相三字別釋境也空假二邊對乎中道非一異名如非七方便之權名實以實為相故言如實相不顛等諸句別釋觀也不顛等者凡夫依正二報之法本是無常反執為常本是苦反執為樂本無我反執為我本不淨反執為淨此凡夫四倒也二乘於常樂我淨四德反執為苦無常無我不淨此二乘四倒也菩薩無此八倒故云不顛倒也不動者不為分段變易二種生死所動也不退者契寂滅理心心寂滅入薩婆若海也不轉者不如凡夫流轉生死不如二乘轉凡成聖也如虗空者虗空但有名字名字求不可得中道觀智亦但有名字亦求不可得無所有性者了一切法無自他共離四性之執此出性空之相也一切語言道斷者即絕言思為相空之相也不生者所破之惑能破之智悉皆稱理故不生也不出者如來所治全體即是故無可出不起者以入理故方便理教一切皆寂也此實相之理名不能名故性空相不能相故相空故云無名無相此重牒前無所有等也無所有者重歎中道觀智之體無二邊之有也無量者非陰界入諸數法故無邊者非如偏小有分限法故無礙者徧入諸法故無障者無能遮止故雖復多句祇是能觀無相無作與境合耳亦只是對一切法名一切空三結成境智但以因緣有從顛倒生故說常樂觀如是法相是名菩薩摩訶薩第二親近處上直明中道觀慧非解非惑絕二邊之相今明雙照二邊從惑因緣生生死從解因緣生涅槃又因緣生有於涅槃從顛倒生者生於生死此則雙照意顯也常樂觀如是法者即三諦等法也又但因緣有從顛倒生者結不思議三諦境也故說者不思議教也常樂觀者結不思議三觀也二偈頌三初頌標章爾時世尊欲重宣此義而說偈言若有菩薩於後惡世無怖畏心欲說是經頌上欲說是經當安住四法由住忍地心不驚怖故云無怖畏心二頌修行二初頌事遠近應入行處及親近處常離國王及國王子大臣官長兇險戲者及旃陀羅外道梵志亦不親近增上慢人貪著小乘三藏學者自應入行處下十四行頌上離十惱事約遠論近也破戒比丘名字羅漢及比丘尼好戲笑者深著五欲求現滅度諸優婆夷皆勿親近名字羅漢者謂假名阿羅漢非實證得也求現滅度幾近小乘非大法器故弘大乘經者即不得親近也若是人等以好心來到菩薩所為聞佛道菩薩則以無所畏心不壞希望而為說法寡女處女及諸不男皆勿親近以為親厚不希望者如左溪尊者未甞為利說一句法未甞因法受一毫財如是存心方可謂之無希望也亦莫親近屠兒魁膾畋獵漁捕為利殺害販肉自活衒賣女色如是之人皆勿親近屠殺也亦分割其肉曰屠膾細切肉也販者買賤而賣貴也衒自媒也此等皆非清淨之行故宜遠之兇險相撲種種嬉戲諸婬女等盡勿親近莫獨屏處為女說法若說法時無得戲笑入里乞食將一比丘若無比丘一心念佛是則名為行處近處以此二處能安樂說入里乞食者雜阿含經云有一羊往糞聚飽食還羣貢高我得好食比丘亦如是得四事供養已起染著想不知出要向諸比丘貢高毀蔑他人我得彼不能得是為羊比丘乞食若師子王遇大獸即噉不味不著得小獸即噉不鄙不薄比丘亦爾得四事供養已不起染著想自知出要無增減心是為師子王比丘乞食又比丘乞食未得食前應念為修道故補飢瘡須行乞食既得食已為報施恩念道不輟二頌非遠近又復不行上中下法有為無為實不實法亦不分別是男是女不得諸法不知不見是則名為菩薩行處上中下法者約教則以別教為上通教為中藏教為下約人或指三乘或三教菩薩今約廢權說故云不行等有為等者有為是世間法故不實無為是出世間法故實亦不分別等者觀音義疏以男女表對定慧慧表男定表女正引此二句以明定慧之法性本絕言不可分別故下即云不得諸法等一切諸法空無所有無有常住亦無起滅是名智者所親近處顛倒分別諸法有無是實非實是生非生在於閒處修攝其心安住不動如須彌山觀一切法皆無所有猶如虗空無有堅固不生不出不動不退常住一相是名近處此頌上常好坐禪及觀一切法空等文可見也三頌行成三初標若有比丘於我滅後入是行處及親近處說斯經時無有怯弱此標行成事成則外儀無失理成則內心無滯故說經時無怯弱也二釋菩薩有時入於靜室以正憶念隨義觀法從禪定起為諸國王王子臣民婆羅門等開化演暢說斯經典其心安隱無有怯弱此釋安樂之因因入靜室修禪定故止於過惡得人無我外則不損因正憶念修智慧故離諸取著得法無我內無顛倒是則心不怯弱不怯弱名安樂也三結文殊師利是名菩薩安住初法能於後世說法華經此頌長行總結初法即指身安樂行也二口安樂行二初長行二初標章又文殊師利如來滅後於末法中欲說是經應住安樂行二行法二初止行四初不說過若口宣說若讀經時不樂說人及經典過此釋口安樂之行法有止行觀行今止行中初不樂說能聽人及所聽經典過者法華已前七方便之權法乃是佛為他機隨他意語名不了義人若聽受容有樂偏小之過法是隨機之說則有何過若言法有過則是惱亂其聽受之人非口安樂行之相也二不輕慢亦不輕慢諸餘法師此言弘經者不可倚恃所弘法華之圓而輕蔑偏權小教之法師也佛在世時尚以異方便及餘深法用助圓實之正道後學順教豈可固違須順佛意將護物機三不歎毀不說他人好惡長短於聲聞人亦不稱名說其過惡亦不稱名讚歎其美初不說一切人次別舉聲聞不說他人長短者夫人惡聞其失故不談人短好譽者必善毀故不稱人長故日藏經云初中後夜減省睡眠精進坐禪誦經修道背捨生死向涅槃路不稱他短不說己長四不怨嫌又亦不生怨嫌之心怨去聲損己則怨違情曰嫌若謂其所承之人及所稟之法妨害我道即是怨心若謂其人法鄙劣即是嫌心心機一動聲說即發杜說過之源故不生怨嫌也安樂行者尚去順己之喜況構無怨之恨二觀行善修如是安樂心故諸有聽者不逆其意有所難問不以小乘法答但以大乘而為解說令得一切種智上既觀諸法空心已住於畢竟空理無所取著必不執大而輕於小但隨順物情復不違於大乘法相或有難問則不說小乘法答但以大乘答者有二意若見其無大機而為說小但令得方便小益若不見其無大機而為說小則妨其大緣是故但為說大則無二者之咎二偈頌三初頌標章爾時世尊欲重宣此義而說偈言菩薩常樂安穩說法於清淨地而施牀座以油塗身澡浴塵穢著新淨衣內外俱淨此二行頌上口安樂行中初標章也上總稱應住今頌中別出行相行相有三初半行欲令現前人得安隱道及果即入如來室義次半行即坐如來座義後一行即著如來衣義以此三法導口業名安樂行也二頌行法二初頌止行四初頌不輕慢安處法座隨問為說今半行頌不輕慢若輕慢者則不隨問為說也二不說長短若有比丘及比丘尼諸優婆塞及優婆夷國王王子羣臣士民以微妙義和顏為說若有難問隨義而答三不說人過因緣譬喻敷演分別以是方便皆使發心漸漸增益入於佛道若說人過生人毒念今不說其過故使發心入佛道佛道從喜生故也四頌無怨嫌除懶惰意及懈怠想離諸憂惱慈心說法怨嫌心起則懈懶憂惱今以慈心說法頌無怨嫌者精進無憂故也上長行皆約止善說頌中皆約行善也二頌觀行晝夜常說無上道教以諸因緣無量譬喻開示眾生咸令歡喜衣服臥具飲食醫藥而於其中無所希望但一心念說法因緣願成佛道令眾亦爾是則大利安樂供養上長行中云但以大乘答今頌云說無上道上云令得一切種智今頌云願成佛道令眾亦爾者令佗亦成佛道也三頌行成四初頌標行成我滅度後若有比丘能演說斯妙法華經此一行標口安樂行成也二無過難除心無嫉恚諸惱障礙亦無憂愁及罵詈者又無怖畏加刀杖等亦無擯出安住忍故此二行明內無過則外難不生如無臭物蠅則不來三有善行成智者如是善修其心能住安樂如我上說四格量功德其人功德千萬億劫算數譬喻說不能盡三意安樂行二初長行三初標章又文殊師利菩薩摩訶薩於後末世法欲滅時受持讀誦斯經典者二行法四初止行四初不嫉諂無懷嫉妬諂誑之心夫二乘欲出生死故先除貪欲菩薩欲化佗故先除瞋見嫉是瞋垢諂是見垢嫉妬違慈悲之心非化他之法諂誑乖智慧之道非自行之法若智慧被障將何上求佛道若慈悲有妨將何下化眾生是故菩薩之人欲修意安樂行最須棄之二不輕罵亦勿輕罵學佛道者求其長短亦勿輕罵等者此戒菩薩之人不應自倚圓行而呵責別教行人學佛道者亦不自倚圓教之長求其權教之短知機呵責不知勿罵若其責罵容有退彼善根之義故云亦勿等也三不惱亂若比丘比丘尼優婆塞優婆夷求聲聞者求辟支佛者求菩薩道者無得惱之令其疑悔語其人言汝等去道甚遠終不能得一切種智所以者何汝是放逸之人於道懈怠故比丘等四眾皆有三乘之機故云求聲聞等此戒不應以圓呵通教三乘者其本無大機強以圓呵乖心成惱通既被呵圓復未解前疑後悔大小俱失以去佛道迂迴名甚遠此惱別教行人今文雖曰呵通以通教中復有別機故也若忩忩取證沈空滯寂不能得一切種智此惱通教行人厭生死懶化導名懈怠悲華經明小乘者為懈怠四不諍競又亦不應戲論諸法有所諍競二觀行四初起大悲心違於嫉諂當於一切眾生起大悲想此下四科明觀行也即約前四惡起於行善也二起慈父心違於輕罵於諸如來起慈父想凡求佛道即是學人敬學如佛不得輕罵三起大師想違於惱亂於諸菩薩起大師想於十方諸大菩薩常應深心恭敬禮拜以理論之三乘皆是菩薩有化訓之德皆是眾生之師應起師想勿言其短四平等說法違於諍論於一切眾生平等說法以順法故不多不少乃至深愛法者亦不為多說平等破偏執之諍法本平等故云以順法也不多不少者量其機器之利鈍也三結成二初由止惡惡不能加文殊師利是菩薩摩訶薩於後末世法欲滅時有成就是第三安樂行者說是法時無能惱亂二由觀行勝人來集得好同學共讀誦是經亦得大眾而來聽受聽已能持持已能誦誦已能說說已能書若使人書供養經卷恭敬尊重讚歎由觀行故勝人來集得好同學也二偈頌二初頌行法二初頌止行四初頌不嫉諂爾時世尊欲重宣此義而說偈言若欲說是經當捨嫉恚慢諂誑邪偽心常修質直行二頌不輕罵不輕蔑於人三頌不諍競亦不戲論法四頌不惱亂不令佗疑悔云汝不得佛二頌觀行四初頌於一切起大悲心是佛子說法常柔和能忍慈悲於一切不生懈怠心二頌於菩薩起大師想十方大菩薩愍眾故行道應生恭敬心是則我大師三頌於如來起慈父想於諸佛世尊生無上父想四頌平等說法息諍論破於憍慢心說法無障礙三頌行成第三法如是智者應守護一心安樂行無量眾所敬四誓願安樂行二初長行二初明行法三初標章又文殊師利菩薩摩訶薩於後末世法欲滅時有持是法華經者以身口意與慈悲俱即誓願安樂行發願流通此經故也二行法二初標誓願境二初慈誓境於在家出家人中生大慈心通取曾發方便心而未出三界者名在家斷見思惑盡出三界者名出家此攝得兩教二乘三教菩薩此輩既皆具無明有苦可拔亦應是大悲境但其皆曾發偏小之心與慈誓相應須與其圓道圓果之樂故言生大慈心以慈能與樂故也二悲誓境於非菩薩人中生大悲心通取未曾發方便心者名非菩薩此攝得三界內者既全不曾發小乘方便之心況復能發大乘真實之心則知此等皆是界內流轉生死之徒亦須與樂但其流轉無際正與悲誓相應宜拔其苦因苦果故言生大悲心以悲能拔苦故也二起誓願由二初起慈誓之由應作是念如是之人則為大失如來方便隨宜說法此即起慈之由也如是之人指上曾發方便心者由樂小故執佛方便以為真實不會圓道故言大失大失是慈誓之由也二起悲誓之由不聞不知不覺不問不信不解指上未曾發偏圓心者由未發偏圓之心不聞偏圓二道故以不聞偏道為無聞慧不知偏道為無思慧不覺偏道為無修慧又無圓三慧何者不問圓道故不聞不信圓道故不思不解圓道故不修偏圓三慧權實皆無甚可憐愍即起悲之由也問云何得知前三是權後三是實答準正發誓文但牒後三而為是經故云其人雖不問不信不解是經三正立誓願其人雖不問不信不解是經我得阿耨多羅三藐三菩提時隨在何地以神通力智慧力引之令得住是法中此正發誓願也彼人雖不問不信偏圓二道菩薩不約偏道發誓但欲與其圓道三慧故言雖不問不信不解此經我得三菩提引令得入也三結成三初總結無過失文殊師利是菩薩摩訶薩於如來滅後有成就此第四法者說是法時無有過失今總結無過失既無過失則是行成行云何成以其立大誓願故即入如來室行成以其知四眾失圓道故即坐如來座行成以其誓制其心不懈怠故即著如來衣行成三行具立故言行成無過失者慈悲成故無瞋垢失如來衣成故無懈怠失如來座成故無諂曲失以由此第四誓願行成故無諸失也二別結慈悲成常為比丘比丘尼優婆塞優婆夷國王王子大臣人民婆羅門居士等供養恭敬尊重讚歎虗空諸天為聽法故亦常隨侍若在聚落城邑空閑林中有人來欲難問者諸天晝夜常為法故而衛護之能令聽者皆得歡喜此別結慈悲行成也以慈成故攝得四眾人天供養聽法誓願成故感佛神通諸天衛護如來座成不著於法故聽者歡喜也三釋誓願行成所以者何此經是一切過去未來現在諸佛神力所護故此釋誓願行成三世諸佛尚皆守護況諸天耶二歎經妙二初法說二初昔未顯說文殊師利是法華經於無量國中乃至名字不可得聞此昔未曾顯說故昔不得也二今日乃得何況得見受持讀誦二譬說二初不與珠譬昔未曾顯說二初開譬六初威伏諸國文殊師利譬如強力轉輪聖王欲以威勢降伏諸國今以輪王譬如來化世降伏諸國譬降伏五陰十二入十八界諸境二小王不順而諸小王不順其命小王譬諸煩惱未得無漏智慧調伏名不順其命也三起兵往伐時轉輪王起種種兵而往討伐起種種兵譬七賢中所修方法為前軍須陀洹斯陀含中所修方法為次軍阿那含阿羅漢中所修方法為後軍所破者是三毒等分八萬四千之寇盜能破者是八萬四千法門之官兵四有功歡喜王見兵眾戰有功者即大歡喜五隨功賞賜隨功賞賜或與田宅聚落城邑或與衣服嚴身之具或與種種珍寶金銀琉璃硨磲碼碯珊瑚琥珀象馬車乘奴婢人民田即三昧宅即智慧聚落即初果二果邑即三果城即四果涅槃衣服即慚忍善法嚴身之具即助道善法也種種七寶即七覺支等象馬車乘即二乘盡智無生智也奴婢即神通得有漏善法如入民即七賢位也隨功賞賜者隨其精進功能故佛輪王見小乘眾破見思賊有微功者賜事禪定無漏田宅若見大士應破大惑獲大功勳即賜以髻中明珠也六而不與珠唯髻中明珠不以與之所以者何獨王頂上有此一珠若以與之王諸眷屬必大驚怪髻喻權珠喻實言髻中明珠者實為權所隱也在頂上者譬極果所宗有出分段生死之機為小功勳有出變易生死之機為大功勳驚怪者未有大功忽賜髻珠諸臣皆疑怪譬眾生大機未動忽說此經二乘疑惑菩薩驚怪二合譬六初合威伏諸國文殊師利如來亦復如是以禪定智慧力得法國土王於三界此下六科合上譬也二合小王不順而諸魔王不肯順伏三合起兵往伐如來賢聖諸將與之共戰四合有功歡喜其有功者心亦歡喜五合隨功賞賜於四眾中為說諸經令其心悅賜以禪定解脫無漏根力諸法之財又復賜與涅槃之城言得滅度引導其心令皆歡喜根力者即三十七道品中五根五力也修此根力即不漏落六道生死故名無漏根力也涅槃此云滅度今即小乘真空涅槃也此真空涅槃能防見思之非禦生死之敵故名涅槃城六合而不與珠而不為說是法華經二與珠譬今得聞二初開譬二初有勳文殊師利如轉輪王見諸兵眾有大功者心甚歡喜二與珠以此難信之珠久在髻中不妄與人而今與之珠在髻中者實為權所覆也解髻即開權與珠即顯實用譬法華開權顯實也四十餘年祕而不譚故云不妄與人二合譬二初合有勳如來亦復如是於三界中為大法王以法教化一切眾生見賢聖軍與五陰魔煩惱魔死魔共戰有大功勳滅三毒出三界破魔網爾時如來亦大歡喜二合與珠此法華經能令眾生至一切智一切世間多怨難信先所未說而今說之文殊師利此法華經是諸如來第一之說於諸說中最為甚深末後賜與如彼強力之王久護明珠今乃與之文殊師利此法華經諸佛如來祕密之藏於諸經中最在其上長夜守護不妄宣說始於今日乃與汝等而敷演之一切智者謂一切內法內名能知能解一切外法外名亦能知能解但不能以一切道起一切種故名一切智內法內名者謂理內所詮法相及能詮名字外法外名者即理外所詮法相及能詮名字空觀若成於此名相悉能體達多怨者如五千退席等如云如來現在猶多怨嫉是也雖信者如中下根譬喻因緣二周之後方能信解是也於諸說中等者此經於已今當說最為第一故也明珠者明譬中道智珠喻圓實之理能令至一切智智即果名行始為因行終為果是行一第一之說是教一祕密之藏是理一安置諸子祕密藏中我亦不久自住其中即兼人一二偈頌二初頌行法二初超頌行成爾時世尊欲重宣此義而說偈言常行忍辱哀愍一切乃能演說佛所讚經上長行中總明行成今偈頌中別顯也常行忍辱頌著忍辱衣行成哀愍一切頌入慈悲室行成乃能演說頌坐法空座行成二追頌行法三初頌誓願境後末世時持此經者於家出家及非菩薩應生慈悲二頌誓願由斯等不聞不信是經則為大失三正立誓願我得佛道以諸方便為說此法令住其中二頌歎經二初頌開譬二初頌不與珠譬譬如強力轉輪之王兵戰有功賞賜諸物象馬車乘嚴身之具及諸田宅聚落城邑或與衣服種種珍寶奴婢財物歡喜賜與二頌與髻珠譬如有勇健能為難事王解髻中明珠賜之二頌合譬二初頌合不與珠如來亦爾為諸法王忍辱大力智慧寶藏以大慈悲如法化世見一切人受諸苦惱欲求解脫與諸魔戰為是眾生說種種法以大方便說此諸經二頌合與珠譬既知眾生得其力已末後乃為說是法華如王解髻明珠與之此經為尊眾經中上我常守護不妄開示今正是時為汝等說三總結行成之相三初結勸四行我滅度後求佛道者欲得安穩演說斯經應當親近如是四法此下二十三行是第三總結行成感徵之相以勸修行今結勸身口意誓願四行也二三障清淨三初報障轉轉現報讀是經者常無憂惱又無病痛顏色鮮白滅現世憂惱即除苦受之報此轉現報之心也無病痛顏色鮮白即轉現報之色也二業障轉轉生報不生貧窮卑賤醜陋此轉惡業也惡業之因應感惡果由持經力轉惡因而得好果即轉生報也不生即無惡生業現在持經不作貧窮之業來世不生卑賤也三煩惱障轉轉後報二初別明三煩惱障轉三初別明貪障轉眾生樂見如慕賢聖天諸童子以為給使多貪欲者為人忽慢又障生梵天今貪欲障轉故眾生樂見人不忽慢天童給使不障生梵天二別明瞋障轉刀杖不加毒不能害若人惡罵口則閉塞遊行無畏如師子王捨瞋則除內刀箭入陣則外刃不傷故云刀杖不加三別明癡障轉智慧光明如日之照二總明一切障轉六初夢入十信二初正明慈悲報若於夢中但見妙事見諸如來坐師子座諸比丘眾圍繞說法又見龍神阿修羅等數如恒沙恭敬合掌二正見無癡報自見其身而為說法從若於夢中至此總是夢入圓教十信位二夢入十住又見諸佛身相金色放無量光照於一切以梵音聲演說諸法佛為四眾說無上法見身處中合掌讚佛聞法歡喜而為供養得陀羅尼證不退智佛知其心深入佛道即為授記成最正覺汝善男子當於來世得無量智佛之大道國土嚴淨廣大無比亦有四眾合掌聽法既云證不退智即為授記者當知得入初住無生得記之位也三夢修十行又見自身在山林中修習善法夢入十住之後既云又見自身在山林等知是十行修習善法也修習云行者前非無行不別而別至此最得行名故也四夢悟十向證諸實相既云證諸實相知是十迴向正觀中道位也證諸者諸言正表斷三十品無明也五夢入十地深入禪定見十方佛深入禪定即第十地中無垢三昧入金剛定諸佛皆現摩頂受職也六夢入妙覺諸佛身金色百福相莊嚴聞法為人說常有是好夢又夢作國王捨宮殿眷屬及上妙五欲行詣於道場在菩提樹下而處師子座求道過七日得諸佛之智成無上道已起而轉法輪為四眾說法經千萬億劫三總結行成說無漏妙法度無量眾生後當入涅槃如煙盡燈滅若後惡世中說是第一法是人得大利如上諸功德大段第二本門開近顯遠亦名開師門之近迹顯佛地之遠本三初序段下至汝等自當因是得聞二正說段爾時釋迦至分別功德品彌勒說十九行偈竟三流通段分別功德品爾時佛告彌勒菩薩至經終初文又二初品目玅法蓮華經從地涌出品第十五正本品目同今師嚴道尊鞠躬祗奉如來一命四方奔踊故言從地涌出世界三世化物惠利無疆一月萬影孰能思量召過以示現弘經以益當故言從地涌出品為人虗空湛然無早無晚惑者執迹而闇其本召昔示今破近執而顯遠事對治寂場少父久服種智還年之藥故老而若少寂光老兒亦久稟常住不死之方故少而若老示其藥力咸令得知故言從地涌出品第一義悉文云是從何所來以何因緣集當知四悉檀因緣故涌出也大段第二本門開近顯遠亦名開師門之近迹顯佛地之遠本三初序段從此下至汝等自當因是得聞二正說段從爾時釋迦告彌勒下至分別功德品彌勒說十九行偈三流通段從偈後下十一品半經文也二經文二初涌出二疑問初文又三初他方請弘爾時他方國土諸來菩薩摩訶薩過八恒河沙數於大眾中起合掌作禮而白佛言世尊若聽我等於佛滅後在此娑婆世界勤加精進護持讀誦書寫供養是經典者當於此土而廣說之他方菩薩既聞迹門流通弘經福大咸欲發願住此弘宣是故請也二如來不許爾時佛告諸菩薩摩訶薩眾止善男子不須汝等護持此經所以者何我娑婆世界自有六萬恒河沙等菩薩摩訶薩一一菩薩各有六萬恒河沙眷屬是諸人等能於我滅後護持讀誦廣說此經如來止之凡有三義一者他方菩薩各各自有己任若住此土廢彼利益二者他方菩薩於此土結緣事淺雖欲宣授必無巨益三者若復許之則不得召下方菩薩下方菩薩若不來此近迹不得破遠本不得顯為此三義故如來止之也召下方來亦有三義一者是我弟子應弘我法二者以緣深廣能徧此土益徧他方土益三者得開近顯遠也三下方涌出二初經家敘相五初涌出佛說是時娑婆世界三千大千國土地皆震裂而於其中有無量千萬億菩薩摩訶薩同時涌出地裂者地覆本眷屬如迹隱本今開迹顯本故裂地以表之二身相是諸菩薩身皆金色三十二相無量光明三住處先盡在此娑婆世界之下此界虗空中住住處者常寂光也常即常德寂即樂德光即淨我二德此四德祕密之藏是其住處以不住法住秘藏中下方者法性之淵底玄宗之極地故言下方在下不屬此空中不屬彼非彼非此即中道也又出此不在上亦不在此下不上不下住在空中亦是中道四聞命是諸菩薩聞釋迦牟尼佛所說音聲從下發來來之由者聞命故來世界弘法故來為人破執故來對治顯本故來第一義皆如上說五眷屬一一菩薩皆是大眾唱導之首各將六萬恒河沙眷屬況將五萬四萬三萬二萬一萬恒河沙等眷屬者況復乃至一恒河沙半恒河沙四分之一乃至千萬億那由他分之一況復千萬億那由他眷屬況復億萬眷屬況復千萬百萬乃至一萬況復一千一百乃至一十況復將五四三二一弟子者況復單己樂遠離行如是等比無量無邊算數譬喻所不能知所將眷屬者若人情往望謂領六萬五萬恒沙者為多領三二一者為少單己者隻獨若依文往尋六萬五萬者為少單己者為多故下偈文云單己獨處者其數轉過上若依法門者一一皆是導師能引眾人至於寶所當知一己非獨六萬非多一即一道清淨二即定慧三即戒定慧四即四諦五即五眼六即六度一一度具十法界界界互具成百法界界界十如即具千如如如十善即成萬善一度具萬六度即六萬法門多不為多一不為少非多非少而多而少也二大眾問訊五初三業供養是諸菩薩從地出已各詣虗空七實玅塔多寶如來釋迦牟尼佛所到已向二世尊頭面禮足及至諸寶樹下師子座上佛所亦皆作禮右遶三匝合掌恭敬以諸菩薩種種讚法而以讚歎住在一面欣樂瞻仰於二世尊樹下之座即分身諸佛所坐者也拜遶是身讚法是口瞻仰是意也是諸菩薩摩訶薩從初涌出以諸菩薩種種讚法而讚於佛如是時間經五十小劫是時釋迦牟尼佛默然而坐及諸四眾亦皆默然五十小劫佛神力故令諸大眾謂如半日五十小劫謂如半日四眾徧見此乃隱長而現短借猶與也其神力令狹而見廣俱是不可思議也五十小劫與半日者此是時節不可思議如來所見不以二相下方菩薩常面稱揚如來默然常受其讚解者即短而長謂五十小劫惑者即長而短謂如半日斯為本迹而作弄引如來未說則暗本而執迹佛若開顯則悟近而達遠亦知不思議一也爾時四眾亦以佛神力故見諸菩薩徧滿無量百千萬億國土虗空四眾徧見菩薩者此是如來借其神力令即狹而見廣亦是不思議也夫肉眼天眼所見不遠而今所覩充滿虗空見雨猛知龍大見華盛知池深既知菩薩應相既多必竝證得彌法界之真理也二陳問訊詞二初標四導師是菩薩眾中有四導師一名上行二名無邊行三名淨行四名安立行是四菩薩於其眾中最為上首唱導之師但舉四人者欲擬開示悟入四十位耳如華嚴但舉法慧功德林金剛幢金剛藏說四十位也二正陳問詞二初長行二初問如來安樂在大眾前各共合掌觀釋迦牟尼佛而問訊言世尊少病少惱安樂行不二問眾生易度所應度者受教易不不令世尊生疲勞耶二偈頌二初頌問如來安樂爾時四大菩薩而說偈言世尊安樂少病少惱教化眾生得無疲倦世尊已離世間有漏五陰豈有病惱葢欲示同人法順土常儀故須問云病惱耳二頌問眾生易度又諸眾生受化易不不令世尊生疲勞耶三佛答安樂二初答安樂爾時世尊於諸菩薩大眾中而作是言如是如是諸善男子如來安樂少病少惱二答易度二初根利德厚諸眾生等易可化度無有疲勞所以者何是諸眾生世世已來常受我化亦於過去諸佛恭敬尊重種諸善根此諸眾生始見我身聞我所說即皆信受入如來慧根利德厚者世世已來常受大化始見我身即稟華嚴入如來慧果熟易零此一類眾生則易度也二根鈍德薄除先修習學小乘者如是之人我今亦令得聞是經入於佛慧根鈍德薄者世世已來不受大化為此等人故須開頓說漸三藏方等般若而調伏之亦令此人今聞法華入於佛慧比前雖難於佛甚易根雖利鈍所入是同略舉十意釋之第一始見今見初成道時名始見法華座席久後真實名今見第二開合不開合日照高山即說於頓不開不合為不入者開頓說漸三昧調伏令漸歸頓為開合也第三竪廣橫略橫竪俱廣頓直竪入於法界故言竪廣不歷方便故言橫略今歷五味即是橫廣得入佛慧亦是竪廣第四本一迹多迹共本獨一臺故本一千華故迹多迹與眾經同故言共本與眾經異故言獨第五加說不加說加四菩薩說四十位故曰加說自說開示悟入不加於佗故曰不加第六變土不變土華王世界故言不變三變土田故言變土第七多處不多處七處八會是為多處耆闍崛山遠處虛空故不多處第八斥奪不斥奪滅化城改客作故言斥奪無如此事故不斥奪第九直顯實開權顯實行大直道名直顯實決了聲聞法名開權顯實第十利根初熟鈍根後熟利根初熟始入佛慧鈍根後熟今入佛慧緣宜不同略為十異種智法界等無差別故今經云始見我身聞我所說即皆信受入如來慧除先修習學小乘者今聞此經入於佛慧明文在茲不須疑也四偈頌隨喜爾時諸大菩薩而說偈言善哉善哉大雄世尊諸眾生等易可化度能問諸佛甚深智慧聞已信行我等隨喜能問者即是華嚴中四大士法華中身子三請俱是能問也所問者即是問佛智慧也五如來述歎於時世尊讚歎上首諸大菩薩善哉善哉善男子汝等能於如來發隨喜心如來述歎與上大異何者上文隨喜能問之人皆是菩薩及所化之人聞已信行即是於菩薩等發隨喜心也今如來述歎何故却云汝等能於如來發隨喜心葢能問者皆是古佛汝能隨喜即是隨喜如來是則菩薩隨喜其迹如來述歎其本此亦密表壽量何者今歎菩薩尚是古佛密表今佛非今成也既非今成必有遠本未得彰灼故是密表二疑問二初此土菩薩疑念二初長行疑念爾時彌勒菩薩及八千恒河沙諸菩薩眾皆作是念我等從昔已來不見不聞如是大菩薩摩訶薩眾從地涌出住世尊前合掌供養問訊如來時彌勒菩薩摩訶薩知八千恒河沙諸菩薩等心之所念并欲自決所疑此下是第二疑問序彌勒及諸菩薩咸疑念者凡有四意一者自寂場以後今座以前十方大士來會不絕雖不可限我以補處智力悉見悉知何於此眾不識一人又我遊化十方奉覲諸佛一切海會咸所諳知就履歷處亦所不識若來若去推求不識不識則無世界益故須疑問二者彼諸大士是前進先達彌勒是後番末學後不知前例如文殊不知入定女人境界女人不知棄諸葢菩薩境界以不識故不知彼之內善自善不生無為人益故須疑問三者彼等大士本達實相底應現十方別頭教化所有真應皆非彌勒境界既不識彼利物之道即不識病無對治益故須疑問四者佛託弘經召諸大士大士奉師嚴命故來密開壽量非時眾之所知既不識如來密旨則無第一義益故須疑問也然彌勒迹居補處本亦應深何當如此不識凡有二義若約實論則近成補處不知久本若約權論則本高迹下為物騰疑也二偈頌正問五初問何處來合掌向佛以偈問曰無量千萬億大眾諸菩薩昔所未曾見願兩足尊說是從何所來二問何緣來以何因緣集巨身大神通智慧叵思議其志念堅固有大忍辱力眾生所樂見為從何所來三敘其數量一一諸菩薩所將諸眷屬其數無有量如恒河沙等或有大菩薩將六萬恒沙如是諸大眾一心求佛道是諸大師等六萬恒河沙俱來供養佛及護持是經將五萬恒沙其數過於是四萬及三萬二萬至一萬一千一百等乃至一恒沙半及三四分億萬分之一千萬那由他萬億諸弟子乃至於半億其數復過上百萬至一萬一千及一百五十與一十乃至三二一單己無眷屬樂於獨處者俱來至佛所其數轉過上如是諸大眾若人行籌數過於恒沙劫猶不能盡知四問其師誰是諸大威德精進菩薩眾誰為其說法教化而成就從誰初發心稱揚何佛法受持行誰經修習何佛道五彌勒結請五初結歎神力如是諸菩薩神通大智力二請答來處四方地振裂皆從中涌出世尊我昔來未曾見是事願說其所從國土之名號我常遊諸國未曾見是眾三請答來緣我於此眾中乃不識一人忽然從地出願說其因緣四大會同請今此之大會無量百千億是諸菩薩等皆欲知此事是諸菩薩眾本末之因緣五請答師主無量德世尊惟願決眾疑二佗土菩薩疑爾時釋迦牟尼佛分身諸佛從無量千萬億他方國土來者在於八方諸寶樹下師子座上結跏趺坐其佛侍者各各見是菩薩大眾於三千大千世界四方從地涌出住於虗空各白其佛言世尊此諸無量無邊阿僧祇菩薩大眾從何所來爾時諸佛各告侍者諸善男子且待須臾有菩薩摩訶薩名曰彌勒釋迦牟尼佛之所授記次後作佛已問斯事佛今答之汝等自當因是得聞其佛侍者即他方菩薩是分身眷屬橫在十方與彌勒同疑俱不知如來本地成佛甚久於是各各以疑陳於己佛佛皆抑待彌勒故云彌勒已問斯事汝等自當因是得聞謂分身諸佛自謂答問之益不在於我故不為答抑待釋迦答彌勒問故云待彌勒耳何者彌勒所問事迹不輕釋尊一代未曾顯說因茲答問廣顯長壽此一代玄祕在佛自開汝自當聞我不應答二此半品下至分別功德品彌勒說偈盡本門正說段二初誡許二正說初文又二初長行二初誡二初述讚爾時釋迦牟尼佛告彌勒菩薩善哉善哉阿逸多乃能問佛如是大事二正誡汝等當共一心被精進鎧發堅固意一心誡勿亂被鎧誡勿怠堅固誡勿退也二許二初標示果智慧如來今欲顯發宣示諸佛智慧二三世開化教諸佛自在神通之力諸佛師子奮迅之力諸佛威猛大勢之力科云開化教者宣示也自在神力者過去益物也師子奮迅者十方分身所被之處現在益物也大勢威猛者未來益物也章安私謂如來自在者我德也神通者樂德也師子奮迅者奮迅除垢淨德也大勢威猛未來益物常德也二偈頌二初頌誡爾時世尊欲重宣此義而說偈言當精進一心我欲說此事勿得有疑悔二頌許二初頌智慧果佛智叵思議二頌三世化汝今出信力住於忍善中昔所未聞法今皆當得聞我今安慰汝勿得懷疑懼佛無不實語智慧不可量所得第一法甚深叵分別如是今當說汝等一心聽科頌三世者前師子等以明三世文中亦無三世之語但以義勢同三世耳今頌亦爾直以佛無不實語等半行偈文而用通之語既不虗則知三世益亦真實矣二正說二初一品半正開近顯遠二分別功德品初記領初文又二初此品未略開近顯遠動執生疑二壽量品廣開近顯遠斷疑生信初文又二初略開近顯遠二初長行二初雙答二初答師弟爾時世尊說此偈已告彌勒菩薩我今於此大眾宣告汝等阿逸多是諸大菩薩摩訶薩無量無數阿僧祇從地涌出汝等昔所未見者我於是娑婆世界得阿耨多羅三藐三菩提已教化示導是諸菩薩調伏其心令發道意二答處所此諸菩薩皆於是娑婆世界之下此界虗空中住下方空中住者釋論明有底散三昧底者下也散者空也此但消名若出體狀下釋者是應作四說有者三有也底者非想非非想也是有漏底以深勝故為底藏教又有者名相也底者空也是真諦底以空寂故為底通教又有者二邊俗也底者邊際智滿是俗諦底故為底別教今經以下方空為底不是上界不是下界表中道為底圓教於四釋中但云有底不云散者底即散故二雙釋二初釋師弟二初雙修智斷於諸經典讀誦通利思惟分別正憶念師知弟子修智斷二德於經分別是修智正憶念是修斷二雙證智斷阿逸多是諸善男子等不樂在眾多有所說常樂靜處勤行精進未曾休息不樂在眾是證斷德勤行精進是證智德二釋處所亦不依止人天而住常樂深智無有障礙亦常樂於諸佛之法一心精進求無上慧不依止人天而住是釋處也人天是二邊不住者不著也深智無礙者依不思議智也樂於佛法者樂不思議境也境智甚深微即非淺行菩薩也二偈頌二初頌雙答二初答師弟爾時世尊欲重宣此義而說偈言阿逸汝當知是諸大菩薩從無數劫來修習佛智慧悉是我所化令發大道心此等是我子依止是世界常行頭陀事志樂於靜處捨大眾憒閙不樂多所說如是諸子等學習我道法晝夜常精進為求佛道故二答處所二初正答處所在娑婆世界下方空中住二歎菩薩德志念力堅固常勤求智慧說種種玅法其心無所畏二頌雙釋二初釋師弟我於伽耶城菩提樹下坐得成最正覺轉無上法輪爾乃教化之令初發道心今皆住不退悉當得成佛我今說實語汝等一心信二釋處所我從久遠來教化是等眾二因疑更請二初長行二初疑動執生疑爾時彌勒菩薩摩訶薩及無數諸菩薩等心生疑惑怪未曾有而作是念云何世尊於少時間教化如是無量無邊阿僧祇諸大菩薩令住阿耨多羅三藐三菩提彌勒等既聞上菩提樹下乃教化之今皆住不退又聞我從久遠來教化是等眾由聞此二說動執生疑二請二騰疑致請初法說三初執近疑遠即白佛言世尊如來為太子時出於釋宮去伽耶城不遠坐於道場得成阿耨多羅三藐三菩提從是已來始過四十餘年世尊云何於此少時大作佛事以佛勢力以佛功德教化如是無量大菩薩眾當成阿耨多羅三藐三菩提此疑成道近所化甚多執近而疑遠也伽耶此云山城去菩提道場約二十里故曰不遠二執遠疑近世尊此大菩薩眾假使有人於千萬億劫數不能盡不得其邊斯等久遠已來於無量無邊諸佛所植諸善根成就菩薩道常修梵行三難信結請世尊如此之事世所難信二譬說二初開譬三初譬成道近意譬如有人色美髮黑年二十五二譬所化多意指百歲人言是我子其百歲人亦指年少言是我父生育我等三總結譬難信是事難信二合譬三初合近譬佛亦如是得道已來其實未久二合遠譬而此大眾諸菩薩等已於無量千萬億劫為佛道故勤行精進善入出住無量百千萬億三昧得大神通久修梵行善能次第習諸善法巧於問答人中之寶一切世間甚為希有此菩薩久種善根非止伽耶發心善入出住者九次第定是善入師子奮迅三昧是善出超越三昧是善住藏通從初地至十地名善入十地入重玄門再修凡夫事名善出玅覺徧滿名善住別教畢法性三昧名善入首楞嚴三昧名善出王三昧名善住圓教次第習諸善法者據因為善習就果為善入善答難問者具福慧二種莊嚴也七方便之尊故云人中寶也三合請答三初舉佛語今日世尊方云得佛道時初令發心教化示導令向阿耨多羅三藐三菩提世尊得佛未久乃能作此大功德事二明請意二初為現在我等雖復信佛隨宜所說佛所出言未曾虗妄佛所知者皆悉通達彌勒自謂現在見聞我雖未達信而已矣二為未來然諸新發意菩薩於佛滅後若聞是語或不信受而起破法罪業因緣今所請者正為未來淺行新發意者喜生誹謗謗則墮於惡道不退者雖能信而不謗不能增道若為分別而說令謗者則生信信者則增道三正請答二初除我等疑唯然世尊願為解說除我等疑二除未來疑及未來世諸善男子聞此事已亦不生疑二偈頌二初頌法說三初頌執近爾時彌勒菩薩欲重宣此義而說偈言佛昔從釋種出家近伽耶坐於菩提樹爾來尚未久二頌疑遠此諸佛子等其數不可量久已行佛道住於神通力善學菩薩道不染世間法如蓮華在水從地而涌出皆起恭敬心住於世尊前是事難思議三頌結請云何而可信佛得道甚近所成就甚多願為除眾疑如實分別說二頌譬說二初頌開譬譬如少壯人年始二十五示人百歲子髮白而面皺是等我所生子亦說是父父少而子老舉世所不信二頌合譬三初頌合近世尊亦如是得道來甚近二頌合遠是諸菩薩等志固無怯弱從無量劫來而行菩薩道巧於難問答其心無所畏忍辱心決定端正有威德十方佛所讚善能分別說不樂在人眾常好在禪定為求佛道故於下空中住三頌合請請於佛答我等從佛聞於此事無疑願佛為未來演說令開解若有於此經生疑不信者即當墮惡道願今為解說是無量菩薩云何於少時教化令發心而住不退地
